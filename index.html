                {hasEvent&&daysUntil!==null&&(isCountup
                  ?<span style={{fontSize:11,color:"#0A84FF",fontWeight:700}}>📅 {Math.abs(daysUntil)} days since</span>
                  :<span style={{fontSize:11,color:daysUntil<=3?"#FF9F0A":LIME,fontWeight:700}}>⏳ {daysUntil===0?"Today!":daysUntil===1?"Tomorrow":`${daysUntil} days away`}</span>
                )}
              </div>
              {sFreq&&fl&&<span style={{fontSize:10,color:isWord?"#4ECDC4":"#333",flexShrink:0,marginLeft:8,fontWeight:isWord?600:400}}>{fl}</span>}
              {_deltaTally!==null&&<span style={{fontSize:10,fontWeight:700,color:_deltaTally<0?"#FF453A":_deltaTally===0?"#FF9F0A":"#30D158",flexShrink:0,marginLeft:4}} title="Δ Tally: how many times you're ahead (+) or behind (-) schedule">Δ{_deltaTally>0?"+":""}{_deltaTally}</span>}
              {(()=>{const dsd=taskDaysSinceDone(task);if(dsd===null||!hasFreq)return null;const freqN=freqToNum(task.frequency);if(freqN===null)return null;const col=dsd>freqN*1.5?"#FF453A":dsd>freqN?"#FF9F0A":"#555";return<span style={{fontSize:9,color:col,flexShrink:0,marginLeft:3}} title={`Last done ${dsd} day${dsd!==1?"s":""} ago`}>↩{dsd}d</span>;})()}
            </div>
          ):null;
        })()}
      </div>
    </div>
  );
}

function ListView({tasks,buckets,activeTab,onEdit,onDelete,onCheck,readOnly,celebratingIds,onAddTask,boardId}){
  const {col:lvBg,border:lvBorder,text:lvText,muted:lvMuted,navBg:lvNav,lm:lvLm}=useTheme();
  const byTime=(a,b)=>t2m(a.time)-t2m(b.time);
  const ov=[...tasks.filter(t=>t.dueDate&&daysDiff(t.dueDate)<0)].sort(byTime);
  const td=[...tasks.filter(t=>t.dueDate&&daysDiff(t.dueDate)===0)].sort(byTime);
  const nd=[...tasks.filter(t=>!t.dueDate)].sort(byTime);
  const sb=activeTab==="all";
  const [adding,setAdding]=useState(false);
  // Build per-day upcoming sections
  const upcomingDays=[];
  const upTasks=tasks.filter(t=>t.dueDate&&daysDiff(t.dueDate)>0);
  const maxDay=upTasks.reduce((m,t)=>Math.max(m,daysDiff(t.dueDate)),0);
  for(let d=1;d<=maxDay;d++){
    const items=[...upTasks.filter(t=>daysDiff(t.dueDate)===d)].sort(byTime);
    if(items.length>0){
      const lbl=d===1?"Due Tomorrow":d===2?"Due in 2 Days":d===3?"Due in 3 Days":`Due in ${d} Days`;
      const col=d===1?"#FF9F0A":d<=3?MUTED:"#444";
      upcomingDays.push({d,lbl,col,items});
    }
  }
  const Sec=({label,color,items,hideToday})=>items.length===0?null:(
    <div style={{marginBottom:18}}>
      <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:8,paddingLeft:2}}><div style={{width:6,height:6,borderRadius:"50%",background:color}}/><span style={{fontSize:11,fontWeight:700,color,letterSpacing:.8,textTransform:"uppercase"}}>{label}</span><span style={{fontSize:11,color:MUTED}}>{items.length}</span></div>
      {items.map(t=><TaskCard key={t.id} task={t} buckets={buckets} onEdit={onEdit} onDelete={onDelete} onCheck={onCheck} showBucket={sb} listMode={true} readOnly={readOnly} hideToday={hideToday} celebrating={celebratingIds.has(t.id)} onDragStart={()=>{}} onDragOver={()=>{}} onDrop={()=>{}} isDragging={false}/>)}
    </div>
  );
  return(
    <div style={{flex:1,overflowY:"auto",padding:"14px 16px",maxWidth:640,margin:"0 auto",width:"100%"}}>
      <Sec label="Overdue" color="#FF453A" items={ov}/>
      <Sec label="Due Today" color={LIME} items={td} hideToday={true}/>
      {upcomingDays.map(({d,lbl,col,items})=><Sec key={d} label={lbl} color={col} items={items}/>)}
      <Sec label="No Date" color="#333" items={nd}/>
      {ov.length+td.length+upTasks.length+nd.length===0&&<div style={{textAlign:"center",padding:"48px 0",color:"#2a2a2a",fontSize:14}}>No tasks</div>}
      {!readOnly&&<div style={{marginTop:8}}>
        {adding?<InlineAdd colId="do" boardId={boardId} onAdd={t=>{onAddTask(t);setAdding(false);}} onCancel={()=>setAdding(false)}/>
        :<button onClick={()=>setAdding(true)} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:`1px dashed ${BORDER}`,borderRadius:9,cursor:"pointer",color:MUTED,fontSize:13,fontFamily:"inherit",padding:"9px 14px",width:"100%",justifyContent:"center"}} onMouseEnter={e=>{e.currentTarget.style.borderColor="#444";e.currentTarget.style.color=TEXT;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=BORDER;e.currentTarget.style.color=MUTED;}}>+ Add Card</button>}
      </div>}
    </div>
  );
}

function IpSection({tasks,onEdit,onCheck,celebratingIds,readOnly}){
  const {navBg:ipNav,border:ipBo,text:ipTx}=useTheme();
  const [open,setOpen]=useState(true);
  return(
    <div style={{padding:"8px 16px 0",flexShrink:0}}>
      <button onClick={()=>setOpen(o=>!o)} style={{display:"flex",alignItems:"center",gap:8,width:"100%",background:ipNav,border:"1px solid #5E5CE644",borderRadius:8,padding:"8px 12px",cursor:"pointer",fontFamily:"inherit",marginBottom:open?4:0}}>
        <span style={{fontSize:12,color:"#5E5CE6"}}>◉</span>
        <span style={{fontSize:11,fontWeight:700,color:"#5E5CE6"}}>IN PROGRESS</span>
        <span style={{fontSize:10,color:"#5E5CE688",marginLeft:4}}>{tasks.length}</span>
        <span style={{marginLeft:"auto",fontSize:10,color:"#5E5CE688"}}>{open?"▾":"▸"}</span>
      </button>
      {open&&tasks.map(t=>{
        const isDone=t.done||(celebratingIds&&celebratingIds.has(t.id));
        return(
          <div key={t.id} onClick={()=>onEdit(t)} style={{cursor:"pointer",padding:"7px 12px",borderBottom:`1px solid ${ipBo}`,display:"flex",alignItems:"center",gap:8,background:isDone?"#0a120a":"transparent",transition:"background .2s"}}>
            {!readOnly&&<div onClick={e=>{e.stopPropagation();onCheck(t.id);}} style={{width:14,height:14,borderRadius:3,border:`1.5px solid ${isDone?"#30D158":"#5E5CE6"}`,background:isDone?"#30D158":"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
              {isDone&&<span style={{color:"#000",fontSize:7,fontWeight:900,lineHeight:1}}>✓</span>}
            </div>}
            <span style={{fontSize:12,color:isDone?"#30D158":ipTx,flex:1,textDecoration:isDone?"line-through":"none"}}>{t.title||"Untitled"}</span>
          </div>
        );
      })}
    </div>
  );
}

function HourlyCalendar({tasks,buckets,onEdit,onCheck,readOnly,celebratingIds,sb,onAddTask,hideTimeFrames,dayFilter,activeTab,allBuckets}){
  const now=etNow();
  const curNm=now.getHours()*60+now.getMinutes();
  const {showBucketColor:hcSBC,showDuration:hcSD,showFrequency:hcSF,showActionTag:hcSAT,showCardBg:hcSCB,lm:hcLm,navBg:hcNav,cardBg:hcCard,border:hcBo,text:hcTx}=useTheme();
  const HOUR_H=56,MIN_H=22;
  const TF_FRAMES=[
    {label:"Morning",emoji:"🌅",color:"#FF9F0A",start:6*60,end:11*60+59},
    {label:"Afternoon",emoji:"☀️",color:LIME,start:12*60,end:16*60+59},
    {label:"Night",emoji:"🌆",color:"#5E5CE6",start:17*60,end:21*60+59},
    {label:"4th Meal",emoji:"🌙",color:"#0A84FF",start:22*60,end:25*60+59},
  ];
  // Compute target date from dayFilter
  const _targetDate=(()=>{
    if(!dayFilter||dayFilter==="today"||dayFilter==="todaytomorrow"||dayFilter==="all"||dayFilter==="overdue"||dayFilter==="todaynomundane")return todayStr();
    if(dayFilter==="tomorrow"){const d=new Date(todayStr()+"T00:00:00");d.setDate(d.getDate()+1);return d.toISOString().split("T")[0];}
    if(dayFilter.startsWith("wd:")){
      const tgt=parseInt(dayFilter.slice(3));
      const now2=etNow();const dow=now2.getDay();
      const diff=(tgt-dow+7)%7||7;
      const d=new Date(now2);d.setDate(now2.getDate()+diff);
      const y=d.getFullYear(),mo=String(d.getMonth()+1).padStart(2,"0"),dy=String(d.getDate()).padStart(2,"0");
      return `${y}-${mo}-${dy}`;
    }
    return todayStr();
  })();
  const _isToday=_targetDate===todayStr();
  // Bucket filter
  const _bktFilter=t=>{if(!activeTab||activeTab==="all")return true;const childIds=(allBuckets||buckets).filter(b=>b.parentId===activeTab).map(b=>b.id);return t.bucketId===activeTab||childIds.includes(t.bucketId);};
  const _allForTarget=tasks.filter(t=>t.dueDate===_targetDate&&_bktFilter(t)&&!(dayFilter==="todaynomundane"&&t.mundane===true));
  const overdue=_isToday?tasks.filter(t=>t.dueDate&&daysDiff(t.dueDate)<0&&_bktFilter(t)):[];
  const todayAll=_allForTarget;
  const todayTimed=[..._allForTarget.filter(t=>t.time)].sort((a,b)=>t2m(a.time)-t2m(b.time));
  const todayUntimed=_allForTarget.filter(t=>!t.time);
  const [ovExpanded,setOvExpanded]=useState(false);
  const [untimedOpen,setUntimedOpen]=useState(true);
  // Dynamic start hour: today after noon & morning done → 12; future days always 6
  const morningTimed=todayTimed.filter(t=>t2m(t.time)>=6*60&&t2m(t.time)<12*60);
  const morningDone=morningTimed.length===0||morningTimed.every(t=>t.done);
  const START_H=(_isToday&&curNm>=12*60&&morningDone)?12:6;
  const END_H=24;
  const HOURS=Array.from({length:END_H-START_H},(_,i)=>START_H+i);
  const totalH=HOURS.length*HOUR_H;
  // Now line
  const nowMin=Math.max(START_H*60,Math.min(END_H*60,curNm));
  const nowTop=(nowMin-START_H*60)/60*HOUR_H;
  const showNowLine=curNm>=START_H*60&&curNm<=END_H*60;
  // Event layout
  const evts=todayTimed.map(t=>{
    const sm=t2m(t.time);
    const dur=t.duration?Math.max(parseInt(t.duration),15):30;
    return{t,sm,em:sm+dur,dur,col:0,cols:1};
  }).filter(e=>e.sm>=START_H*60&&e.sm<END_H*60);
  const placed=[];
  evts.forEach(e=>{
    const overlapping=placed.filter(p=>p.sm<e.em&&p.em>e.sm);
    const usedCols=overlapping.map(p=>p.col);
    let col=0;while(usedCols.includes(col))col++;
    e.col=col;placed.push(e);
  });
  placed.forEach(e=>{
    const ov=placed.filter(p=>p!==e&&p.sm<e.em&&p.em>e.sm);
    e.cols=Math.max(1,...ov.map(p=>p.col+1),e.col+1);
  });
  const bktColor=t=>{const bkt=buckets.find(b=>b.id===t.bucketId);return bkt?.mainColor||null;};
  const hLabel=h=>h===0||h===24?"12 AM":h===12?"12 PM":h>12?`${h-12} PM`:`${h} AM`;
  const tdLbl=new Date(_targetDate+"T00:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
  // Click hour to create task
  const clickHour=h=>{
    if(readOnly||!onAddTask)return;
    const nt=mkTask("do",null);
    nt.title="";nt.dueDate=_targetDate;nt.time=`${String(h).padStart(2,"0")}:00`;
    onAddTask(nt,true); // true = open edit immediately
  };
  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0}}>
      {/* Date header */}
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 16px 0",flexShrink:0}}>
        <div style={{flex:1,height:1,background:BORDER}}/>
        <div style={{fontSize:11,fontWeight:700,color:LIME,letterSpacing:.8,textTransform:"uppercase",whiteSpace:"nowrap"}}>{tdLbl}</div>
        <div style={{flex:1,height:1,background:BORDER}}/>
      </div>
      {/* Overdue */}
      {overdue.length>0&&(
        <div style={{padding:"8px 16px 0",flexShrink:0}}>
          <button onClick={()=>setOvExpanded(o=>!o)} style={{display:"flex",alignItems:"center",gap:8,width:"100%",background:hcLm?(ovExpanded?"#ffe0e0":"#ffe8e8"):ovExpanded?"#1a0808":"#110808",border:"1px solid #FF453A44",borderRadius:8,padding:"8px 12px",cursor:"pointer",fontFamily:"inherit",marginBottom:ovExpanded?6:0}}>
            <span style={{fontSize:12,color:"#FF453A"}}>⚠</span>
            <span style={{fontSize:11,fontWeight:700,color:"#FF453A"}}>{overdue.length} OVERDUE</span>
            <span style={{marginLeft:"auto",fontSize:10,color:"#FF453A88"}}>{ovExpanded?"▾ hide":"▸ show"}</span>
          </button>
          {ovExpanded&&<div style={{paddingBottom:4}}>{[...overdue].sort((a,b)=>(a.dueDate||"").localeCompare(b.dueDate||"")).map(t=>(
            <div key={t.id} onClick={()=>onEdit(t)} style={{cursor:"pointer",padding:"6px 10px",borderBottom:`1px solid ${hcBo}`}}>
              <span style={{fontSize:12,color:"#FF453A88",marginRight:6}}>{t.dueDate}</span>
              <span style={{fontSize:12,color:hcTx}}>{t.title||"Untitled"}</span>
            </div>
          ))}</div>}
        </div>
      )}
      {/* In Progress one-off tasks (collapsible, after overdue) */}
      {(()=>{
        const ipTasks=_isToday?tasks.filter(t=>t.status==="inprogress"&&!(t.frequency&&t.frequency.trim())&&!t.isRef):[];
        if(!ipTasks.length)return null;
        return <IpSection tasks={ipTasks} onEdit={onEdit} onCheck={onCheck} celebratingIds={celebratingIds} readOnly={readOnly}/>;
      })()}
      {/* Hourly grid */}
      <div style={{flex:1,overflowY:"auto",padding:"8px 12px 0"}}>
        <div style={{width:"100%"}}>
          <div style={{position:"relative",marginLeft:52}}>
            {/* Time-frame bracket bars (left side, when enabled) */}
            {TF_FRAMES.map(fr=>{
              const fStart=Math.max(fr.start,START_H*60),fEnd=Math.min(fr.end,END_H*60);
              if(fStart>=fEnd)return null;
              const top=(fStart-START_H*60)/60*HOUR_H;
              const height=(fEnd-fStart)/60*HOUR_H;
              return(
                <div key={fr.label} style={{position:"absolute",left:-50,top,width:6,height,borderRadius:3,background:fr.color+"55",pointerEvents:"none"}} title={fr.label}/>
              );
            })}
            {/* Hour lines - z-index:0 so event cards sit on top */}
            {HOURS.map((h,i)=>{
              const hm=h*60;
              const fr=TF_FRAMES.find(f=>hm>=f.start&&hm<f.end);
              const isActiveFr=fr&&curNm>=fr.start&&curNm<fr.end&&_isToday;
              const isPastFr=fr&&curNm>=fr.end&&_isToday;
              const hrCol=isActiveFr?fr.color:isPastFr?fr.color+"66":fr?"#333":"#444";
              const hrWeight=isActiveFr?700:400;
              return(
              <div key={h} style={{position:"absolute",top:i*HOUR_H,left:-52,right:0,display:"flex",alignItems:"center",zIndex:0}}>
                <span onClick={()=>clickHour(h)} style={{fontSize:10,color:hrCol,fontWeight:hrWeight,width:46,textAlign:"right",paddingRight:6,flexShrink:0,lineHeight:1,cursor:readOnly?"default":"pointer",whiteSpace:"nowrap",transition:"color .3s"}}
                  onMouseEnter={e=>{if(!readOnly)e.currentTarget.style.color=LIME;}}
                  onMouseLeave={e=>{e.currentTarget.style.color=hrCol;}}>
                  {hLabel(h)}
                </span>
                <div style={{flex:1,height:1,background:hcLm?"#c8ddf0":"#1a1a1a"}}/>
              </div>
              );
            })}
            {/* Half-hour dashes - z-index:0 behind cards */}
            {HOURS.slice(0,-1).map((h,i)=>(
              <div key={`half-${h}`} style={{position:"absolute",top:i*HOUR_H+HOUR_H/2,left:0,right:0,height:1,background:"#111",pointerEvents:"none",zIndex:0}}/>
            ))}
            {/* Now line */}
            {showNowLine&&(
              <div style={{position:"absolute",top:nowTop,left:-52,right:0,display:"flex",alignItems:"center",zIndex:10,pointerEvents:"none"}}>
                <span style={{fontSize:9,color:LIME,width:46,textAlign:"right",paddingRight:4,fontWeight:700,flexShrink:0,whiteSpace:"nowrap",lineHeight:1}}>{fmtTime(`${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`)}</span>
                <div style={{width:8,height:8,borderRadius:"50%",background:LIME,flexShrink:0,marginLeft:-4,boxShadow:`0 0 6px ${LIME}`}}/>
                <div style={{flex:1,height:2,background:`linear-gradient(90deg,${LIME},${LIME}44,transparent)`,borderRadius:1}}/>
              </div>
            )}
            {/* Event blocks - z-index:1 above grid lines */}
            <div style={{position:"relative",height:totalH,marginLeft:8,zIndex:1}}>
              {placed.map(({t,sm,em,dur,col,cols})=>{
                const top=(sm-START_H*60)/60*HOUR_H;
                const height=Math.max(dur/60*HOUR_H,MIN_H);
                const bc=bktColor(t);
                const bkt=buckets.find(b=>b.id===t.bucketId);
                const showBc=hcSBC&&bc;
                const borderCol=showBc?bc+"55":"#2a2a2a";
                const bg=showBc?(hcLm?bc+"33":bc+"0d"):(hcLm?hcCard:"#1c1c1e");
                const isDone=t.done||celebratingIds.has(t.id);
                const titleCol=isDone?"#30D158":hcTx;
                return(
                  <div key={t.id} onClick={()=>onEdit(t)} style={{position:"absolute",top,left:`calc(${col*100/cols}%)`,width:`calc(${100/cols}% - 4px)`,boxSizing:"border-box",paddingRight:4}}>
                    <div style={{height,background:bg,border:`1px solid ${borderCol}`,borderRadius:7,padding:"4px 7px",cursor:"pointer",overflow:"hidden",position:"relative"}}>
                      {showBc&&<div style={{position:"absolute",left:0,top:0,bottom:0,width:3,background:bc,borderRadius:"0 2px 2px 0",opacity:.9}}/>}
                      <div style={{paddingLeft:showBc?6:0}}>
                        <div style={{fontSize:11,fontWeight:700,color:titleCol,lineHeight:1.3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:height>36?"normal":"nowrap",textDecoration:isDone?"line-through":"none",opacity:isDone?.7:1}}>{t.title||"Untitled"}</div>
                        {height>28&&<div style={{fontSize:9,color:"#555",marginTop:2}}>
                          {fmtTime(t.time)}
                          {hcSD&&t.duration?` · ${t.duration}m`:""}
                          {hcSBC&&bkt?` · ${bkt.emoji}`:""}
                          {hcSF&&t.frequency?` · ${t.frequency}`:""}
                        </div>}
                      </div>
                      {!readOnly&&<div style={{position:"absolute",top:4,right:4,width:14,height:14,borderRadius:3,border:`1.5px solid ${isDone?"#30D158":"#444"}`,background:isDone?"#30D158":"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}} onClick={e=>{e.stopPropagation();onCheck(t.id);}}>
                        {isDone&&<span style={{color:"#000",fontSize:7,fontWeight:900,lineHeight:1}}>✓</span>}
                      </div>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
          {/* Untimed tasks */}
          {todayUntimed.length>0&&(
            <div style={{marginTop:16,borderTop:`1px solid ${BORDER}`,paddingTop:8}}>
              <button onClick={()=>setUntimedOpen(o=>!o)} style={{display:"flex",alignItems:"center",gap:8,width:"100%",background:"transparent",border:"none",cursor:"pointer",fontFamily:"inherit",padding:"4px 0",marginBottom:untimedOpen?6:0}}>
                <span style={{fontSize:11,fontWeight:700,color:"#555",letterSpacing:.5}}>⏱ NO TIME SET</span>
                <span style={{fontSize:10,color:"#333"}}>{todayUntimed.length}</span>
                <span style={{marginLeft:"auto",fontSize:9,color:"#333"}}>{untimedOpen?"▾":"▸"}</span>
              </button>
              {untimedOpen&&todayUntimed.map(t=>{
                const isDoneU=t.done||celebratingIds.has(t.id);
                return(
                  <div key={t.id} onClick={()=>onEdit(t)} style={{cursor:"pointer",padding:"7px 10px",borderRadius:7,background:isDoneU?"#0a120a":(hcLm?hcCard:"#111"),marginBottom:4,border:`1px solid ${isDoneU?"#30D15833":hcBo}`,display:"flex",alignItems:"center",gap:8}}>
                    {!readOnly&&<div onClick={e=>{e.stopPropagation();onCheck(t.id);}} style={{width:14,height:14,borderRadius:3,border:`1.5px solid ${isDoneU?"#30D158":"#444"}`,background:isDoneU?"#30D158":"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>{isDoneU&&<span style={{color:"#000",fontSize:7,fontWeight:900,lineHeight:1}}>✓</span>}</div>}
                    <span style={{fontSize:12,color:isDoneU?"#30D158":hcTx,textDecoration:isDoneU?"line-through":"none",opacity:isDoneU?.7:1,flex:1}}>{t.title||"Untitled"}</span>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}


function DayView({tasks,buckets,activeTab,onEdit,onDelete,onCheck,readOnly,celebratingIds,onAddTask,boardId,hideCalOverdue,showTomorrow,hideTimeFrames,onOpenModal,dayFilter}){
  const {col:dvBg,border:dvBo,text:dvTx,muted:dvMu,cardBg:dvCard,lm:dvLm,navBg:dvNav}=useTheme();
  const sb=activeTab==="all";
  const rel=tasks.filter(t=>t.dueDate&&daysDiff(t.dueDate)<=0&&!(dayFilter==="todaynomundane"&&t.mundane===true));
  const ov=rel.filter(t=>daysDiff(t.dueDate)<0);
  const td=rel.filter(t=>daysDiff(t.dueDate)===0);
  const timed=[...td.filter(t=>t.time)].sort((a,b)=>t2m(a.time)-t2m(b.time));
  const untimed=td.filter(t=>!t.time);
  const tmrw=[...tasks.filter(t=>t.dueDate&&daysDiff(t.dueDate)===1)].sort((a,b)=>t2m(a.time)-t2m(b.time));
  const now=etNow(),nm=now.getHours()*60+now.getMinutes();
  const tdLbl=now.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
  const nmLbl=now.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
  const [ovExpanded,setOvExpanded]=useState(false);
  const [untimedOpen,setUntimedOpen]=useState(true);
  const upcoming60=t=>t.time&&!t.time.startsWith("—")&&t2m(t.time)>nm&&t2m(t.time)<=nm+60;

  const TF=[
    {label:"Morning",emoji:"🌅",start:6*60,end:11*60+59},
    {label:"Afternoon",emoji:"☀️",start:12*60,end:16*60+59},
    {label:"Night",emoji:"🌆",start:17*60,end:21*60+59},
    {label:"4th Meal",emoji:"🌙",start:22*60,end:25*60+59},
  ];

  // Initial open state: current + past frames open, future frames closed
  const initOpen=TF.reduce((acc,fr)=>{acc[fr.label]=nm>=fr.start;return acc;},{});
  const [frameOpen,setFrameOpen]=useState(initOpen);
  const toggleFrame=label=>setFrameOpen(s=>({...s,[label]:!s[label]}));

  const Row=({task})=>{
    const isToday=task.dueDate&&daysDiff(task.dueDate)===0;
    const timeColor=dvMu;
    const dotBg=dvLm?"#b0c8e0":"#2a2a2a";
    const dotBorder=dvLm?"#a0b8d0":"#333";
    return(
      <div style={{display:"flex",alignItems:"flex-start",marginBottom:4}}>
        <div style={{width:62,flexShrink:0,paddingTop:10,textAlign:"right",paddingRight:10,whiteSpace:"nowrap"}}>{task.time?<span onClick={e=>{e.stopPropagation();if(!readOnly){const nt=mkTask("do",boardId);nt.title="";nt.dueDate=todayStr();nt.time=task.time;onAddTask(nt);}}} style={{fontSize:10,color:timeColor,fontWeight:400,whiteSpace:"nowrap",cursor:readOnly?"default":"pointer"}}>{fmtTime(task.time)}</span>:<span style={{fontSize:9,color:"#2a2a2a"}}>—</span>}</div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",paddingTop:12,flexShrink:0,width:16}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:dotBg,border:`1.5px solid ${dotBorder}`}}/>
          <div style={{width:1,flex:1,background:dvLm?"#b0c8e0":"#1a1a1a",minHeight:16,marginTop:2}}/>
        </div>
        <div style={{flex:1,paddingLeft:8,paddingBottom:4}}><TaskCard task={task} buckets={buckets} onEdit={onEdit} onDelete={onDelete} onCheck={onCheck} showBucket={sb} listMode={true} readOnly={readOnly} hideTime={true} hideToday={isToday&&!!task.time} celebrating={celebratingIds.has(task.id)} onDragStart={()=>{}} onDragOver={()=>{}} onDrop={()=>{}} isDragging={false}/></div>
      </div>
    );
  };

  const NowLine=()=>(<div style={{display:"flex",alignItems:"center",margin:"6px 0"}}>
    <div style={{width:62,flexShrink:0,textAlign:"right",paddingRight:10,whiteSpace:"nowrap"}}><span style={{fontSize:10,color:LIME,fontWeight:700}}>{nmLbl}</span></div>
    <div style={{width:16,display:"flex",justifyContent:"center"}}><div style={{width:10,height:10,borderRadius:"50%",background:LIME,boxShadow:`0 0 8px ${LIME}88`}}/></div>
    <div style={{flex:1,paddingLeft:8}}><div style={{height:2,background:`linear-gradient(90deg,${LIME},${LIME}44,transparent)`,borderRadius:2}}/></div>
  </div>);

  const FrameBlock=({frame,frameTasks,nowInFrame})=>{
    const open=frameOpen[frame.label];
    const hasPassed=nm>frame.end;
    const isCurrent=nm>=frame.start&&nm<=frame.end;
    const unfinished=frameTasks.filter(t=>!t.done);
    const allClear=hasPassed&&unfinished.length===0;
    const hasProblems=hasPassed&&unfinished.length>0;
    const fmtStart=(()=>{const hr=Math.floor(frame.start/60);const h12=hr===0?12:hr>12?hr-12:hr;const ap=hr>=12?"pm":"am";return `${h12}:00 ${ap}`;})();
    const headerBg=dvLm?(open?(isCurrent?"#d0f5e0":hasPassed?"#e0ecf8":"#e8f0f8"):"#deeaf5"):(open?(isCurrent?"#071500":hasPassed?"#0a0a0a":"#111"):"#0c0c0c");
    const borderColor=isCurrent?"#CAFF4C55":hasProblems?"#FF453A44":allClear?"#30D15844":open?"#333":BORDER;
    const labelColor=isCurrent?LIME:hasProblems?"#FF453A":allClear?"#30D158":"#ccc";
    const statusText=isCurrent?"▶ NOW":allClear?"✓ Cleared":hasProblems?`${unfinished.length} unfinished`:open?`${frameTasks.length} tasks`:`${frameTasks.length} task${frameTasks.length!==1?"s":""}`;
    const statusColor=isCurrent?LIME:allClear?"#30D158":hasProblems?"#FF453A":"#555";
    const preview=!open&&frameTasks.length>0?frameTasks.slice(0,3).map(t=>t.title||"Untitled").join(" · ")+(frameTasks.length>3?" …":""):"";
    const rowsWithNow=[];
    if(open){
      let nowInserted=false;
      frameTasks.forEach(t=>{
        if(!nowInserted&&nowInFrame&&t2m(t.time)>nm){
          rowsWithNow.push(<NowLine key="now"/>);
          nowInserted=true;
        }
        rowsWithNow.push(<Row key={t.id} task={t}/>);
      });
      if(!nowInserted&&nowInFrame)rowsWithNow.push(<NowLine key="now"/>);
    }
    return(
      <div style={{marginBottom:6}}>
        <button onClick={()=>toggleFrame(frame.label)} style={{display:"flex",alignItems:"center",gap:8,width:"100%",background:headerBg,border:`1px solid ${borderColor}`,borderRadius:open?8:"8px",padding:"9px 12px",cursor:"pointer",fontFamily:"inherit",marginBottom:open?4:0,transition:"all .2s"}}>
          <span style={{fontSize:14,fontWeight:900,color:open?"#666":"#aaa",minWidth:14,textAlign:"center",lineHeight:1}}>{open?"▾":"▶"}</span>
          <span style={{fontSize:11,fontWeight:700,color:labelColor,letterSpacing:.5}}>{frame.emoji} {frame.label.toUpperCase()}</span>
          <span style={{fontSize:9,color:"#333",marginLeft:2}}>{fmtStart}</span>
          {!open&&preview&&<span style={{fontSize:10,color:"#444",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginLeft:6,textAlign:"left"}}>{preview}</span>}
          <span style={{marginLeft:"auto",flexShrink:0,fontSize:10,color:statusColor,fontWeight:600}}>{statusText}</span>
          <span style={{fontSize:10,color:"#333",marginLeft:6,flexShrink:0}}>{open?"▾ hide":"▸ show"}</span>
        </button>
        {open&&<div>{rowsWithNow}</div>}
      </div>
    );
  };

  const buildTimedList=()=>{
    if(hideTimeFrames){
      const items=[];
      let nowInserted=false;
      timed.forEach(t=>{
        const tm=t2m(t.time);
        if(!nowInserted&&tm>nm){items.push(<NowLine key="now"/>);nowInserted=true;}
        items.push(<Row key={t.id} task={t}/>);
      });
      if(!nowInserted)items.push(<NowLine key="now"/>);
      return items;
    }
    const blocks=[];
    let nowPlaced=false;
    TF.forEach(frame=>{
      const frameTasks=timed.filter(t=>{const m=t2m(t.time);return m>=frame.start&&m<=frame.end;});
      const nowInFrame=nm>=frame.start&&nm<=frame.end;
      if(nowInFrame)nowPlaced=true;
      if(frameTasks.length>0||nowInFrame){
        blocks.push(<FrameBlock key={frame.label} frame={frame} frameTasks={frameTasks} nowInFrame={nowInFrame}/>);
      }
    });
    const noFrame=timed.filter(t=>{const m=t2m(t.time);return !TF.some(fr=>m>=fr.start&&m<=fr.end);});
    const noFrameItems=[];
    if(!nowPlaced){noFrameItems.push(<NowLine key="now-nf"/>);}
    noFrame.forEach(t=>noFrameItems.push(<Row key={t.id} task={t}/>));
    if(noFrameItems.length>0)blocks.push(<div key="noframe">{noFrameItems}</div>);
    return blocks;
  };

  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0}}>
      <QuickAddBar boardId={boardId} onAdd={onAddTask} onOpenModal={onOpenModal} readOnly={readOnly}/>
      <div style={{flex:1,overflowY:"auto",padding:"14px 0",maxWidth:600,margin:"0 auto",width:"100%"}}>
        {ov.length>0&&(
          <div style={{marginBottom:16,padding:"0 16px"}}>
            <button onClick={()=>setOvExpanded(o=>!o)} style={{display:"flex",alignItems:"center",gap:8,width:"100%",background:dvLm?(ovExpanded?"#ffe0e0":"#ffe8e8"):(ovExpanded?"#1a0808":"#110808"),border:"1px solid #FF453A44",borderRadius:8,padding:"9px 14px",cursor:"pointer",fontFamily:"inherit",marginBottom:ovExpanded?10:0,transition:"margin .2s"}}>
              <span style={{fontSize:13,color:"#FF453A"}}>⚠</span>
              <span style={{fontSize:12,fontWeight:700,color:"#FF453A"}}>{ov.length} OVERDUE TASK{ov.length!==1?"S":""}</span>
              <span style={{marginLeft:"auto",fontSize:11,color:"#FF453A88"}}>{ovExpanded?"▾ hide":"▸ show"}</span>
            </button>
            {ovExpanded&&[...ov].sort((a,b)=>t2m(a.time)-t2m(b.time)).map(t=><Row key={t.id} task={t}/>)}
          </div>
        )}
        <div style={{display:"flex",alignItems:"center",gap:10,margin:"0 16px 14px"}}><div style={{flex:1,height:1,background:BORDER}}/><div style={{fontSize:11,fontWeight:700,color:LIME,letterSpacing:.8,textTransform:"uppercase",whiteSpace:"nowrap"}}>{tdLbl}</div><div style={{flex:1,height:1,background:BORDER}}/></div>
        <div style={{padding:"0 16px"}}>
          {buildTimedList()}
          {untimed.length>0&&(()=>{
            const unfinishedUntimed=untimed.filter(t=>!t.done);
            const allDone=unfinishedUntimed.length===0;
            const ub=unfinishedUntimed.length;
            const uPreview=!untimedOpen?untimed.slice(0,3).map(t=>t.title||"Untitled").join(" · ")+(untimed.length>3?" …":""):"";
            return(
              <div style={{marginBottom:6}}>
                <button onClick={()=>setUntimedOpen(o=>!o)} style={{display:"flex",alignItems:"center",gap:8,width:"100%",background:dvLm?(untimedOpen?"#e8f0f8":"#deeaf5"):(untimedOpen?"#111":"#0c0c0c"),border:`1px solid ${ub>0?"#FF453A33":allDone?"#30D15833":dvBo}`,borderRadius:8,padding:"9px 12px",cursor:"pointer",fontFamily:"inherit",marginBottom:untimedOpen?4:0,transition:"all .2s"}}>
                  <span style={{fontSize:14,fontWeight:900,color:untimedOpen?"#666":"#aaa",minWidth:14,textAlign:"center",lineHeight:1}}>{untimedOpen?"▾":"▶"}</span>
                  <span style={{fontSize:11,fontWeight:700,color:allDone?"#30D158":ub>0?"#FF453A":"#ccc",letterSpacing:.5}}>⏱ NO TIME SET</span>
                  {!untimedOpen&&uPreview&&<span style={{fontSize:10,color:"#444",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginLeft:6,textAlign:"left"}}>{uPreview}</span>}
                  <span style={{marginLeft:"auto",flexShrink:0,fontSize:10,color:allDone?"#30D158":ub>0?"#FF453A":"#555",fontWeight:600}}>{allDone?"✓ Cleared":`${ub} unfinished`}</span>
                  <span style={{fontSize:10,color:"#333",marginLeft:6,flexShrink:0}}>{untimedOpen?"▾ hide":"▸ show"}</span>
                </button>
                {untimedOpen&&untimed.map(t=><Row key={t.id} task={t}/>)}
              </div>
            );
          })()}
          {rel.length===0&&<div style={{textAlign:"center",padding:"48px 0",fontSize:13,fontWeight:800,letterSpacing:1.5,color:LIME,textTransform:"uppercase"}}>YOU CRUSHED THE DAY! 🎉 PARTY!</div>}
        </div>
        {!readOnly&&<div style={{padding:"10px 16px 0"}}><DayAddCard boardId={boardId} onAdd={onAddTask}/></div>}
        {showTomorrow&&tmrw.length>0&&(
          <div style={{padding:"0 16px",marginTop:48}}>
            <div style={{borderTop:`1px solid #1a1a1a`,paddingTop:24,marginBottom:16}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
                <div style={{flex:1,height:1,background:"#1a1a1a"}}/>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:10,fontWeight:700,color:"#444",letterSpacing:1.2,textTransform:"uppercase"}}>Tomorrow</div>
                  <div style={{fontSize:11,color:"#333",marginTop:2}}>{(()=>{const d=new Date();d.setDate(d.getDate()+1);return d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});})()}</div>
                </div>
                <div style={{flex:1,height:1,background:"#1a1a1a"}}/>
              </div>
            </div>
            {tmrw.map(t=><Row key={t.id} task={t}/>)}
          </div>
        )}
      </div>
    </div>
  );
}

function TabataView({tasks,onCheck,onEdit,celebratingIds}){
  const {cardBg:tabCard,border:tabBo,text:tabTx,muted:tabMu,navBg:tabNav,lm:tabLm}=useTheme();
  const [mode,setMode]=useState("manual"); // manual | tasks
  const [workSecs,setWorkSecs]=useState(40);
  const [restSecs,setRestSecs]=useState(20);
  const [rounds,setRounds]=useState(8);
  const [phase,setPhase]=useState("idle"); // idle|work|rest|done
  const [round,setRound]=useState(1);
  const [secs,setSecs]=useState(40);
  const [running,setRunning]=useState(false);
  const tickRef=useRef(null);
  const containerRef=useRef(null);
  const [ringSize,setRingSize]=useState(280);
  useEffect(()=>{
    const el=containerRef.current;if(!el)return;
    const obs=new ResizeObserver(e=>{const w=e[0].contentRect.width;setRingSize(Math.min(Math.max(w-32,220),480));});
    obs.observe(el);return()=>obs.disconnect();
  },[]);
  // Task mode: editable queue
  const baseIP=useMemo(()=>(tasks||[]).filter(t=>t.status==="inprogress"&&!t.done).sort((a,b)=>(a.manualOrder||0)-(b.manualOrder||0)),[tasks]);
  const allTasks=useMemo(()=>(tasks||[]).filter(t=>!t.isRef&&!t.done),[tasks]);
  const [queue,setQueue]=useState(null); // null = use baseIP
  const inProgressTasks=queue!==null?queue:baseIP;
  const [taskIdx,setTaskIdx]=useState(0);
  const [skipped,setSkipped]=useState(new Set());
  const [editingQueue,setEditingQueue]=useState(false);
  const [taskSearch,setTaskSearch]=useState("");
  useEffect(()=>{if(phase==="idle")setQueue(null);},[baseIP]);
  const currentTask=mode==="tasks"?inProgressTasks.filter((_,i)=>!skipped.has(i))[taskIdx]||null:null;
  const taskWorkSecs=currentTask&&currentTask.duration?parseInt(currentTask.duration)*60:workSecs;
  const beep=(freq,dur)=>{try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=freq;o.type="sine";g.gain.setValueAtTime(0.3,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur/1000);o.start(ctx.currentTime);o.stop(ctx.currentTime+dur/1000);}catch{}};
  const start=()=>{
    if(mode==="tasks"){setTaskIdx(0);setSkipped(new Set());setPhase("work");setSecs(taskWorkSecs||workSecs);setRound(1);setRunning(true);}
    else{setPhase("work");setSecs(workSecs);setRound(1);setRunning(true);}
  };
  const skipTask=()=>{
    setRunning(false);clearInterval(tickRef.current);
    setSkipped(s=>{const ns=new Set(s);ns.add(taskIdx);return ns;});
    const remaining=inProgressTasks.filter((_,i)=>i!==taskIdx&&!skipped.has(i));
    if(remaining.length===0){setPhase("done");return;}
    setPhase("work");setSecs(taskWorkSecs||workSecs);setRunning(true);
  };
  const markTaskDone=()=>{
    if(currentTask&&onCheck)onCheck(currentTask);
    setRunning(false);clearInterval(tickRef.current);
    const remaining=inProgressTasks.filter((_,i)=>!skipped.has(i)&&i!==taskIdx);
    if(remaining.length===0){setPhase("done");setRunning(false);return;}
    setTaskIdx(i=>i+1);setPhase("work");
    const nextTask=remaining[0];
    setSecs(nextTask&&nextTask.duration?parseInt(nextTask.duration)*60:workSecs);
    setRunning(true);
  };
  const stop=()=>{setRunning(false);setPhase("idle");clearInterval(tickRef.current);};
  useEffect(()=>{
    if(!running)return;
    tickRef.current=setInterval(()=>{
      setSecs(s=>{
        if(s>1)return s-1;
        if(mode==="tasks"){
          // task mode: when timer hits 0, move to next task
          beep(880,300);
          const remaining=inProgressTasks.filter((_,i)=>!skipped.has(i));
          const nextIdx=taskIdx+1;
          if(nextIdx>=remaining.length){beep(440,600);setRunning(false);clearInterval(tickRef.current);setPhase("done");setSecs(0);}
          else{setTaskIdx(nextIdx);const nt=remaining[nextIdx];setSecs(nt&&nt.duration?parseInt(nt.duration)*60:workSecs);}
          return s;
        }
        // manual mode
        setPhase(ph=>{
          setRound(r=>{
            if(ph==="work"){
              beep(880,150);setSecs(restSecs);return r;
            }else{
              if(r>=rounds){beep(440,600);beep(440,600);setRunning(false);clearInterval(tickRef.current);setPhase("done");setSecs(0);return r;}
              beep(660,150);setSecs(workSecs);return r+1;
            }
          });
          return ph==="work"?"rest":"work";
        });
        return s;
      });
    },1000);
    return()=>clearInterval(tickRef.current);
  },[running,workSecs,restSecs,rounds,mode,taskIdx,skipped,inProgressTasks]);
  const effectiveWork=mode==="tasks"?(currentTask&&currentTask.duration?parseInt(currentTask.duration)*60:workSecs):workSecs;
  const pct=phase==="work"?secs/effectiveWork:phase==="rest"?secs/restSecs:1;
  const phaseColor=phase==="work"?LIME:phase==="rest"?"#0A84FF":phase==="done"?"#30D158":"#444";
  const circumference=2*Math.PI*90;
  const numInput=(label,val,set,min,max)=>(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
      <div style={{fontSize:10,color:MUTED,letterSpacing:1,textTransform:"uppercase"}}>{label}</div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <button onClick={()=>set(v=>Math.max(min,v-5))} style={{width:32,height:32,borderRadius:8,border:`1px solid ${BORDER}`,background:"#111",color:TEXT,fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
        <input type="number" value={val} onChange={e=>set(Math.max(min,Math.min(max,parseInt(e.target.value)||min)))} min={min} max={max} style={{width:60,textAlign:"center",background:"#111",border:`1px solid ${BORDER}`,borderRadius:8,padding:"6px",color:TEXT,fontSize:18,fontWeight:700,fontFamily:"inherit",outline:"none"}}/>
        <button onClick={()=>set(v=>Math.min(max,v+5))} style={{width:32,height:32,borderRadius:8,border:`1px solid ${BORDER}`,background:"#111",color:TEXT,fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
      </div>
    </div>
  );
  const taskQueue=inProgressTasks.filter((_,i)=>!skipped.has(i));
  const totalTasks=taskQueue.length;
  const taskPos=Math.min(taskIdx,totalTasks-1);

  return(
    <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",alignItems:"center",padding:"24px 16px",gap:20,width:"100%",boxSizing:"border-box"}}>
      <div style={{fontSize:13,fontWeight:800,letterSpacing:2,color:MUTED,textTransform:"uppercase"}}>Tabata Timer</div>
      {/* Mode toggle */}
      {(phase==="idle"||phase==="done")&&(
        <div style={{display:"flex",borderRadius:9,border:`1px solid ${BORDER}`,overflow:"hidden"}}>
          {[{id:"manual",label:"Manual"},  {id:"tasks",label:"In Progress Tasks"}].map(m=>(
            <button key={m.id} onClick={()=>setMode(m.id)} style={{padding:"7px 18px",border:"none",background:mode===m.id?LIME:"transparent",color:mode===m.id?"#000":MUTED,fontWeight:700,fontSize:12,fontFamily:"inherit",cursor:"pointer"}}>
              {m.label}
            </button>
          ))}
        </div>
      )}
      {/* Task queue info - editable */}
      {mode==="tasks"&&phase==="idle"&&(
        <div style={{width:"100%",maxWidth:480}}>
          <div style={{background:tabLm?"#e8f2fa":tabCard,borderRadius:10,border:`1px solid ${tabBo}`,padding:"12px 14px",marginBottom:8}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <div style={{fontSize:10,color:tabMu,fontWeight:700,letterSpacing:1,flex:1}}>QUEUE · {inProgressTasks.length} tasks</div>
              <button onClick={()=>setEditingQueue(e=>!e)} style={{padding:"3px 10px",borderRadius:6,border:`1px solid ${tabBo}`,background:editingQueue?LIME:"transparent",color:editingQueue?"#000":tabMu,fontSize:11,cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>✏ Edit</button>
            </div>
            {inProgressTasks.length===0&&!editingQueue&&<div style={{fontSize:12,color:tabMu,fontStyle:"italic"}}>No tasks — add some below or move tasks to In Progress</div>}
            {inProgressTasks.map((t,i)=>(
              <div key={t.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:i<inProgressTasks.length-1?`1px solid ${tabBo}`:"none"}}>
                <span style={{fontSize:10,color:tabMu,width:18,textAlign:"right",flexShrink:0}}>{i+1}.</span>
                <span style={{flex:1,fontSize:12,color:tabTx,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title||"Untitled"}</span>
                {editingQueue
                  ?<input type="number" min="1" max="999" value={t.duration||""} onChange={e=>{const v=e.target.value;setQueue(q=>(q||baseIP).map(x=>x.id===t.id?{...x,duration:v}:x));}} placeholder="min" style={{width:48,padding:"3px 5px",borderRadius:5,border:`1px solid ${tabBo}`,background:tabLm?"#fff":"#1a1a1a",color:tabTx,fontSize:11,fontFamily:"inherit",outline:"none",textAlign:"center"}}/>
                  :<span style={{fontSize:10,color:"#FF9F0A",flexShrink:0}}>{t.duration?t.duration+"m":"—"}</span>
                }
                {editingQueue&&<button onClick={()=>setQueue(q=>(q||baseIP).filter(x=>x.id!==t.id))} style={{background:"none",border:"none",color:"#FF453A",cursor:"pointer",fontSize:14,padding:"0 2px",lineHeight:1}}>✕</button>}
              </div>
            ))}
          </div>
          {editingQueue&&(
            <div style={{background:tabLm?"#e8f2fa":tabCard,borderRadius:10,border:`1px solid ${tabBo}`,padding:"12px 14px"}}>
              <div style={{fontSize:10,color:tabMu,fontWeight:700,letterSpacing:1,marginBottom:8}}>ADD TASKS</div>
              <input value={taskSearch} onChange={e=>setTaskSearch(e.target.value)} placeholder="Search tasks…" style={{width:"100%",boxSizing:"border-box",padding:"7px 10px",borderRadius:7,border:`1px solid ${tabBo}`,background:tabLm?"#fff":"#1a1a1a",color:tabTx,fontSize:12,fontFamily:"inherit",outline:"none",marginBottom:8}}/>
              <div style={{maxHeight:160,overflowY:"auto"}}>
                {allTasks.filter(t=>!inProgressTasks.find(x=>x.id===t.id)&&(!taskSearch||(t.title||"").toLowerCase().includes(taskSearch.toLowerCase()))).slice(0,20).map(t=>(
                  <div key={t.id} onClick={()=>setQueue(q=>[...(q||baseIP),t])} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 8px",borderRadius:7,cursor:"pointer",marginBottom:3}} onMouseEnter={e=>e.currentTarget.style.background=tabLm?"#d0e8f8":"#1a1a1a"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <span style={{fontSize:12,color:LIME}}>+</span>
                    <span style={{flex:1,fontSize:12,color:tabTx,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title||"Untitled"}</span>
                    {t.duration&&<span style={{fontSize:10,color:"#FF9F0A"}}>{t.duration}m</span>}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}
      {/* Current task in progress */}
      {mode==="tasks"&&running&&currentTask&&(
        <div style={{width:"100%",maxWidth:360,background:"#0c1a0c",borderRadius:10,border:"1px solid #30D15844",padding:"12px 14px",textAlign:"center"}}>
          <div style={{fontSize:10,color:MUTED,letterSpacing:1,marginBottom:4}}>NOW WORKING ON ({taskPos+1}/{totalTasks})</div>
          <div style={{fontSize:15,fontWeight:700,color:LIME,lineHeight:1.3}}>{currentTask.title||"Untitled"}</div>
          {currentTask.duration&&<div style={{fontSize:10,color:MUTED,marginTop:4}}>{currentTask.duration} min</div>}
        </div>
      )}
      {/* Ring - full width */}
      <div ref={containerRef} style={{position:"relative",width:"100%",maxWidth:480,flexShrink:0,alignSelf:"stretch"}}>
      <div style={{position:"relative",width:ringSize,height:ringSize,margin:"0 auto"}}>
        <svg width={ringSize} height={ringSize} style={{transform:"rotate(-90deg)"}}>
          {(()=>{const r=ringSize/2*0.86;const cx=ringSize/2,cy=ringSize/2;const sw=Math.round(ringSize*0.057);return(<><circle cx={cx} cy={cy} r={r} fill="none" stroke={tabLm?"#c0d8f0":"#1a1a1a"} strokeWidth={sw}/>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke={phaseColor} strokeWidth={sw}
            strokeDasharray={2*Math.PI*r} strokeDashoffset={2*Math.PI*r*(1-pct)}
            style={{transition:"stroke-dashoffset .9s linear,stroke .3s"}}/></>);})()}
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4}}>
          <div style={{fontSize:Math.round(ringSize*0.22),fontWeight:900,color:phaseColor,lineHeight:1,fontVariantNumeric:"tabular-nums"}}>
            {phase==="idle"?"GO":phase==="done"?"✓":`${Math.floor(secs/60)}:${String(secs%60).padStart(2,"0")}`}
          </div>
          {phase!=="idle"&&phase!=="done"&&mode==="manual"&&<div style={{fontSize:Math.round(ringSize*0.05),color:phaseColor,fontWeight:700,letterSpacing:2}}>{phase==="work"?"WORK":"REST"}</div>}
          {phase!=="idle"&&phase!=="done"&&<div style={{fontSize:Math.round(ringSize*0.04),color:MUTED}}>{mode==="tasks"?`Task ${taskPos+1}/${totalTasks}`:`Round ${round}/${rounds}`}</div>}
          {phase==="done"&&<div style={{fontSize:Math.round(ringSize*0.05),color:"#30D158",fontWeight:700,letterSpacing:1}}>DONE! 🎉</div>}
        </div>
      </div>
      </div>
      {/* Manual controls */}
      {mode==="manual"&&!running&&phase!=="work"&&phase!=="rest"&&(
        <div style={{display:"flex",gap:20,flexWrap:"wrap",justifyContent:"center"}}>
          {numInput("Work (s)",workSecs,setWorkSecs,5,300)}
          {numInput("Rest (s)",restSecs,setRestSecs,5,300)}
          {numInput("Rounds",rounds,setRounds,1,99)}
        </div>
      )}
      {/* Buttons */}
      <div style={{display:"flex",gap:10,flexWrap:"wrap",justifyContent:"center"}}>
        {phase==="idle"||phase==="done"?(
          <button onClick={start} disabled={mode==="tasks"&&totalTasks===0} style={{padding:"13px 40px",borderRadius:12,border:"none",background:LIME,color:"#000",fontSize:16,fontWeight:800,cursor:"pointer",fontFamily:"inherit",opacity:mode==="tasks"&&totalTasks===0?.4:1}}>
            {phase==="done"?"Restart":"Start"}
          </button>
        ):(
          <>
            <button onClick={()=>setRunning(r=>!r)} style={{padding:"12px 22px",borderRadius:12,border:`1px solid ${running?"#333":LIME}`,background:running?"#1a1a1a":LIME,color:running?TEXT:"#000",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
              {running?"Pause":"Resume"}
            </button>
            {mode==="tasks"&&currentTask&&<button onClick={markTaskDone} style={{padding:"12px 18px",borderRadius:12,border:"1px solid #30D15844",background:"#0a140a",color:"#30D158",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>✓ Done</button>}
            {mode==="tasks"&&<button onClick={skipTask} style={{padding:"12px 18px",borderRadius:12,border:`1px solid ${BORDER}`,background:"#111",color:MUTED,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Skip →</button>}
            <button onClick={stop} style={{padding:"12px 22px",borderRadius:12,border:"1px solid #FF453A44",background:"#1a0808",color:"#FF453A",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Stop</button>
          </>
        )}
      </div>
      {mode==="manual"&&phase==="idle"&&<div style={{fontSize:11,color:MUTED,textAlign:"center",lineHeight:1.8}}>
        {rounds} rounds · {workSecs}s work / {restSecs}s rest · ~{Math.round((workSecs+restSecs)*rounds/60)} min
      </div>}
    </div>
  );
}

function DayAddCard({boardId,onAdd}){
  const [adding,setAdding]=useState(false);
  return adding?<InlineAdd colId="do" boardId={boardId} onAdd={t=>{onAdd(t);setAdding(false);}} onCancel={()=>setAdding(false)}/>
  :<button onClick={()=>setAdding(true)} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:`1px dashed ${BORDER}`,borderRadius:9,cursor:"pointer",color:MUTED,fontSize:13,fontFamily:"inherit",padding:"9px 14px",width:"100%",justifyContent:"center",marginBottom:16}} onMouseEnter={e=>{e.currentTarget.style.borderColor="#444";e.currentTarget.style.color=TEXT;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=BORDER;e.currentTarget.style.color=MUTED;}}>+ Add Card</button>;
}

function DurationView({tasks,buckets,actions,brands,persons,labels,devices,activeTab,onEdit,onDelete,onCheck,readOnly,celebratingIds,onAddTask,boardId}){
  const sb=activeTab==="all";
  const fmtMin=m=>{if(!m||m===0)return"0m";if(m<60)return`${m}m`;return`${Math.floor(m/60)}h ${m%60?("0"+m%60).slice(-2)+"m":""}`.trim();};
  const durColor=m=>m<=5?"#30D158":m<=15?LIME:m<=30?"#FF9F0A":"#FF453A";
  const [adding,setAdding]=useState(false);
  const [groupBy,setGroupBy]=useState("time");
  const [durActionF,setDurActionF]=useState("all");
  const [durBucketF,setDurBucketF]=useState("all");
  const [durPriorityF,setDurPriorityF]=useState("all");
  const [durDateF,setDurDateF]=useState("all");
  const [durTimeF,setDurTimeF]=useState("all");
  const [durFreqF,setDurFreqF]=useState("all");
  const [durStatusF,setDurStatusF]=useState("all");
  const [durBrandF,setDurBrandF]=useState("all");
  const [durGamedayF,setDurGamedayF]=useState("all");
  const [durPersonF,setDurPersonF]=useState("all");
  const [durLabelsF,setDurLabelsF]=useState([]); // multi-select array of label ids
  const [durMundaneF,setDurMundaneF]=useState("all"); // all | mundane | normal
  const [durDeviceF,setDurDeviceF]=useState("all");
  const {navBg:dvNav,inp:dvInp,border:dvBrd,text:dvTxt,muted:dvMtd,lm:dvLm,limeText:dvLimeText}=useTheme();
  const selStyle={padding:"5px 9px",borderRadius:7,border:`1px solid ${dvBrd}`,background:dvInp,color:dvTxt,fontSize:12,fontFamily:"inherit",cursor:"pointer",outline:"none"};
  // All tasks (no date gate - List view shows everything)
  const relevant=tasks;
  // Apply internal filters
  const filtered=relevant.filter(t=>{
    if(durDateF==="today"&&(!t.dueDate||daysDiff(t.dueDate)!==0))return false;
    if(durDateF==="overdue"&&(!t.dueDate||daysDiff(t.dueDate)>=0))return false;
    if(durDateF==="upcoming"&&(!t.dueDate||daysDiff(t.dueDate)<=0))return false;
    if(durDateF==="nodate"&&t.dueDate)return false;
    if(durTimeF==="timed"&&!t.time)return false;
    if(durTimeF==="untimed"&&t.time)return false;
    if(durFreqF==="recurring"&&!(t.frequency&&t.frequency.trim()))return false;
    if(durFreqF==="oneoff"&&(t.frequency&&t.frequency.trim()))return false;
    if(durStatusF!=="all"&&t.status!==durStatusF)return false;
    if(durActionF!=="all"&&(t.action||"")!==durActionF)return false;
    if(durBucketF!=="all"&&(t.bucketId||"")!==durBucketF)return false;
    if(durPriorityF!=="all"&&(t.priority||"normal")!==durPriorityF)return false;
    if(durBrandF!=="all"&&(t.brand||"")!==durBrandF)return false;
    if(durGamedayF!=="all"&&(t.gameday||"")!==durGamedayF)return false;
    if(durPersonF!=="all"&&(t.person||"")!==durPersonF)return false;
    if(durLabelsF.length>0&&!(t.labels||[]).includes(durLabelsF[0]))return false;
    if(durMundaneF==="mundane"&&!t.mundane)return false;
    if(durMundaneF==="normal"&&t.mundane)return false;
    if(durDeviceF!=="all"&&(t.device||"")!==durDeviceF)return false;
    return true;
  });
  const withDur=[...filtered.filter(t=>t.duration&&parseInt(t.duration)>0)].sort((a,b)=>parseInt(a.duration)-parseInt(b.duration));
  const noDur=[...filtered.filter(t=>!t.duration||parseInt(t.duration)===0)].sort((a,b)=>todOrd(a)-todOrd(b));
  const totalMin=withDur.reduce((s,t)=>s+parseInt(t.duration||0),0);
  // Build groups based on groupBy mode
  const buildGroups=()=>{
    if(groupBy==="duration"){
      const seen=new Set();const mins=[];
      for(const t of withDur){const m=parseInt(t.duration);if(!seen.has(m)){seen.add(m);mins.push(m);}}
      mins.sort((a,b)=>a-b);
      return mins.map(m=>{
        const items=[...withDur.filter(t=>parseInt(t.duration)===m)].sort((a,b)=>todOrd(a)-todOrd(b));
        const col=durColor(m);
        return{key:`dur-${m}`,label:`${m} min`,color:col,items,extra:fmtMin(m*items.length)+" to clear"};
      });
    }
    if(groupBy==="action"){
      const actMap={};
      filtered.forEach(t=>{const k=t.action||"";if(!actMap[k])actMap[k]=[];actMap[k].push(t);});
      return Object.keys(actMap).sort((a,b)=>(a||"zzz").localeCompare(b||"zzz")).map(k=>{
        const items=[...actMap[k]].sort((a,b)=>parseInt(a.duration||0)-parseInt(b.duration||0));
        const act=(actions||DEFAULT_ACTIONS).find(a=>a.label===k);
        return{key:`act-${k||"none"}`,label:k?(act?`${act.emoji} ${k}`:k):"No Action",color:"#4ECDC4",items,extra:null};
      });
    }
    if(groupBy==="bucket"){
      const bktMap={};
      filtered.forEach(t=>{const k=t.bucketId||"";if(!bktMap[k])bktMap[k]=[];bktMap[k].push(t);});
      return Object.keys(bktMap).sort((a,b)=>{const ba=buckets.find(x=>x.id===a),bb=buckets.find(x=>x.id===b);return(ba?.label||"zzz").localeCompare(bb?.label||"zzz");}).map(k=>{
        const bkt=buckets.find(b=>b.id===k);
        const items=[...bktMap[k]].sort((a,b)=>parseInt(a.duration||0)-parseInt(b.duration||0));
        return{key:`bkt-${k||"none"}`,label:bkt?`${bkt.emoji} ${bkt.label}`:"No Bucket",color:bkt?.mainColor||"#555",items,extra:null};
      });
    }
    if(groupBy==="priority"){
      const order=["crush","high","normal","low"];
      const pMap={};
      filtered.forEach(t=>{const k=t.priority||"normal";if(!pMap[k])pMap[k]=[];pMap[k].push(t);});
      return order.filter(k=>pMap[k]).map(k=>{
        const pi=PMAP[k];
        const items=[...pMap[k]].sort((a,b)=>parseInt(a.duration||0)-parseInt(b.duration||0));
        return{key:`pri-${k}`,label:`${pi.emoji||""} ${pi.label}`.trim(),color:pi.dot||"#555",items,extra:null};
      });
    }
    if(groupBy==="status"){
      const sMap={};
      filtered.forEach(t=>{const k=t.status||"list";if(!sMap[k])sMap[k]=[];sMap[k].push(t);});
      return COLS.filter(col=>sMap[col.id]).map(col=>{
        const items=[...sMap[col.id]].sort((a,b)=>parseInt(a.duration||0)-parseInt(b.duration||0));
        return{key:`st-${col.id}`,label:col.label,color:col.accent,items,extra:null};
      });
    }
    if(groupBy==="date"){
      const today=todayStr();
      const groups2=[];
      const overdue=filtered.filter(t=>t.dueDate&&daysDiff(t.dueDate)<0).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
      const todayT=filtered.filter(t=>t.dueDate&&daysDiff(t.dueDate)===0);
      const upcoming=filtered.filter(t=>t.dueDate&&daysDiff(t.dueDate)>0).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
      const nodate=filtered.filter(t=>!t.dueDate);
      if(overdue.length)groups2.push({key:"overdue",label:"Overdue",color:"#FF453A",items:overdue,extra:null});
      if(todayT.length)groups2.push({key:"today",label:"Today",color:LIME,items:todayT,extra:null});
      if(upcoming.length)groups2.push({key:"upcoming",label:"Upcoming",color:"#FF9F0A",items:upcoming,extra:null});
      if(nodate.length)groups2.push({key:"nodate",label:"No Date",color:"#444",items:nodate,extra:null});
      return groups2;
    }
    if(groupBy==="time"){
      const srt=(a,b)=>t2m(a.time)-t2m(b.time);
      const morning=filtered.filter(t=>t.time&&t2m(t.time)>=6*60&&t2m(t.time)<12*60).sort(srt);
      const afternoon=filtered.filter(t=>t.time&&t2m(t.time)>=12*60&&t2m(t.time)<17*60).sort(srt);
      const evening=filtered.filter(t=>t.time&&t2m(t.time)>=17*60&&t2m(t.time)<21*60).sort(srt);
      const night=filtered.filter(t=>t.time&&(t2m(t.time)>=21*60||t2m(t.time)<6*60)).sort(srt);
      const notime=filtered.filter(t=>!t.time);
      const grps=[];
      if(morning.length)grps.push({key:"morning",label:"🌅 Morning",color:"#FF9F0A",items:morning,extra:null});
      if(afternoon.length)grps.push({key:"afternoon",label:"☀️ Afternoon",color:LIME,items:afternoon,extra:null});
      if(evening.length)grps.push({key:"evening",label:"🌆 Evening",color:"#5E5CE6",items:evening,extra:null});
      if(night.length)grps.push({key:"night",label:"🌙 Night",color:"#0A84FF",items:night,extra:null});
      if(notime.length)grps.push({key:"notime",label:"No Time",color:"#444",items:notime,extra:null});
      return grps;
    }
    if(groupBy==="frequency"){
      const oneoff=filtered.filter(t=>!t.frequency||!t.frequency.trim());
      const rec=filtered.filter(t=>t.frequency&&t.frequency.trim());
      const numMap={},wdMap={},otherMap={};
      rec.forEach(t=>{
        const p=parseFreq(t.frequency);
        if(p.type==="annual"){
    const today=new Date(todayStr()+"T00:00:00");
    let yr=today.getFullYear();
    let candidate=new Date(yr,p.month-1,p.day);
    if(candidate<=today)candidate=new Date(yr+1,p.month-1,p.day);
    return candidate.toISOString().split("T")[0];
  }
  if(p.type==="month_day"){const sk=p.day===-1?999:p.day;const lbl=p.day===-1?"Every Last":"Every "+p.day;if(!numMap[lbl])numMap[lbl]={lbl,sk,items:[]};numMap[lbl].items.push(t);}
        else if(p.type==="days"&&!isNaN(parseInt(t.frequency.trim()))){const n=parseInt(t.frequency.trim());const lbl="Every "+n+" days";if(!numMap[lbl])numMap[lbl]={lbl,sk:n*0.01,items:[]};numMap[lbl].items.push(t);}
        else if(p.type==="weekday"){const lbl=WDL[p.day];if(!wdMap[p.day])wdMap[p.day]={lbl,sk:p.day,items:[]};wdMap[p.day].items.push(t);}
        else{const lbl=p.label||t.frequency;if(!otherMap[lbl])otherMap[lbl]={lbl,items:[]};otherMap[lbl].items.push(t);}
      });
      const grps=[];
      if(oneoff.length)grps.push({key:"oneoff",label:"One-off",color:"#888",items:oneoff,extra:null});
      Object.values(numMap).sort((a,b)=>a.sk-b.sk).forEach(v=>grps.push({key:"freq-"+v.lbl,label:v.lbl,color:"#5E5CE6",items:v.items,extra:null}));
      Object.values(wdMap).sort((a,b)=>a.sk-b.sk).forEach(v=>grps.push({key:"freq-wd-"+v.lbl,label:"Every "+v.lbl,color:"#4ECDC4",items:v.items,extra:null}));
      Object.values(otherMap).forEach(v=>grps.push({key:"freq-oth-"+v.lbl,label:v.lbl||"Other",color:"#FF9F0A",items:v.items,extra:null}));
      return grps;
    }
    if(groupBy==="person"){
      const pMap={};
      filtered.forEach(t=>{const k=t.person||"";if(!pMap[k])pMap[k]=[];pMap[k].push(t);});
      return Object.keys(pMap).sort((a,b)=>(a||"zzz").localeCompare(b||"zzz")).map(k=>{
        const pr=(persons||[]).find(x=>x.label===k);
        const items=[...pMap[k]].sort((a,b)=>parseInt(a.duration||0)-parseInt(b.duration||0));
        return{key:`per-${k||"none"}`,label:k?(pr?`${pr.emoji} ${k}`:k):"No Person",color:"#4ECDC4",items,extra:null};
      });
    }
    if(groupBy==="device"){
      const dvMap={};
      filtered.forEach(t=>{const k=t.device||"";if(!dvMap[k])dvMap[k]=[];dvMap[k].push(t);});
      return Object.keys(dvMap).sort((a,b)=>(a||"zzz").localeCompare(b||"zzz")).map(k=>{
        const items=[...dvMap[k]].sort((a,b)=>parseInt(a.duration||0)-parseInt(b.duration||0));
        return{key:`dev-${k||"none"}`,label:k?"📱 "+k:"No Device",color:"#0A84FF",items,extra:null};
      });
    }
    return[];
  };
  // MUNDANE groupBy handled inline in buildGroups
  const groups=(()=>{
    if(groupBy==="mundane"){
      const mundG=filtered.filter(t=>t.mundane===true);
      const normG=filtered.filter(t=>!t.mundane);
      const grps2=[];
      if(mundG.length)grps2.push({key:"mundane-yes",label:"🟠 Mundane",color:"#FF9F0A",items:mundG,extra:null});
      if(normG.length)grps2.push({key:"mundane-no",label:"⭐ Normal",color:"#30D158",items:normG,extra:null});
      return grps2;
    }
    return buildGroups();
  })();
  // Unique action/bucket values for filter dropdowns
  const usedActions=[...new Set(relevant.map(t=>t.action||"").filter(Boolean))].sort();
  const usedBuckets=[...new Set(relevant.map(t=>t.bucketId||"").filter(Boolean))];
  const usedBrands=[...new Set(relevant.map(t=>t.brand||"").filter(Boolean))].sort();
  const usedGamedays=[...new Set(relevant.map(t=>t.gameday||"").filter(Boolean))];
  const usedPersons=[...new Set(relevant.map(t=>t.person||"").filter(Boolean))].sort();
  const usedDevices=[...new Set(relevant.map(t=>t.device||"").filter(Boolean))].sort();
  const allLabels=labels||[];
  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0}}>
      {/* Filter bar */}
      <div style={{padding:"10px 16px",borderBottom:`1px solid ${dvBrd}`,background:dvNav,flexShrink:0,display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:6,padding:"4px 10px",borderRadius:8,border:`2px solid ${dvLimeText}66`,background:dvLm?"#d0ead0":"#0a140a"}}>
          <span style={{fontSize:10,color:dvLimeText,fontWeight:800,letterSpacing:.6}}>GROUP BY</span>
          <select value={groupBy} onChange={e=>setGroupBy(e.target.value)} style={{...selStyle,background:dvLm?"#e8f5e0":"#0e1a0e",border:`1px solid ${dvLimeText}44`,color:dvLimeText}}>
          <option value="status">Status</option>
          <option value="date">Date</option>
          <option value="time">Time</option>
          <option value="frequency">Frequency</option>
          <option value="duration">Duration</option>
          <option value="action">Action</option>
          <option value="bucket">Bucket</option>
          <option value="priority">Priority</option>
          <option value="person">Person</option>
          <option value="mundane">Mundane</option>
          <option value="device">Device</option>
        </select>
        </div>
        <select value={durDateF} onChange={e=>setDurDateF(e.target.value)} style={selStyle}>
          <option value="all">All Dates</option>
          <option value="overdue">Overdue</option>
          <option value="today">Today</option>
          <option value="upcoming">Upcoming</option>
          <option value="nodate">No Date</option>
        </select>
        <select value={durTimeF} onChange={e=>setDurTimeF(e.target.value)} style={selStyle}>
          <option value="all">All Times</option>
          <option value="timed">Has Time</option>
          <option value="untimed">No Time</option>
        </select>
        <select value={durFreqF} onChange={e=>setDurFreqF(e.target.value)} style={selStyle}>
          <option value="all">All Freq</option>
          <option value="recurring">Recurring</option>
          <option value="oneoff">One-off</option>
        </select>
        <select value={durStatusF} onChange={e=>setDurStatusF(e.target.value)} style={selStyle}>
          <option value="all">All Status</option>
          {COLS.map(col=><option key={col.id} value={col.id}>{col.label}</option>)}
        </select>
        {usedActions.length>0&&<select value={durActionF} onChange={e=>setDurActionF(e.target.value)} style={selStyle}>
          <option value="all">All Actions</option>
          {usedActions.map(a=>{const act=(actions||DEFAULT_ACTIONS).find(x=>x.label===a);return<option key={a} value={a}>{act?`${act.emoji} `:""}{a}</option>;})}
        </select>}
        {usedBuckets.length>0&&<select value={durBucketF} onChange={e=>setDurBucketF(e.target.value)} style={selStyle}>
          <option value="all">All Buckets</option>
          {usedBuckets.map(id=>{const bkt=buckets.find(b=>b.id===id);return bkt?<option key={id} value={id}>{bkt.emoji} {bkt.label}</option>:null;})}
        </select>}
        <select value={durPriorityF} onChange={e=>setDurPriorityF(e.target.value)} style={selStyle}>
          <option value="all">All Priorities</option>
          {PRIORITIES.map(p=><option key={p.id} value={p.id}>{p.emoji||""} {p.label}</option>)}
        </select>
        {usedBrands.length>0&&<select value={durBrandF} onChange={e=>setDurBrandF(e.target.value)} style={selStyle}>
          <option value="all">All Brands</option>
          {usedBrands.map(b=>{const br=(brands||[]).find(x=>x.label===b);return<option key={b} value={b}>{br?`${br.emoji} `:""}{b}</option>;})}
        </select>}
        {usedGamedays.length>0&&<select value={durGamedayF} onChange={e=>setDurGamedayF(e.target.value)} style={selStyle}>
          <option value="all">All Gamedays</option>
          {usedGamedays.map(g=><option key={g} value={g}>{g}</option>)}
        </select>}
        {usedPersons.length>0&&<select value={durPersonF} onChange={e=>setDurPersonF(e.target.value)} style={selStyle}>
          <option value="all">All People</option>
          {usedPersons.map(p=>{const pr=(persons||[]).find(x=>x.label===p);return<option key={p} value={p}>{pr?`${pr.emoji} `:""}{p}</option>;})}
        </select>}
        <select value={durMundaneF} onChange={e=>setDurMundaneF(e.target.value)} style={selStyle}>
          <option value="all">All Tasks</option>
          <option value="normal">Normal Only</option>
          <option value="mundane">Mundane Only</option>
        </select>
        {usedDevices.length>0&&<select value={durDeviceF} onChange={e=>setDurDeviceF(e.target.value)} style={selStyle}>
          <option value="all">All Devices</option>
          {usedDevices.map(d=><option key={d} value={d}>📱 {d}</option>)}
        </select>}
        {allLabels.length>0&&<select value={durLabelsF[0]||""} onChange={e=>{const v=e.target.value;setDurLabelsF(v?[v]:[]);}} style={selStyle}>
          <option value="">All Labels</option>
          {allLabels.map(l=><option key={l.id} value={l.id}>{l.emoji} {l.label}</option>)}
        </select>}
        {totalMin>0&&<span style={{marginLeft:"auto",fontSize:11,color:MUTED}}>⏱ <span style={{color:TEXT,fontWeight:700}}>{fmtMin(totalMin)}</span> · {withDur.length} tasks</span>}
      </div>
      {/* Task list */}
      <div style={{flex:1,overflowY:"auto",padding:"14px 16px",maxWidth:640,margin:"0 auto",width:"100%"}}>
        {groups.map(g=>(
          <div key={g.key} style={{marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
              <div style={{width:6,height:6,borderRadius:"50%",background:g.color,flexShrink:0}}/>
              <span style={{fontSize:12,fontWeight:700,color:g.color}}>{g.label}</span>
              <span style={{fontSize:11,color:MUTED}}>{g.items.length} task{g.items.length!==1?"s":""}</span>
              {g.extra&&<span style={{fontSize:10,color:"#444",marginLeft:"auto"}}>{g.extra}</span>}
            </div>
            {g.items.map(t=><TaskCard key={t.id} task={t} buckets={buckets} onEdit={onEdit} onDelete={onDelete} onCheck={onCheck} showBucket={sb} listMode={true} readOnly={readOnly} celebrating={celebratingIds.has(t.id)} onDragStart={()=>{}} onDragOver={()=>{}} onDrop={()=>{}} isDragging={false}/>)}
          </div>
        ))}
        {(groupBy==="duration")&&noDur.length>0&&(
          <div style={{marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
              <div style={{width:6,height:6,borderRadius:"50%",background:"#2a2a2a",flexShrink:0}}/>
              <span style={{fontSize:12,fontWeight:700,color:"#444"}}>No Duration</span>
              <span style={{fontSize:11,color:MUTED}}>{noDur.length}</span>
            </div>
            {noDur.map(t=><TaskCard key={t.id} task={t} buckets={buckets} onEdit={onEdit} onDelete={onDelete} onCheck={onCheck} showBucket={sb} listMode={true} readOnly={readOnly} celebrating={celebratingIds.has(t.id)} onDragStart={()=>{}} onDragOver={()=>{}} onDrop={()=>{}} isDragging={false}/>)}
          </div>
        )}
        {filtered.length===0&&<div style={{textAlign:"center",padding:"48px 0",color:"#2a2a2a",fontSize:14}}>Nothing matches ✓</div>}
        {!readOnly&&<div style={{marginTop:8}}>
          {adding?<InlineAdd colId="do" boardId={boardId} onAdd={t=>{onAddTask(t);setAdding(false);}} onCancel={()=>setAdding(false)}/>
          :<button onClick={()=>setAdding(true)} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:`1px dashed ${BORDER}`,borderRadius:9,cursor:"pointer",color:MUTED,fontSize:13,fontFamily:"inherit",padding:"9px 14px",width:"100%",justifyContent:"center"}} onMouseEnter={e=>{e.currentTarget.style.borderColor="#444";e.currentTarget.style.color=TEXT;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=BORDER;e.currentTarget.style.color=MUTED;}}>+ Add Card</button>}
        </div>}
      </div>
    </div>
  );
}

function QuickAddBar({boardId,onAdd,onOpenModal,readOnly}){
  if(readOnly)return null;
  const {navBg:qaNav,inp:qaInp,border:qaBo,text:qaText,muted:qaMu}=useTheme();
  const [title,setTitle]=useState("");
  const ref=useRef();
  const submit=()=>{
    const t=title.trim();
    if(!t)return;
    setTitle("");
    const task=mkTask("do",boardId);
    task.title=t;
    task.dueDate=todayStr();
    onAdd(task);
  };
  const handlePlus=()=>{if(title.trim())submit();else onOpenModal();};
  return(
    <div style={{padding:"8px 16px",borderBottom:`1px solid ${qaBo}`,background:qaNav,flexShrink:0,display:"flex",gap:8,alignItems:"center"}}>
      <input ref={ref} value={title} onChange={e=>setTitle(e.target.value)}
        onKeyDown={e=>{if(e.key==="Enter")submit();if(e.key==="Escape")setTitle("");}}
        placeholder="Add task for today…"
        style={{flex:1,background:qaInp,border:`1px solid ${title?qaBo:qaBo}`,borderRadius:8,padding:"8px 12px",color:qaText,fontSize:13,outline:"none",fontFamily:"inherit"}}
        onFocus={FL} onBlur={FB}/>
      <button onClick={handlePlus} style={{width:34,height:34,borderRadius:8,border:"none",background:title?LIME:qaInp,color:title?"#000":qaMu,fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"background .15s,color .15s",fontWeight:700}}>+</button>
    </div>
  );
}

function linkify(text){
  if(!text)return null;
  const urlRe=/(https?:\/\/[^\s]+)/g;
  const parts=text.split(urlRe);
  return parts.map((p,i)=>urlRe.test(p)?<a key={i} href={p} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{color:"#0A84FF",textDecoration:"underline",wordBreak:"break-all"}}>{p}</a>:<React.Fragment key={i}>{p}</React.Fragment>);
}

function MonthlyView({tasks,buckets,onEdit,celebratingIds}){
  const {text:mvTx,cardBg:mvCard,border:mvBo,lm:mvLm}=useTheme();
  const isBig=t=>{
    if(!t.frequency)return false;
    const p=parseFreq(t.frequency);
    if(p.type==="annual"||p.type==="years"||p.type==="months"||p.type==="month_day")return true;
    if(p.type==="days"&&p.n>=20)return true;
    return false;
  };
  const filtered=tasks.filter(t=>!t.isRef&&isBig(t));
  const sorted=[...filtered].sort((a,b)=>{
    const ad=a.dueDate||"9999-12-31",bd=b.dueDate||"9999-12-31";
    return ad.localeCompare(bd);
  });
  // Group: month → 10-day chunk → items
  const MNAMES=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const months=[];
  sorted.forEach(t=>{
    const bkt=buckets.find(b=>b.id===t.bucketId);
    const diff=t.dueDate?daysDiff(t.dueDate):null;
    const isDone=t.done||celebratingIds.has(t.id);
    let dateColor=MUTED;
    if(diff!==null){if(diff<0)dateColor="#FF453A";else if(diff===0)dateColor=LIME;else if(diff<=7)dateColor="#FF9F0A";}
    const fp=parseFreq(t.frequency);
    const row={t,bkt,diff,isDone,dateColor,fp};
    const monthKey=t.dueDate?t.dueDate.slice(0,7):"zz-nodate";
    let mo=months.find(m=>m.key===monthKey);
    if(!mo){
      const label=monthKey==="zz-nodate"?"No Due Date":MNAMES[parseInt(monthKey.slice(5))-1]+" "+monthKey.slice(0,4);
      mo={key:monthKey,label,chunks:[]};months.push(mo);
    }
    // 10-day chunk
    const day=t.dueDate?parseInt(t.dueDate.slice(8)):0;
    const chunkIdx=t.dueDate?Math.floor((day-1)/10):0;
    const chunkStarts=[1,11,21];
    const chunkLabel=t.dueDate
      ? (()=>{const mo2=parseInt(t.dueDate.slice(5,7));const mn=MNAMES[mo2-1].slice(0,3);const s=chunkStarts[chunkIdx];const e=chunkIdx===2?new Date(parseInt(t.dueDate.slice(0,4)),mo2,0).getDate():chunkStarts[chunkIdx+1]-1;return `${mn} ${s}–${e}`;})()
      : "No Date";
    const chunkKey=`${monthKey}-${chunkIdx}`;
    let ch=mo.chunks.find(c=>c.key===chunkKey);
    if(!ch){ch={key:chunkKey,label:chunkLabel,items:[]};mo.chunks.push(ch);}
    ch.items.push(row);
  });
  return(
    <div style={{flex:1,overflowY:"auto",padding:"16px 16px 40px"}}>
      <div style={{maxWidth:700,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
          <div style={{flex:1,height:1,background:BORDER}}/>
          <span style={{fontSize:11,fontWeight:700,color:MUTED,letterSpacing:1,textTransform:"uppercase"}}>◷ MONTHLY+ · {filtered.length} tasks</span>
          <div style={{flex:1,height:1,background:BORDER}}/>
        </div>
        {filtered.length===0&&(
          <div style={{textAlign:"center",padding:"64px 0",color:MUTED,fontSize:14}}>
            <div style={{fontSize:36,marginBottom:12}}>◷</div>
            No monthly/annual tasks yet
          </div>
        )}
        {months.map(mo=>(
          <div key={mo.key} style={{marginBottom:36}}>
            {/* Big month header */}
            <div style={{display:"flex",alignItems:"baseline",gap:10,marginBottom:14}}>
              <div style={{fontSize:22,fontWeight:900,color:mvTx,letterSpacing:-.5}}>{mo.label}</div>
              <div style={{flex:1,height:2,background:"#1a1a1a",marginLeft:4,borderRadius:1}}/>
            </div>
            {mo.chunks.map(ch=>(
              <div key={ch.key} style={{marginBottom:18}}>
                {/* 10-day sub-header */}
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <div style={{fontSize:10,fontWeight:700,color:"#444",letterSpacing:.8,textTransform:"uppercase"}}>{ch.label}</div>
                  <div style={{flex:1,height:1,background:"#1a1a1a"}}/>
                </div>
                {ch.items.map(({t,bkt,diff,isDone,dateColor,fp})=>{
                  const accent=bkt?.mainColor||null;
                  const cardBorder=isDone?"#30D15833":accent?(accent+"44"):BORDER;
                  const cardBg=isDone?"#0a120a":accent?(mvLm?accent+"33":accent+"0a"):(mvLm?mvCard:"#0e0e0e");
                  const dueDt=t.dueDate?new Date(t.dueDate+"T00:00:00"):null;
                  const dayNum=dueDt?String(dueDt.getDate()).padStart(2,"0"):null;
                  const monAbbr=dueDt?["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][dueDt.getMonth()]:null;
                  return(
                    <div key={t.id} onClick={()=>onEdit(t)}
                      style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",borderRadius:10,marginBottom:6,background:cardBg,border:`1px solid ${cardBorder}`,cursor:"pointer",transition:"border-color .15s"}}
                      onMouseEnter={e=>e.currentTarget.style.borderColor=accent?(accent+"88"):"#333"}
                      onMouseLeave={e=>e.currentTarget.style.borderColor=cardBorder}>
                      {/* Left accent stripe */}
                      {accent&&<div style={{width:3,alignSelf:"stretch",borderRadius:2,background:accent,flexShrink:0}}/>}
                      {/* Content */}
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:13,color:isDone?"#30D158":mvTx,fontWeight:600,textDecoration:isDone?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title||"Untitled"}</div>
                        <div style={{display:"flex",alignItems:"center",gap:6,marginTop:3}}>
                          {bkt&&<span style={{fontSize:10,color:accent||MUTED,fontWeight:600}}>{bkt.emoji} {bkt.label}</span>}
                          <span style={{fontSize:10,color:"#5E5CE6"}}>{fp.label}</span>
                          {t.time&&<span style={{fontSize:10,color:MUTED}}>{fmtTime(t.time)}</span>}
                        </div>
                      </div>
                      {/* Big date on right */}
                      {dayNum&&(
                        <div style={{textAlign:"center",flexShrink:0,minWidth:44}}>
                          <div style={{fontSize:24,fontWeight:900,color:isDone?"#30D158":dateColor,lineHeight:1}}>{dayNum}</div>
                          <div style={{fontSize:9,fontWeight:700,color:dateColor,letterSpacing:.5,textTransform:"uppercase",marginTop:1}}>{monAbbr}</div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}
