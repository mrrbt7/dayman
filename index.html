<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Countdown</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #0a0a0a; color: #fff; font-family: 'DM Sans', sans-serif; min-height: 100vh; overscroll-behavior: none; }

  :root {
    --bg: #0a0a0a;
    --card: #141414;
    --card-hover: #1a1a1a;
    --border: #1f1f1f;
    --muted: #3a3a3a;
    --text-dim: #555;
    --text-mid: #888;
    --accent: #4f8ef7;
    --accent-glow: rgba(79,142,247,0.15);
    --today: #f7c94f;
    --today-glow: rgba(247,201,79,0.15);
    --past: #555;
  }

  .app { max-width: 480px; margin: 0 auto; min-height: 100vh; position: relative; }

  /* Header */
  .header { padding: 52px 20px 0; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 30px; font-weight: 700; letter-spacing: -0.8px; }
  .header-btn { background: none; border: none; color: var(--text-mid); cursor: pointer; padding: 6px; font-size: 22px; line-height: 1; border-radius: 8px; }
  .header-btn:hover { color: #fff; }

  /* Main Tabs */
  .main-tabs { display: flex; gap: 0; padding: 16px 20px 0; border-bottom: 1px solid var(--border); }
  .main-tab { background: none; border: none; color: var(--text-dim); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; padding: 8px 0; margin-right: 24px; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .main-tab.active { color: #fff; border-bottom-color: var(--accent); }

  /* Category Filter */
  .filter-row { display: flex; gap: 8px; padding: 14px 20px; overflow-x: auto; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-pill { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 5px 14px; font-size: 13px; font-weight: 500; color: var(--text-mid); cursor: pointer; white-space: nowrap; transition: all 0.15s; flex-shrink: 0; }
  .filter-pill.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }

  /* List */
  .list { padding: 4px 16px 100px; display: flex; flex-direction: column; gap: 8px; }

  /* Card */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px 18px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: background 0.15s, transform 0.1s; user-select: none; }
  .card:active { transform: scale(0.985); background: var(--card-hover); }
  .card.today { border-color: rgba(247,201,79,0.3); background: linear-gradient(135deg, #141414, #161610); }
  .card.past-card { opacity: 0.55; }

  .card-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }

  .card-body { flex: 1; min-width: 0; }
  .card-name { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #e8e8e8; }
  .card-meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; font-family: 'DM Mono', monospace; }

  .card-count { text-align: right; flex-shrink: 0; }
  .count-num { font-size: 32px; font-weight: 700; line-height: 1; font-family: 'DM Mono', monospace; color: var(--accent); }
  .count-num.today-num { color: var(--today); font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .count-num.past-num { color: var(--text-dim); }
  .count-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; font-weight: 500; }

  /* Empty state */
  .empty { text-align: center; padding: 60px 20px; color: var(--text-dim); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  /* FAB */
  .fab { position: fixed; bottom: 28px; right: 24px; width: 56px; height: 56px; border-radius: 50%; background: var(--accent); border: none; color: #000; font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(79,142,247,0.4); transition: transform 0.15s, box-shadow 0.15s; z-index: 50; }
  .fab:hover { transform: scale(1.05); box-shadow: 0 6px 28px rgba(79,142,247,0.55); }
  .fab:active { transform: scale(0.95); }

  /* Modal overlay */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: flex-end; animation: fadeIn 0.15s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .sheet { background: #111; border-radius: 24px 24px 0 0; padding: 20px 20px 40px; width: 100%; border-top: 1px solid var(--border); animation: slideUp 0.25s ease; max-height: 90vh; overflow-y: auto; }
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .sheet-handle { width: 36px; height: 4px; background: #333; border-radius: 2px; margin: 0 auto 20px; }
  .sheet-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }

  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 11px; color: var(--text-mid); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; margin-bottom: 6px; display: block; }
  .form-input { width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; color: #fff; padding: 12px 14px; font-size: 15px; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.15s; }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: #3a3a3a; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .category-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .cat-btn { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 8px 14px; font-size: 13px; color: var(--text-mid); cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
  .cat-btn.selected { background: #1a2535; border-color: var(--accent); color: #fff; }

  .recur-grid { display: flex; gap: 8px; flex-wrap: wrap; }
  .recur-btn { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 7px 12px; font-size: 12px; color: var(--text-mid); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .recur-btn.selected { background: #1a2535; border-color: var(--accent); color: #fff; }

  .btn-row { display: flex; gap: 10px; margin-top: 20px; }
  .btn-primary { flex: 1; background: var(--accent); border: none; border-radius: 12px; color: #000; font-weight: 700; font-size: 15px; padding: 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity 0.15s; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-ghost { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; color: var(--text-mid); font-weight: 500; font-size: 15px; padding: 14px 18px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .btn-delete { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 12px; color: #ef4444; font-weight: 500; font-size: 14px; padding: 14px 18px; cursor: pointer; font-family: 'DM Sans', sans-serif; }

  .loading { text-align: center; padding: 60px 20px; color: var(--text-dim); font-size: 14px; }
  .error-banner { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 10px; padding: 10px 14px; margin: 12px 16px; font-size: 13px; color: #ef4444; }

  select.form-input { appearance: none; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
// ─── CONFIG ─────────────────────────────────────────────────────────────────
const SUPABASE_URL  = 'https://hnfvtllodmgsipyuwzsx.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhuZnZ0bGxvZG1nc2lweXV3enN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MjgwNzEsImV4cCI6MjA4NzMwNDA3MX0.4YzxxQK9PPPo1qGs9mEb6JhE5Ic6Y3_Lt9CGYtCCZEU';
// ─────────────────────────────────────────────────────────────────────────────

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

const { useState, useEffect, useCallback } = React;

const CATEGORIES = [
  { key: 'countdown',   label: 'Countdown',   emoji: '⏳' },
  { key: 'anniversary', label: 'Anniversary', emoji: '💍' },
  { key: 'birthday',    label: 'Birthday',    emoji: '🎂' },
  { key: 'holiday',     label: 'Holiday',     emoji: '🌸' },
];

const RECURRINGS = [
  { key: null,     label: 'One-time' },
  { key: 'weekly', label: '📅 Weekly' },
  { key: 'monthly',label: '🗓 Monthly' },
  { key: 'yearly', label: '🔁 Yearly' },
];

const CAT_COLORS = {
  countdown:   '#4f8ef7',
  anniversary: '#c084fc',
  birthday:    '#f472b6',
  holiday:     '#fb923c',
};

function daysUntil(dateStr) {
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(dateStr + 'T00:00:00');
  return Math.round((target - today) / 86400000);
}

function nextOccurrence(dateStr, recurring) {
  if (!recurring) return dateStr;
  const today = new Date(); today.setHours(0,0,0,0);
  let d = new Date(dateStr + 'T00:00:00');
  if (recurring === 'weekly') {
    while (d < today) d.setDate(d.getDate() + 7);
  } else if (recurring === 'monthly') {
    while (d < today) d.setMonth(d.getMonth() + 1);
  } else if (recurring === 'yearly') {
    while (d < today) d.setFullYear(d.getFullYear() + 1);
  }
  return d.toISOString().split('T')[0];
}

function fmtDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

// ─── ADD/EDIT SHEET ──────────────────────────────────────────────────────────
function EventSheet({ item, onClose, onSave, onDelete }) {
  const [name, setName]       = useState(item?.name || '');
  const [date, setDate]       = useState(item?.target_date || '');
  const [cat, setCat]         = useState(item?.category || 'countdown');
  const [recurring, setRecur] = useState(item?.recurring || null);
  const [saving, setSaving]   = useState(false);

  async function handleSave() {
    if (!name.trim() || !date) return;
    setSaving(true);
    await onSave({ name: name.trim(), target_date: date, category: cat, recurring });
    setSaving(false);
  }

  return (
    <div className="overlay" onClick={e => e.target.className === 'overlay' && onClose()}>
      <div className="sheet">
        <div className="sheet-handle" />
        <div className="sheet-title">{item ? 'Edit Event' : 'New Countdown'}</div>

        <div className="form-group">
          <label className="form-label">Name</label>
          <input className="form-input" placeholder="What are you counting down to?" value={name}
            onChange={e => setName(e.target.value)} autoFocus />
        </div>

        <div className="form-group">
          <label className="form-label">Date</label>
          <input className="form-input" type="date" value={date} onChange={e => setDate(e.target.value)} />
        </div>

        <div className="form-group">
          <label className="form-label">Category</label>
          <div className="category-grid">
            {CATEGORIES.map(c => (
              <button key={c.key} className={`cat-btn ${cat === c.key ? 'selected' : ''}`}
                onClick={() => setCat(c.key)}>
                {c.emoji} {c.label}
              </button>
            ))}
          </div>
        </div>

        <div className="form-group">
          <label className="form-label">Recurring</label>
          <div className="recur-grid">
            {RECURRINGS.map(r => (
              <button key={String(r.key)} className={`recur-btn ${recurring === r.key ? 'selected' : ''}`}
                onClick={() => setRecur(r.key)}>
                {r.label}
              </button>
            ))}
          </div>
        </div>

        <div className="btn-row">
          <button className="btn-ghost" onClick={onClose}>Cancel</button>
          {item && <button className="btn-delete" onClick={() => onDelete(item.id)}>Delete</button>}
          <button className="btn-primary" onClick={handleSave} disabled={saving}>
            {saving ? '…' : item ? 'Save' : 'Add'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ────────────────────────────────────────────────────────────────
function App() {
  const [items, setItems]       = useState([]);
  const [loading, setLoading]   = useState(true);
  const [error, setError]       = useState(null);
  const [mainTab, setMainTab]   = useState('upcoming');  // upcoming | past
  const [catFilter, setCatFilter] = useState('all');
  const [sheet, setSheet]       = useState(null); // null | 'new' | {item}

  const load = useCallback(async () => {
    const { data, error } = await sb.from('countdowns').select('*').order('target_date');
    if (error) { setError(error.message); }
    else { setItems(data || []); }
    setLoading(false);
  }, []);

  useEffect(() => { load(); }, [load]);

  async function handleSave({ name, target_date, category, recurring }) {
    if (sheet?.id) {
      const { error } = await sb.from('countdowns').update({ name, target_date, category, recurring }).eq('id', sheet.id);
      if (error) { alert(error.message); return; }
    } else {
      const { error } = await sb.from('countdowns').insert({ name, target_date, category, recurring });
      if (error) { alert(error.message); return; }
    }
    setSheet(null);
    load();
  }

  async function handleDelete(id) {
    const { error } = await sb.from('countdowns').delete().eq('id', id);
    if (error) { alert(error.message); return; }
    setSheet(null);
    load();
  }

  // Compute effective days for each item (recurring = next occurrence)
  const enriched = items.map(item => {
    const effectiveDate = item.recurring ? nextOccurrence(item.target_date, item.recurring) : item.target_date;
    const days = daysUntil(effectiveDate);
    return { ...item, _days: days, _effectiveDate: effectiveDate };
  });

  const upcoming = enriched.filter(i => i._days >= 0).sort((a,b) => a._days - b._days);
  const past      = enriched.filter(i => i._days < 0).sort((a,b) => b._days - a._days);

  const displayList = (mainTab === 'upcoming' ? upcoming : past)
    .filter(i => catFilter === 'all' || i.category === catFilter);

  const catInfo = (key) => CATEGORIES.find(c => c.key === key) || CATEGORIES[0];

  return (
    <div className="app">
      {/* Header */}
      <div className="header">
        <h1>Countdown</h1>
        <button className="header-btn" onClick={() => setSheet('new')}>＋</button>
      </div>

      {/* Main Tabs */}
      <div className="main-tabs">
        <button className={`main-tab ${mainTab === 'upcoming' ? 'active' : ''}`}
          onClick={() => setMainTab('upcoming')}>
          Upcoming {upcoming.length > 0 && `(${upcoming.length})`}
        </button>
        <button className={`main-tab ${mainTab === 'past' ? 'active' : ''}`}
          onClick={() => setMainTab('past')}>
          Past {past.length > 0 && `(${past.length})`}
        </button>
      </div>

      {/* Category Filter */}
      <div className="filter-row">
        <button className={`filter-pill ${catFilter === 'all' ? 'active' : ''}`}
          onClick={() => setCatFilter('all')}>All</button>
        {CATEGORIES.map(c => (
          <button key={c.key} className={`filter-pill ${catFilter === c.key ? 'active' : ''}`}
            onClick={() => setCatFilter(c.key)}>
            {c.label}
          </button>
        ))}
      </div>

      {error && <div className="error-banner">⚠ {error}</div>}

      {/* List */}
      <div className="list">
        {loading ? (
          <div className="loading">Loading…</div>
        ) : displayList.length === 0 ? (
          <div className="empty">
            <div className="empty-icon">⏳</div>
            <p>No {mainTab === 'past' ? 'past' : 'upcoming'} events</p>
          </div>
        ) : displayList.map((item, i) => {
          const ci = catInfo(item.category);
          const isToday = item._days === 0;
          const isPast  = item._days < 0;
          const color   = CAT_COLORS[item.category] || '#4f8ef7';
          return (
            <div key={item.id}
              className={`card ${isToday ? 'today' : ''} ${isPast ? 'past-card' : ''}`}
              style={{ animationDelay: `${i * 30}ms`, animation: 'slideIn 0.2s ease both' }}
              onClick={() => setSheet(item)}>

              <div className="card-icon" style={{ background: color + '1a' }}>
                {ci.emoji}
              </div>

              <div className="card-body">
                <div className="card-name">{item.name}</div>
                <div className="card-meta">
                  {fmtDate(item._effectiveDate)}
                  {item.recurring && <span style={{marginLeft:6, color:'#4f8ef7'}}>↻ {item.recurring}</span>}
                </div>
              </div>

              <div className="card-count">
                {isToday ? (
                  <div className="count-num today-num" style={{ color: '#f7c94f' }}>Today</div>
                ) : (
                  <>
                    <div className={`count-num ${isPast ? 'past-num' : ''}`}
                      style={!isPast ? { color } : {}}>
                      {Math.abs(item._days)}
                    </div>
                    <div className="count-label">{isPast ? 'Days Ago' : 'Days Left'}</div>
                  </>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {/* FAB */}
      <button className="fab" onClick={() => setSheet('new')}>+</button>

      {/* Sheet */}
      {sheet && (
        <EventSheet
          item={sheet === 'new' ? null : sheet}
          onClose={() => setSheet(null)}
          onSave={handleSave}
          onDelete={handleDelete}
        />
      )}

      <style>{`
        @keyframes slideIn {
          from { opacity: 0; transform: translateY(8px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        input[type="date"]::-webkit-calendar-picker-indicator {
          filter: invert(0.5);
        }
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
