  const [userRole,setUserRole]=useState("owner");
  const [board,setBoard]=useState(null);
  const [allBoards,setAllBoards]=useState([]);
  const [settings,setSettings]=useState(DEF_SETTINGS);
  const subRef=useRef(null);
  const logKey=`dc_log_dayman_${user.id}`;
  const getLog=()=>{try{return JSON.parse(localStorage.getItem(logKey)||"[]");}catch{return[];}};
  const appendLog=(entry)=>{try{const l=getLog();l.unshift({...entry,at:new Date().toISOString()});localStorage.setItem(logKey,JSON.stringify(l.slice(0,500)));}catch{}};

  // Load master board (oldest) + all tasks across all boards
  const loadAll=useCallback(async()=>{
    setLoading(true);
    const{data:members}=await db.from("board_members").select("role,boards(*)").eq("user_id",user.id).order("created_at",{referencedTable:"boards",ascending:true});
    const boards_=(members||[]).map(m=>({...m.boards,role:m.role})).filter(Boolean).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
    setAllBoards(boards_);
    let masterBoard=boards_[0]||null;
    // Auto-create master board if none
    if(!masterBoard){
      const{data:nb}=await db.from("boards").insert({user_id:user.id,name:"Master Board",emoji:"🏠"}).select().single();
      if(nb){await db.from("board_members").upsert({board_id:nb.id,user_id:user.id,role:"owner"},{onConflict:"board_id,user_id"});masterBoard={...nb,role:"owner"};setAllBoards([masterBoard]);}
    }
    setBoard(masterBoard);
    if(!masterBoard){setLoading(false);return;}
    const boardIds=boards_.map(b=>b.id);
    const[tr,br,sr]=await Promise.all([
      db.from("tasks").select("*").in("board_id",boardIds).eq("done",false),
      db.from("buckets").select("*").in("board_id",boardIds).order("sort_order"),
      db.from("board_settings").select("*").eq("board_id",masterBoard.id).single(),
    ]);
    setTasks((tr.data||[]).map(dbToTask311));
    setBuckets((br.data||[]).map(bk=>({id:bk.id,emoji:bk.emoji,label:bk.label,mainColor:bk.color||null,bgColor:bk.bg_color||null,parentId:bk.parent_id||null,boardId:bk.board_id})));
    const mem=members.find(m=>m.boards?.id===masterBoard.id);
    if(mem)setUserRole(mem.role);
    if(sr.data){
      const dk=`dc_disp_${user.id}_${masterBoard.id}`;let lc={};try{lc=JSON.parse(localStorage.getItem(dk)||"{}");}catch{}
      const s={...DEF_SETTINGS,...{hideEmptyDo:sr.data.hide_empty_do||false,defaultView:lc.defaultView||sr.data.default_view||"plan",hideTimeFrames:sr.data.hide_time_frames||false,showActionTag:sr.data.show_action_tag||false,showBucketColor:sr.data.show_bucket_color!==false,showCardBg:sr.data.show_card_bg!==false,showDuration:sr.data.show_duration!==false,showFrequency:sr.data.show_frequency!==false}};
      setSettings(s);setViewMode(s.defaultView||"plan");
      if(sr.data.actions_json){try{setActions(JSON.parse(sr.data.actions_json));}catch{}}
      if(sr.data.brands_json){try{setBrands(JSON.parse(sr.data.brands_json));}catch{}}
      if(sr.data.persons_json){try{setPersons(JSON.parse(sr.data.persons_json));}catch{}}
      if(sr.data.labels_json){try{setLabels(JSON.parse(sr.data.labels_json));}catch{}}
      if(sr.data.devices_json){try{setDevices(JSON.parse(sr.data.devices_json));}catch{}}
      if(sr.data.sprints_json){try{setSprints(JSON.parse(sr.data.sprints_json));}catch{}}
    }
    setLoading(false);
    // Realtime on master board
    if(subRef.current)db.removeChannel(subRef.current);
    subRef.current=db.channel(`plan-${masterBoard.id}`)
      .on("postgres_changes",{event:"*",schema:"public",table:"tasks",filter:`board_id=eq.${masterBoard.id}`},({eventType,new:n,old:o})=>{
        if(eventType==="INSERT"){if(!celebratingRef.current.has(n.id))setTasks(ts=>{if(ts.some(t=>t.id===n.id))return ts;return[...ts,dbToTask311(n)];});}
        if(eventType==="UPDATE"){if(!celebratingRef.current.has(n.id)&&!doneTaskIds.current.has(n.id))setTasks(ts=>ts.map(t=>t.id===n.id?dbToTask311(n):t));}
        if(eventType==="DELETE")setTasks(ts=>ts.filter(t=>t.id!==o.id));
      }).subscribe();
  },[user.id]);

  useEffect(()=>{loadAll();},[loadAll]);
  useEffect(()=>()=>{if(subRef.current)db.removeChannel(subRef.current);},[]);

  const getBoardId=useCallback(t=>t.boardId||board?.id,[board]);

  const saveTask=async t=>{
    appendLog({type:"edit",title:t.title});
    setSyncing(true);
    const bid=getBoardId(t);
    const{error}=await db.from("tasks").upsert(t2db311(t,bid));
    setSyncing(false);
    if(!error){setTasks(ts=>{const i=ts.findIndex(x=>x.id===t.id);if(i>=0){const c=[...ts];c[i]=t;return c;}return[...ts,t];});setEditing(null);}
    else{const isStatusErr=error.message&&(error.message.includes("status")||error.message.includes("constraint"));if(isStatusErr)alert("Run the SQL migration first — see the console for details.");else alert("Save failed: "+error.message);}
  };
  const addTask=async(t,openEdit=false)=>{
    appendLog({type:"add",title:t.title});
    const bid=t.boardId||board?.id;
    setSyncing(true);const{error}=await db.from("tasks").upsert(t2db311(t,bid));setSyncing(false);
    if(!error){setTasks(ts=>[...ts,t]);if(openEdit)setTimeout(()=>setEditing(t),80);}
  };
  const delTask=async id=>{
    appendLog({type:"delete",title:tasks.find(t=>t.id===id)?.title||"?"});
    setSyncing(true);const{error}=await db.from("tasks").delete().eq("id",id);setSyncing(false);
    if(!error){setTasks(ts=>ts.filter(t=>t.id!==id));setEditing(null);}
  };
  const duplicateTask=async orig=>{
    const dup={...orig,id:genId(),title:orig.title+" (copy)",manualOrder:Date.now(),done:false,completionLog:[]};
    const bid=getBoardId(orig);setSyncing(true);await db.from("tasks").upsert(t2db311(dup,bid));setSyncing(false);setTasks(ts=>[...ts,dup]);
  };
  const saveRef=async updated=>{
    setSyncing(true);const{error}=await db.from("tasks").upsert(t2db311(updated,getBoardId(updated)));setSyncing(false);
    if(!error)setTasks(ts=>ts.map(t=>t.id===updated.id?updated:t));
  };
  const checkTask=async id=>{
    const ct=tasks.find(t=>t.id===id);if(!ct)return;
    if(ct.done&&!(ct.frequency&&ct.frequency.trim())){const u={...ct,done:false};setSyncing(true);await db.from("tasks").upsert(t2db311(u,getBoardId(ct)));setSyncing(false);setTasks(ts=>ts.map(t=>t.id===id?u:t));return;}
    const hasFreq=ct.frequency&&ct.frequency.trim();
    const e={id:genId(),doneAt:new Date().toISOString(),note:""};
    appendLog({type:"complete",title:ct.title||"?"});
    const endCelebration=()=>{setCelebratingIds(s=>{const n=new Set(s);n.delete(id);return n;});setTimeout(()=>celebratingRef.current.delete(id),60);};
    if(!hasFreq){
      doneTaskIds.current.add(id);
      const u={...ct,done:true,completionLog:[...(ct.completionLog||[]),e]};
      setTasks(ts=>ts.map(t=>t.id===id?u:t));
      celebratingRef.current.add(id);setCelebratingIds(s=>{const n=new Set(s);n.add(id);return n;});
      setTimeout(async()=>{setSyncing(true);await db.from("tasks").upsert(t2db311(u,getBoardId(ct)));setSyncing(false);endCelebration();},2500);
    }else{
      celebratingRef.current.add(id);setCelebratingIds(s=>{const n=new Set(s);n.add(id);return n;});
      setTimeout(async()=>{
        const nd=nextDue311(ct.frequency)||ct.dueDate;
        const u={...ct,status:"list",dueDate:nd,completionLog:[...(ct.completionLog||[]),e]};
        setSyncing(true);await db.from("tasks").upsert(t2db311(u,getBoardId(ct)));setSyncing(false);
        setTasks(ts=>ts.map(t=>t.id===id?u:t));endCelebration();
      },2500);
    }
  };
  const snoozeTask=t=>{const d=new Date((t.dueDate||todayStr())+"T00:00:00");d.setDate(d.getDate()+1);saveTask({...t,dueDate:d.toISOString().split("T")[0]});};
  const snoozeAllOverdue=async()=>{const overdue=tasks.filter(t=>t.dueDate&&daysDiff(t.dueDate)<0);if(!overdue.length)return;const today_=todayStr();const updated=overdue.map(t=>({...t,dueDate:today_}));setTasks(ts=>ts.map(t=>{const u=updated.find(x=>x.id===t.id);return u||t;}));await db.from("tasks").upsert(updated.map(t=>t2db311(t,getBoardId(t))));};
  const boardSort=async()=>{const now_=new Date();const nm_=now_.getHours()*60+now_.getMinutes();const updated=tasks.map(t=>{const hasFreq=t.frequency&&t.frequency.trim();const isToday=t.dueDate&&daysDiff(t.dueDate)===0;const isOverdue=t.dueDate&&daysDiff(t.dueDate)<0;const tm=t.time?t2m(t.time):null;const in2h=isToday&&tm!==null&&tm>nm_&&tm<=nm_+120;const pastToday=isToday&&tm!==null&&tm<=nm_;if(isOverdue||in2h||pastToday)return{...t,status:"inprogress"};if(!hasFreq)return{...t,status:"nextup"};if(isToday)return{...t,status:"do"};return{...t,status:"list"};});const changed=updated.filter((t,i)=>t.status!==tasks[i].status);if(!changed.length)return;setTasks(updated);await db.from("tasks").upsert(changed.map(t=>t2db311(t,getBoardId(t))));};
  const saveBuckets=async list=>{
    setBuckets(list);setShowBuckets(false);
    if(!board)return;
    const{data:ex}=await db.from("buckets").select("id").eq("board_id",board.id);
    const exIds=new Set((ex||[]).map(b=>b.id));const lIds=new Set(list.map(b=>b.id));
    for(const id of exIds){if(!lIds.has(id))await db.from("buckets").delete().eq("id",id);}
    if(list.length>0){const rows=list.map((b,i)=>({id:b.id,board_id:board.id,emoji:b.emoji||"📦",label:b.label,color:b.mainColor||null,bg_color:b.bgColor||null,parent_id:b.parentId||null,sort_order:i}));await db.from("buckets").upsert(rows);}
  };
  const saveDevices=async list=>{setDevices(list);setShowDevices(false);if(board)await db.from("board_settings").upsert({board_id:board.id,devices_json:JSON.stringify(list)},{onConflict:"board_id"});};
  const saveSprints=async list=>{setSprints(list);setShowSprints(false);if(board)await db.from("board_settings").upsert({board_id:board.id,sprints_json:JSON.stringify(list)},{onConflict:"board_id"});};
  const savePersons=async list=>{setPersons(list);setShowPersons(false);if(board)await db.from("board_settings").upsert({board_id:board.id,persons_json:JSON.stringify(list)},{onConflict:"board_id"});};
  const saveBrands=async list=>{setBrands(list);setShowBrands(false);if(board)await db.from("board_settings").upsert({board_id:board.id,brands_json:JSON.stringify(list)},{onConflict:"board_id"});};
  const saveLabels=async list=>{setLabels(list);setShowLabels(false);if(board)await db.from("board_settings").upsert({board_id:board.id,labels_json:JSON.stringify(list)},{onConflict:"board_id"});};
  const saveActions=async list=>{setActions(list);setShowActions(false);if(board)await db.from("board_settings").upsert({board_id:board.id,actions_json:JSON.stringify(list)},{onConflict:"board_id"});};
  const saveSettings=async s=>{setSettings(s);if(board){const dk=`dc_disp_${user.id}_${board.id}`;try{localStorage.setItem(dk,JSON.stringify(s));}catch{}await db.from("board_settings").upsert({board_id:board.id,hide_empty_do:s.hideEmptyDo,default_view:s.defaultView,hide_time_frames:s.hideTimeFrames,show_action_tag:s.showActionTag,show_bucket_color:s.showBucketColor!==false,show_card_bg:s.showCardBg!==false,show_duration:s.showDuration!==false,show_frequency:s.showFrequency!==false},{onConflict:"board_id"});}};
  const importTasks=async rows=>{if(!board)return;setSyncing(true);for(const r of rows){await db.from("tasks").insert(t2db311(r,board.id));}const{data}=await db.from("tasks").select("*").in("board_id",allBoards.map(b=>b.id)).eq("done",false);if(data)setTasks(data.map(dbToTask311));setSyncing(false);};
  const forceRefresh=async()=>{setSyncing(true);const{data}=await db.from("tasks").select("*").in("board_id",allBoards.map(b=>b.id)).eq("done",false);if(data)setTasks(data.map(dbToTask311));setSyncing(false);};
  const handleEdit=t=>{if(t.isRef)setEditingRef(t);else setEditing(t);};
  const handleDragStart=useCallback(id=>setDraggingId(id),[]);
  const handleDrop=async targetId=>{
    if(!draggingId||draggingId===targetId)return;
    const from=tasks.find(t=>t.id===draggingId),to=tasks.find(t=>t.id===targetId);
    if(!from||!to||from.status!==to.status){setDraggingId(null);return;}
    const colTasks=[...tasks.filter(t=>t.status===from.status)].sort((a,b)=>(a.manualOrder||0)-(b.manualOrder||0));
    const without=colTasks.filter(t=>t.id!==draggingId);const tgtIdx=without.findIndex(t=>t.id===targetId);without.splice(tgtIdx,0,from);
    const reordered=without.map((t,i)=>({...t,manualOrder:i*10}));
    setTasks(ts=>ts.map(t=>{const r=reordered.find(x=>x.id===t.id);return r||t;}));setDraggingId(null);
    await db.from("tasks").upsert(reordered.map(t=>t2db311(t,getBoardId(t))));
  };
  const handleDropCol=async colId=>{
    if(!draggingId)return;const m=tasks.find(t=>t.id===draggingId);if(!m||m.status===colId){setDraggingId(null);return;}
    const colTasks=tasks.filter(t=>t.status===colId);const maxOrder=colTasks.length>0?Math.max(...colTasks.map(t=>t.manualOrder||0))+10:0;
    const u={...m,status:colId,manualOrder:maxOrder};setTasks(ts=>ts.map(t=>t.id===draggingId?u:t));setDraggingId(null);
    await db.from("tasks").upsert(t2db311(u,getBoardId(u)));
  };

  const childBucketIds=useMemo(()=>activeTab==="all"?[]:buckets.filter(b=>b.parentId===activeTab).map(b=>b.id),[activeTab,buckets]);
  const vis=useMemo(()=>tasks.filter(t=>{
    if(t.isRef)return false;
    if(settings.hideMundane&&t.mundane===true)return false;
    if(activeTab==="__nobudget__"){if(t.bucketId)return false;}
    else if(activeTab!=="all"&&t.bucketId!==activeTab&&!childBucketIds.includes(t.bucketId))return false;
    if(dayFilter==="alltasks")return true;
    if(!t.dueDate){return dayFilter==="nodate"||dayFilter==="all";}
    if(dayFilter==="nodate")return false;
    if(dayFilter==="all")return true;
    const d=daysDiff(t.dueDate);
    if(dayFilter==="today")return d<=0;
    if(dayFilter==="todaynomundane"){if(t.mundane===true)return false;return d<=0;}
    if(dayFilter==="todaytomorrow")return d<=1;
    if(dayFilter==="tomorrow")return d===1;
    if(dayFilter==="overdue")return d<0;
    if(dayFilter.startsWith("wd:")){const _wd=parseInt(dayFilter.slice(3));return new Date(t.dueDate+"T00:00:00").getDay()===_wd;}
    return true;
  }),[tasks,activeTab,childBucketIds,dayFilter,settings.hideMundane]);
  const visBucket=useMemo(()=>tasks.filter(t=>{
    if(t.isRef)return false;
    if(dayFilter==="todaynomundane"&&t.mundane===true)return false;
    if(activeTab==="__nobudget__"){if(t.bucketId)return false;}
    else if(activeTab!=="all"&&t.bucketId!==activeTab&&!childBucketIds.includes(t.bucketId))return false;
    return true;
  }),[tasks,activeTab,childBucketIds,dayFilter]);
  const visibleBuckets=buckets.filter(b=>!b.hidden);
  const tabs=[{id:"all",emoji:"",label:"ALL",color:null},...visibleBuckets.map(b=>({id:b.id,emoji:b.emoji,label:b.label,color:b.mainColor||null})),{id:"__nobudget__",emoji:"∅",label:"No Bucket",color:null}];
  const oCt=tasks.filter(t=>t.dueDate&&daysDiff(t.dueDate)<0).length;
  const tCt=tasks.filter(t=>t.dueDate&&daysDiff(t.dueDate)===0).length;
  const TOOL_VIEWS=["inbox","onesies","monthly","health","ref","taba","gameday","plan","sprint","summ"];
  const isToolView=TOOL_VIEWS.includes(viewMode);
  const readOnly=userRole==="viewer";
  const theme={bg:"#000",navBg:"#000",cardBg:"#1c1c1e",col:"#111",border:"#2a2a2a",text:"#e8e8e8",muted:"#555",inp:"#1a1a1a",lm:false,limeText:LIME,limeBtn:LIME,showActionTag:!!settings.showActionTag,showBucketColor:settings.showBucketColor!==false,showCardBg:settings.showCardBg!==false,showDuration:settings.showDuration!==false,showFrequency:settings.showFrequency!==false};

  if(loading)return(<div style={{height:"100%",display:"flex",alignItems:"center",justifyContent:"center",background:"#000",flexDirection:"column",gap:12}}><Spinner size={28} color={LIME}/><div style={{fontSize:12,color:MUTED}}>Loading tasks…</div></div>);

  return(<ThemeCtx.Provider value={theme}>
  <div onDragEnd={()=>setDraggingId(null)} style={{height:"100%",display:"flex",flexDirection:"column",background:"#000",color:TEXT,overflow:"hidden"}}>
    {/* Toolbar: day filter + bucket + quick-add */}
    <div style={{display:"flex",alignItems:"center",gap:6,padding:"0 8px",borderBottom:`1px solid ${BORDER}`,flexShrink:0,height:38,background:"#000"}}>
      <div style={{opacity:isToolView?.4:1,pointerEvents:isToolView?"none":"auto"}}>
        <DayFilterDropdown value={dayFilter} onChange={setDayFilter}/>
      </div>
      <BucketDropdown tabs={tabs} activeTab={activeTab} onSelect={setActiveTab}/>
      <div style={{flex:1}}/>
      {syncing&&<span style={{fontSize:10,color:LIME,letterSpacing:1}}>SYNCING</span>}
      <button onClick={()=>setShowSearch(true)} style={{background:"none",border:`1px solid ${BORDER}`,borderRadius:7,padding:"4px 9px",cursor:"pointer",fontSize:13,color:MUTED}}>🔍</button>
      <button onClick={()=>setShowQuickAdd(true)} style={{background:LIME,border:"none",borderRadius:8,padding:"4px 12px",cursor:"pointer",color:"#000",fontSize:20,fontWeight:800,lineHeight:1.2}}>+</button>
      <button onClick={()=>setShowSidebar311(true)} style={{background:"none",border:`1px solid ${BORDER}`,borderRadius:7,padding:"4px 9px",cursor:"pointer",fontSize:13,color:MUTED}}>⊞</button>
    </div>
    {/* Views */}
    <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0,overflow:"hidden"}}>
      {viewMode==="board"&&(<div style={{display:"flex",flexDirection:"column",flex:1,minHeight:0}}>
        <QuickAddBar boardId={board?.id} onAdd={addTask} onOpenModal={()=>setShowQuickAdd(true)} readOnly={readOnly}/>
        <div style={{flex:1,overflowX:"auto",overflowY:"hidden",padding:"10px 12px 0",display:"flex",gap:10,alignItems:"stretch",minHeight:0}}>
          {COLS.filter(col=>!(col.id==="do"&&settings.hideEmptyDo&&vis.filter(t=>t.status===col.id).length===0)).map(col=>(
            <Column key={col.id} col={col} boardId={board?.id} buckets={buckets} activeTab={activeTab} tasks={vis.filter(t=>t.status===col.id)} onEdit={setEditing} onDelete={delTask} onCheck={checkTask} onDuplicate={duplicateTask} onAddTask={addTask} readOnly={readOnly} draggingId={draggingId} celebratingIds={celebratingIds} onDragStart={handleDragStart} onDragOver={()=>{}} onDrop={handleDrop} onDropCol={handleDropCol}/>
          ))}
        </div>
        {!readOnly&&<div style={{padding:"6px 12px",borderTop:`1px solid ${BORDER}`,display:"flex",gap:6,justifyContent:"flex-end"}}>
          <button onClick={snoozeAllOverdue} style={{padding:"6px 14px",borderRadius:8,border:"1px solid #FF9F0A44",background:"#1a0e00",color:"#FF9F0A",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>💤 Snooze Overdue</button>
          <button onClick={boardSort} style={{padding:"6px 14px",borderRadius:8,border:"1px solid #5E5CE644",background:"#0a0a1a",color:"#5E5CE6",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>⚡ Super Sort</button>
        </div>}
      </div>)}
      {viewMode==="cal"&&<div style={{display:"flex",flexDirection:"column",flex:1,minHeight:0}}><QuickAddBar boardId={board?.id} onAdd={addTask} onOpenModal={()=>setShowQuickAdd(true)} readOnly={readOnly}/><HourlyCalendar tasks={visBucket} buckets={buckets} onEdit={setEditing} onCheck={checkTask} readOnly={readOnly} celebratingIds={celebratingIds} sb={activeTab==="all"} onAddTask={addTask} hideTimeFrames={settings.hideTimeFrames} dayFilter={dayFilter} activeTab={activeTab} allBuckets={buckets}/></div>}
      {viewMode==="day"&&<DayView tasks={visBucket} buckets={buckets} activeTab={activeTab} onEdit={setEditing} onDelete={delTask} onCheck={checkTask} readOnly={readOnly} celebratingIds={celebratingIds} onAddTask={addTask} boardId={board?.id} hideTimeFrames={settings.hideTimeFrames} onOpenModal={()=>setShowQuickAdd(true)} dayFilter={dayFilter}/>}
      {viewMode==="list"&&<div style={{display:"flex",flexDirection:"column",flex:1,minHeight:0}}><QuickAddBar boardId={board?.id} onAdd={addTask} onOpenModal={()=>setShowQuickAdd(true)} readOnly={readOnly}/><DurationView tasks={vis} buckets={buckets} actions={actions} brands={brands} persons={persons} labels={labels} devices={devices} activeTab={activeTab} onEdit={setEditing} onDelete={delTask} onCheck={checkTask} readOnly={readOnly} celebratingIds={celebratingIds} onAddTask={addTask} boardId={board?.id}/></div>}
      {viewMode==="plan"&&<PlanView tasks={visBucket} buckets={buckets} onEdit={handleEdit} onCheck={checkTask} onSnooze={snoozeTask} readOnly={readOnly} celebratingIds={celebratingIds}/>}
      {viewMode==="dash"&&<div style={{display:"flex",flexDirection:"column",flex:1,minHeight:0}}><QuickAddBar boardId={board?.id} onAdd={addTask} onOpenModal={()=>setShowQuickAdd(true)} readOnly={readOnly}/><DashboardView tasks={visBucket} buckets={buckets} onEdit={handleEdit} onCheck={checkTask} celebratingIds={celebratingIds} readOnly={readOnly} dayFilter={dayFilter} onSnooze={snoozeTask}/></div>}
      {viewMode==="monthly"&&<MonthlyView tasks={tasks} buckets={buckets} onEdit={handleEdit} celebratingIds={celebratingIds}/>}
      {viewMode==="taba"&&<TabataView tasks={tasks} onCheck={checkTask} onEdit={setEditing} celebratingIds={celebratingIds}/>}
      {viewMode==="health"&&<HealthView tasks={tasks} buckets={buckets} onEdit={setEditing} activeTab={activeTab} childBucketIds={childBucketIds}/>}
      {viewMode==="onesies"&&<OnesiesView tasks={visBucket} buckets={buckets} onEdit={handleEdit} onCheck={checkTask} onDelete={delTask} celebratingIds={celebratingIds} readOnly={readOnly} onAddTask={addTask} boardId={board?.id}/>}
      {viewMode==="inbox"&&<InboxView tasks={tasks} buckets={buckets} boardId={board?.id} onAdd={addTask} onEdit={handleEdit} readOnly={readOnly}/>}
      {viewMode==="ref"&&<RefBoardView tasks={tasks} buckets={buckets} boardId={board?.id} onAdd={addTask} onEdit={handleEdit} readOnly={readOnly}/>}
      {viewMode==="summ"&&<SummaryView tasks={visBucket} buckets={buckets} onEdit={handleEdit} celebratingIds={celebratingIds} dayFilter={dayFilter}/>}
      {viewMode==="gameday"&&<GamedayView tasks={visBucket} buckets={buckets} onEdit={handleEdit} onCheck={checkTask} onDelete={delTask} celebratingIds={celebratingIds} readOnly={readOnly} onAddTask={addTask} boardId={board?.id}/>}
      {viewMode==="sprint"&&<SprintView sprints={sprints} onSaveSprints={saveSprints}/>}
      {viewMode==="simple"&&<SimpleView tasks={tasks} onEdit={handleEdit}/>}
    </div>
    {/* 311 Sidebar — view switcher */}
    {showSidebar311&&<Sidebar viewMode={viewMode} onView={v=>{setViewMode(v);setShowSidebar311(false);}} onClose={()=>setShowSidebar311(false)} onBack={()=>setShowSidebar311(false)} onBoards={()=>setShowSidebar311(false)} onSettings={()=>{setShowSettings(true);setShowSidebar311(false);}} onDisplay={()=>{setShowDisplay(true);setShowSidebar311(false);}} onStats={()=>{setShowStats(true);setShowSidebar311(false);}} onBuckets={()=>{setShowBuckets(true);setShowSidebar311(false);}} onActions={()=>{setShowActions(true);setShowSidebar311(false);}} onBrands={()=>{setShowBrands(true);setShowSidebar311(false);}} onPersons={()=>{setShowPersons(true);setShowSidebar311(false);}} onLabels={()=>{setShowLabels(true);setShowSidebar311(false);}} onDevices={()=>{setShowDevices(true);setShowSidebar311(false);}} onSprints={()=>{setShowSprints(true);setShowSidebar311(false);}} onImport={()=>{setShowImport(true);setShowSidebar311(false);}} board={board}/>}
    {showQuickAdd&&<QuickAddModal boardId={board?.id} buckets={buckets} onAdd={t=>{addTask(t);setShowQuickAdd(false);}} onClose={()=>setShowQuickAdd(false)}/>}
    {editing&&<EditMdl task={editing} tasks={tasks} buckets={buckets} actions={actions} brands={brands} persons={persons} labels={labels} devices={devices} sprints={sprints} onSave={saveTask} onClose={()=>setEditing(null)} onDelete={delTask} onDuplicate={duplicateTask} onOpenRef={r=>{setEditing(null);setEditingRef(r);}} readOnly={readOnly}/>}
    {editingRef&&<RefCardModal task={editingRef} onSave={saveRef} onClose={()=>setEditingRef(null)} onMore={t=>{setEditingRef(null);setEditing(t);}} readOnly={readOnly}/>}
    {showSearch&&<SearchMdl tasks={tasks} boards={allBoards} allMode={true} onSelectTask={t=>{setShowSearch(false);handleEdit(t);}} onClose={()=>setShowSearch(false)}/>}
    {showSettings&&<SettingsMdl settings={settings} onChange={saveSettings} onBuckets={()=>setShowBuckets(true)} onActions={()=>setShowActions(true)} onBrands={()=>setShowBrands(true)} onPersons={()=>setShowPersons(true)} onMembers={()=>setShowMembers(true)} onClose={()=>setShowSettings(false)} boardName={board?.name} userRole={userRole} user={user} onCleanSort={async()=>{}} onBoardSort={boardSort} onSnoozeOverdue={snoozeAllOverdue} onTabata={()=>setViewMode("taba")} onSync={forceRefresh} syncing={syncing} onShowLog={()=>setShowLog(true)} onAdmin={()=>setShowAdmin(true)} onExportTasks={()=>{const lines=tasks.map(t=>[t.title,t.dueDate,t.frequency,t.status].filter(Boolean).join(" | "));const blob=new Blob([lines.join("\n")],{type:"text/plain"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="dayman-tasks.txt";a.click();}} onExportLog={()=>{const log=getLog();const lines=log.map(e=>`[${new Date(e.at).toLocaleString()}] ${e.type.toUpperCase()}: ${e.title||"?"}`);const blob=new Blob([lines.join("\n")],{type:"text/plain"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="dayman-log.txt";a.click();}} onExportBoard={()=>{const exp={exportedAt:new Date().toISOString(),tasks:tasks.filter(t=>!t.done)};const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(exp,null,2)],{type:"application/json"}));a.download="dayman-export.json";a.click();}}/>}
    {showDisplay&&<DisplayMdl settings={settings} onChange={saveSettings} onClose={()=>setShowDisplay(false)}/>}
    {showStats&&<StatsMdl tasks={tasks} oCt={oCt} tCt={tCt} onClose={()=>setShowStats(false)}/>}
    {showLog&&<ActivityLog logKey={logKey} onClose={()=>setShowLog(false)}/>}
    {showBuckets&&<BucketMgr buckets={buckets} onSave={saveBuckets} onClose={()=>setShowBuckets(false)}/>}
    {showBrands&&<BrandMgrView brands={brands} onSave={saveBrands} onClose={()=>setShowBrands(false)}/>}
    {showPersons&&<PersonMgrView persons={persons} onSave={savePersons} onClose={()=>setShowPersons(false)}/>}
    {showLabels&&<LabelsMgrView labels={labels} onSave={saveLabels} onClose={()=>setShowLabels(false)}/>}
    {showDevices&&<DeviceMgrView devices={devices} onSave={saveDevices} onClose={()=>setShowDevices(false)}/>}
    {showSprints&&<SprintsMgr sprints={sprints} onSave={saveSprints} onClose={()=>setShowSprints(false)}/>}
    {showImport&&<ImportModal boardId={board?.id} buckets={buckets} onImport={importTasks} onClose={()=>setShowImport(false)}/>}
    {showActions&&<ActionMgr actions={actions} onSave={saveActions} onClose={()=>setShowActions(false)}/>}
    {showAdmin&&<AdminSettingsMdl onClose={()=>setShowAdmin(false)} userRole={userRole} user={user} onMembers={()=>{setShowAdmin(false);setShowMembers(true);}} onImport={()=>{setShowAdmin(false);setShowImport(true);}} onExportTasks={()=>{}} onExportLog={()=>{}} onExportBoard={()=>{}} onBoardSort={boardSort} onCleanSort={async()=>{}} onSnoozeOverdue={snoozeAllOverdue} onSync={forceRefresh} syncing={syncing}/>}
    {showMembers&&board&&<MembersModal board={board} userRole={userRole} currentUser={user} onClose={()=>setShowMembers(false)}/>}
  </div>
  </ThemeCtx.Provider>);
}

// ═══════════════════════════════════════════════════════════════════
// SIDEBAR DRAWER (Dayman navigation)
// ═══════════════════════════════════════════════════════════════════
function SidebarDrawer({open,onClose,tab,setTab,user,onSignOut}){
  const NAV_ITEMS=[
    {key:"now",label:"NOW",icon:"☀",color:"#f7c94f"},
    {key:"habits",label:"HABITS",icon:"✓",color:GREEN},
    {key:"sprint",label:"SPRINT",icon:"⚡",color:LIME},
    {key:"countdown",label:"COUNTDOWN",icon:"⏳",color:BLUE},
    {key:"freq",label:"FREQ",icon:"🔁",color:ORANGE},
    {key:"plan",label:"PLAN",icon:"▣",color:"#c084fc"},
    {key:"brands",label:"BRANDS",icon:"🏷",color:LIME},
  ];
  return(<>
    {open&&<div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:800,backdropFilter:"blur(2px)"}}/>}
    <div style={{position:"fixed",top:0,left:0,bottom:0,width:270,background:"#0a0a0a",borderRight:`1px solid ${BORDER}`,zIndex:900,display:"flex",flexDirection:"column",transform:open?"translateX(0)":"translateX(-100%)",transition:"transform .25s cubic-bezier(.4,0,.2,1)",boxShadow:open?"8px 0 40px rgba(0,0,0,.8)":"none"}}>
      <div style={{padding:"20px 20px 16px",borderBottom:`1px solid ${BORDER}`,display:"flex",alignItems:"center",gap:12}}>
        <span style={{fontSize:24,lineHeight:1}}>☀</span>
        <div><div style={{fontWeight:900,fontSize:16,letterSpacing:-0.5,color:LIME}}>DAYMAN 2.8</div><div style={{fontSize:11,color:MUTED,marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:150}}>{user?.email}</div></div>
        <button onClick={onClose} style={{marginLeft:"auto",background:"none",border:"none",color:MUTED,fontSize:22,cursor:"pointer",lineHeight:1,flexShrink:0}}>✕</button>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"12px 0"}}>
        <div style={{padding:"0 16px 6px",fontSize:9,fontWeight:700,letterSpacing:2,color:"#444",textTransform:"uppercase"}}>Views</div>
        {NAV_ITEMS.map(t=>(<button key={t.key} onClick={()=>{setTab(t.key);onClose();}} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"12px 16px",background:tab===t.key?t.color+"18":"transparent",border:"none",cursor:"pointer",fontFamily:"inherit",textAlign:"left",borderLeft:tab===t.key?`3px solid ${t.color}`:"3px solid transparent",transition:"all .15s"}}>
          <span style={{fontSize:18,width:24,textAlign:"center",flexShrink:0,lineHeight:1}}>{t.icon}</span>
          <span style={{fontSize:13,fontWeight:tab===t.key?700:500,color:tab===t.key?t.color:TEXT,letterSpacing:0.2}}>{t.label}</span>
          {tab===t.key&&<div style={{marginLeft:"auto",width:6,height:6,borderRadius:"50%",background:t.color,flexShrink:0}}/>}
        </button>))}
        <div style={{margin:"16px 16px 8px",height:1,background:BORDER}}/>
        <div style={{padding:"0 16px 8px",fontSize:9,fontWeight:700,letterSpacing:2,color:"#444",textTransform:"uppercase"}}>Settings</div>
        <div style={{padding:"8px 16px"}}>
          <div style={{background:"#111",borderRadius:10,border:`1px solid ${BORDER}`,padding:"12px 14px",marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{color:MUTED,fontSize:12}}>Version</span><span style={{fontSize:12,fontWeight:700,color:LIME}}>DAYMAN 2.8</span></div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{color:MUTED,fontSize:12}}>Day resets at</span><span style={{fontSize:12,fontWeight:700,color:ORANGE}}>3:00 AM</span></div>
            <div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:MUTED,fontSize:12}}>Database</span><span style={{fontSize:12,color:TEXT}}>Supabase</span></div>
          </div>
          <button onClick={onSignOut} style={{width:"100%",padding:"11px",borderRadius:10,border:"1px solid rgba(239,68,68,.3)",background:"rgba(239,68,68,.05)",color:"#ef4444",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>Sign Out</button>
        </div>
      </div>
    </div>
  </>);
}

// ═══════════════════════════════════════════════════════════════════
// GLOBAL TOP BAR
// ═══════════════════════════════════════════════════════════════════
const TAB_META={
  now:{label:"NOW",color:"#f7c94f"},
  habits:{label:"HABITS",color:GREEN},
  sprint:{label:"SPRINT",color:LIME},
  countdown:{label:"COUNTDOWN",color:BLUE},
  freq:{label:"FREQ",color:ORANGE},
  plan:{label:"PLAN",color:"#c084fc"},
  brands:{label:"BRANDS",color:LIME},
};
function TopBar({tab,onMenuOpen}){
  const meta=TAB_META[tab]||{label:tab.toUpperCase(),color:LIME};
  return(
    <div style={{flexShrink:0,height:48,display:"flex",alignItems:"center",borderBottom:`1px solid ${BORDER}`,background:"#000",padding:"0 4px 0 0"}}>
      <button onClick={onMenuOpen} style={{width:48,height:48,background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:MUTED,flexShrink:0}}>
        <svg width="20" height="14" viewBox="0 0 20 14" fill="none"><rect width="20" height="2" rx="1" fill="currentColor"/><rect y="6" width="20" height="2" rx="1" fill="currentColor"/><rect y="12" width="20" height="2" rx="1" fill="currentColor"/></svg>
      </button>
      <span style={{fontWeight:900,fontSize:15,letterSpacing:-0.5,color:meta.color,flex:1}}>{meta.label}</span>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// BOTTOM NAV
// ═══════════════════════════════════════════════════════════════════
const TABS=[
  {key:"now",label:"NOW",icon:"☀",color:"#f7c94f"},
  {key:"habits",label:"HABITS",icon:"✓",color:GREEN},
  {key:"sprint",label:"SPRINT",icon:"⚡",color:LIME},
  {key:"countdown",label:"⏳",icon:"⏳",color:BLUE},
  {key:"freq",label:"FREQ",icon:"🔁",color:ORANGE},
  {key:"plan",label:"PLAN",icon:"▣",color:"#c084fc"},
];
function BottomNav({tab,setTab}){
  return(<div style={{flexShrink:0,display:"flex",borderTop:`1px solid ${BORDER}`,background:"#000",height:NAV_H}}>
    {TABS.map(t=>(<button key={t.key} onClick={()=>setTab(t.key)} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,padding:"6px 0",fontFamily:"inherit",transition:"opacity .1s",opacity:tab===t.key?1:0.4,position:"relative"}}>
      <span style={{fontSize:18,lineHeight:1}}>{t.icon}</span>
      <span style={{fontSize:9,fontWeight:700,letterSpacing:"0.06em",color:tab===t.key?t.color:MUTED}}>{t.label}</span>
      {tab===t.key&&<div style={{width:20,height:2,borderRadius:1,background:t.color,position:"absolute",bottom:4}}/>}
    </button>))}
  </div>);
}

// ═══════════════════════════════════════════════════════════════════
// ROOT APP
// ═══════════════════════════════════════════════════════════════════
function App(){
  const [screen,setScreen]=useState("loading");
  const [user,setUser]=useState(null);
  const [tab,setTab]=useState("habits");
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const switchTab=t=>{setTab(t);if(t==="now")setNowKey(k=>k+1);};
  const resetHour=RESET_HOUR;
  const [nowKey,setNowKey]=useState(0);

  useEffect(()=>{
    db.auth.getSession().then(({data:{session}})=>{if(session){setUser(session.user);setScreen("main");}else setScreen("auth");});
    const{data:{subscription}}=db.auth.onAuthStateChange((_,session)=>{if(session){setUser(session.user);setScreen("main");}else{setUser(null);setScreen("auth");}});
    return()=>subscription.unsubscribe();
  },[]);

  if(screen==="loading")return(<div style={{height:"100%",display:"flex",alignItems:"center",justifyContent:"center",background:"#000",flexDirection:"column",gap:16}}><div style={{fontSize:36}}>☀</div><Spinner size={22}/></div>);
  if(screen==="auth")return<AuthScreen onAuth={u=>{setUser(u);setScreen("main");}}/>;

  return(<div style={{height:"100%",display:"flex",flexDirection:"column",background:"#000",overflow:"hidden"}}>
    <SidebarDrawer open={sidebarOpen} onClose={()=>setSidebarOpen(false)} tab={tab} setTab={switchTab} user={user} onSignOut={()=>db.auth.signOut()}/>
    <TopBar tab={tab} onMenuOpen={()=>setSidebarOpen(true)}/>
    <div style={{flex:1,overflow:"hidden",position:"relative"}}>
      <div style={{display:tab==="now"?"block":"none",height:"100%"}}>{user&&<NowSection key={nowKey} user={user} resetHour={resetHour} onNavigate={switchTab}/>}</div>
      <div style={{display:tab==="sprint"?"block":"none",height:"100%"}}>{user&&<SprintSection user={user} resetHour={resetHour}/>}</div>
      <div style={{display:tab==="habits"?"block":"none",height:"100%"}}>{user&&<HabitsSection user={user} resetHour={resetHour}/>}</div>
      <div style={{display:tab==="countdown"?"block":"none",height:"100%"}}>{user&&<CountdownSection user={user} resetHour={resetHour}/>}</div>
      <div style={{display:tab==="freq"?"block":"none",height:"100%"}}>{user&&<FreqSection user={user} resetHour={resetHour}/>}</div>
      <div style={{display:tab==="plan"?"block":"none",height:"100%"}}>{user&&<PlanSection user={user}/>}</div>
      <div style={{display:tab==="brands"?"block":"none",height:"100%"}}>{user&&<BrandsSection user={user}/>}</div>
    </div>
    <BottomNav tab={tab} setTab={switchTab}/>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
