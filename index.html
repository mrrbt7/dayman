const CD_RECURRINGS=[{key:null,label:'One-time'},{key:'weekly',label:'📅 Weekly'},{key:'monthly',label:'🗓 Monthly'},{key:'yearly',label:'🔁 Yearly'}];

function CDEventSheet({item,onClose,onSave,onDelete,defaultDirection}){
  const [name,setName]=useState(item?.name||'');
  const [cdEmoji,setCdEmoji]=useState(item?.emoji||'');
  const [date,setDate]=useState(item?.target_date||'');
  const [firstDate,setFirstDate]=useState(item?.first_date||'');
  const [cat,setCat]=useState(item?.category||'countdown');
  const [recurring,setRecur]=useState(item?.recurring||null);
  const [direction,setDirection]=useState(item?.direction||defaultDirection||'countdown');
  const [saving,setSaving]=useState(false);
  const isCountUp=direction==='countup';
  const habit_col=CD_COLORS[cat]||BLUE;
  const save=async()=>{if(!name.trim()||!date)return;setSaving(true);await onSave({name:name.trim(),emoji:cdEmoji||null,target_date:date,first_date:firstDate||null,category:cat,recurring,direction});setSaving(false);};
  return(<Sheet onClose={onClose} title={item?(isCountUp?'Edit Count-Up':'Edit Countdown'):(isCountUp?'New Count-Up':'New Countdown')}>
    <FormInput label="Type">
      <div style={{display:'flex',gap:8}}>
        {[['countdown','⏳ Countdown'],['countup','⏱ Count-Up']].map(([d,l])=>(<button key={d} onClick={()=>setDirection(d)} style={{flex:1,padding:'9px',borderRadius:10,cursor:'pointer',background:direction===d?'#1a2535':'#1a1a1a',border:`1px solid ${direction===d?BLUE:'#2a2a2a'}`,color:direction===d?TEXT:MUTED,fontSize:12,fontFamily:'inherit',fontWeight:direction===d?600:400}}>{l}</button>))}
      </div>
    </FormInput>
    <div style={{display:'flex',gap:8,marginBottom:14}}>
      <input value={cdEmoji} onChange={e=>setCdEmoji(e.target.value)} style={{...inp(),width:52,textAlign:'center',fontSize:22,padding:'8px 4px',flexShrink:0}} placeholder='🎯'/>
      <input value={name} onChange={e=>setName(e.target.value)} placeholder={isCountUp?'What happened / started?':'What are you counting down to?'} style={{...inp(),flex:1}} autoFocus/>
    </div>
    <FormInput label={isCountUp?'Date it started / happened':'Date'}>
      <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={inp()}/>
    </FormInput>
    <FormInput label="Original year (for age/years display)" style={{opacity:0.85}}>
      <input type="date" value={firstDate} onChange={e=>setFirstDate(e.target.value)} style={{...inp(),color:firstDate?TEXT:MUTED}} placeholder="e.g. 1988-03-17"/>
      <div style={{fontSize:11,color:MUTED,marginTop:5}}>For birthdays/anniversaries — shows how many years. Leave blank to skip.</div>
      {firstDate&&yearsFrom(firstDate)!==null&&<div style={{fontSize:13,color:habit_col||BLUE,marginTop:5,fontWeight:700}}>→ {yearsFrom(firstDate)} years old / {yearsFrom(firstDate)} yrs</div>}
    </FormInput>
    {!isCountUp&&(<>
      <FormInput label="Category">
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {CD_CATS.map(c=>(<button key={c.key} onClick={()=>setCat(c.key)} style={{background:cat===c.key?'#1a2535':'#1a1a1a',border:`1px solid ${cat===c.key?BLUE:'#2a2a2a'}`,borderRadius:10,padding:'8px 14px',fontSize:13,color:cat===c.key?TEXT:MUTED,cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',gap:6}}>{c.emoji} {c.label}</button>))}
        </div>
      </FormInput>
      <FormInput label="Recurring">
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {CD_RECURRINGS.map(r=>(<button key={String(r.key)} onClick={()=>setRecur(r.key)} style={{background:recurring===r.key?'#1a2535':'#1a1a1a',border:`1px solid ${recurring===r.key?BLUE:'#2a2a2a'}`,borderRadius:10,padding:'7px 12px',fontSize:12,color:recurring===r.key?TEXT:MUTED,cursor:'pointer',fontFamily:'inherit'}}>{r.label}</button>))}
        </div>
      </FormInput>
    </>)}
    <BtnRow>
      {item&&<button onClick={()=>onDelete(item.id)} style={{background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.2)',borderRadius:12,color:'#ef4444',fontSize:14,padding:'12px 16px',cursor:'pointer',fontFamily:'inherit'}}>Delete</button>}
      <BtnGhost onClick={onClose}>Cancel</BtnGhost>
      <BtnPrimary onClick={save} disabled={saving||!name.trim()||!date} color={BLUE}>{saving?'…':item?'Save':'Add'}</BtnPrimary>
    </BtnRow>
  </Sheet>);
}

function CountdownSection({user,resetHour=4}){
  const [items,setItems]=useState([]);const [loading,setLoading]=useState(true);
  const [mainTab,setMainTab]=useState('upcoming');const [catFilter,setCatFilter]=useState('all');
  const [sheet,setSheet]=useState(null);const [detailItem,setDetailItem]=useState(null);

  const load=useCallback(async()=>{
    const{data,error}=await db.from('countdowns').select('*').eq('user_id',user.id).order('target_date');
    if(!error)setItems(data||[]);setLoading(false);
  },[user.id]);
  useEffect(()=>{load();},[load]);

  const handleSave=async({name,emoji,target_date,first_date,category,recurring,direction})=>{
    if(sheet?.id){await db.from('countdowns').update({name,emoji:emoji||null,target_date,first_date:first_date||null,category,recurring,direction}).eq('id',sheet.id);}
    else{await db.from('countdowns').insert({user_id:user.id,name,emoji:emoji||null,target_date,first_date:first_date||null,category,recurring,direction:direction||'countdown'});}
    setSheet(null);load();
  };
  const handleDelete=async id=>{await db.from('countdowns').delete().eq('id',id);setSheet(null);load();};

  // Mark a recurring countdown complete → advance to next occurrence
  const handleMarkComplete=async(item,e)=>{
    e.stopPropagation();
    if(!item.recurring){// non-recurring: just move to past by setting last_completed
      await db.from('countdowns').update({last_completed:new Date().toISOString().split('T')[0]}).eq('id',item.id);
    }else{
      // advance target_date to next occurrence from today
      const next=nextOccurrence(item.target_date,item.recurring);
      // compute the one after that (to store as new target)
      const today=new Date();today.setHours(0,0,0,0);
      let d=new Date(next+'T00:00:00');
      if(item.recurring==='weekly')d.setDate(d.getDate()+7);
      else if(item.recurring==='monthly')d.setMonth(d.getMonth()+1);
      else if(item.recurring==='yearly')d.setFullYear(d.getFullYear()+1);
      const newTarget=d.toISOString().split('T')[0];
      await db.from('countdowns').update({target_date:newTarget,last_completed:new Date().toISOString().split('T')[0]}).eq('id',item.id);
    }
    load();
  };

  const enriched=items.map(item=>{
    // For recurring: use stored target_date (not auto-advance) so it stays in Upcoming until marked done
    const effectiveDate=item.target_date;
    const days=daysUntil(effectiveDate);
    return{...item,_days:days,_effectiveDate:effectiveDate};
  });

  // Split by direction
  const cdItems=enriched.filter(i=>i.direction!=='countup');
  const cuItems=enriched.filter(i=>i.direction==='countup');
  // Upcoming = not past OR recurring (stays until marked done). Past = non-recurring past only.
  const upcomingAll=cdItems.filter(i=>i._days>=0||i.recurring).sort((a,b)=>a._days-b._days);
  const upcoming=upcomingAll.filter(i=>i._days<=100);
  const far=upcomingAll.filter(i=>i._days>100).sort((a,b)=>a._days-b._days);
  const past=cdItems.filter(i=>i._days<0&&!i.recurring).sort((a,b)=>b._days-a._days);
  const countup=[...cuItems].map(i=>({...i,_since:Math.abs(i._days)})).sort((a,b)=>b._since-a._since);

  const displayList=mainTab==='countup'?countup
    :mainTab==='far'?far.filter(i=>catFilter==='all'||i.category===catFilter)
    :mainTab==='past'?past.filter(i=>catFilter==='all'||i.category===catFilter)
    :upcoming.filter(i=>catFilter==='all'||i.category===catFilter);

  const tabCounts={upcoming:upcoming.length,far:far.length,past:past.length,countup:countup.length};

  return(<div style={{height:'100%',display:'flex',flexDirection:'column',background:'#000',overflow:'hidden'}}>
    {/* Header */}
    <div className="section-header">
      <div style={{flex:1}}><span style={{fontWeight:900,fontSize:17,letterSpacing:-1}}><span style={{color:BLUE}}>⏳</span> COUNTDOWN</span></div>
      <button onClick={()=>setSheet('new')} style={{background:BLUE,border:'none',borderRadius:8,padding:'5px 14px',cursor:'pointer',color:'#000',fontSize:20,fontWeight:800,fontFamily:'inherit',lineHeight:1.2}}>+</button>
    </div>

    {/* Chrome tabs */}
    <div className="chrome-tabs">
      {[['upcoming','Upcoming',BLUE],['far','100+ Days','#aaa'],['past','Past','#aaa'],['countup','Count Up','#22d3ee']].map(([k,l,col])=>(
        <button key={k} className={`chrome-tab ${mainTab===k?'active':'inactive'}`} onClick={()=>setMainTab(k)} style={{color:mainTab===k?col:'#666'}}>
          {l}{tabCounts[k]>0?` (${tabCounts[k]})`:''}{mainTab===k&&<span style={{position:'absolute',bottom:0,left:0,right:0,height:2,borderRadius:'2px 2px 0 0',background:col}}/>}
        </button>
      ))}
    </div>

    {/* Category filter — not for countup */}
    {mainTab!=='countup'&&(<div className="pill-tabs">
      {[{key:'all',label:'All',emoji:''},...CD_CATS].map(c=>(<button key={c.key} className={`pill-tab ${catFilter===c.key?'active':'inactive'}`} onClick={()=>setCatFilter(c.key)} style={{borderColor:catFilter===c.key?BLUE:BORDER,background:catFilter===c.key?BLUE:'#141414',color:catFilter===c.key?'#000':MUTED}}>{c.emoji?c.emoji+' ':''}{c.label}</button>))}
    </div>)}

    <div style={{flex:1,overflowY:'auto',padding:'4px 16px',paddingBottom:NAV_H+12}}>
      {loading&&<div style={{display:'flex',justifyContent:'center',paddingTop:40}}><Spinner size={22} color={BLUE}/></div>}
      {!loading&&displayList.length===0&&(<div style={{textAlign:'center',padding:'60px 0',color:MUTED}}><div style={{fontSize:40,marginBottom:12}}>{mainTab==='countup'?'⏱':'⏳'}</div><div style={{fontSize:14}}>No {mainTab==='countup'?'count-up events':mainTab+' events'}</div></div>)}
      {!loading&&(()=>{
        const isCountUp=mainTab==='countup';
        // Build sectioned list for non-countup tabs
        const renderItem=(item,i)=>{
          const ci=CD_CATS.find(c=>c.key===item.category)||CD_CATS[0];
          const isToday_=item._days===0;const isPast=item._days<0&&!isCountUp;
          const color=isCountUp?'#22d3ee':(CD_COLORS[item.category]||BLUE);
          const daysVal=isCountUp?item._since:Math.abs(item._days);
          const isOverdue_=!isCountUp&&item._days<0;
          const yrsLabel=item.first_date?(isCountUp?yearsFrom(item.first_date):yearsUntilNext(item.first_date)):null;
          return(<div key={item.id} style={{background:isOverdue_?'#180808':'#141414',border:`1px solid ${isToday_?'rgba(247,201,79,0.3)':isOverdue_?RED+'33':BORDER}`,borderRadius:16,padding:'14px 15px',marginBottom:8,display:'flex',alignItems:'center',gap:14,cursor:'pointer'}} onClick={()=>setDetailItem(item)}>
            <div style={{width:40,height:40,borderRadius:11,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,background:color+'1a',flexShrink:0}}>{item.emoji||(isCountUp?'⏱':ci.emoji)}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:TASK_FS,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:isOverdue_?RED:'#e8e8e8'}}>{item.name}</div>
              <div style={{display:'flex',alignItems:'center',gap:6,marginTop:2,flexWrap:'wrap'}}>
                {yrsLabel!==null&&<span style={{fontSize:12,fontWeight:700,color:color}}>{isCountUp?`${yrsLabel} yrs`:`→ turns ${yrsLabel}`}</span>}
                <span style={{fontSize:11,color:MUTED}}>
                  {new Date(item.target_date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
                  {item.recurring&&<span style={{marginLeft:5,color:BLUE}}>↻ {item.recurring}</span>}
                </span>
              </div>
            </div>
            <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:2,flexShrink:0}}>
              {isToday_&&!isCountUp?<div style={{color:'#f7c94f',fontWeight:700,fontSize:16}}>Today</div>:<>
                <div style={{fontSize:30,fontWeight:700,lineHeight:1,fontFamily:'monospace',color:isOverdue_?RED:isPast?MUTED:color}}>{daysVal}</div>
                <div style={{fontSize:10,color:MUTED,textTransform:'uppercase',letterSpacing:'0.04em',fontWeight:500}}>{isCountUp?'Days Since':isOverdue_?'Overdue':'Days Until'}</div>
              </>}
            </div>
          </div>);
        };
        if(mainTab==='upcoming'){
          // Sections: Overdue, Today, Upcoming
          const overdue=displayList.filter(i=>i._days<0);
          const todayItems=displayList.filter(i=>i._days===0);
          const upcoming_=displayList.filter(i=>i._days>0);
          const SectionLabel=({label,color:col})=>(<div style={{display:'flex',alignItems:'center',gap:6,padding:'8px 0 4px'}}>
            <div style={{width:5,height:5,borderRadius:'50%',background:col,flexShrink:0}}/>
            <span style={{fontSize:9,fontWeight:700,letterSpacing:1.5,textTransform:'uppercase',color:col}}>{label}</span>
          </div>);
          return(<>
            {overdue.length>0&&<><SectionLabel label="Overdue" color={RED}/>{overdue.map((item,i)=>renderItem(item,i))}</>}
            {todayItems.length>0&&<><SectionLabel label="Today" color="#f7c94f"/>{todayItems.map((item,i)=>renderItem(item,i))}</>}
            {upcoming_.length>0&&<><SectionLabel label="Upcoming" color={BLUE}/>{upcoming_.map((item,i)=>renderItem(item,i))}</>}
          </>);
        }
        return displayList.map((item,i)=>renderItem(item,i));
      })()}
    </div>

    {sheet&&(<CDEventSheet item={sheet==='new'?null:sheet} onClose={()=>setSheet(null)} onSave={handleSave} onDelete={handleDelete} defaultDirection={mainTab==='countup'?'countup':'countdown'}/>)}
    {detailItem&&(<CDDetailScreen item={detailItem} onClose={()=>setDetailItem(null)} onEdit={item=>{setDetailItem(null);setSheet(item);}} onMarkComplete={async item=>{await handleMarkComplete(item,{stopPropagation:()=>{}});setDetailItem(null);}} onDelete={async id=>{await handleDelete(id);setDetailItem(null);}}/>)}
  </div>);
}

function CDDetailScreen({item,onClose,onEdit,onMarkComplete,onDelete}){
  const isCountUp=item.direction==='countup';
  const ci=CD_CATS.find(c=>c.key===item.category)||CD_CATS[0];
  const color=isCountUp?'#22d3ee':(CD_COLORS[item.category]||BLUE);
  const yrsLabel=item.first_date?(isCountUp?yearsFrom(item.first_date):yearsUntilNext(item.first_date)):null;
  const [now,setNow]=useState(()=>new Date());
  useEffect(()=>{const id=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(id);},[]);
  const target=new Date(item.target_date+'T00:00:00');
  const diffMs=isCountUp?(now-target):(target-now);
  const isToday=daysUntil(item.target_date)===0;
  const isOverdue=!isCountUp&&!isToday&&diffMs<0;
  const absDiff=Math.abs(diffMs);
  const totalSecs_=Math.floor(absDiff/1000);
  const ss=totalSecs_%60;const totalMins=Math.floor(totalSecs_/60);const mm=totalMins%60;
  const totalHrs=Math.floor(totalMins/60);const hh=totalHrs%24;
  const totalDays=Math.floor(totalHrs/24);
  const d1=isCountUp?target:now;const d2=isCountUp?now:target;
  let yrs=d2.getFullYear()-d1.getFullYear();let mos=d2.getMonth()-d1.getMonth();
  if(mos<0){yrs--;mos+=12;}
  const afterYM=new Date(d1);afterYM.setFullYear(afterYM.getFullYear()+yrs);afterYM.setMonth(afterYM.getMonth()+mos);
  const remDays=Math.max(0,Math.round(Math.abs(d2-afterYM)/86400000));
  const pad=n=>String(n).padStart(2,'0');
  const bigColor=isOverdue?RED:color;
  return(<div style={{position:'fixed',inset:0,background:'#000',zIndex:400,display:'flex',flexDirection:'column'}}>
    <div className="section-header">
      <button onClick={onClose} style={{background:'none',border:'none',color:MUTED,fontSize:26,cursor:'pointer',lineHeight:1,marginLeft:-4}}>‹</button>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontWeight:900,fontSize:16,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:isOverdue?RED:color}}>{item.name}</div>
        {yrsLabel!==null&&<div style={{fontSize:12,color:color,fontWeight:700,marginTop:1}}>{isCountUp?`${yrsLabel} yrs`:`→ turns ${yrsLabel}`}</div>}
      </div>
      <button onClick={()=>onEdit(item)} style={{background:'none',border:`1px solid ${BORDER}`,borderRadius:8,padding:'5px 12px',color:MUTED,fontSize:12,cursor:'pointer',fontFamily:'inherit'}}>Edit</button>
    </div>
    <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'0 32px',gap:14,textAlign:'center'}}>
      <div style={{fontSize:52,lineHeight:1}}>{item.emoji||(isCountUp?'⏱':ci.emoji)}</div>
      {isToday&&!isCountUp?(<div style={{fontSize:42,fontWeight:900,color:'#f7c94f',letterSpacing:-2}}>TODAY! 🎉</div>):(
        <>
          {/* Big number headline */}
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:80,fontWeight:900,lineHeight:1,fontVariantNumeric:'tabular-nums',color:bigColor}}>
              {yrs>0?yrs:mos>0?mos:totalDays}
            </div>
            <div style={{fontSize:14,color:MUTED,fontWeight:600,letterSpacing:1,textTransform:'uppercase',marginTop:4}}>
              {yrs>0?`year${yrs!==1?'s':''}`:mos>0?`month${mos!==1?'s':''}`:isCountUp?'days since':isOverdue?'days overdue':'days'}
            </div>
          </div>
          {/* Sentence format */}
          <div style={{fontSize:16,color:TEXT,lineHeight:1.8,maxWidth:320}}>
            {(()=>{
              const parts=[];
              if(yrs>0)parts.push(`${yrs} year${yrs!==1?'s':''}`);
              if(mos>0)parts.push(`${mos} month${mos!==1?'s':''}`);
              if(remDays>0)parts.push(`${remDays} day${remDays!==1?'s':''}`);
              if(hh>0)parts.push(`${hh} hour${hh!==1?'s':''}`);
              if(mm>0)parts.push(`${mm} minute${mm!==1?'s':''}`);
              parts.push(`${ss} second${ss!==1?'s':''}`);
              if(parts.length===1)return parts[0];
              return parts.slice(0,-1).join(', ')+', and '+parts[parts.length-1];
            })()}
          </div>
          <div style={{fontSize:12,color:MUTED,letterSpacing:1,textTransform:'uppercase'}}>{isCountUp?'elapsed':'remaining'}</div>
        </>
      )}
      <div style={{fontSize:13,color:MUTED,marginTop:4}}>
        {new Date(item.target_date+'T00:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}
      </div>
      {item.recurring&&<div style={{fontSize:12,color:BLUE}}>↻ Repeats {item.recurring}</div>}
    </div>
    <div style={{padding:'16px 20px 40px',borderTop:`1px solid ${BORDER}`,display:'flex',flexDirection:'column',gap:10}}>
      {!isCountUp&&<button onClick={()=>onMarkComplete(item)} style={{width:'100%',padding:'14px',borderRadius:12,border:'none',background:GREEN,color:'#000',fontWeight:900,fontSize:15,cursor:'pointer',fontFamily:'inherit'}}>✓ Mark as Done</button>}
      <div style={{display:'flex',gap:8}}>
        <button onClick={()=>onEdit(item)} style={{flex:1,padding:'12px',borderRadius:10,border:`1px solid ${BORDER}`,background:'transparent',color:MUTED,fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>✏️ Edit</button>
        <button onClick={()=>{if(window.confirm('Delete this countdown?'))onDelete(item.id);}} style={{flex:1,padding:'12px',borderRadius:10,border:'1px solid rgba(239,68,68,.3)',background:'rgba(239,68,68,.1)',color:'#ef4444',fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>Delete</button>
      </div>
    </div>
  </div>);
}

function FreqSection({user,resetHour=4}){
  const [tasks,setTasks]=useState([]);const [raw,setRaw]=useState({});
  const [boards,setBoards]=useState([]);const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState('do');const [q,setQ]=useState('');
  const [editItem,setEditItem]=useState(null);const [addOpen,setAddOpen]=useState(false);
  const [saving,setSaving]=useState(false);

  const load=useCallback(async()=>{
    const{data:mem}=await db.from('board_members').select('board_id,boards(id,name,emoji)').eq('user_id',user.id);
    const bds=(mem||[]).map(m=>m.boards).filter(Boolean);setBoards(bds);
    const ids=bds.map(b=>b.id);if(!ids.length){setTasks([]);setLoading(false);return;}
    const{data:rows}=await db.from('tasks').select('*').in('board_id',ids).eq('done',false).not('frequency','is',null).neq('frequency','');
    const rawMap={};
    const mapped=(rows||[]).filter(r=>r.frequency&&freqDays(r.frequency)!==null).map(r=>{
      rawMap[r.id]=r;
      const fd=freqDays(r.frequency);const cl=r.completion_log||[];
      const sd=daysSinceDone(cl);const over=(fd!==null&&sd!==null&&sd>fd)?sd-fd:null;
      const due=fd!==null&&sd!==null&&sd===fd;
      // daysUntilDue: negative = overdue, 0 = due today, positive = days left
      const daysUntilDue=fd!==null&&sd!==null?(fd-sd):null;
      return{id:r.id,title:r.title||'Untitled',freq:fd,since:sd,over,due,daysUntilDue,isDo:sd===null||over!==null||due};
    });
    setRaw(rawMap);setTasks(mapped);setLoading(false);
  },[user.id]);
  useEffect(()=>{load();},[load]);

  const markDone=async id=>{const r=raw[id];if(!r)return;const cl=r.completion_log||[];const newCl=[...cl,{id:genId(),doneAt:new Date().toISOString(),note:''}];await db.from('tasks').update({completion_log:newCl,due_date:nextDue(r.frequency),status:'list'}).eq('id',id);setEditItem(null);load();};
  const saveTask=async(id,upd)=>{await db.from('tasks').update(upd).eq('id',id);setEditItem(null);load();};
  const addTask=async(data)=>{await db.from('tasks').insert(data);setAddOpen(false);load();};
  const deleteTask=async id=>{if(!window.confirm('Delete this task?'))return;await db.from('tasks').update({done:true}).eq('id',id);setEditItem(null);load();};

  let rows=tasks.filter(t=>tab==='do'?t.isDo:tab==='dont'?!t.isDo:true);
  if(q.trim())rows=rows.filter(t=>t.title.toLowerCase().includes(q.toLowerCase()));
  // Sort by days until due (most overdue first, never-done last)
  rows.sort((a,b)=>{
    const av=a.daysUntilDue??9999;const bv=b.daysUntilDue??9999;return av-bv;
  });

  const sections_=[];
  if(tab==='do'||tab==='all'){const ov=rows.filter(r=>r.over!==null);const du=rows.filter(r=>r.due&&r.over===null);const nd=rows.filter(r=>r.since===null&&!r.due&&r.over===null);const ok=rows.filter(r=>!r.isDo&&r.since!==null);if(ov.length)sections_.push({label:'Overdue',color:RED,items:ov});if(du.length)sections_.push({label:'Due',color:ORANGE,items:du});if(tab==='all'&&ok.length)sections_.push({label:'Not Due Yet',color:GREEN,items:ok});if(nd.length)sections_.push({label:'Never Done',color:'#333',items:nd});}
  else{sections_.push({label:'',color:'',items:rows});}

  return(<div style={{height:'100%',display:'flex',flexDirection:'column',background:'#000',overflow:'hidden'}}>
    <div className="section-header">
      <div style={{flex:1}}><span style={{fontWeight:900,fontSize:17,letterSpacing:-1}}><span style={{color:ORANGE}}>🔁</span> FREQ</span></div>
      <span style={{fontSize:11,color:MUTED}}>{rows.length} task{rows.length!==1?'s':''}</span>
      <button onClick={()=>setAddOpen(true)} style={{background:ORANGE,border:'none',borderRadius:8,padding:'5px 13px',cursor:'pointer',color:'#000',fontSize:20,fontWeight:800,fontFamily:'inherit',lineHeight:1.2}}>+</button>
    </div>

    {/* Chrome tabs */}
    <div className="chrome-tabs">
      {[['do','DO',RED],['dont',"DON'T",GREEN],['all','ALL',LIME]].map(([k,l,col])=>(
        <button key={k} className={`chrome-tab ${tab===k?'active':'inactive'}`} onClick={()=>setTab(k)} style={{color:tab===k?col:'#666'}}>
          {l}{tab===k&&<span style={{position:'absolute',bottom:0,left:0,right:0,height:2,borderRadius:'2px 2px 0 0',background:col}}/>}
        </button>
      ))}
    </div>

    {/* Filter */}
    <div style={{padding:'8px 16px',flexShrink:0}}><input value={q} onChange={e=>setQ(e.target.value)} placeholder="Filter tasks…" style={{...inp(),fontSize:'14px !important'}}/></div>

    {/* List */}
    <div style={{flex:1,overflowY:'auto',paddingBottom:NAV_H+12}}>
      {loading&&<div style={{display:'flex',justifyContent:'center',paddingTop:40}}><Spinner size={22} color={ORANGE}/></div>}
      {!loading&&rows.length===0&&(<div style={{textAlign:'center',padding:'60px 0',color:MUTED}}><div style={{fontSize:26,marginBottom:10}}>{tab==='do'?'✓':'◡'}</div><div style={{fontSize:13}}>{tab==='do'?'Nothing overdue or due':tab==='dont'?'All good':'No tasks'}</div></div>)}
      {sections_.map((sec,si)=>(<div key={si}>
        {sec.label&&(<div style={{padding:'10px 16px 3px',display:'flex',alignItems:'center',gap:7}}><div style={{width:5,height:5,borderRadius:'50%',background:sec.color,flexShrink:0}}/><span style={{fontSize:9,fontWeight:700,letterSpacing:1.5,textTransform:'uppercase',color:sec.color}}>{sec.label}</span></div>)}
        {sec.items.map(t=>{
          const dtd=t.daysUntilDue;
          const dtdColor=dtd===null?MUTED:dtd<0?RED:dtd===0?ORANGE:dtd<=3?'#f7c94f':GREEN;
          const dtdLabel=dtd===null?'—':dtd<0?`${Math.abs(dtd)}d over`:dtd===0?'today':`${dtd}d`;
          return(<div key={t.id} onClick={()=>setEditItem(t)} style={{display:'grid',gridTemplateColumns:'60px 1fr 64px',alignItems:'center',padding:'10px 16px',borderBottom:`1px solid #080808`,cursor:'pointer',transition:'background .1s'}} onMouseEnter={e=>e.currentTarget.style.background='#0c0c0c'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            <div style={{display:'flex',flexDirection:'column',gap:1}}>
              <span style={{fontSize:12,fontWeight:700,color:MUTED,fontVariantNumeric:'tabular-nums'}}>{t.freq}d</span>
              <span style={{fontSize:10,color:'#555',fontVariantNumeric:'tabular-nums'}}>{t.since!==null?t.since+'d ago':'never'}</span>
            </div>
            <span style={{fontSize:TASK_FS,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',paddingRight:8}}>{t.title}</span>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:14,fontWeight:800,color:dtdColor,fontVariantNumeric:'tabular-nums',lineHeight:1}}>{dtdLabel}</div>
              {dtd!==null&&dtd!==0&&<div style={{fontSize:8,color:MUTED,textTransform:'uppercase',letterSpacing:0.5}}>{dtd<0?'overdue':'left'}</div>}
            </div>
          </div>);
        })}
      </div>))}
    </div>

    {/* Full page edit */}
    {editItem&&raw[editItem.id]&&(<FreqTaskDetail task={raw[editItem.id]} boards={boards} onClose={()=>setEditItem(null)} onSave={saveTask} onDelete={deleteTask} onMarkDone={markDone}/>)}

    {/* Add modal */}
    {addOpen&&(<Sheet onClose={()=>setAddOpen(false)} title="New Task">
      <FormInput label="Title"><input id="fq_add_title" placeholder="What needs to get done?" style={inp()} autoFocus/></FormInput>
      <FormInput label="Frequency"><input id="fq_add_freq" placeholder="e.g. 7, daily, weekly" style={inp()}/></FormInput>
      {boards.length>1&&(<FormInput label="Board"><select id="fq_add_board" style={{...inp(),cursor:'pointer'}}>{boards.map(b=>(<option key={b.id} value={b.id}>{b.emoji||''} {b.name}</option>))}</select></FormInput>)}
      {boards.length===1&&<input type="hidden" id="fq_add_board" value={boards[0]?.id||''}/>}
      <BtnRow>
        <BtnGhost onClick={()=>setAddOpen(false)}>Cancel</BtnGhost>
        <BtnPrimary color={ORANGE} onClick={async()=>{const title=document.getElementById('fq_add_title')?.value?.trim();const freq=document.getElementById('fq_add_freq')?.value?.trim();const boardId=document.getElementById('fq_add_board')?.value;if(!title||!boardId)return;await addTask({id:genId(),board_id:boardId,title,frequency:freq||null,status:'list',priority:'normal',done:false,manual_order:Date.now(),completion_log:[],due_date:todayStr()});}}>Add Task</BtnPrimary>
      </BtnRow>
    </Sheet>)}
  </div>);
}


// ═══════════════════════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════════════════════
function SidebarSection({user,resetHour,onResetHourChange,onSignOut}){
  const saveReset=h=>{onResetHourChange(h);};
  return(<div style={{height:'100%',display:'flex',flexDirection:'column',background:'#000',overflow:'hidden'}}>
    <div className="section-header"><div style={{flex:1}}><span style={{fontWeight:900,fontSize:17,letterSpacing:-1}}>⚙️ SETTINGS</span></div></div>
    <div style={{flex:1,overflowY:'auto',padding:'20px 16px',paddingBottom:NAV_H+20}}>
      <div style={{marginBottom:24}}>
        <div style={{fontSize:10,color:MUTED,fontWeight:700,letterSpacing:2,textTransform:'uppercase',marginBottom:10}}>Account</div>
        <div style={{background:'#111',borderRadius:12,border:`1px solid ${BORDER}`,padding:'14px 16px',marginBottom:8}}>
          <div style={{fontSize:11,color:MUTED,marginBottom:2}}>Signed in as</div>
          <div style={{fontSize:14,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.email}</div>
        </div>
        <button onClick={onSignOut} style={{width:'100%',padding:'13px',borderRadius:12,border:'1px solid rgba(239,68,68,.3)',background:'rgba(239,68,68,.05)',color:'#ef4444',fontWeight:700,fontSize:14,cursor:'pointer',fontFamily:'inherit'}}>Sign Out</button>
      </div>
      <div style={{marginBottom:24}}>
        <div style={{fontSize:10,color:MUTED,fontWeight:700,letterSpacing:2,textTransform:'uppercase',marginBottom:10}}>Day Reset Time — All Sections</div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {Array.from({length:13},(_,i)=>i).map(h=>(<button key={h} onClick={()=>saveReset(h)} style={{padding:'7px 12px',borderRadius:7,border:`1px solid ${resetHour===h?LIME:BORDER}`,background:resetHour===h?'#0a140a':'transparent',color:resetHour===h?LIME:MUTED,fontSize:11,cursor:'pointer',fontFamily:'inherit',fontWeight:resetHour===h?700:400}}>{h===0?'12am':`${h}${h<12?'am':'pm'}`}</button>))}
        </div>
        <div style={{fontSize:11,color:MUTED,marginTop:8}}>A 2am reset means the next day doesn't start until 2am. Applies to habits, sprints, freq, and countdowns.</div>
      </div>
      <div style={{marginBottom:24}}>
        <div style={{fontSize:10,color:MUTED,fontWeight:700,letterSpacing:2,textTransform:'uppercase',marginBottom:10}}>Required SQL Columns</div>
        <div style={{background:'#0a0a0a',borderRadius:10,border:`1px solid ${BORDER}`,padding:'12px 14px',fontSize:10,color:'#555',lineHeight:2,fontFamily:'monospace'}}>
          {'habits: habit_frequency, weekly_day, sprint_id, streak_start'}
          <br/>{'countdowns: first_date, direction, last_completed'}
          <br/>{'sprints_v2: daily_state, frequency_days'}
        </div>
      </div>
      <div style={{background:'#111',borderRadius:12,border:`1px solid ${BORDER}`,padding:'14px 16px'}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}><span style={{color:MUTED,fontSize:13}}>Version</span><span style={{fontSize:13,fontWeight:700,color:LIME}}>DAYMAN 2.0</span></div>
        <div style={{display:'flex',justifyContent:'space-between'}}><span style={{color:MUTED,fontSize:13}}>Database</span><span style={{fontSize:13,color:TEXT}}>MR Supabase</span></div>
      </div>
    </div>
  </div>);
}

// ═══════════════════════════════════════════════════════════════════
// BOTTOM NAV
// ═══════════════════════════════════════════════════════════════════
const TABS=[
  {key:'habits',label:'HABITS',icon:'✓',color:GREEN},
  {key:'sprint',label:'SPRINT',icon:'⚡',color:LIME},
  {key:'countdown',label:'⏳',icon:'⏳',color:BLUE},
  {key:'freq',label:'FREQ',icon:'🔁',color:ORANGE},
  {key:'sidebar',label:'⚙️',icon:'⚙️',color:MUTED},
];
function BottomNav({tab,setTab}){
  return(<div style={{flexShrink:0,display:'flex',borderTop:`1px solid ${BORDER}`,background:'#000',height:NAV_H}}>
    {TABS.map(t=>(<button key={t.key} onClick={()=>setTab(t.key)} style={{flex:1,background:'none',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:3,padding:'6px 0',fontFamily:'inherit',transition:'opacity .1s',opacity:tab===t.key?1:0.4}}>
      <span style={{fontSize:18,lineHeight:1}}>{t.icon}</span>
      <span style={{fontSize:9,fontWeight:700,letterSpacing:'0.08em',color:tab===t.key?t.color:MUTED}}>{t.label}</span>
      {tab===t.key&&<div style={{width:20,height:2,borderRadius:1,background:t.color,position:'absolute',bottom:4}}/>}
    </button>))}
  </div>);
}

// ═══════════════════════════════════════════════════════════════════
// ROOT APP
// ═══════════════════════════════════════════════════════════════════
function App(){
  const [screen,setScreen]=useState('loading');
  const [user,setUser]=useState(null);
  const [tab,setTab]=useState('habits');
  const [resetHour,setResetHour]=useState(()=>getResetHour());
  const updateResetHour=h=>{setResetHour(h);try{localStorage.setItem(RESET_HOUR_LS,String(h));}catch{}};

  useEffect(()=>{
    db.auth.getSession().then(({data:{session}})=>{if(session){setUser(session.user);setScreen('main');}else setScreen('auth');});
    const{data:{subscription}}=db.auth.onAuthStateChange((_,session)=>{if(session){setUser(session.user);setScreen('main');}else{setUser(null);setScreen('auth');}});
    return()=>subscription.unsubscribe();
  },[]);

  if(screen==='loading')return(<div style={{height:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:'#000',flexDirection:'column',gap:16}}><div style={{fontSize:36}}>☀</div><Spinner size={22}/></div>);
  if(screen==='auth')return<AuthScreen onAuth={u=>{setUser(u);setScreen('main');}}/>;

  return(<div style={{height:'100%',display:'flex',flexDirection:'column',background:'#000',overflow:'hidden'}}>
    <div style={{flex:1,overflow:'hidden',position:'relative'}}>
      <div style={{display:tab==='sprint'?'block':'none',height:'100%'}}>{user&&<SprintSection user={user} resetHour={resetHour}/>}</div>
      <div style={{display:tab==='habits'?'block':'none',height:'100%'}}>{user&&<HabitsSection user={user} resetHour={resetHour}/>}</div>
      <div style={{display:tab==='countdown'?'block':'none',height:'100%'}}>{user&&<CountdownSection user={user} resetHour={resetHour}/>}</div>
      <div style={{display:tab==='freq'?'block':'none',height:'100%'}}>{user&&<FreqSection user={user} resetHour={resetHour}/>}</div>
      <div style={{display:tab==='sidebar'?'block':'none',height:'100%'}}>{user&&<SidebarSection user={user} resetHour={resetHour} onResetHourChange={updateResetHour} onSignOut={()=>db.auth.signOut()}/>}</div>
    </div>
    <BottomNav tab={tab} setTab={setTab}/>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
