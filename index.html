// SHARED UTILS

const genId=()=>crypto.randomUUID();
const fmtSecs=s=>{if(s<0)s=0;return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;};
const fmtTime12=t=>{if(!t)return'';const[h,m]=t.split(':');const hr=parseInt(h);return`${hr===0?12:hr>12?hr-12:hr}:${m} ${hr<12?'AM':'PM'}`;};
const fmtDate=d=>new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
const totalSecs=ts=>(ts||[]).reduce((a,t)=>a+(Number(t.seconds)||0),0);

// ── Sprint date helpers ──────────────────────────────────────────
const todayKey=(resetHour=4)=>{
  const now=new Date();const reset=new Date(now);
  reset.setHours(resetHour,0,0,0);
  if(now<reset)reset.setDate(reset.getDate()-1);
  return reset.toISOString().slice(0,10);
};
const resolveDS=(raw,resetHour=4)=>{
  if(!raw||!raw.date)return{date:null,done:false,skipped:[]};
  if(raw.date!==todayKey(resetHour))return{date:null,done:false,skipped:[]};
  return{date:raw.date,done:!!raw.done,skipped:Array.isArray(raw.skipped)?raw.skipped:[]};
};

// ── Sprint local storage ─────────────────────────────────────────
const DAY_ABBR=['MON','TUE','WED','THU','FRI','SAT','SUN'];
const DAY_LABEL={MON:'Mon',TUE:'Tue',WED:'Wed',THU:'Thu',FRI:'Fri',SAT:'Sat',SUN:'Sun'};
const loadSettings=uid=>{try{return JSON.parse(localStorage.getItem(`sprint_settings_${uid}`)||'{}')}catch{return{}}};
const saveSettings=(uid,s)=>{try{localStorage.setItem(`sprint_settings_${uid}`,JSON.stringify(s))}catch{}};
const RKEY='sprint_runner_v24';
const saveRunner=s=>{try{localStorage.setItem(RKEY,JSON.stringify({...s,savedAt:Date.now()}))}catch{}};
const loadRunner=()=>{try{const s=JSON.parse(localStorage.getItem(RKEY)||'null');if(!s?.savedAt||Date.now()-s.savedAt>3600000)return null;return s;}catch{return null;}};
const clearRunner=()=>{try{localStorage.removeItem(RKEY)}catch{}};
const advanceRunner=(saved,tasks)=>{
  if(!saved.running||saved.phase!=='running')return saved;
  let gap=Math.floor((Date.now()-saved.savedAt)/1000);
  let idx=saved.taskIdx,secs=saved.secs,elapsed=saved.elapsed||0;
  while(gap>0&&idx<tasks.length){if(gap>=secs){gap-=secs;elapsed+=secs;idx++;secs=idx<tasks.length?tasks[idx].seconds||30:0;}else{secs-=gap;elapsed+=gap;gap=0;}}
  const done=idx>=tasks.length;
  return{...saved,taskIdx:done?tasks.length-1:idx,secs:done?0:secs,elapsed,phase:done?'done':'running',running:!done};
};

// ── Wake lock ────────────────────────────────────────────────────
let _wl=null;
const acqWL=async()=>{try{if('wakeLock' in navigator)_wl=await navigator.wakeLock.request('screen');}catch{}};
const relWL=()=>{try{if(_wl){_wl.release();_wl=null;}}catch{}};

// ── Audio ────────────────────────────────────────────────────────
const beep=(freq,dur,vol=0.25)=>{try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=freq;o.type='sine';g.gain.setValueAtTime(vol,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur/1000);o.start();o.stop(ctx.currentTime+dur/1000);}catch{}};
const chime=()=>{beep(523,180,.2);setTimeout(()=>beep(659,180,.2),160);setTimeout(()=>beep(784,300,.25),320);};
const speak=text=>{try{window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.rate=.88;u.pitch=1.05;window.speechSynthesis.speak(u);}catch{}};
const askNotif=async()=>{try{if('Notification' in window&&Notification.permission==='default')await Notification.requestPermission();}catch{}};
const showNotif=(task,num,total)=>{try{if('Notification' in window&&Notification.permission==='granted')new Notification(`⚡ Task ${num}/${total}`,{body:`${task.title} — ${fmtSecs(task.seconds||0)}`,tag:'sprint',renotify:true,silent:true});}catch{}};

// ── FREQ helpers ─────────────────────────────────────────────────
const WDN=['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
const todayStr=()=>{const et=new Date(new Date().toLocaleString('en-US',{timeZone:'America/New_York'}));return et.toISOString().split('T')[0];};
const freqDays=f=>{if(!f)return null;const s=f.trim().toLowerCase();if(WDN.includes(s)||['weekday','weekdays','weekend','weekends','weekly'].includes(s))return 7;if(s==='daily')return 1;if(s==='monthly')return 30;if(s==='yearly')return 365;const n=parseInt(s);return(!isNaN(n)&&n>0)?n:null;};
const daysSinceDone=cl=>{if(!cl||!cl.length)return null;const last=[...cl].sort((a,b)=>b.doneAt.localeCompare(a.doneAt))[0];if(!last||!last.doneAt)return null;return Math.round((new Date()-new Date(last.doneAt))/(1000*60*60*24));};
const lastDoneStr=cl=>{if(!cl||!cl.length)return null;return[...cl].sort((a,b)=>b.doneAt.localeCompare(a.doneAt))[0]?.doneAt?.split('T')[0]||null;};
const nextDue=frequency=>{const fd=freqDays(frequency);if(!fd)return todayStr();const d=new Date(todayStr()+'T00:00:00');d.setDate(d.getDate()+fd);return d.toISOString().split('T')[0];};
const fmtDateShort=s=>{if(!s)return'—';return new Date(s+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});};

// ── Countdown helpers ────────────────────────────────────────────
const CD_CATS=[{key:'countdown',label:'Countdown',emoji:'⏳'},{key:'anniversary',label:'Anniversary',emoji:'💍'},{key:'birthday',label:'Birthday',emoji:'🎂'},{key:'holiday',label:'Holiday',emoji:'🌸'}];
const CD_COLORS={countdown:BLUE,anniversary:'#c084fc',birthday:'#f472b6',holiday:ORANGE};
const daysUntil=dateStr=>{const today=new Date();today.setHours(0,0,0,0);const target=new Date(dateStr+'T00:00:00');return Math.round((target-today)/86400000);};
const nextOccurrence=(dateStr,recurring)=>{
  if(!recurring)return dateStr;
  const today=new Date();today.setHours(0,0,0,0);
  let d=new Date(dateStr+'T00:00:00');
  if(recurring==='weekly')while(d<today)d.setDate(d.getDate()+7);
  else if(recurring==='monthly')while(d<today)d.setMonth(d.getMonth()+1);
  else if(recurring==='yearly')while(d<today)d.setFullYear(d.getFullYear()+1);
  return d.toISOString().split('T')[0];
};

const Spinner=({size=16,color=LIME})=>(<div className="spin" style={{width:size,height:size,border:'2px solid #2a2a2a',borderTopColor:color,borderRadius:'50%',flexShrink:0}}/>);

function DotMenu({items}){
  const [open,setOpen]=useState(false);const ref=useRef(null);
  useEffect(()=>{if(!open)return;const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};document.addEventListener('pointerdown',h);return()=>document.removeEventListener('pointerdown',h);},[open]);
  return(<div ref={ref} style={{position:'relative',flexShrink:0}}>
    <button onClick={e=>{e.stopPropagation();setOpen(o=>!o);}} style={{background:'none',border:'none',color:MUTED,fontSize:20,cursor:'pointer',padding:'4px 8px',lineHeight:1,borderRadius:7,display:'flex',alignItems:'center'}} onMouseEnter={e=>e.currentTarget.style.color=TEXT} onMouseLeave={e=>e.currentTarget.style.color=MUTED}>&#x22EF;</button>
    {open&&(<div className="fade-in" style={{position:'absolute',right:0,top:'calc(100% + 4px)',background:'#1a1a1a',border:`1px solid ${BORDER}`,borderRadius:10,minWidth:170,zIndex:9999,overflow:'hidden',boxShadow:'0 8px 32px rgba(0,0,0,.8)'}}>

    </div>)}
  </div>);
}

const BtnRow=({children})=>(<div style={{display:'flex',gap:8,marginTop:18}}>{children}</div>);
const BtnPrimary=({onClick,disabled,color=LIME,children,style={}})=>(<button onClick={onClick} disabled={disabled} style={{flex:1,background:disabled?'#2a2a2a':color,border:'none',borderRadius:12,color:disabled?MUTED:(color===LIME?'#000':'#000'),fontWeight:800,fontSize:15,padding:14,cursor:disabled?'default':'pointer',fontFamily:'inherit',...style}}>{children}</button>);

function AuthScreen({onAuth}){
  const [mode,setMode]=useState('login'),[email,setEmail]=useState(''),[pw,setPw]=useState('');
  const [loading,setLoading]=useState(false),[err,setErr]=useState('');
  const i={...inp(),marginBottom:14};
  const submit=async()=>{
    if(!email||!pw)return setErr('Email and password required');
    setLoading(true);setErr('');
    try{const res=mode==='login'?await db.auth.signInWithPassword({email,password:pw}):await db.auth.signUp({email,password:pw});
    if(res.error)throw res.error;
    if(mode==='signup'&&!res.data.session){setLoading(false);setErr('Check email to confirm, then sign in.');return;}
    onAuth(res.data.user);}catch(e){setErr(e.message||'Error');}
    setLoading(false);
  };
  return(<div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24,background:'#000'}}>
    <div style={{width:'100%',maxWidth:360}}>
      <div style={{textAlign:'center',marginBottom:36}}>
        <div style={{fontSize:11,color:MUTED,letterSpacing:5,marginBottom:8}}>DAYCRUSH</div>
        <div style={{fontSize:48,fontWeight:900,letterSpacing:-3,lineHeight:1}}><span style={{color:LIME}}>☀</span><span> DAYMAN</span></div>
        <div style={{fontSize:10,color:MUTED,letterSpacing:3,marginTop:8}}>SPRINT · HABITS · COUNTDOWN · FREQ</div>
      </div>
      <div style={{display:'flex',marginBottom:20,border:`1px solid ${BORDER}`,borderRadius:10,overflow:'hidden'}}>
        {['login','signup'].map(m=>(<button key={m} onClick={()=>{setMode(m);setErr('');}} style={{flex:1,padding:'10px',background:mode===m?'#1a1a1a':'transparent',border:'none',cursor:'pointer',fontSize:13,fontWeight:mode===m?700:400,color:mode===m?TEXT:MUTED,fontFamily:'inherit'}}>{m==='login'?'Sign In':'Sign Up'}</button>))}
      </div>
      <input type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} placeholder="Email" style={i} autoCapitalize="none"/>
      <input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} placeholder="Password" style={{...i,marginBottom:20}}/>
      {err&&<div style={{fontSize:12,color:err.includes('Check')?LIME:RED,marginBottom:14,padding:'9px 12px',borderRadius:8,background:err.includes('Check')?'#0a140a':'#1a0a0a'}}>{err}</div>}
      <button onClick={submit} disabled={loading} style={{width:'100%',padding:'13px',borderRadius:10,border:'none',background:loading?'#2a2a2a':LIME,color:'#000',fontWeight:900,fontSize:15,fontFamily:'inherit',cursor:loading?'default':'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
        {loading&&<Spinner size={14} color={MUTED}/>}{mode==='login'?'Sign In':'Create Account'}
      </button>
    </div>
  </div>);
}

function SprintDetail({sprint,settings,isDone,onClose,onRun,onEdit,onDuplicate,onSaveSkipped,onToggleDone}){
  const resetHour=settings.resetHour??4;const tasks=sprint.tasks||[];
  const [skipped,setSkipped]=useState(()=>new Set(resolveDS(sprint.daily_state,resetHour).skipped||[]));
  const activeTasks=tasks.filter(t=>!skipped.has(t.id));
  const toggle=id=>{setSkipped(prev=>{const next=new Set(prev);if(next.has(id))next.delete(id);else next.add(id);onSaveSkipped(sprint.id,[...next]);return next;});};
  const resetAll=()=>{setSkipped(new Set());onSaveSkipped(sprint.id,[]);};
  const freqLabel=sprint.frequency_days?sprint.frequency_days.split(',').map(d=>DAY_LABEL[d]||d).join(' · '):(sprint.frequency&&sprint.frequency>1)?`Every ${sprint.frequency}d`:'Daily';
  return(<div style={{position:'fixed',inset:0,background:'#000',zIndex:500,display:'flex',flexDirection:'column'}}>
    <div style={{padding:'14px 16px 12px',borderBottom:`1px solid ${BORDER}`,flexShrink:0}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
        <span style={{fontSize:24,flexShrink:0}}>{sprint.emoji||'⚡'}</span>
        <div style={{flex:1,minWidth:0}}><div style={{fontWeight:900,fontSize:16,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{sprint.name}</div>
          <div style={{fontSize:11,color:MUTED,marginTop:1}}>{skipped.size>0?<span>Excluding <span style={{color:ORANGE,fontWeight:700}}>{skipped.size}</span> · <span style={{color:LIME,fontWeight:700}}>{activeTasks.length}</span> active</span>:<span>{tasks.length} tasks · {fmtSecs(totalSecs(tasks))}</span>}</div>
        </div>
        {sprint.scheduled_time&&<span style={{fontSize:18,color:ORANGE,fontWeight:900,flexShrink:0}}>{fmtTime12(sprint.scheduled_time)}</span>}
      </div>
      <div style={{display:'flex',gap:7,alignItems:'center',flexWrap:'wrap'}}>

      </div>
    </div>
    <div style={{padding:'12px 18px 20px',borderTop:`1px solid ${BORDER}`,display:'flex',gap:8,flexShrink:0}}>
      <button onClick={onCancel} style={{flex:1,padding:'12px',borderRadius:9,border:`1px solid ${BORDER}`,background:'transparent',color:MUTED,cursor:'pointer',fontFamily:'inherit',fontSize:13}}>Cancel</button>

        {saving&&<Spinner size={14} color={MUTED}/>}{saving?'Saving…':'Save Sprint'}
      </button>
    </div>
  </div>);
}

function SprintRunner({sprint,onClose,onLogRun,onComplete}){
  const tasks=useMemo(()=>sprint.tasks||[],[sprint]);
  const restore=sprint._restore;
  const [dispIdx,setDispIdx]=useState(()=>restore?.taskIdx??0);
  const [dispSecs,setDispSecs]=useState(()=>restore?.secs??(tasks[0]?.seconds||30));
  const [dispElapsed,setDispElapsed]=useState(()=>restore?.elapsed??0);
  const [phase,setPhase]=useState(()=>restore?.phase??'idle');
  const [isRunning,setIsRunning]=useState(false);
  const [transitioning,setTransitioning]=useState(false);
  const [snapRing,setSnapRing]=useState(false);
  const [ringSize,setRingSize]=useState(300);
  const T=useRef({running:false,transitioning:false,secs:restore?.secs??(tasks[0]?.seconds||30),taskIdx:restore?.taskIdx??0,elapsed:restore?.elapsed??0,tasks,taskStartedAt:Date.now()});
  const containerRef=useRef(null);const tickRef=useRef(null);const loggedRef=useRef(false);const gotoRef=useRef(null);
  const schedNotifTimers=useRef([]);

  useEffect(()=>{T.current.tasks=tasks;},[tasks]);
  useEffect(()=>{setDispIdx(0);setDispSecs(tasks[0]?.seconds||30);},[]);
  useEffect(()=>()=>{clearInterval(tickRef.current);schedNotifTimers.current.forEach(clearTimeout);relWL();},[]);
  useEffect(()=>{askNotif();},[]);
  useEffect(()=>{const el=containerRef.current;if(!el)return;const obs=new ResizeObserver(e=>{const w=e[0].contentRect.width;setRingSize(Math.min(Math.max(w-12,240),420));});obs.observe(el);return()=>obs.disconnect();},[]);

  const scheduleAllNotifs=useCallback((taskList,startIdx,startSecs)=>{
    schedNotifTimers.current.forEach(clearTimeout);schedNotifTimers.current=[];
    if(!('Notification' in window)||Notification.permission!=='granted')return;
    let delay=startSecs*1000;
    for(let i=startIdx+1;i<taskList.length;i++){const task=taskList[i];const d=delay;schedNotifTimers.current.push(setTimeout(()=>{if(!T.current.running)return;try{new Notification(`⚡ ${task.title}`,{body:`Task ${i+1}/${taskList.length} · ${fmtSecs(task.seconds||0)}`,tag:'sprint-task',renotify:true,silent:false});}catch{}},d));delay+=task.seconds*1000;}
    schedNotifTimers.current.push(setTimeout(()=>{if(!T.current.running)return;try{new Notification('✓ Sprint Complete!',{body:'All tasks finished.',tag:'sprint-done',renotify:true});}catch{}},delay));
  },[]);

  useEffect(()=>{if(phase!=='running')return;acqWL();
    const onVisible=async()=>{await acqWL();if(!T.current.running||T.current.transitioning)return;
      const elapsed=Math.floor((Date.now()-T.current.taskStartedAt)/1000);const taskSecs=T.current.tasks[T.current.taskIdx]?.seconds||30;const remaining=taskSecs-elapsed;
      if(remaining>0){T.current.secs=remaining;setDispSecs(remaining);}else{T.current.transitioning=true;let overflow=Math.abs(remaining);let idx=T.current.taskIdx+1;while(overflow>0&&idx<T.current.tasks.length){const ns=T.current.tasks[idx].seconds||30;if(overflow>=ns){overflow-=ns;idx++;}else{T.current.secs=ns-overflow;overflow=0;}}setTransitioning(true);setTimeout(()=>gotoRef.current(idx),100);}
    };
    document.addEventListener('visibilitychange',onVisible);return()=>{relWL();document.removeEventListener('visibilitychange',onVisible);};},[phase]);

  useEffect(()=>{if(phase==='done')document.title='✓ Sprint Complete';else if(phase==='running'&&tasks[dispIdx])document.title=`⚡ ${fmtSecs(dispSecs)} — ${tasks[dispIdx].title}`;else document.title='DAYMAN';return()=>{document.title='DAYMAN';};},[dispSecs,phase,dispIdx,tasks]);
  useEffect(()=>{if(phase==='idle'||phase==='done'){clearRunner();return;}saveRunner({sprintId:sprint.id,taskIdx:dispIdx,secs:dispSecs,elapsed:dispElapsed,phase,running:T.current.running});},[dispIdx,dispSecs,dispElapsed,phase]);
  useEffect(()=>{if(phase==='done'&&!loggedRef.current){loggedRef.current=true;onLogRun&&onLogRun(sprint.id,sprint.name,sprint.emoji||'⚡',tasks.length,totalSecs(tasks),T.current.elapsed);onComplete&&onComplete(sprint.id);}},[phase]);

  const finishSprint=useCallback(()=>{clearInterval(tickRef.current);schedNotifTimers.current.forEach(clearTimeout);T.current.running=false;T.current.transitioning=false;setPhase('done');setIsRunning(false);setTransitioning(false);clearRunner();try{window.speechSynthesis.cancel();}catch{}setTimeout(()=>{chime();speak('Sprint complete! Great work.');},100);},[]);

function SprintSection({user}){
  const [sprints,setSprints]=useState([]);const [loadingList,setLoadingList]=useState(true);

  const [showCompleted,setShowCompleted]=useState(false);

    setLoadingList(true);

              <div onClick={e=>e.stopPropagation()}><DotMenu items={[{label:'▶ Run',action:()=>{setRunTarget(sp);setView('run');}},{label:'Edit',action:()=>{setEditTarget(sp);setView('edit');}},{label:'Duplicate',action:()=>handleDuplicate(sp)},'---',{label:'Delete',danger:true,action:()=>handleDelete(sp.id,sp.name)}]}/></div>
            </div>
          </div>
        </div>);})}
      </div>))}
    </div>
    <div style={{padding:'10px 16px 22px',borderTop:`1px solid ${BORDER}`,flexShrink:0,display:'flex',flexDirection:'column',gap:8}}>
      {doneCount>0&&<button onClick={()=>setShowCompleted(v=>!v)} style={{width:'100%',padding:'9px',borderRadius:8,border:`1px solid ${BORDER}`,background:'transparent',color:MUTED,fontSize:12,cursor:'pointer',fontFamily:'inherit',fontWeight:600}}>{showCompleted?`Hide ${doneCount} completed`:`Show ${doneCount} completed`}</button>}
      <button onClick={()=>{setEditTarget(null);setView('edit');}} style={{width:'100%',padding:'14px',borderRadius:10,border:'none',background:LIME,color:'#000',fontWeight:900,fontSize:15,fontFamily:'inherit',cursor:'pointer'}}>+ New Sprint</button>
    </div>
    {previewTarget&&(<SprintDetail sprint={previewTarget} settings={settings} isDone={!!resolveDS(previewTarget.daily_state,resetHour).done} onClose={()=>setPreviewTarget(null)} onRun={sp=>{setPreviewTarget(null);setRunTarget(sp);setView('run');}} onEdit={sp=>{setPreviewTarget(null);setEditTarget(sp);setView('edit');}} onDuplicate={sp=>{setPreviewTarget(null);handleDuplicate(sp);}} onSaveSkipped={(id,ids)=>saveDailyState(id,{skipped:ids})} onToggleDone={done=>saveDailyState(previewTarget.id,{done})}/>)}
    {showHistory&&<HistoryPanel user={user} onClose={()=>setShowHistory(false)}/>}
    {showSettings&&<SettingsPanel settings={settings} onSave={s=>{setSettings(s);saveSettings(user.id,s);setShowSettings(false);}} onClose={()=>setShowSettings(false)}/>}
  </div>);
}

const HABIT_COLORS=['#38bdf8','#4ade80','#fb923c','#f472b6','#a78bfa','#facc15','#34d399','#f87171','#22d3ee','#e879f9'];

function getLast7Dates(){
  const days=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(d.toISOString().split('T')[0]);}return days;
}
function dayLabel(dateStr){
  const d=new Date(dateStr+'T00:00:00');return['SUN','MON','TUE','WED','THU','FRI','SAT'][d.getDay()];
}
function dayNum(dateStr){return new Date(dateStr+'T00:00:00').getDate();}

function EditHabitSheet({habit,onClose,onSave,onDelete}){
  const [name,setName]=useState(habit.name||'');
  const [time,setTime]=useState(habit.scheduled_time||'');
  const [seed,setSeed]=useState(habit.streak_seed||0);
  const [color,setColor]=useState(habit.color||HABIT_COLORS[0]);
  const save=()=>{if(!name.trim())return;onSave(habit.id,{name:name.trim(),scheduled_time:time||null,streak_seed:seed,color});};
  return(<Sheet onClose={onClose} title="Edit Habit">
    <FormInput label="Name"><input value={name} onChange={e=>setName(e.target.value)} style={inp()} autoFocus/></FormInput>
    <FormInput label="Time (optional)">
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <input type="time" value={time} onChange={e=>setTime(e.target.value)} style={{...inp(),flex:1,color:time?ORANGE:MUTED}}/>
        {time&&<button onClick={()=>setTime('')} style={{background:'none',border:`1px solid ${BORDER}`,borderRadius:8,padding:'10px 12px',color:MUTED,cursor:'pointer',fontSize:12,fontFamily:'inherit',flexShrink:0}}>Clear</button>}
      </div>
      {time&&<div style={{fontSize:11,color:ORANGE,marginTop:5,fontWeight:700}}>⏰ {fmtTime12(time)}</div>}
    </FormInput>
    <FormInput label="Color">
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        {HABIT_COLORS.map(c=>(<button key={c} onClick={()=>setColor(c)} style={{width:28,height:28,borderRadius:'50%',background:c,border:'none',cursor:'pointer',outline:color===c?'2px solid #fff':'none',outlineOffset:2}}/>))}
      </div>
    </FormInput>
    <FormInput label="Streak Seed — days before app tracking">
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
        <button onClick={()=>setSeed(s=>Math.max(0,s-1))} style={{width:40,height:40,borderRadius:8,border:`1px solid ${BORDER}`,background:'#1a1a1a',color:TEXT,cursor:'pointer',fontSize:20,fontFamily:'inherit',flexShrink:0}}>−</button>
        <div style={{flex:1,textAlign:'center'}}>
          <div style={{fontSize:30,fontWeight:900,color:seed>0?GREEN:MUTED,fontVariantNumeric:'tabular-nums'}}>{seed}</div>
          <div style={{fontSize:10,color:MUTED,marginTop:1}}>days added to streak</div>
        </div>
        <button onClick={()=>setSeed(s=>s+1)} style={{width:40,height:40,borderRadius:8,border:`1px solid ${BORDER}`,background:'#1a1a1a',color:TEXT,cursor:'pointer',fontSize:20,fontFamily:'inherit',flexShrink:0}}>+</button>
      </div>
      <div style={{fontSize:11,color:MUTED,lineHeight:1.5}}>Set this if you've been doing this habit before tracking here. It adds to your calculated streak count.</div>
    </FormInput>
    <BtnRow>
      <button onClick={()=>onDelete(habit.id)} style={{background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.2)',borderRadius:12,color:'#ef4444',fontSize:14,padding:'12px 16px',cursor:'pointer',fontFamily:'inherit'}}>Delete</button>
      <BtnGhost onClick={onClose}>Cancel</BtnGhost>
      <BtnPrimary color={GREEN} onClick={save}>Save</BtnPrimary>
    </BtnRow>
  </Sheet>);
}

function HabitsSection({user}){
  const [habits,setHabits]=useState([]);
  const [logs,setLogs]=useState({});
  const [loading,setLoading]=useState(true);
  const [showAdd,setShowAdd]=useState(false);
  const [editHabit,setEditHabit]=useState(null);
  const [hideCompleted,setHideCompleted]=useState(false);
  const [newName,setNewName]=useState('');
  const [newType,setNewType]=useState('bool');
  const [newColor,setNewColor]=useState(HABIT_COLORS[0]);
  const [newTime,setNewTime]=useState('');
  const [saving,setSaving]=useState(false);
  const dates=useMemo(()=>getLast7Dates(),[]);
  const today=dates[6];

  const load=useCallback(async()=>{
    const[{data:h},{data:l}]=await Promise.all([
      db.from('habits').select('*').eq('user_id',user.id).order('sort_order',{ascending:true}).order('created_at',{ascending:true}),
      db.from('habit_logs').select('*').eq('user_id',user.id).gte('log_date',dates[0]).lte('log_date',today)
    ]);
    setHabits(h||[]);
    const map={};(l||[]).forEach(r=>{map[`${r.habit_id}_${r.log_date}`]=r.value;});
    setLogs(map);setLoading(false);
  },[user.id,dates,today]);

  useEffect(()=>{load();},[load]);

  // Cycle: bool: null→1(done)→-1(skip)→null | count: null→1...9→null
  const toggleCell=async(e,habit,date)=>{
    e.stopPropagation();
    const key=`${habit.id}_${date}`;
    const cur=logs[key]??null;
    let next=null;
    if(habit.type==='bool'){if(cur===null)next=1;else if(cur===1)next=-1;else next=null;}
    else{next=(cur||0)+1;if(next>9)next=null;}
    setLogs(l=>{const nl={...l};if(next===null)delete nl[key];else nl[key]=next;return nl;});
    if(next===null){await db.from('habit_logs').delete().eq('habit_id',habit.id).eq('log_date',date);}
    else{await db.from('habit_logs').upsert({user_id:user.id,habit_id:habit.id,log_date:date,value:next},{onConflict:'habit_id,log_date'});}
  };

  // Streak: consecutive days where val===1, val===-1, or val>0 (count). Skip (-1) doesn't break streak.
  const getStreak=useCallback(habit=>{
    let streak=0;
    for(let i=0;i<365;i++){
      const d=new Date();d.setDate(d.getDate()-i);const ds=d.toISOString().split('T')[0];
      const val=logs[`${habit.id}_${ds}`]??null;
      const tracked=habit.type==='bool'?(val===1||val===-1):(val!==null&&val>0);
      if(tracked)streak++;
      else if(i===0)continue;
      else break;
    }
    return streak+(habit.streak_seed||0);
  },[logs]);

  const isDoneToday=useCallback(habit=>{
    const val=logs[`${habit.id}_${today}`]??null;
    return habit.type==='bool'?(val===1||val===-1):(val!==null&&val>0);
  },[logs,today]);

  const moveHabit=async(habit,dir)=>{
    const idx=habits.findIndex(h=>h.id===habit.id);
    const newIdx=idx+dir;
    if(newIdx<0||newIdx>=habits.length)return;
    const arr=[...habits];[arr[idx],arr[newIdx]]=[arr[newIdx],arr[idx]];
    setHabits(arr);
    await Promise.all(arr.map((h,i)=>db.from('habits').update({sort_order:i}).eq('id',h.id)));
  };

  const addHabit=async()=>{
    if(!newName.trim())return;setSaving(true);
    await db.from('habits').insert({user_id:user.id,name:newName.trim(),color:newColor,type:newType,scheduled_time:newTime||null,sort_order:habits.length,streak_seed:0});
    setNewName('');setNewType('bool');setNewColor(HABIT_COLORS[0]);setNewTime('');setSaving(false);setShowAdd(false);load();
  };
  const deleteHabit=async id=>{if(!window.confirm('Delete habit and all its history?'))return;await db.from('habits').delete().eq('id',id);load();setEditHabit(null);};
  const updateHabit=async(id,patch)=>{await db.from('habits').update(patch).eq('id',id);load();setEditHabit(null);};

  const renderCell=(habit,date)=>{
    const val=logs[`${habit.id}_${date}`]??null;
    const isToday=date===today;
    const col=habit.color||BLUE;
    if(habit.type==='bool'){
      let icon='·',color='#2a2a2a',bg='transparent';
      if(val===1){icon='✓';color=col;bg=col+'20';}
      else if(val===-1){icon='—';color='#666';bg='transparent';}
      return(<button key={date} onClick={e=>toggleCell(e,habit,date)} style={{width:34,height:40,background:bg,border:isToday?`1px solid #333`:'none',borderRadius:7,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color,fontSize:val===1?16:14,fontWeight:700,flexShrink:0,transition:'all .1s'}}>{icon}</button>);
    }else{
      return(<button key={date} onClick={e=>toggleCell(e,habit,date)} style={{width:34,height:40,background:'transparent',border:isToday?`1px solid #333`:'none',borderRadius:7,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
        <span style={{color:val>0?col:'#2a2a2a',fontWeight:700,fontSize:14}}>{val>0?val:'·'}</span>
      </button>);
    }
  };

  const completedCount=habits.filter(h=>isDoneToday(h)).length;
  const displayHabits=hideCompleted?habits.filter(h=>!isDoneToday(h)):habits;

  return(<div style={{height:'100%',display:'flex',flexDirection:'column',background:'#000',overflow:'hidden'}}>
    {/* Header */}
    <div style={{padding:'12px 16px 10px',borderBottom:`1px solid ${BORDER}`,display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
      <div style={{flex:1}}><span style={{fontWeight:900,fontSize:17,letterSpacing:-1}}><span style={{color:GREEN}}>✓</span> HABITS</span></div>
      {habits.length>0&&(
        <button onClick={()=>setHideCompleted(v=>!v)} style={{background:'none',border:`1px solid ${BORDER}`,borderRadius:7,padding:'4px 10px',cursor:'pointer',fontSize:11,color:hideCompleted?LIME:MUTED,fontFamily:'inherit',fontWeight:600,whiteSpace:'nowrap'}}>
          {hideCompleted?`All (${completedCount} done)`:`${completedCount}/${habits.length} ✓`}
        </button>
      )}
      <button onClick={()=>setShowAdd(true)} style={{background:GREEN,border:'none',borderRadius:8,padding:'5px 14px',cursor:'pointer',color:'#000',fontSize:20,fontWeight:800,fontFamily:'inherit',lineHeight:1.2}}>+</button>
    </div>

    {/* Day headers */}
    <div style={{padding:'6px 16px 0',flexShrink:0}}>
      <div style={{display:'flex',alignItems:'flex-end',gap:2}}>
        <div style={{flex:1,minWidth:0}}/>
        <div style={{width:22,flexShrink:0}}/>
        {dates.map(d=>(<div key={d} style={{width:34,textAlign:'center',flexShrink:0}}>
          <div style={{fontSize:9,color:'#555',letterSpacing:'0.04em',marginBottom:2}}>{dayLabel(d)}</div>
          <div style={{fontSize:12,fontWeight:d===today?700:400,color:d===today?TEXT:'#3a3a3a',background:d===today?'#1a1a1a':'none',borderRadius:6,width:28,height:26,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto'}}>{dayNum(d)}</div>
        </div>))}
      </div>
    </div>

    <div style={{flex:1,overflowY:'auto',paddingBottom:NAV_H+12}}>
      {loading&&<div style={{display:'flex',justifyContent:'center',paddingTop:40}}><Spinner size={22} color={GREEN}/></div>}
      {!loading&&habits.length===0&&(<div style={{textAlign:'center',padding:'60px 20px',color:MUTED}}><div style={{fontSize:40,marginBottom:12}}>✓</div><div style={{fontSize:15,fontWeight:700,marginBottom:6}}>No habits yet</div><div style={{fontSize:13}}>Tap + to add your first habit</div></div>)}

      {displayHabits.map((habit,idx)=>{
        const streak=getStreak(habit);
        const done=isDoneToday(habit);
        const col=habit.color||BLUE;
        return(<div key={habit.id} style={{display:'flex',alignItems:'center',gap:2,padding:'0 16px',borderBottom:`1px solid #0d0d0d`}}>
          {/* Order arrows */}
          <div style={{display:'flex',flexDirection:'column',gap:0,flexShrink:0,width:18,marginRight:4}}>
            <button onClick={()=>moveHabit(habit,-1)} disabled={idx===0} style={{background:'none',border:'none',color:idx===0?'#1e1e1e':MUTED,cursor:idx===0?'default':'pointer',fontSize:9,padding:'2px 3px',lineHeight:1,display:'block'}}>▲</button>
            <button onClick={()=>moveHabit(habit,1)} disabled={idx===displayHabits.length-1} style={{background:'none',border:'none',color:idx===displayHabits.length-1?'#1e1e1e':MUTED,cursor:idx===displayHabits.length-1?'default':'pointer',fontSize:9,padding:'2px 3px',lineHeight:1,display:'block'}}>▼</button>
          </div>
          {/* Name — click to open edit */}
          <div onClick={()=>setEditHabit(habit)} style={{flex:1,minWidth:0,cursor:'pointer',paddingTop:7,paddingBottom:7}}>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <div style={{width:7,height:7,borderRadius:'50%',background:col,flexShrink:0}}/>
              <div style={{overflow:'hidden',flex:1}}>
                <div style={{fontSize:14,fontWeight:500,color:done?'#444':col,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',textDecoration:done?'line-through':'none'}}>{habit.name}</div>
                <div style={{display:'flex',alignItems:'center',gap:6,marginTop:2}}>
                  {streak>0&&<span style={{fontSize:10,color:MUTED,fontWeight:600}}>🔥 {streak}d</span>}
                  {habit.scheduled_time&&<span style={{fontSize:10,color:'#555'}}>⏰ {fmtTime12(habit.scheduled_time)}</span>}
                </div>
              </div>
            </div>
          </div>
          {/* Cells — click to toggle only */}
          {dates.map(d=>renderCell(habit,d))}
        </div>);
      })}

      {hideCompleted&&completedCount>0&&(<div style={{textAlign:'center',padding:'16px',fontSize:12,color:'#444'}}>
        {completedCount} completed habit{completedCount!==1?'s':''} hidden
      </div>)}
    </div>

    {/* Add sheet */}
    {showAdd&&(<Sheet onClose={()=>setShowAdd(false)} title="New Habit">
      <FormInput label="Name"><input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="What do you want to track?" style={inp()} autoFocus/></FormInput>
      <FormInput label="Type">
        <div style={{display:'flex',gap:8}}>
          {[['bool','✓ Checkbox'],['count','# Counter']].map(([t,l])=>(<button key={t} onClick={()=>setNewType(t)} style={{flex:1,padding:'10px',borderRadius:10,cursor:'pointer',background:newType===t?'#0e1f10':'#1a1a1a',border:`1px solid ${newType===t?GREEN:'#2a2a2a'}`,color:newType===t?TEXT:MUTED,fontSize:13,fontFamily:'inherit',fontWeight:500}}>{l}</button>))}
        </div>
      </FormInput>
      <FormInput label="Time (optional)">
        <input type="time" value={newTime} onChange={e=>setNewTime(e.target.value)} style={{...inp(),color:newTime?ORANGE:MUTED}}/>
        {newTime&&<div style={{fontSize:11,color:ORANGE,marginTop:5,fontWeight:700}}>⏰ {fmtTime12(newTime)}</div>}
      </FormInput>
      <FormInput label="Color">
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {HABIT_COLORS.map(c=>(<button key={c} onClick={()=>setNewColor(c)} style={{width:28,height:28,borderRadius:'50%',background:c,border:'none',cursor:'pointer',outline:newColor===c?'2px solid #fff':'none',outlineOffset:2}}/>))}
        </div>
      </FormInput>
      <BtnRow>
        <BtnGhost onClick={()=>setShowAdd(false)}>Cancel</BtnGhost>
        <BtnPrimary onClick={addHabit} disabled={saving||!newName.trim()} color={GREEN}>{saving?'Adding…':'Add Habit'}</BtnPrimary>
      </BtnRow>
    </Sheet>)}

    {/* Edit sheet */}
    {editHabit&&(<EditHabitSheet habit={editHabit} onClose={()=>setEditHabit(null)} onSave={updateHabit} onDelete={deleteHabit}/>)}
  </div>);
}

function CountdownSection({user}){
  const [items,setItems]=useState([]);const [loading,setLoading]=useState(true);
  const [mainTab,setMainTab]=useState('upcoming');const [catFilter,setCatFilter]=useState('all');
  const [sheet,setSheet]=useState(null);

  const load=useCallback(async()=>{
    const{data,error}=await db.from('countdowns').select('*').eq('user_id',user.id).order('target_date');
    if(!error)setItems(data||[]);setLoading(false);
  },[user.id]);
  useEffect(()=>{load();},[load]);

  const handleSave=async({name,target_date,category,recurring,direction})=>{
    if(sheet?.id){await db.from('countdowns').update({name,target_date,category,recurring,direction}).eq('id',sheet.id);}
    else{await db.from('countdowns').insert({user_id:user.id,name,target_date,category,recurring,direction:direction||'countdown'});}
    setSheet(null);load();
  };
  const handleDelete=async id=>{await db.from('countdowns').delete().eq('id',id);setSheet(null);load();};

  const enriched=items.map(item=>{
    const effectiveDate=item.recurring?nextOccurrence(item.target_date,item.recurring):item.target_date;
    const days=daysUntil(effectiveDate);
    return{...item,_days:days,_effectiveDate:effectiveDate};
  });

  // Split by direction
  const cdItems=enriched.filter(i=>i.direction!=='countup');
  const cuItems=enriched.filter(i=>i.direction==='countup');
  const upcoming=cdItems.filter(i=>i._days>=0).sort((a,b)=>a._days-b._days);
  const past=cdItems.filter(i=>i._days<0).sort((a,b)=>b._days-a._days);
  // Count-up: items in past, show days since. Sort most days first.
  const countup=[...cuItems].map(i=>({...i,_since:Math.abs(i._days)})).sort((a,b)=>b._since-a._since);

  const displayList=mainTab==='countup'
    ?countup
    :(mainTab==='upcoming'?upcoming:past).filter(i=>catFilter==='all'||i.category===catFilter);

  const tabCounts={upcoming:upcoming.length,past:past.length,countup:countup.length};

  return(<div style={{height:'100%',display:'flex',flexDirection:'column',background:'#000',overflow:'hidden'}}>
    {/* Header */}
    <div style={{padding:'12px 16px 0',display:'flex',alignItems:'center',flexShrink:0}}>
      <div style={{flex:1}}><span style={{fontWeight:900,fontSize:17,letterSpacing:-1}}><span style={{color:BLUE}}>⏳</span> COUNTDOWN</span></div>
      <button onClick={()=>setSheet('new')} style={{background:BLUE,border:'none',borderRadius:8,padding:'5px 14px',cursor:'pointer',color:'#000',fontSize:20,fontWeight:800,fontFamily:'inherit',lineHeight:1.2}}>+</button>
    </div>

    {/* Main tabs */}
    <div style={{display:'flex',borderBottom:`1px solid ${BORDER}`,flexShrink:0,padding:'0 16px'}}>
      {[['upcoming','Upcoming'],['past','Past'],['countup','Count Up']].map(([k,l])=>(<button key={k} onClick={()=>setMainTab(k)} style={{background:'none',border:'none',color:mainTab===k?TEXT:MUTED,fontSize:12,fontWeight:600,letterSpacing:'0.04em',textTransform:'uppercase',cursor:'pointer',padding:'10px 0',marginRight:18,borderBottom:`2px solid ${mainTab===k?BLUE:'transparent'}`,fontFamily:'inherit',whiteSpace:'nowrap'}}>{l}{tabCounts[k]>0?` (${tabCounts[k]})`:''}</button>))}
    </div>

    {/* Category filter — only for non-countup tabs */}
    {mainTab!=='countup'&&(<div style={{display:'flex',gap:8,padding:'10px 16px',overflowX:'auto',flexShrink:0}}>
      {[{key:'all',label:'All',emoji:''},...CD_CATS].map(c=>(<button key={c.key} onClick={()=>setCatFilter(c.key)} style={{background:catFilter===c.key?BLUE:'#141414',border:`1px solid ${catFilter===c.key?BLUE:BORDER}`,borderRadius:20,padding:'5px 14px',fontSize:12,fontWeight:500,color:catFilter===c.key?'#000':MUTED,cursor:'pointer',whiteSpace:'nowrap',flexShrink:0,fontFamily:'inherit'}}>{c.emoji?c.emoji+' ':''}{c.label}</button>))}
    </div>)}

    {/* Count-up header info */}
    {mainTab==='countup'&&(<div style={{padding:'10px 16px 4px',flexShrink:0}}>
      <div style={{fontSize:12,color:MUTED}}>How many days since each event. Tap + to add.</div>
    </div>)}

    <div style={{flex:1,overflowY:'auto',padding:'4px 16px',paddingBottom:NAV_H+12}}>
      {loading&&<div style={{display:'flex',justifyContent:'center',paddingTop:40}}><Spinner size={22} color={BLUE}/></div>}
      {!loading&&displayList.length===0&&(<div style={{textAlign:'center',padding:'60px 0',color:MUTED}}><div style={{fontSize:40,marginBottom:12}}>{mainTab==='countup'?'⏱':'⏳'}</div><div style={{fontSize:14}}>No {mainTab==='countup'?'count-up events':mainTab+' events'}</div></div>)}
      {displayList.map((item,i)=>{
        const isCountUp=mainTab==='countup';
        const ci=CD_CATS.find(c=>c.key===item.category)||CD_CATS[0];
        const isToday=item._days===0;const isPast=item._days<0&&!isCountUp;
        const color=isCountUp?'#22d3ee':(CD_COLORS[item.category]||BLUE);
        const daysVal=isCountUp?item._since:Math.abs(item._days);
        return(<div key={item.id} onClick={()=>setSheet(item)} style={{background:'#141414',border:`1px solid ${isToday?'rgba(247,201,79,0.3)':BORDER}`,borderRadius:16,padding:'15px 16px',marginBottom:8,display:'flex',alignItems:'center',gap:14,cursor:'pointer',opacity:isPast?0.55:1,animation:'fadeIn .2s ease both',animationDelay:`${i*25}ms`}}>
          <div style={{width:44,height:44,borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,background:color+'1a',flexShrink:0}}>{isCountUp?'⏱':ci.emoji}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:15,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'#e8e8e8'}}>{item.name}</div>
            <div style={{fontSize:11,color:MUTED,marginTop:2}}>
              {new Date(item.target_date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
              {item.recurring&&<span style={{marginLeft:6,color:BLUE}}>↻ {item.recurring}</span>}
            </div>
          </div>
          <div style={{textAlign:'right',flexShrink:0}}>
            {isToday&&!isCountUp?<div style={{color:'#f7c94f',fontWeight:700,fontSize:18}}>Today</div>:<>
              <div style={{fontSize:32,fontWeight:700,lineHeight:1,fontFamily:'monospace',color:isPast?MUTED:color}}>{daysVal}</div>
              <div style={{fontSize:10,color:MUTED,textTransform:'uppercase',letterSpacing:'0.05em',marginTop:2,fontWeight:500}}>{isCountUp?'Days Since':isPast?'Days Ago':'Days Left'}</div>
            </>}
          </div>
        </div>);
      })}
    </div>

    {sheet&&(<CDEventSheet item={sheet==='new'?null:sheet} onClose={()=>setSheet(null)} onSave={handleSave} onDelete={handleDelete} defaultDirection={mainTab==='countup'?'countup':'countdown'}/>)}
  </div>);
}

// ═══════════════════════════════════════════════════════════════════
// FREQ SECTION
// ═══════════════════════════════════════════════════════════════════
function FreqSection({user}){
  const [tasks,setTasks]=useState([]);const [raw,setRaw]=useState({});
  const [boards,setBoards]=useState([]);const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState('do');const [q,setQ]=useState('');
  const [editItem,setEditItem]=useState(null);const [addOpen,setAddOpen]=useState(false);
  const [saving,setSaving]=useState(false);

  const load=useCallback(async()=>{
    const{data:mem}=await db.from('board_members').select('board_id,boards(id,name,emoji)').eq('user_id',user.id);
    const bds=(mem||[]).map(m=>m.boards).filter(Boolean);setBoards(bds);
    const ids=bds.map(b=>b.id);if(!ids.length){setTasks([]);setLoading(false);return;}
    const{data:rows}=await db.from('tasks').select('*').in('board_id',ids).eq('done',false).not('frequency','is',null).neq('frequency','');
    const rawMap={};
    const mapped=(rows||[]).filter(r=>r.frequency&&freqDays(r.frequency)!==null).map(r=>{
      rawMap[r.id]=r;
      const fd=freqDays(r.frequency);const cl=r.completion_log||[];
      const sd=daysSinceDone(cl);const over=(fd!==null&&sd!==null&&sd>fd)?sd-fd:null;
      const due=fd!==null&&sd!==null&&sd===fd;
      return{id:r.id,title:r.title||'Untitled',freq:fd,since:sd,over,due,isDo:sd===null||over!==null||due};
    });
    setRaw(rawMap);setTasks(mapped);setLoading(false);
  },[user.id]);
  useEffect(()=>{load();},[load]);

  const markDone=async id=>{const r=raw[id];if(!r)return;const cl=r.completion_log||[];const newCl=[...cl,{id:genId(),doneAt:new Date().toISOString(),note:''}];await db.from('tasks').update({completion_log:newCl,due_date:nextDue(r.frequency),status:'list'}).eq('id',id);setEditItem(null);load();};
  const saveTask=async(id,upd)=>{await db.from('tasks').update(upd).eq('id',id);setEditItem(null);load();};
  const addTask=async(data)=>{await db.from('tasks').insert(data);setAddOpen(false);load();};
  const deleteTask=async id=>{if(!window.confirm('Delete this task?'))return;await db.from('tasks').update({done:true}).eq('id',id);setEditItem(null);load();};

  let rows=tasks.filter(t=>tab==='do'?t.isDo:tab==='dont'?!t.isDo:true);
  if(q.trim())rows=rows.filter(t=>t.title.toLowerCase().includes(q.toLowerCase()));
  if(tab==='do')rows.sort((a,b)=>{if(a.over!==null&&b.over!==null)return b.over-a.over;if(a.over!==null)return -1;if(b.over!==null)return 1;if(a.due&&!b.due)return -1;if(b.due&&!a.due)return 1;return 0;});
  else if(tab==='dont')rows.sort((a,b)=>{const ar=(a.freq&&a.since!==null)?a.freq-a.since:9999;const br=(b.freq&&b.since!==null)?b.freq-b.since:9999;return ar-br;});

  const sections_=[];
  if(tab==='do'||tab==='all'){const ov=rows.filter(r=>r.over!==null);const du=rows.filter(r=>r.due&&r.over===null);const nd=rows.filter(r=>r.since===null&&!r.due&&r.over===null);const ok=rows.filter(r=>!r.isDo&&r.since!==null);if(ov.length)sections_.push({label:'Overdue',color:RED,items:ov});if(du.length)sections_.push({label:'Due',color:ORANGE,items:du});if(tab==='all'&&ok.length)sections_.push({label:'Not Due Yet',color:GREEN,items:ok});if(nd.length)sections_.push({label:'Never Done',color:'#333',items:nd});}
  else{sections_.push({label:'',color:'',items:rows});}

  const r=editItem&&raw[editItem.id];
  const rfd=r?freqDays(r.frequency):null;const rsd=r?daysSinceDone(r.completion_log||[]):null;
  const rover=(rfd!==null&&rsd!==null&&rsd>rfd)?rsd-rfd:null;
  const rld=r?lastDoneStr(r.completion_log||[]):null;
  const rdelta=rfd!==null&&rsd!==null?rfd-rsd:null;

  return(<div style={{height:'100%',display:'flex',flexDirection:'column',background:'#000',overflow:'hidden'}}>
    <div style={{padding:'12px 16px 0',display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
      <div style={{flex:1}}><span style={{fontWeight:900,fontSize:17,letterSpacing:-1}}><span style={{color:ORANGE}}>🔁</span> FREQ</span></div>
      <span style={{fontSize:11,color:MUTED}}>{rows.length} task{rows.length!==1?'s':''}</span>
      <button onClick={()=>setAddOpen(true)} style={{background:ORANGE,border:'none',borderRadius:8,padding:'5px 13px',cursor:'pointer',color:'#000',fontSize:20,fontWeight:800,fontFamily:'inherit',lineHeight:1.2}}>+</button>
    </div>

    {/* Tabs */}
    <div style={{display:'flex',borderBottom:`1px solid ${BORDER}`,flexShrink:0}}>
      {[['do','DO',RED],['dont',"DON'T",GREEN],['all','ALL',LIME]].map(([k,l,c])=>(<button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:'10px 0',textAlign:'center',fontSize:11,fontWeight:700,letterSpacing:1.5,cursor:'pointer',color:tab===k?c:MUTED,border:'none',borderBottom:`2px solid ${tab===k?c:'transparent'}`,background:'none',fontFamily:'inherit'}}>{l}</button>))}
    </div>

    {/* Filter */}
    <div style={{padding:'8px 16px',flexShrink:0}}><input value={q} onChange={e=>setQ(e.target.value)} placeholder="Filter tasks…" style={{...inp(),fontSize:'14px !important'}}/></div>

    {/* List */}
    <div style={{flex:1,overflowY:'auto',paddingBottom:NAV_H+12}}>
      {loading&&<div style={{display:'flex',justifyContent:'center',paddingTop:40}}><Spinner size={22} color={ORANGE}/></div>}
      {!loading&&rows.length===0&&(<div style={{textAlign:'center',padding:'60px 0',color:MUTED}}><div style={{fontSize:26,marginBottom:10}}>{tab==='do'?'✓':'◡'}</div><div style={{fontSize:13}}>{tab==='do'?'Nothing overdue or due':tab==='dont'?'All good':'No tasks'}</div></div>)}
      {sections_.map((sec,si)=>(<div key={si}>
        {sec.label&&(<div style={{padding:'10px 16px 3px',display:'flex',alignItems:'center',gap:7}}><div style={{width:5,height:5,borderRadius:'50%',background:sec.color,flexShrink:0}}/><span style={{fontSize:9,fontWeight:700,letterSpacing:1.5,textTransform:'uppercase',color:sec.color}}>{sec.label}</span></div>)}
        {sec.items.map(t=>(<div key={t.id} onClick={()=>setEditItem(t)} style={{display:'grid',gridTemplateColumns:'48px 1fr 58px 58px',alignItems:'center',padding:'10px 16px',borderBottom:`1px solid #080808`,cursor:'pointer',transition:'background .1s'}} onMouseEnter={e=>e.currentTarget.style.background='#0c0c0c'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <span style={{fontSize:13,fontWeight:700,color:MUTED,fontVariantNumeric:'tabular-nums'}}>{t.freq}</span>
          <span style={{fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',paddingRight:8}}>{t.title}</span>
          <span style={{fontSize:12,fontWeight:600,textAlign:'right',fontVariantNumeric:'tabular-nums',color:t.since===null?'#333':t.over!==null?RED:t.due?ORANGE:GREEN}}>{t.since!==null?t.since+'d':'—'}</span>
          <span style={{fontSize:12,fontWeight:700,textAlign:'right',color:RED,fontVariantNumeric:'tabular-nums'}}>{t.over!==null?t.over+'d':''}</span>
        </div>))}
      </div>))}
    </div>

    {/* Edit modal */}
    {editItem&&r&&(<Sheet onClose={()=>setEditItem(null)} title="Edit Task">
      <FormInput label="Title"><input defaultValue={r.title||''} id="fq_title" style={inp()}/></FormInput>
      <FormInput label="Frequency"><input defaultValue={r.frequency||''} id="fq_freq" placeholder="e.g. 7, daily, weekly" style={inp()}/></FormInput>
      <FormInput label="Notes"><textarea defaultValue={r.notes||''} id="fq_notes" rows={2} style={{...inp(),resize:'vertical'}}/></FormInput>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,background:'#0a0a0a',borderRadius:8,border:`1px solid ${BORDER}`,overflow:'hidden',marginBottom:14}}>
        {[['Freq',rfd!==null?rfd:'—','#444'],['Since',rsd!==null?rsd+'d':'—',rover!==null?RED:editItem.due?ORANGE:rsd!==null?GREEN:'#444'],['Δ Tally',rdelta!==null?(rdelta>0?'+'+rdelta:rdelta):'—',rdelta===null?'#444':rdelta<0?RED:rdelta===0?ORANGE:GREEN]].map(([l,v,c])=>(<div key={l} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,padding:'9px 4px',borderRight:`1px solid #141414`}}><div style={{fontSize:8,fontWeight:700,letterSpacing:1,color:'#444',textTransform:'uppercase'}}>{l}</div><div style={{fontSize:20,fontWeight:800,color:c}}>{v}</div></div>))}
      </div>
      {rld&&<div style={{display:'flex',alignItems:'center',gap:6,padding:'7px 10px',background:'#061406',borderRadius:7,border:`1px solid ${GREEN}20`,marginBottom:12,fontSize:11}}><span style={{color:GREEN,fontWeight:700}}>✓ Last done:</span><span style={{color:GREEN}}>{fmtDateShort(rld)}</span></div>}
      <button onClick={()=>markDone(editItem.id)} style={{width:'100%',padding:'12px',borderRadius:10,border:`1px solid ${GREEN}40`,background:'#0a140a',color:GREEN,fontWeight:800,fontSize:14,fontFamily:'inherit',cursor:'pointer',marginBottom:10}}>✓ Mark Done{rfd?` → resets in ${rfd}d`:''}</button>
      <BtnRow>
        <button onClick={()=>deleteTask(editItem.id)} style={{background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.2)',borderRadius:12,color:'#ef4444',fontSize:14,padding:'12px 16px',cursor:'pointer',fontFamily:'inherit'}}>Delete</button>
        <BtnGhost onClick={()=>setEditItem(null)}>Cancel</BtnGhost>
        <BtnPrimary color={ORANGE} onClick={async()=>{const title=document.getElementById('fq_title')?.value?.trim();const freq=document.getElementById('fq_freq')?.value?.trim();const notes=document.getElementById('fq_notes')?.value;if(!title)return;await saveTask(editItem.id,{title,frequency:freq||null,notes});}}>Save</BtnPrimary>
      </BtnRow>
    </Sheet>)}

    {/* Add modal */}
    {addOpen&&(<Sheet onClose={()=>setAddOpen(false)} title="New Task">
      <FormInput label="Title"><input id="fq_add_title" placeholder="What needs to get done?" style={inp()} autoFocus/></FormInput>
      <FormInput label="Frequency"><input id="fq_add_freq" placeholder="e.g. 7, daily, weekly" style={inp()}/></FormInput>
      {boards.length>1&&(<FormInput label="Board"><select id="fq_add_board" style={{...inp(),cursor:'pointer'}}>{boards.map(b=>(<option key={b.id} value={b.id}>{b.emoji||''} {b.name}</option>))}</select></FormInput>)}
      {boards.length===1&&<input type="hidden" id="fq_add_board" value={boards[0]?.id||''}/>}
      <BtnRow>
        <BtnGhost onClick={()=>setAddOpen(false)}>Cancel</BtnGhost>
        <BtnPrimary color={ORANGE} onClick={async()=>{const title=document.getElementById('fq_add_title')?.value?.trim();const freq=document.getElementById('fq_add_freq')?.value?.trim();const boardId=document.getElementById('fq_add_board')?.value;if(!title||!boardId)return;await addTask({id:genId(),board_id:boardId,title,frequency:freq||null,status:'list',priority:'normal',done:false,manual_order:Date.now(),completion_log:[],due_date:todayStr()});}}>Add Task</BtnPrimary>
      </BtnRow>
    </Sheet>)}
  </div>);
}

// ═══════════════════════════════════════════════════════════════════
// BOTTOM NAV
// ═══════════════════════════════════════════════════════════════════
const TABS=[
  {key:'sprint',label:'SPRINT',icon:'⚡',color:LIME},
  {key:'habits',label:'HABITS',icon:'✓',color:GREEN},
  {key:'countdown',label:'COUNTDOWN',icon:'⏳',color:BLUE},
  {key:'freq',label:'FREQ',icon:'🔁',color:ORANGE},
];
function BottomNav({tab,setTab}){
  return(<div style={{flexShrink:0,display:'flex',borderTop:`1px solid ${BORDER}`,background:'#000',height:NAV_H}}>
    {TABS.map(t=>(<button key={t.key} onClick={()=>setTab(t.key)} style={{flex:1,background:'none',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:3,padding:'6px 0',fontFamily:'inherit',transition:'opacity .1s',opacity:tab===t.key?1:0.4}}>
      <span style={{fontSize:18,lineHeight:1}}>{t.icon}</span>
      <span style={{fontSize:9,fontWeight:700,letterSpacing:'0.08em',color:tab===t.key?t.color:MUTED}}>{t.label}</span>
      {tab===t.key&&<div style={{width:20,height:2,borderRadius:1,background:t.color,position:'absolute',bottom:4}}/>}
    </button>))}
  </div>);
}

// ═══════════════════════════════════════════════════════════════════
// ROOT APP
// ═══════════════════════════════════════════════════════════════════
function App(){
  const [screen,setScreen]=useState('loading');
  const [user,setUser]=useState(null);
  const [tab,setTab]=useState('sprint');

  useEffect(()=>{
    db.auth.getSession().then(({data:{session}})=>{if(session){setUser(session.user);setScreen('main');}else setScreen('auth');});
    const{data:{subscription}}=db.auth.onAuthStateChange((_,session)=>{if(session){setUser(session.user);setScreen('main');}else{setUser(null);setScreen('auth');}});
    return()=>subscription.unsubscribe();
  },[]);

  if(screen==='loading')return(<div style={{height:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:'#000',flexDirection:'column',gap:16}}><div style={{fontSize:36}}>☀</div><Spinner size={22}/></div>);
  if(screen==='auth')return<AuthScreen onAuth={u=>{setUser(u);setScreen('main');}}/>;

  return(<div style={{height:'100%',display:'flex',flexDirection:'column',background:'#000',overflow:'hidden'}}>
    <div style={{flex:1,overflow:'hidden',position:'relative'}}>
      <div style={{display:tab==='sprint'?'block':'none',height:'100%'}}>{user&&<SprintSection user={user}/>}</div>
      <div style={{display:tab==='habits'?'block':'none',height:'100%'}}>{user&&<HabitsSection user={user}/>}</div>
      <div style={{display:tab==='countdown'?'block':'none',height:'100%'}}>{user&&<CountdownSection user={user}/>}</div>
      <div style={{display:tab==='freq'?'block':'none',height:'100%'}}>{user&&<FreqSection user={user}/>}</div>
    </div>
    <BottomNav tab={tab} setTab={setTab}/>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
