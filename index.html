<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;background:#000;color:#e8e8e8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
input,textarea,select{font-size:16px!important;color-scheme:dark;font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:99px}
::-webkit-scrollbar-track{background:transparent}
.spin{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 1s ease-in-out infinite}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .2s ease-out}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.section-header{height:48px;min-height:48px;max-height:48px;display:flex;align-items:center;gap:8px;padding:0 16px;border-bottom:1px solid #2a2a2a;flex-shrink:0;}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.5)}
input[type="time"]::-webkit-calendar-picker-indicator{filter:invert(0.5)}
/* Pill tab row — for category/type filters */
.pill-tabs{display:flex;gap:8px;padding:8px 16px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.pill-tabs::-webkit-scrollbar{display:none}
.pill-tab{border-radius:20px;padding:5px 14px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0;border:1px solid;font-family:inherit;transition:all .15s}
.pill-tab.active{color:#000;font-weight:600}
.pill-tab.inactive{background:#141414;color:#777}
/* Chrome tabs — for primary section tabs */
.chrome-tabs{display:flex;overflow-x:auto;flex-shrink:0;border-bottom:1px solid #2a2a2a;scrollbar-width:none;background:#000}
.chrome-tabs::-webkit-scrollbar{display:none}
.chrome-tab{flex-shrink:0;padding:0 16px;height:38px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;letter-spacing:0.04em;cursor:pointer;border:none;background:none;font-family:inherit;position:relative;white-space:nowrap;transition:color .15s}
.chrome-tab.active{color:#e8e8e8}
.chrome-tab.inactive{color:#666}
.chrome-tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;border-radius:2px 2px 0 0}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhuZnZ0bGxvZG1nc2lweXV3enN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MjgwNzEsImV4cCI6MjA4NzMwNDA3MX0.4YzxxQK9PPPo1qGs9mEb6JhE5Ic6Y3_Lt9CGYtCCZEU';

// ═══════════════════════════════════════════════════════════════════
// SHARED CONSTANTS

const LIME="#CAFF4C",BORDER="#2a2a2a",TEXT="#e8e8e8",MUTED="#888";
const RED="#FF453A",ORANGE="#FF9F0A",GREEN="#30D158",BLUE="#4f8ef7";
const CARD="#111",CARD2="#161616",INSET="#0a0a0a";
const NAV_H=58;

// ═══════════════════════════════════════════════════════════════════
// SHARED UTILS
// ═══════════════════════════════════════════════════════════════════
const genId=()=>crypto.randomUUID();
const fmtSecs=s=>{if(s<0)s=0;return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;};
const fmtTime12=t=>{if(!t)return'';const[h,m]=t.split(':');const hr=parseInt(h);return`${hr===0?12:hr>12?hr-12:hr}:${m} ${hr<12?'AM':'PM'}`;};
const fmtDate=d=>new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
const totalSecs=ts=>(ts||[]).reduce((a,t)=>a+(Number(t.seconds)||0),0);

// ── Sprint date helpers ──────────────────────────────────────────
const todayKey=(resetHour=4)=>{
  const now=new Date();const reset=new Date(now);
  reset.setHours(resetHour,0,0,0);
  if(now<reset)reset.setDate(reset.getDate()-1);
  return reset.toISOString().slice(0,10);
};
const resolveDS=(raw,resetHour=4)=>{
  if(!raw||!raw.date)return{date:null,done:false,skipped:[]};
  if(raw.date!==todayKey(resetHour))return{date:null,done:false,skipped:[]};
  return{date:raw.date,done:!!raw.done,skipped:Array.isArray(raw.skipped)?raw.skipped:[]};
};

// ── Sprint local storage ─────────────────────────────────────────
const DAY_ABBR=['MON','TUE','WED','THU','FRI','SAT','SUN'];
const DAY_LABEL={MON:'Mon',TUE:'Tue',WED:'Wed',THU:'Thu',FRI:'Fri',SAT:'Sat',SUN:'Sun'};
const loadSettings=uid=>{try{return JSON.parse(localStorage.getItem(`sprint_settings_${uid}`)||'{}')}catch{return{}}};
const saveSettings=(uid,s)=>{try{localStorage.setItem(`sprint_settings_${uid}`,JSON.stringify(s))}catch{}};
const RKEY='sprint_runner_v24';
const saveRunner=s=>{try{localStorage.setItem(RKEY,JSON.stringify({...s,savedAt:Date.now()}))}catch{}};
const loadRunner=()=>{try{const s=JSON.parse(localStorage.getItem(RKEY)||'null');if(!s?.savedAt||Date.now()-s.savedAt>3600000)return null;return s;}catch{return null;}};
const clearRunner=()=>{try{localStorage.removeItem(RKEY)}catch{}};
const advanceRunner=(saved,tasks)=>{
  if(!saved.running||saved.phase!=='running')return saved;
  let gap=Math.floor((Date.now()-saved.savedAt)/1000);
  let idx=saved.taskIdx,secs=saved.secs,elapsed=saved.elapsed||0;
  while(gap>0&&idx<tasks.length){if(gap>=secs){gap-=secs;elapsed+=secs;idx++;secs=idx<tasks.length?tasks[idx].seconds||30:0;}else{secs-=gap;elapsed+=gap;gap=0;}}
  const done=idx>=tasks.length;
  return{...saved,taskIdx:done?tasks.length-1:idx,secs:done?0:secs,elapsed,phase:done?'done':'running',running:!done};
};

// ── Wake lock ────────────────────────────────────────────────────
let _wl=null;
const acqWL=async()=>{try{if('wakeLock' in navigator)_wl=await navigator.wakeLock.request('screen');}catch{}};
const relWL=()=>{try{if(_wl){_wl.release();_wl=null;}}catch{}};

// ── Audio ────────────────────────────────────────────────────────
const beep=(freq,dur,vol=0.25)=>{try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=freq;o.type='sine';g.gain.setValueAtTime(vol,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur/1000);o.start();o.stop(ctx.currentTime+dur/1000);}catch{}};
const chime=()=>{beep(523,180,.2);setTimeout(()=>beep(659,180,.2),160);setTimeout(()=>beep(784,300,.25),320);};
const speak=text=>{try{window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.rate=.88;u.pitch=1.05;window.speechSynthesis.speak(u);}catch{}};
const askNotif=async()=>{try{if('Notification' in window&&Notification.permission==='default')await Notification.requestPermission();}catch{}};
const showNotif=(task,num,total)=>{try{if('Notification' in window&&Notification.permission==='granted')new Notification(`⚡ Task ${num}/${total}`,{body:`${task.title} — ${fmtSecs(task.seconds||0)}`,tag:'sprint',renotify:true,silent:true});}catch{}};

// ── FREQ helpers ─────────────────────────────────────────────────
const WDN=['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
const todayStr=()=>{const et=new Date(new Date().toLocaleString('en-US',{timeZone:'America/New_York'}));return et.toISOString().split('T')[0];};
const freqDays=f=>{if(!f)return null;const s=f.trim().toLowerCase();if(WDN.includes(s)||['weekday','weekdays','weekend','weekends','weekly'].includes(s))return 7;if(s==='daily')return 1;if(s==='monthly')return 30;if(s==='yearly')return 365;const n=parseInt(s);return(!isNaN(n)&&n>0)?n:null;};
const daysSinceDone=cl=>{if(!cl||!cl.length)return null;const last=[...cl].sort((a,b)=>b.doneAt.localeCompare(a.doneAt))[0];if(!last||!last.doneAt)return null;return Math.round((new Date()-new Date(last.doneAt))/(1000*60*60*24));};
const lastDoneStr=cl=>{if(!cl||!cl.length)return null;return[...cl].sort((a,b)=>b.doneAt.localeCompare(a.doneAt))[0]?.doneAt?.split('T')[0]||null;};
const nextDue=frequency=>{const fd=freqDays(frequency);if(!fd)return todayStr();const d=new Date(todayStr()+'T00:00:00');d.setDate(d.getDate()+fd);return d.toISOString().split('T')[0];};
const fmtDateShort=s=>{if(!s)return'—';return new Date(s+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});};

// ── Countdown helpers ────────────────────────────────────────────
const CD_CATS=[{key:'countdown',label:'Countdown',emoji:'⏳'},{key:'anniversary',label:'Anniversary',emoji:'💍'},{key:'birthday',label:'Birthday',emoji:'🎂'},{key:'holiday',label:'Holiday',emoji:'🌸'}];
const CD_COLORS={countdown:BLUE,anniversary:'#c084fc',birthday:'#f472b6',holiday:ORANGE};
const daysUntil=dateStr=>{const today=new Date();today.setHours(0,0,0,0);const target=new Date(dateStr+'T00:00:00');return Math.round((target-today)/86400000);};
const nextOccurrence=(dateStr,recurring)=>{
  if(!recurring)return dateStr;
  const today=new Date();today.setHours(0,0,0,0);
  let d=new Date(dateStr+'T00:00:00');
  if(recurring==='weekly')while(d<today)d.setDate(d.getDate()+7);
  else if(recurring==='monthly')while(d<today)d.setMonth(d.getMonth()+1);
  else if(recurring==='yearly')while(d<today)d.setFullYear(d.getFullYear()+1);
  return d.toISOString().split('T')[0];
};

// years since original date
const yearsFrom=dateStr=>{if(!dateStr)return null;const orig=new Date(dateStr+'T00:00:00');const today=new Date();today.setHours(0,0,0,0);let yrs=today.getFullYear()-orig.getFullYear();if(today.getMonth()<orig.getMonth()||(today.getMonth()===orig.getMonth()&&today.getDate()<orig.getDate()))yrs--;return yrs;};
// For countdown items: age they WILL BE on that upcoming day
const yearsUntilNext=dateStr=>{const cur=yearsFrom(dateStr);if(cur===null)return null;return cur+1;};
// sprint day helper
const getTodayAbbr=()=>['SUN','MON','TUE','WED','THU','FRI','SAT'][new Date().getDay()];
const isTodaySprint=sp=>{if(!sp.frequency_days)return true;return sp.frequency_days.split(',').includes(getTodayAbbr());};
const sprintTimeColor=t=>{
  if(!t)return ORANGE;
  const [h,m]=t.split(':').map(Number);
  const now=new Date();const sprintMins=h*60+m;const nowMins=now.getHours()*60+now.getMinutes();
  const diff=nowMins-sprintMins;
  if(diff<0)return ORANGE;// future - normal orange
  if(diff<30)return '#FF9F0A';// just passed - same
  if(diff<60)return '#FF7A0A';// 30-60m late
  if(diff<120)return '#FF5A0A';// 1-2h late
  return RED;// 2h+ late - full red
};

// ═══════════════════════════════════════════════════════════════════
// SHARED UI COMPONENTS
// ═══════════════════════════════════════════════════════════════════
const Spinner=({size=16,color=LIME})=>(<div className="spin" style={{width:size,height:size,border:'2px solid #2a2a2a',borderTopColor:color,borderRadius:'50%',flexShrink:0}}/>);

function DotMenu({items}){
  const [open,setOpen]=useState(false);const ref=useRef(null);
  useEffect(()=>{if(!open)return;const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};document.addEventListener('pointerdown',h);return()=>document.removeEventListener('pointerdown',h);},[open]);
  return(<div ref={ref} style={{position:'relative',flexShrink:0}}>
    <button onClick={e=>{e.stopPropagation();setOpen(o=>!o);}} style={{background:'none',border:'none',color:MUTED,fontSize:20,cursor:'pointer',padding:'4px 8px',lineHeight:1,borderRadius:7,display:'flex',alignItems:'center'}} onMouseEnter={e=>e.currentTarget.style.color=TEXT} onMouseLeave={e=>e.currentTarget.style.color=MUTED}>&#x22EF;</button>
    {open&&(<div className="fade-in" style={{position:'absolute',right:0,top:'calc(100% + 4px)',background:'#1a1a1a',border:`1px solid ${BORDER}`,borderRadius:10,minWidth:170,zIndex:9999,overflow:'hidden',boxShadow:'0 8px 32px rgba(0,0,0,.8)'}}>
      {items.map((item,i)=>item==='---'?<div key={i} style={{height:1,background:BORDER,margin:'3px 0'}}/>:<button key={i} onClick={e=>{e.stopPropagation();setOpen(false);item.action();}} style={{display:'block',width:'100%',textAlign:'left',padding:'11px 16px',background:'none',border:'none',color:item.danger?RED:TEXT,fontSize:13,cursor:'pointer',fontFamily:'inherit',fontWeight:item.danger?700:400}} onMouseEnter={e=>e.currentTarget.style.background='#2a2a2a'} onMouseLeave={e=>e.currentTarget.style.background='none'}>{item.label}</button>)}
    </div>)}
  </div>);
}

function Sheet({onClose,title,children}){
  return(<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.82)',zIndex:300,display:'flex',alignItems:'flex-end'}} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={{background:'#111',borderRadius:'20px 20px 0 0',padding:'20px 20px 40px',width:'100%',borderTop:`1px solid ${BORDER}`,maxHeight:'90vh',overflowY:'auto',animation:'slideUp .22s ease'}}>
      <div style={{width:36,height:4,background:'#333',borderRadius:2,margin:'0 auto 18px'}}/>
      {title&&<div style={{fontSize:17,fontWeight:700,marginBottom:18}}>{title}</div>}
      {children}
    </div>
  </div>);
}

const FormInput=({label,children,style={}})=>(<div style={{marginBottom:14,...style}}>{label&&<div style={{fontSize:10,color:MUTED,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:6}}>{label}</div>}{children}</div>);
const inp=(extra={})=>({width:'100%',background:'#1a1a1a',border:`1px solid #2a2a2a`,borderRadius:10,color:TEXT,padding:'11px 13px',outline:'none',transition:'border-color .15s',...extra});
const BtnRow=({children})=>(<div style={{display:'flex',gap:8,marginTop:18}}>{children}</div>);
const BtnPrimary=({onClick,disabled,color=LIME,children,style={}})=>(<button onClick={onClick} disabled={disabled} style={{flex:1,background:disabled?'#2a2a2a':color,border:'none',borderRadius:12,color:disabled?MUTED:(color===LIME?'#000':'#000'),fontWeight:800,fontSize:15,padding:14,cursor:disabled?'default':'pointer',fontFamily:'inherit',...style}}>{children}</button>);
const BtnGhost=({onClick,children,style={}})=>(<button onClick={onClick} style={{background:'#1a1a1a',border:`1px solid ${BORDER}`,borderRadius:12,color:MUTED,fontWeight:500,fontSize:14,padding:'12px 16px',cursor:'pointer',fontFamily:'inherit',...style}}>{children}</button>);

// ═══════════════════════════════════════════════════════════════════
// AUTH SCREEN
// ═══════════════════════════════════════════════════════════════════
function AuthScreen({onAuth}){
  const [mode,setMode]=useState('login'),[email,setEmail]=useState(''),[pw,setPw]=useState('');
  const [loading,setLoading]=useState(false),[err,setErr]=useState('');
  const i={...inp(),marginBottom:14};
  const submit=async()=>{
    if(!email||!pw)return setErr('Email and password required');
    setLoading(true);setErr('');
    try{const res=mode==='login'?await db.auth.signInWithPassword({email,password:pw}):await db.auth.signUp({email,password:pw});
    if(res.error)throw res.error;
    if(mode==='signup'&&!res.data.session){setLoading(false);setErr('Check email to confirm, then sign in.');return;}
    onAuth(res.data.user);}catch(e){setErr(e.message||'Error');}
    setLoading(false);
  };
  return(<div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24,background:'#000'}}>
    <div style={{width:'100%',maxWidth:360}}>
      <div style={{textAlign:'center',marginBottom:36}}>
        <div style={{fontSize:11,color:MUTED,letterSpacing:5,marginBottom:8}}>DAYCRUSH</div>
        <div style={{fontSize:48,fontWeight:900,letterSpacing:-3,lineHeight:1}}><span style={{color:LIME}}>☀</span><span> DAYMAN</span></div>
        <div style={{fontSize:10,color:MUTED,letterSpacing:3,marginTop:8}}>SPRINT · HABITS · COUNTDOWN · FREQ</div>
      </div>
      <div style={{display:'flex',marginBottom:20,border:`1px solid ${BORDER}`,borderRadius:10,overflow:'hidden'}}>
        {['login','signup'].map(m=>(<button key={m} onClick={()=>{setMode(m);setErr('');}} style={{flex:1,padding:'10px',background:mode===m?'#1a1a1a':'transparent',border:'none',cursor:'pointer',fontSize:13,fontWeight:mode===m?700:400,color:mode===m?TEXT:MUTED,fontFamily:'inherit'}}>{m==='login'?'Sign In':'Sign Up'}</button>))}
      </div>
      <input type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} placeholder="Email" style={i} autoCapitalize="none"/>
      <input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} placeholder="Password" style={{...i,marginBottom:20}}/>
      {err&&<div style={{fontSize:12,color:err.includes('Check')?LIME:RED,marginBottom:14,padding:'9px 12px',borderRadius:8,background:err.includes('Check')?'#0a140a':'#1a0a0a'}}>{err}</div>}
      <button onClick={submit} disabled={loading} style={{width:'100%',padding:'13px',borderRadius:10,border:'none',background:loading?'#2a2a2a':LIME,color:'#000',fontWeight:900,fontSize:15,fontFamily:'inherit',cursor:loading?'default':'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
        {loading&&<Spinner size={14} color={MUTED}/>}{mode==='login'?'Sign In':'Create Account'}
      </button>
    </div>
  </div>);
}

const getTimeSection=t=>{if(!t)return'NO TIME';const[h]=t.split(':').map(Number);if(h>=4&&h<12)return'MORNING';if(h>=12&&h<18)return'AFTERNOON';if(h>=18&&h<24)return'NIGHT';return'4TH MEAL';};
const SECTION_ORDER=['MORNING','AFTERNOON','NIGHT','4TH MEAL','NO TIME'];
const SECTION_EMOJI={MORNING:'🌅',AFTERNOON:'☀️',NIGHT:'🌙','4TH MEAL':'🦉','NO TIME':'📋'};

function SettingsPanel({settings,onSave,onClose}){

  return(<Sheet onClose={onClose}><div style={{fontWeight:800,fontSize:16,marginBottom:18}}>⚙️ Settings</div>

        {Array.from({length:13},(_,i)=>i).map(h=>(<button key={h} onClick={()=>setResetHour(h)} style={{padding:'7px 12px',borderRadius:7,border:`1px solid ${resetHour===h?LIME:BORDER}`,background:resetHour===h?'#0a140a':'transparent',color:resetHour===h?LIME:MUTED,fontSize:12,cursor:'pointer',fontFamily:'inherit',fontWeight:resetHour===h?700:400}}>{h===0?'Midnight':`${h}:00 ${h<12?'AM':'PM'}`}</button>))}

function HistoryPanel({user,onClose}){
  const [runs,setRuns]=useState([]);const [loading,setLoading]=useState(true);
  useEffect(()=>{db.from('sprint_runs').select('*').eq('user_id',user.id).order('completed_at',{ascending:false}).limit(50).then(({data})=>{setRuns(data||[]);setLoading(false);});},[]);
  return(<div style={{position:'fixed',inset:0,background:'#000',zIndex:400,display:'flex',flexDirection:'column'}}>
    <div style={{padding:'16px 18px',borderBottom:`1px solid ${BORDER}`,display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
      <button onClick={onClose} style={{background:'none',border:'none',color:MUTED,fontSize:26,cursor:'pointer',lineHeight:1,padding:'0 4px',marginLeft:-4}}>‹</button>
      <div style={{fontWeight:800,fontSize:16,flex:1}}>📊 Run History</div>
    </div>
    <div style={{flex:1,overflowY:'auto',padding:'14px 18px'}}>
      {loading&&<div style={{display:'flex',justifyContent:'center',paddingTop:40}}><Spinner size={22}/></div>}
      {!loading&&runs.length===0&&<div style={{textAlign:'center',padding:'60px 0',color:MUTED}}><div style={{fontSize:36,marginBottom:12}}>📊</div><div style={{fontSize:14,color:TEXT,fontWeight:700,marginBottom:6}}>No runs yet</div></div>}
      {runs.map(r=>(<div key={r.id} style={{background:CARD,borderRadius:10,border:`1px solid ${BORDER}`,padding:'12px 14px',marginBottom:8}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}><span style={{fontSize:20}}>{r.sprint_emoji||'⚡'}</span>

function SprintRunner({sprint,onClose,onLogRun,onComplete}){
  const tasks=useMemo(()=>sprint.tasks||[],[sprint]);
  const restore=sprint._restore;
  const [dispIdx,setDispIdx]=useState(()=>restore?.taskIdx??0);
  const [dispSecs,setDispSecs]=useState(()=>restore?.secs??(tasks[0]?.seconds||30));
  const [dispElapsed,setDispElapsed]=useState(()=>restore?.elapsed??0);
  const [phase,setPhase]=useState(()=>restore?.phase??'idle');
  const [isRunning,setIsRunning]=useState(false);
  const [transitioning,setTransitioning]=useState(false);
  const [snapRing,setSnapRing]=useState(false);
  const [ringSize,setRingSize]=useState(300);
  const T=useRef({running:false,transitioning:false,secs:restore?.secs??(tasks[0]?.seconds||30),taskIdx:restore?.taskIdx??0,elapsed:restore?.elapsed??0,tasks,taskStartedAt:Date.now()});
  const containerRef=useRef(null);const tickRef=useRef(null);const loggedRef=useRef(false);const gotoRef=useRef(null);
  const schedNotifTimers=useRef([]);

  useEffect(()=>{T.current.tasks=tasks;},[tasks]);
  useEffect(()=>{setDispIdx(0);setDispSecs(tasks[0]?.seconds||30);},[]);
  useEffect(()=>()=>{clearInterval(tickRef.current);schedNotifTimers.current.forEach(clearTimeout);relWL();},[]);
  useEffect(()=>{askNotif();},[]);
  useEffect(()=>{const el=containerRef.current;if(!el)return;const obs=new ResizeObserver(e=>{const w=e[0].contentRect.width;setRingSize(Math.min(Math.max(w-12,240),420));});obs.observe(el);return()=>obs.disconnect();},[]);

  const scheduleAllNotifs=useCallback((taskList,startIdx,startSecs)=>{
    schedNotifTimers.current.forEach(clearTimeout);schedNotifTimers.current=[];
    if(!('Notification' in window)||Notification.permission!=='granted')return;

// Calculate sprint streak: consecutive days marked done from sprint_runs
const calcSprintStreak=(runs,sprintId,resetHour)=>{
  const spRuns=runs.filter(r=>r.sprint_id===sprintId);
  if(!spRuns.length)return 0;
  // Build set of day keys that had a run
  const daySet=new Set(spRuns.map(r=>{
    const d=new Date(r.created_at);
    // Apply reset hour: if before resetHour, belongs to previous day
    if(d.getHours()<resetHour){d.setDate(d.getDate()-1);}
    return d.toISOString().split('T')[0];
  }));
  // Count consecutive days ending today/yesterday
  const today=new Date();if(today.getHours()<resetHour)today.setDate(today.getDate()-1);
  let streak=0;
  for(let i=0;i<10000;i++){
    const d=new Date(today);d.setDate(today.getDate()-i);
    const key=d.toISOString().split('T')[0];
    if(daySet.has(key))streak++;
    else if(i===0)continue;// today not done yet — don't break
    else break;
  }
  return streak;
};

function SprintSection({user,resetHour:resetHourProp=4}){

  const saveSprint=async data=>{

    else{await db.from('sprints_v2').insert({user_id:user.id,name:data.name,emoji:data.emoji,scheduled_time:data.scheduled_time||null,frequency:data.frequency??1,frequency_days:data.frequency_days||null,tasks:data.tasks||[]});}

  const deleteSprint=async()=>{if(!editTarget?.id)return;await db.from('sprints_v2').delete().eq('id',editTarget.id).eq('user_id',user.id);await loadSprints();setEditTarget(null);setView('list');};
  const handleDelete=async(id,name)=>{if(!window.confirm(`Delete "${name}"?\nThis cannot be undone.`))return;await db.from('sprints_v2').delete().eq('id',id).eq('user_id',user.id);await loadSprints();};
  const handleDuplicate=async sp=>{await db.from('sprints_v2').insert({user_id:user.id,name:`${sp.name} (copy)`,emoji:sp.emoji,scheduled_time:sp.scheduled_time||null,frequency:sp.frequency??1,frequency_days:sp.frequency_days||null,tasks:(sp.tasks||[]).map(t=>({...t,id:genId()}))});await loadSprints();};
  const logRun=async(sprintId,sprintName,sprintEmoji,taskCount,plannedSecs,elapsedSecs)=>{try{await db.from('sprint_runs').insert({user_id:user.id,sprint_id:sprintId,sprint_name:sprintName,sprint_emoji:sprintEmoji,task_count:taskCount,planned_secs:plannedSecs,elapsed_secs:elapsedSecs});}catch{}};
  const saveDailyState=useCallback(async(id,patch)=>{
    const resetHour=settings.resetHour??4;const today=todayKey(resetHour);
    setSprints(prev=>prev.map(s=>{if(s.id!==id)return s;const existing=resolveDS(s.daily_state,resetHour);return{...s,daily_state:{...existing,...patch,date:today}};}));

  const doneMap=useMemo(()=>{const m={};sprints.forEach(s=>{m[s.id]=resolveDS(s.daily_state,resetHour).done;});return m;},[sprints,resetHour]);

  },[tabList,sprintTab,timeFilter]);

  const streakMap=useMemo(()=>{
    const m={};sprints.forEach(s=>{m[s.id]=calcSprintStreak(allRuns,s.id,resetHour);});return m;
  },[allRuns,sprints,resetHour]);
  const doneCount=doneSprints.length;

  const SprintCard=({sp})=>{
    const done=doneMap[sp.id];
    return(<div onClick={()=>setPreviewTarget(sp)} style={{background:done?'#0a0f0a':CARD,borderRadius:12,border:`1px solid ${done?GREEN+'44':BORDER}`,padding:'13px 14px',marginBottom:8,cursor:'pointer'}}>
      <div style={{display:'flex',alignItems:'baseline',gap:8,marginBottom:6}}>
        {sp.scheduled_time&&<div style={{fontSize:20,fontWeight:900,color:done?'#30D158aa':sprintTimeColor(sp.scheduled_time),letterSpacing:-0.5,lineHeight:1}}>{fmtTime12(sp.scheduled_time)}</div>}
        {sp.scheduled_time&&totalSecs(sp.tasks)>0&&<div style={{fontSize:12,color:MUTED,fontWeight:600}}>({fmtSecs(totalSecs(sp.tasks))} total)</div>}
        {!sp.scheduled_time&&totalSecs(sp.tasks)>0&&<div style={{fontSize:13,color:MUTED,fontWeight:600}}>{fmtSecs(totalSecs(sp.tasks))} total</div>}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <span style={{fontSize:20,flexShrink:0}}>{sp.emoji||'⚡'}</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,fontSize:TASK_FS,color:done?'#30D158aa':TEXT,textDecoration:done?'line-through':'none',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{sp.name}</div>
          <div style={{fontSize:11,color:MUTED,marginTop:2,display:'flex',gap:5,flexWrap:'wrap',alignItems:'center'}}>
            <span>{(sp.tasks||[]).length} tasks</span>
            {totalSecs(sp.tasks)>0&&<><span style={{color:BORDER}}>·</span><span style={{color:ORANGE}}>{fmtSecs(totalSecs(sp.tasks))}</span></>}
            {sp.frequency_days&&<><span style={{color:BORDER}}>·</span><span style={{color:LIME,fontSize:10,fontWeight:700}}>{sp.frequency_days.split(',').map(d=>DAY_LABEL[d]||d).join(' ')}</span></>}
            {(streakMap[sp.id]??0)>0&&<><span style={{color:BORDER}}>·</span><span style={{color:sp.streak_color||LIME,fontWeight:700}}>{streakMap[sp.id]}d streak</span></>}
          </div>
        </div>
        <div style={{display:'flex',gap:6,flexShrink:0,alignItems:'center'}}>
          <button onClick={e=>{e.stopPropagation();setRunTarget(sp);setView('run');}} style={{padding:'7px 14px',borderRadius:7,border:'none',background:RED,color:'#fff',fontWeight:900,fontSize:12,cursor:'pointer',fontFamily:'inherit'}}>▶ Run</button>
          <button onClick={e=>{e.stopPropagation();saveDailyState(sp.id,{done:!done});}} style={{padding:'7px 14px',borderRadius:7,border:'none',background:done?GREEN:'#1a3a1a',color:done?'#000':GREEN,fontWeight:900,fontSize:12,cursor:'pointer',fontFamily:'inherit',border:`1px solid ${GREEN}55`}}>{done?'✓ Done':'Done!'}</button>

        </div>
      </div>
    </div>);
  };

  if(view==='edit')return(<SprintEditor sprint={editTarget} onSave={saveSprint} onCancel={()=>{setEditTarget(null);setView('list');}} onDelete={deleteSprint}/>);
  if(view==='run'&&runTarget)return(<SprintRunner sprint={runTarget} onClose={()=>{setRunTarget(null);setView('list');loadSprints();}} onLogRun={logRun} onComplete={id=>saveDailyState(id,{done:true})}/>);

  return(<div style={{height:'100%',display:'flex',flexDirection:'column',background:'#000',overflow:'hidden'}}>
    {/* Fixed header */}
    <div className="section-header">
      <div style={{flex:1}}><span style={{fontWeight:900,fontSize:17,letterSpacing:-1}}><span style={{color:LIME}}>⚡</span> SPRINT</span></div>
      <DotMenu items={[{label:'↻ Refresh',action:loadSprints},{label:'📊 Run History',action:()=>setShowHistory(true)},{label:'⚙️ Settings',action:()=>setShowSettings(true)}]}/>
      <button onClick={()=>{setEditTarget(null);setView('edit');}} style={{background:LIME,border:'none',borderRadius:8,padding:'5px 13px',cursor:'pointer',color:'#000',fontSize:20,fontWeight:800,fontFamily:'inherit',lineHeight:1.2}}>+</button>
    </div>
    {/* Chrome tabs */}
    <div className="chrome-tabs">
      {[['today',`Today (${todaySprints.length})`,LIME],['done',`Done (${doneCount})`,GREEN],['notyet',`Not Yet (${notYetSprints.length})`,MUTED]].map(([k,l,col])=>(
        <button key={k} className={`chrome-tab ${sprintTab===k?'active':'inactive'}`} onClick={()=>setSprintTab(k)} style={{color:sprintTab===k?col:'#666'}}>
          {l}
          {sprintTab===k&&<span style={{position:'absolute',bottom:0,left:0,right:0,height:2,borderRadius:'2px 2px 0 0',background:col}}/>}
        </button>
      ))}
    </div>
    {/* Time-of-day filter (today tab only) */}
    {sprintTab==='today'&&(<div className="pill-tabs">
      {[['all','All'],['MORNING','🌅 Morning'],['AFTERNOON','☀️ Afternoon'],['NIGHT','🌙 Night'],['NO TIME','📋 No Time']].map(([k,l])=>(
        <button key={k} className={`pill-tab ${timeFilter===k?'active':'inactive'}`} onClick={()=>setTimeFilter(k)} style={{borderColor:timeFilter===k?LIME:BORDER,background:timeFilter===k?LIME:'#141414',color:timeFilter===k?'#000':MUTED}}>{l}</button>
      ))}
    </div>)}
    <div style={{flex:1,overflowY:'auto',padding:'10px 16px',paddingBottom:NAV_H+12}}>
      {loadingList&&<div style={{display:'flex',justifyContent:'center',paddingTop:60}}><Spinner size={24}/></div>}
      {!loadingList&&tabList.length===0&&(<div style={{textAlign:'center',padding:'70px 0',color:MUTED}}>
        <div style={{fontSize:40,marginBottom:12}}>{sprintTab==='today'?'⚡':sprintTab==='done'?'✓':'📅'}</div>
        <div style={{fontSize:14,fontWeight:700,color:TEXT,marginBottom:6}}>{sprintTab==='today'?'Nothing for today':sprintTab==='done'?'Nothing done yet':'No upcoming sprints'}</div>
        {sprintTab==='notyet'&&<div style={{fontSize:12,color:MUTED}}>Sprints with specific day schedules that aren't today will appear here.</div>}
      </div>)}
      {!loadingList&&sprintTab==='today'&&sections&&sections.map((sec,si)=>(<div key={sec.label} style={{marginBottom:si<sections.length-1?16:0}}>
        <div style={{fontSize:10,color:MUTED,letterSpacing:3,fontWeight:800,marginBottom:8,display:'flex',alignItems:'center',gap:6}}><span>{SECTION_EMOJI[sec.label]}</span><span>{sec.label}</span></div>
        {sec.items.map(sp=><SprintCard key={sp.id} sp={sp}/>)}
      </div>))}
      {!loadingList&&sprintTab!=='today'&&tabList.map(sp=><SprintCard key={sp.id} sp={sp}/>)}
    </div>

    {previewTarget&&(<SprintDetail sprint={previewTarget} settings={settings} isDone={!!resolveDS(previewTarget.daily_state,resetHour).done} onClose={()=>setPreviewTarget(null)} onRun={sp=>{setPreviewTarget(null);setRunTarget(sp);setView('run');}} onEdit={sp=>{setPreviewTarget(null);setEditTarget(sp);setView('edit');}} onDuplicate={sp=>{setPreviewTarget(null);handleDuplicate(sp);}} onSaveSkipped={(id,ids)=>saveDailyState(id,{skipped:ids})} onToggleDone={done=>saveDailyState(previewTarget.id,{done})}/>)}
    {showHistory&&<HistoryPanel user={user} onClose={()=>setShowHistory(false)}/>}
    {showSettings&&<SettingsPanel settings={settings} onSave={s=>{setSettings(s);saveSettings(user.id,s);setShowSettings(false);}} onClose={()=>setShowSettings(false)}/>}
  </div>);
}

// HABITS SECTION
// ═══════════════════════════════════════════════════════════════════
// Get last N occurrences of a weekday (0=Sun...6=Sat) as date strings
const getLastNOccurrences=(weekdayIdx,n)=>{
  const dates=[];const d=new Date();d.setHours(0,0,0,0);
  const dow=d.getDay();let offset=(dow-weekdayIdx+7)%7;if(offset===0&&dates.length===0)offset=0;
  // start from most recent occurrence (could be today)
  let cur=new Date(d);cur.setDate(d.getDate()-offset);
  for(let i=0;i<n;i++){dates.push(cur.toISOString().split('T')[0]);cur=new Date(cur);cur.setDate(cur.getDate()-7);}
  return dates.reverse();// oldest first
};
const DAY_IDX={SUN:0,MON:1,TUE:2,WED:3,THU:4,FRI:5,SAT:6};
const RESET_HOUR_LS='dayman_reset_hour';
const HABIT_FREQ_LS='dm_hfreq';
const getResetHour=()=>{try{return JSON.parse(localStorage.getItem(RESET_HOUR_LS)||'4');}catch{return 4;}};const HABIT_HIDE_LS='dm_hhide';
const DAY_FULL_MAP={MON:'Monday',TUE:'Tuesday',WED:'Wednesday',THU:'Thursday',FRI:'Friday',SAT:'Saturday',SUN:'Sunday'};
const HABIT_COLORS=['#38bdf8','#4ade80','#fb923c','#f472b6','#a78bfa','#facc15','#34d399','#f87171','#22d3ee','#e879f9'];

function getLast7Dates(){
  const days=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(d.toISOString().split('T')[0]);}return days;
}
function dayLabel(dateStr){
  const d=new Date(dateStr+'T00:00:00');return['SUN','MON','TUE','WED','THU','FRI','SAT'][d.getDay()];
}
function dayNum(dateStr){return new Date(dateStr+'T00:00:00').getDate();}

function HabitDetailScreen({habit,user,sprints=[],buckets=[],onClose,onSave,onDelete}){
  const [logs,setLogs]=useState({});
  const [loadingLogs,setLoadingLogs]=useState(true);
  const [name,setName]=useState(habit.name||'');
  const [time,setTime]=useState(habit.scheduled_time||'');
  const [color,setColor]=useState(habit.color||HABIT_COLORS[0]);
  const [emoji_,setEmoji_]=useState(habit.emoji||'');
  const [saving,setSaving]=useState(false);
  const [sprintId,setSprintId]=useState(habit.sprint_id||'');
  const [bucketId,setBucketId]=useState(habit.bucket_id||'');
  const [calMonth,setCalMonth]=useState(()=>new Date().toISOString().slice(0,7));

  const isWeekly=habit.habit_frequency==='weekly';
  const weekDayIdx=DAY_IDX[habit.weekly_day]??1;

  // Calendar shows 1 month at a time; streaks go back 10000
  const today=useMemo(()=>new Date().toISOString().split('T')[0],[]);
  const weeklyDates=useMemo(()=>getLastNOccurrences(weekDayIdx,1500),[weekDayIdx]);

  useEffect(()=>{
    // Load all logs (no date limit) for accurate streaks
    db.from('habit_logs').select('*').eq('habit_id',habit.id).lte('log_date',today)
      .then(({data})=>{const m={};(data||[]).forEach(r=>{m[r.log_date]=r.value;});setLogs(m);setLoadingLogs(false);});
  },[habit.id]);

  const streak=useMemo(()=>{
    if(isWeekly){
      // count consecutive weeks
      let s=0;
      for(let i=weeklyDates.length-1;i>=0;i--){
        const ds=weeklyDates[i];const val=logs[ds]??null;
        const tracked=habit.type==='bool'?(val===1||val===-1):(val!==null&&val>0);
        if(tracked)s++;else if(i===weeklyDates.length-1)continue;else break;
      }
      return s;
    }
    let s=0;
    for(let i=0;i<10000;i++){
      const dt=new Date();dt.setDate(dt.getDate()-i);const ds=dt.toISOString().split('T')[0];
      const val=logs[ds]??null;
      const tracked=habit.type==='bool'?(val===1||val===-1):(val!==null&&val>0);
      if(tracked)s++;else if(i===0)continue;else break;
    }
    return s;
  },[logs,isWeekly,weeklyDates]);

  const toggleDay=async(date)=>{
    if(date>today)return;
    const cur=logs[date]??null;
    let next=null;
    if(habit.type==='bool'){if(cur===null)next=1;else if(cur===1)next=-1;else next=null;}
    else{next=(cur||0)+1;if(next>9)next=null;}
    setLogs(l=>{const nl={...l};if(next===null)delete nl[date];else nl[date]=next;return nl;});
    if(next===null){await db.from('habit_logs').delete().eq('habit_id',habit.id).eq('log_date',date);}
    else{await db.from('habit_logs').upsert({user_id:user.id,habit_id:habit.id,log_date:date,value:next},{onConflict:'habit_id,log_date'});}
  };

  // Calendar: build dates for the currently viewed month
  const calDates=useMemo(()=>{
    const [yr,mo]=calMonth.split('-').map(Number);
    const dates=[];
    const daysInMonth=new Date(yr,mo,0).getDate();
    for(let d=1;d<=daysInMonth;d++){
      const ds=`${yr}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      if(isWeekly){
        // only include dates matching the habit's weekday
        const dow=new Date(ds+'T00:00:00').getDay();
        if(dow===weekDayIdx)dates.push(ds);
      }else{
        dates.push(ds);
      }
    }
    return dates;
  },[calMonth,isWeekly,weekDayIdx]);

  const canGoBack=()=>{const [yr,mo]=calMonth.split('-').map(Number);return !(yr<2015);};
  const canGoForward=()=>{const now=new Date();const [yr,mo]=calMonth.split('-').map(Number);return yr<now.getFullYear()||(yr===now.getFullYear()&&mo<=now.getMonth()+1);};
  const moveMonth=delta=>{const [yr,mo]=calMonth.split('-').map(Number);const d=new Date(yr,mo-1+delta,1);setCalMonth(d.toISOString().slice(0,7));};

  const cellBg=(date)=>{const val=logs[date]??null;const col=habit.color||BLUE;if(habit.type==='bool'){if(val===1)return col;if(val===-1)return'#333';}else{if(val>0)return col;}return'#1a1a1a';};
  const cellIcon=(date)=>{const val=logs[date]??null;if(habit.type==='bool'){if(val===1)return'✓';if(val===-1)return'—';}else{if(val>0)return val;}return null;};

  const save=async()=>{if(!name.trim())return;setSaving(true);await onSave(habit.id,{name:name.trim(),scheduled_time:time||null,color,emoji:emoji_||null,sprint_id:sprintId||null,bucket_id:bucketId||null});setSaving(false);};

  return(<div style={{position:'fixed',inset:0,background:'#000',zIndex:500,display:'flex',flexDirection:'column',overflow:'hidden'}}>
    <div className="section-header">
      <button onClick={onClose} style={{background:'none',border:'none',color:MUTED,fontSize:26,cursor:'pointer',lineHeight:1,marginLeft:-4}}>‹</button>
      <div style={{flex:1,fontWeight:900,fontSize:16,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:habit.color||BLUE}}>{habit.emoji?habit.emoji+' ':''}{habit.name}</div>
      <button onClick={()=>{if(window.confirm('Delete habit and all history?'))onDelete(habit.id);}} style={{background:'none',border:'none',color:'#ef444488',cursor:'pointer',fontSize:13,fontFamily:'inherit',padding:'4px 8px'}}>Delete</button>
    </div>

    <div style={{flex:1,overflowY:'auto',padding:'0 16px 40px'}}>
      <div style={{textAlign:'center',padding:'24px 0 16px'}}>
        <div style={{fontSize:88,fontWeight:900,color:habit.color||BLUE,lineHeight:1,fontVariantNumeric:'tabular-nums'}}>{streak}</div>
        <div style={{fontSize:13,color:MUTED,letterSpacing:2,fontWeight:700,marginTop:4,textTransform:'uppercase'}}>{isWeekly?'Week Streak':'Day Streak'}</div>

        {habit.scheduled_time&&<div style={{fontSize:12,color:ORANGE,marginTop:5}}>⏰ {fmtTime12(habit.scheduled_time)}</div>}
        <div style={{fontSize:11,color:'#444',marginTop:5}}>Tap any day to toggle · ✓ done · — skipped · blank missed</div>
      </div>

      {streak>0&&<div style={{fontSize:11,color:'#555',textAlign:'center',marginBottom:8}}>Day 1: {(()=>{const d=new Date();d.setDate(d.getDate()-(streak-1));return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});})()}</div>}
      {loadingLogs&&<div style={{display:'flex',justifyContent:'center',padding:'30px'}}><Spinner size={20} color={habit.color||BLUE}/></div>}

      {!loadingLogs&&(()=>{
        const moDate=new Date(calMonth+'-01T00:00:00');
        const monthLabel=moDate.toLocaleDateString('en-US',{month:'long',year:'numeric'});
        return(<div style={{marginBottom:20}}>
          {/* Month navigation */}
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
            <button onClick={()=>moveMonth(-1)} disabled={!canGoBack()} style={{background:'none',border:`1px solid ${BORDER}`,borderRadius:7,width:32,height:32,color:canGoBack()?TEXT:BORDER,cursor:canGoBack()?'pointer':'default',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontFamily:'inherit'}}>‹</button>
            <div style={{flex:1,textAlign:'center',fontSize:13,fontWeight:700,color:MUTED,letterSpacing:1,textTransform:'uppercase'}}>{monthLabel}</div>
            <button onClick={()=>moveMonth(1)} disabled={!canGoForward()} style={{background:'none',border:`1px solid ${BORDER}`,borderRadius:7,width:32,height:32,color:canGoForward()?TEXT:BORDER,cursor:canGoForward()?'pointer':'default',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontFamily:'inherit'}}>›</button>
          </div>
          {isWeekly?(
            <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
              {calDates.map(date=>{
                const isFuture=date>today;const bg=cellBg(date);const icon=cellIcon(date);
                const dayLabel_=new Date(date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
                return(<button key={date} onClick={()=>toggleDay(date)} disabled={isFuture}
                  style={{width:52,height:56,borderRadius:8,background:bg,border:'1px solid #1f1f1f',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2,cursor:isFuture?'default':'pointer',opacity:isFuture?0.12:1,fontFamily:'inherit',padding:0}}>
                  <span style={{fontSize:9,color:bg==='#1a1a1a'?'#888':'#000',fontWeight:500}}>{dayLabel_}</span>
                  {icon?<span style={{fontSize:11,fontWeight:700,color:bg==='#1a1a1a'||bg==='#333'?'#777':'#000'}}>{icon}</span>
                    :<span style={{fontSize:9,color:'#444'}}>—</span>}
                </button>);
              })}
              {calDates.length===0&&<div style={{color:MUTED,fontSize:12,padding:'16px 0'}}>No {DAY_FULL_MAP[habit.weekly_day]||'weekday'} occurrences this month</div>}
            </div>
          ):(()=>{
            const firstDow=calDates.length?new Date(calDates[0]+'T00:00:00').getDay():0;
            const padNeeded=firstDow===0?6:firstDow-1;
            const padded=Array(padNeeded).fill(null).concat(calDates);
            const weeks=[];for(let i=0;i<padded.length;i+=7)weeks.push(padded.slice(i,i+7));
            return(<>
              <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:3}}>
                {['M','T','W','T','F','S','S'].map((d,i)=>(<div key={i} style={{textAlign:'center',fontSize:9,color:'#888',fontWeight:700,paddingBottom:2}}>{d}</div>))}
              </div>
              {weeks.map((week,wi)=>(<div key={wi} style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:2}}>
                {week.map((date,di)=>{
                  if(!date)return<div key={di}/>;
                  const isToday_=date===today;const isFuture=date>today;
                  const bg=cellBg(date);const icon=cellIcon(date);
                  return(<button key={di} onClick={()=>toggleDay(date)} disabled={isFuture}
                    style={{aspectRatio:'1',borderRadius:5,background:bg,border:isToday_?`2px solid ${habit.color||BLUE}`:'1px solid #1f1f1f',display:'flex',alignItems:'center',justifyContent:'center',cursor:isFuture?'default':'pointer',opacity:isFuture?0.12:1,fontFamily:'inherit',padding:0}}>
                    {icon?<span style={{fontSize:10,fontWeight:700,color:bg==='#1a1a1a'||bg==='#333'?'#777':'#000'}}>{icon}</span>
                      :<span style={{fontSize:9,color:'#888'}}>{new Date(date+'T00:00:00').getDate()}</span>}
                  </button>);
                })}
              </div>))}
            </>);
          })()}
        </div>);
      })()}

      <div style={{display:'flex',gap:12,marginBottom:24,flexWrap:'wrap'}}>
        {[[habit.color||BLUE,'✓ Done'],['#333','— Skipped'],['#1a1a1a','Missed']].map(([col,lbl])=>(<div key={lbl} style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:10,height:10,borderRadius:2,background:col}}/><span style={{fontSize:10,color:MUTED}}>{lbl}</span></div>))}
      </div>

      <div style={{borderTop:`1px solid ${BORDER}`,paddingTop:20}}>
        <div style={{fontSize:10,color:MUTED,letterSpacing:2,fontWeight:700,marginBottom:14}}>EDIT HABIT</div>
        <div style={{display:'flex',gap:8,marginBottom:14}}><input value={emoji_} onChange={e=>setEmoji_(e.target.value)} style={{...inp(),width:52,textAlign:'center',fontSize:22,padding:'8px 4px',flexShrink:0}} placeholder='😀'/><input value={name} onChange={e=>setName(e.target.value)} style={{...inp(),flex:1}}/></div>
        <FormInput label="Time (optional)">
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <input type="time" value={time} onChange={e=>setTime(e.target.value)} style={{...inp(),flex:1,color:time?ORANGE:MUTED}}/>
            {time&&<button onClick={()=>setTime('')} style={{background:'none',border:`1px solid ${BORDER}`,borderRadius:8,padding:'10px 12px',color:MUTED,cursor:'pointer',fontSize:12,fontFamily:'inherit',flexShrink:0}}>Clear</button>}
          </div>
          {time&&<div style={{fontSize:11,color:ORANGE,marginTop:5,fontWeight:700}}>⏰ {fmtTime12(time)}</div>}
        </FormInput>
        <FormInput label="Color">
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {HABIT_COLORS.map(col=>(<button key={col} onClick={()=>setColor(col)} style={{width:30,height:30,borderRadius:'50%',background:col,border:'none',cursor:'pointer',outline:color===col?'2px solid #fff':'none',outlineOffset:2}}/>))}
          </div>
        </FormInput>
        {buckets.length>0&&(<FormInput label="Bucket (optional)">
          <select value={bucketId} onChange={e=>setBucketId(e.target.value)} style={{...inp(),cursor:'pointer'}}>
            <option value="">No bucket</option>
            {buckets.map(b=>(<option key={b.id} value={b.id}>{b.emoji} {b.name}</option>))}
          </select>
        </FormInput>)}
        {sprints.length>0&&(<FormInput label="Link to Sprint (optional)">
          <select value={sprintId} onChange={e=>setSprintId(e.target.value)} style={{...inp(),cursor:'pointer'}}>
            <option value="">No sprint linked</option>
            {sprints.map(s=>(<option key={s.id} value={s.id}>{s.emoji||'⚡'} {s.name}</option>))}
          </select>
        </FormInput>)}
        <button onClick={save} disabled={saving} style={{width:'100%',padding:'14px',borderRadius:12,border:'none',background:saving?'#2a2a2a':habit.color||GREEN,color:'#000',fontWeight:900,fontSize:15,fontFamily:'inherit',cursor:saving?'default':'pointer',marginTop:4}}>{saving?'Saving…':'Save Changes'}</button>
      </div>
    </div>
  </div>);
}

        {time&&<button onClick={()=>setTime('')} style={{background:'none',border:`1px solid ${BORDER}`,borderRadius:8,padding:'10px 12px',color:MUTED,cursor:'pointer',fontSize:12,fontFamily:'inherit',flexShrink:0}}>Clear</button>}
      </div>

      </div>
    </FormInput>
    <BtnRow>
      <button onClick={()=>onDelete(habit.id)} style={{background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.2)',borderRadius:12,color:'#ef4444',fontSize:14,padding:'12px 16px',cursor:'pointer',fontFamily:'inherit'}}>Delete</button>

  const addBucket=async()=>{if(!newName.trim())return;setSaving(true);await db.from('habit_buckets').insert({user_id:user.id,name:newName.trim(),color:newColor,emoji:newEmoji,sort_order:buckets.length});setNewName('');setSaving(false);onReload();};
  const deleteBucket=async id=>{if(!window.confirm('Delete bucket? Habits inside will become unbucketed.'))return;await db.from('habits').update({bucket_id:null}).eq('bucket_id',id);await db.from('habit_buckets').delete().eq('id',id);onReload();};
  return(<div style={{position:'fixed',inset:0,background:'#000',zIndex:600,display:'flex',flexDirection:'column'}}>
    <div className="section-header">
      <button onClick={onClose} style={{background:'none',border:'none',color:MUTED,fontSize:26,cursor:'pointer',lineHeight:1,marginLeft:-4}}>‹</button>

      <button onClick={()=>db.from('habit_buckets').select('*').eq('user_id',user.id).then(({data})=>{if(data)onReload();})} style={{background:'none',border:'none',color:MUTED,cursor:'pointer',fontSize:13}}>↻</button>

        <span style={{fontSize:20}}>{b.emoji}</span>

      <div style={{marginTop:20,background:'#111',borderRadius:12,border:`1px solid ${BORDER}`,padding:'16px'}}>
        <div style={{fontSize:11,color:MUTED,fontWeight:700,letterSpacing:2,textTransform:'uppercase',marginBottom:12}}>New Bucket</div>
        <div style={{display:'flex',gap:8,marginBottom:10}}>
          <input value={newEmoji} onChange={e=>setNewEmoji(e.target.value)} style={{...inp(),width:52,textAlign:'center',fontSize:20,padding:'8px 4px'}}/>
          <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Bucket name…" style={{...inp(),flex:1}} onKeyDown={e=>e.key==='Enter'&&addBucket()} autoFocus/>

        <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>

function HabitsSection({user,resetHour=4}){
  const [habits,setHabits]=useState([]);
  const [buckets,setBuckets]=useState([]);
  const [logs,setLogs]=useState({});
  const [loading,setLoading]=useState(true);
  const [showAdd,setShowAdd]=useState(false);
  const [editHabit,setEditHabit]=useState(null);
  const [detailHabit,setDetailHabit]=useState(null);
  const [showBucketMgr,setShowBucketMgr]=useState(false);
  const [habitTypeFilter,setHabitTypeFilter]=useState('all');
  const [habTab,setHabTabRaw]=useState(()=>{try{return localStorage.getItem(HABIT_FREQ_LS)||'today';}catch{return'today';}});
  const [hideCompleted,setHideCompletedRaw]=useState(()=>{try{return localStorage.getItem(HABIT_HIDE_LS)==='1';}catch{return false;}});
  const setHabTab=v=>{setHabTabRaw(v);try{localStorage.setItem(HABIT_FREQ_LS,v);}catch{}};
  const setHideCompleted=v=>{const next=typeof v==='function'?v(hideCompleted):v;setHideCompletedRaw(next);try{localStorage.setItem(HABIT_HIDE_LS,next?'1':'0');}catch{}};
  const [newName,setNewName]=useState('');
  const [newType,setNewType]=useState('bool');
  const [newColor,setNewColor]=useState(HABIT_COLORS[0]);
  const [newTime,setNewTime]=useState('');
  const [newHabitFreq,setNewHabitFreq]=useState('daily');
  const [newEmoji,setNewEmoji]=useState('');
  const [newWeekDay,setNewWeekDay]=useState(()=>getTodayAbbr());
  const [newSprintId,setNewSprintId]=useState('');
  const [newBucketId,setNewBucketId]=useState('');
  const [saving,setSaving]=useState(false);
  const [sprints,setSprints]=useState([]);
  const dates=useMemo(()=>getLast7Dates(),[]);
  // Use resetHour-aware today: if current hour < resetHour, "today" is yesterday
  const today=useMemo(()=>{const now=new Date();if(now.getHours()<resetHour){const y=new Date(now);y.setDate(y.getDate()-1);return y.toISOString().split('T')[0];}return now.toISOString().split('T')[0];},[resetHour]);


  const load=useCallback(async()=>{
    const[{data:h},{data:l},{data:sp},{data:bk}]=await Promise.all([
      db.from('habits').select('*').eq('user_id',user.id).order('sort_order',{ascending:true}).order('created_at',{ascending:true}),
      db.from('habit_logs').select('*').eq('user_id',user.id).lte('log_date',today),
      db.from('sprints_v2').select('id,name,emoji').eq('user_id',user.id).order('created_at'),
      db.from('habit_buckets').select('*').eq('user_id',user.id).order('sort_order',{ascending:true})
    ]);
    // Sort by scheduled_time (nulls last)
    const sorted=(h||[]).slice().sort((a,b)=>{
      if(a.scheduled_time&&b.scheduled_time)return a.scheduled_time.localeCompare(b.scheduled_time);
      if(a.scheduled_time)return -1;if(b.scheduled_time)return 1;return 0;
    });
    setHabits(sorted);setSprints(sp||[]);setBuckets(bk||[]);
    const map={};(l||[]).forEach(r=>{map[`${r.habit_id}_${r.log_date}`]=r.value;});
    setLogs(map);setLoading(false);
  },[user.id,today]);

  useEffect(()=>{load();},[load]);

  const toggleCell=async(e,habit,date)=>{
    e.stopPropagation();
    const key=`${habit.id}_${date}`;const cur=logs[key]??null;
    let next=null;
    if(habit.type==='bool'){if(cur===null)next=1;else if(cur===1)next=-1;else next=null;}
    else{next=(cur||0)+1;if(next>9)next=null;}
    setLogs(l=>{const nl={...l};if(next===null)delete nl[key];else nl[key]=next;return nl;});
    if(next===null)await db.from('habit_logs').delete().eq('habit_id',habit.id).eq('log_date',date);
    else await db.from('habit_logs').upsert({user_id:user.id,habit_id:habit.id,log_date:date,value:next},{onConflict:'habit_id,log_date'});
  };

  // Streak for daily habits: consecutive days
  const getDailyStreak=useCallback(habit=>{
    if(habit.streak_start){
      const start=new Date(habit.streak_start+'T00:00:00');
      return Math.max(0,Math.round((new Date(today+'T00:00:00')-start)/86400000)+1);
    }
    let streak=0;
    for(let i=0;i<10000;i++){
      const d=new Date();d.setDate(d.getDate()-i);const ds=d.toISOString().split('T')[0];
      const val=logs[`${habit.id}_${ds}`]??null;
      const tracked=habit.type==='bool'?(val===1||val===-1):(val!==null&&val>0);
      if(tracked)streak++;else if(i===0)continue;else break;
    }
    return streak;
  },[logs,today]);

  // Streak for weekly habits: consecutive weeks the specific day was done
  const getWeeklyStreak=useCallback(habit=>{
    const dayIdx=DAY_IDX[habit.weekly_day]??1;
    const occurrences=getLastNOccurrences(dayIdx,1500);// last 1500 weeks
    let streak=0;
    for(let i=occurrences.length-1;i>=0;i--){
      const ds=occurrences[i];
      const val=logs[`${habit.id}_${ds}`]??null;
      const tracked=habit.type==='bool'?(val===1||val===-1):(val!==null&&val>0);
      if(tracked)streak++;else if(i===occurrences.length-1)continue;// skip today if not yet done
      else break;
    }
    return streak;
  },[logs]);

  const getStreak=useCallback(habit=>{
    if(habit.habit_frequency==='weekly')return getWeeklyStreak(habit);
    return getDailyStreak(habit);
  },[getDailyStreak,getWeeklyStreak]);

  const isDoneToday=useCallback(habit=>{
    const val=logs[`${habit.id}_${today}`]??null;
    return habit.type==='bool'?(val===1||val===-1):(val!==null&&val>0);
  },[logs,today]);

  const moveHabit=async(habit,dir,list)=>{
    const idx=list.findIndex(h=>h.id===habit.id);const newIdx=idx+dir;
    if(newIdx<0||newIdx>=list.length)return;
    const arr=[...list];[arr[idx],arr[newIdx]]=[arr[newIdx],arr[idx]];
    setHabits(prev=>prev.map(h=>{const f=arr.find(a=>a.id===h.id);return f?{...h,sort_order:arr.indexOf(f)}:h;}));
    await Promise.all(arr.map((h,i)=>db.from('habits').update({sort_order:i}).eq('id',h.id)));
  };

  const addHabit=async()=>{
    if(!newName.trim())return;setSaving(true);
    await db.from('habits').insert({user_id:user.id,name:newName.trim(),color:newColor,type:newType,scheduled_time:newTime||null,sort_order:habits.length,streak_seed:0,habit_frequency:newHabitFreq,weekly_day:newHabitFreq==='weekly'?newWeekDay:null,sprint_id:newSprintId||null,bucket_id:newBucketId||null,emoji:newEmoji||null});
    setNewName('');setNewType('bool');setNewColor(HABIT_COLORS[0]);setNewTime('');setNewHabitFreq('daily');setNewSprintId('');setNewBucketId('');setNewEmoji('');setSaving(false);setShowAdd(false);load();
  };
  const deleteHabit=async id=>{if(!window.confirm('Delete habit and all its history?'))return;await db.from('habits').delete().eq('id',id);load();setEditHabit(null);};
  const updateHabit=async(id,patch)=>{await db.from('habits').update(patch).eq('id',id);load();setEditHabit(null);};

  // Render a cell for daily habits (7-day grid)
  const renderDailyCell=(habit,date)=>{
    const val=logs[`${habit.id}_${date}`]??null;const isToday_=date===today;const col=habit.color||BLUE;
    if(habit.type==='bool'){
      let icon='·',color='#2a2a2a',bg='transparent';
      if(val===1){icon='✓';color=col;bg=col+'20';}else if(val===-1){icon='—';color='#555';}
      return(<button key={date} onClick={e=>toggleCell(e,habit,date)} style={{width:34,height:40,background:bg,border:isToday_?`1px solid #333`:'none',borderRadius:7,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color,fontSize:val===1?15:13,fontWeight:700,flexShrink:0,transition:'all .1s'}}>{icon}</button>);
    }
    const numVal=val>0?val:null;
    return(<button key={date} onClick={e=>toggleCell(e,habit,date)} style={{width:34,height:40,background:'transparent',border:isToday_?`1px solid #333`:'none',borderRadius:7,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
      <span style={{color:numVal?col:'#2a2a2a',fontWeight:700,fontSize:13}}>{numVal||'·'}</span>
    </button>);
  };

  // Render a cell for weekly habits (last 7 Tuesdays, etc.)
  const renderWeeklyCell=(habit,date)=>{
    const val=logs[`${habit.id}_${date}`]??null;const col=habit.color||BLUE;
    const isThisWeek=date===today||(()=>{const d=new Date(date+'T00:00:00');const t=new Date(today+'T00:00:00');return Math.abs(t-d)<7*86400000;})();
    if(habit.type==='bool'){
      let icon='·',color='#2a2a2a',bg='transparent';
      if(val===1){icon='✓';color=col;bg=col+'20';}else if(val===-1){icon='—';color='#555';}
      return(<button key={date} onClick={e=>toggleCell(e,habit,date)} style={{width:34,height:40,background:bg,border:isThisWeek?`1px solid #333`:'none',borderRadius:7,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color,fontSize:val===1?15:13,fontWeight:700,flexShrink:0}}>{icon}</button>);
    }
    const numVal=val>0?val:null;
    return(<button key={date} onClick={e=>toggleCell(e,habit,date)} style={{width:34,height:40,background:'transparent',border:isThisWeek?`1px solid #333`:'none',borderRadius:7,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
      <span style={{color:numVal?col:'#2a2a2a',fontWeight:700,fontSize:13}}>{numVal||'·'}</span>
    </button>);
  };

  const todayAbbr=getTodayAbbr();
  const dailyHabits=habits.filter(h=>!h.habit_frequency||h.habit_frequency==='daily');
  const weeklyHabits=habits.filter(h=>h.habit_frequency==='weekly');
  const todayWeekly=weeklyHabits.filter(h=>h.weekly_day===todayAbbr);
  const upcomingWeeklyDays=DAY_ABBR.filter(d=>{if(d===todayAbbr)return false;return weeklyHabits.some(h=>h.weekly_day===d);});
  const completedDaily=dailyHabits.filter(h=>isDoneToday(h)).length;
  const completedToday=completedDaily+todayWeekly.filter(h=>isDoneToday(h)).length;
  const totalToday=dailyHabits.length+todayWeekly.length;

  const applyFilters=list=>(hideCompleted?list.filter(h=>!isDoneToday(h)):list).filter(h=>habitTypeFilter==='all'||h.type===habitTypeFilter);

  // Habit row component (defined outside render to avoid recreation)
  const HabitRow=({habit,idx,list,cells,dateLabel})=>{
    const streak=getStreak(habit);const done=isDoneToday(habit);const col=habit.color||BLUE;
    const linkedSprint=habit.sprint_id?sprints.find(s=>s.id===habit.sprint_id):null;
    return(<div style={{display:'flex',alignItems:'center',gap:2,padding:'0 16px',borderBottom:`1px solid #0d0d0d`,minHeight:48}}>

      {/* Name */}
      <div onClick={()=>setDetailHabit(habit)} style={{flex:1,minWidth:0,cursor:'pointer',paddingTop:5,paddingBottom:5}}>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <div style={{width:7,height:7,borderRadius:'50%',background:col,flexShrink:0}}/>
          <div style={{overflow:'hidden',flex:1}}>
            <div style={{fontSize:TASK_FS,fontWeight:600,color:done?'#444':col,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',textDecoration:done?'line-through':'none'}}>{habit.name}</div>
            <div style={{display:'flex',alignItems:'center',gap:5,marginTop:1,flexWrap:'wrap'}}>
              {habit.scheduled_time&&<span style={{fontSize:10,color:ORANGE,fontWeight:600}}>{fmtTime12(habit.scheduled_time)}</span>}
              {linkedSprint&&<span style={{fontSize:9,color:LIME}}>⚡{linkedSprint.name}</span>}
            </div>
          </div>
        </div>
      </div>
      {/* Streak — left of first cell, same color */}
      <div style={{width:54,flexShrink:0,textAlign:'right',paddingRight:4}}>
        {streak>0?(<div style={{fontSize:11,fontWeight:700,color:col,lineHeight:1.2,textAlign:'right'}}>
          <div style={{fontSize:13}}>{streak}</div>
          <div style={{fontSize:8,opacity:0.8}}>{habit.habit_frequency==='weekly'?'weeks':'days'}</div>
        </div>):<div/>}
      </div>
      {/* Cells */}
      {cells}
    </div>);
  };

  // Build 7-day cells for daily
  const dailyCells=(habit)=>dates.map(d=>renderDailyCell(habit,d));
  // Build 7-week cells for weekly
  const weeklyCells=(habit)=>{
    const dayIdx=DAY_IDX[habit.weekly_day]??1;
    const wkDates=getLastNOccurrences(dayIdx,7);
    return wkDates.map(d=>renderWeeklyCell(habit,d));
  };

  // Week date headers for weekly habits
  const WeeklyDateHeader=({habit})=>{
    const dayIdx=DAY_IDX[habit.weekly_day]??1;
    const wkDates=getLastNOccurrences(dayIdx,7);
    return(<div style={{display:'flex',alignItems:'flex-end',gap:2,padding:'0 16px 0',marginBottom:0}}>
      <div style={{flex:1,minWidth:0}}/><div style={{width:54,flexShrink:0}}/>
      {wkDates.map((d,i)=>{
        const isThis=i===6;// most recent = this week
        const wkNum=wkDates.length-i;
        return(<div key={d} style={{width:34,textAlign:'center',flexShrink:0}}>
          <div style={{fontSize:9,color:MUTED,marginBottom:1}}>{isThis?'NOW':`-${wkNum-1}wk`}</div>
          <div style={{fontSize:10,fontWeight:isThis?700:400,color:isThis?TEXT:'#666',background:isThis?'#1a1a1a':'none',borderRadius:5,width:28,height:22,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto'}}>{new Date(d+'T00:00:00').getDate()}</div>
        </div>);
      })}
    </div>);
  };

  return(<div style={{height:'100%',display:'flex',flexDirection:'column',background:'#000',overflow:'hidden'}}>
    {/* Header */}
    <div className="section-header">
      <div style={{flex:1}}><span style={{fontWeight:900,fontSize:17,letterSpacing:-1}}><span style={{color:GREEN}}>✓</span> HABITS</span></div>
      <button onClick={()=>setShowBucketMgr(true)} style={{background:'none',border:`1px solid ${BORDER}`,borderRadius:7,padding:'4px 10px',cursor:'pointer',color:MUTED,fontSize:11,fontFamily:'inherit',marginRight:4}}>Buckets</button>
      <button onClick={()=>setShowAdd(true)} style={{background:GREEN,border:'none',borderRadius:8,padding:'5px 14px',cursor:'pointer',color:'#000',fontSize:20,fontWeight:800,fontFamily:'inherit',lineHeight:1.2}}>+</button>
    </div>

    {/* Chrome tabs: TODAY | UPCOMING */}
    <div className="chrome-tabs">
      {[['today',`Today (${totalToday})`],['upcoming','Upcoming']].map(([k,l])=>(
        <button key={k} className={`chrome-tab ${habTab===k?'active':'inactive'}`} onClick={()=>setHabTab(k)} style={{color:habTab===k?GREEN:'#666'}}>
          {l}{habTab===k&&<span style={{position:'absolute',bottom:0,left:0,right:0,height:2,borderRadius:'2px 2px 0 0',background:GREEN}}/>}
        </button>
      ))}
      <div style={{flex:1}}/>
      {(habTab==='today'?totalToday:0)>0&&(
        <button className="chrome-tab" onClick={()=>setHideCompleted(v=>!v)} style={{color:hideCompleted?GREEN:'#666',fontSize:11}}>
          {hideCompleted?`▶ ${completedToday} done`:`Hide ${completedToday} ✓`}{false&&<span/>}
        </button>
      )}
    </div>
    <div className="pill-tabs">
      {[['all','All'],['bool','✓'],['count','#']].map(([k,l])=>(
        <button key={k} className={`pill-tab ${habitTypeFilter===k?'active':'inactive'}`} onClick={()=>setHabitTypeFilter(k)} style={{borderColor:habitTypeFilter===k?GREEN:BORDER,background:habitTypeFilter===k?GREEN:'#141414',color:habitTypeFilter===k?'#000':MUTED}}>{l}</button>
      ))}
      {buckets.length>0&&buckets.map(bk=>(<button key={bk.id} className="pill-tab inactive" style={{borderColor:BORDER,background:'#141414',color:bk.color||MUTED}}>{bk.emoji} {bk.name}</button>))}
    </div>



    <div style={{flex:1,overflowY:'auto',paddingBottom:NAV_H+12}}>
      {loading&&<div style={{display:'flex',justifyContent:'center',paddingTop:40}}><Spinner size={22} color={GREEN}/></div>}

      {/* TODAY TAB */}
      {!loading&&habTab==='today'&&(<>
        {/* Today's weekly habits first */}
        {todayWeekly.length>0&&(<>
          <div style={{padding:'8px 16px 2px',display:'flex',alignItems:'center',gap:8}}>
            <div style={{fontSize:10,color:GREEN,fontWeight:700,letterSpacing:1,textTransform:'uppercase'}}>{DAY_FULL_MAP[todayAbbr]||todayAbbr}</div>
            <span style={{fontSize:9,background:GREEN,color:'#000',borderRadius:4,padding:'1px 5px',fontWeight:700}}>WEEKLY</span>
          </div>

    {/* Add sheet */}

      <div style={{display:'flex',gap:8,marginBottom:14}}>

        <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="What do you want to track?" style={{...inp(),flex:1}} autoFocus/>

        <div style={{display:'flex',gap:8}}>
          {[['bool','✓ Checkbox'],['count','# Counter']].map(([t,l])=>(<button key={t} onClick={()=>setNewType(t)} style={{flex:1,padding:'10px',borderRadius:10,cursor:'pointer',background:newType===t?'#0e1f10':'#1a1a1a',border:`1px solid ${newType===t?GREEN:'#2a2a2a'}`,color:newType===t?TEXT:MUTED,fontSize:13,fontFamily:'inherit',fontWeight:500}}>{l}</button>))}
        </div>
      </FormInput>
      <FormInput label="Frequency">
        <div style={{display:'flex',gap:8}}>
          {[['daily','Daily'],['weekly','Weekly']].map(([f,l])=>(<button key={f} onClick={()=>setNewHabitFreq(f)} style={{flex:1,padding:'9px',borderRadius:10,cursor:'pointer',background:newHabitFreq===f?'#0e1f10':'#1a1a1a',border:`1px solid ${newHabitFreq===f?GREEN:'#2a2a2a'}`,color:newHabitFreq===f?TEXT:MUTED,fontSize:13,fontFamily:'inherit'}}>{l}</button>))}
        </div>
      </FormInput>
      {newHabitFreq==='weekly'&&(<FormInput label="Day of week">
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {DAY_ABBR.map(d=>(<button key={d} onClick={()=>setNewWeekDay(d)} style={{padding:'6px 10px',borderRadius:8,border:`1px solid ${newWeekDay===d?GREEN:BORDER}`,background:newWeekDay===d?'#0e1f10':'#1a1a1a',color:newWeekDay===d?GREEN:MUTED,fontSize:12,cursor:'pointer',fontFamily:'inherit'}}>{DAY_LABEL[d]}</button>))}
        </div>
      </FormInput>)}
      <FormInput label="Time (optional)">
        <input type="time" value={newTime} onChange={e=>setNewTime(e.target.value)} style={{...inp(),color:newTime?ORANGE:MUTED}}/>
        {newTime&&<div style={{fontSize:11,color:ORANGE,marginTop:5,fontWeight:700}}>⏰ {fmtTime12(newTime)}</div>}
      </FormInput>
      {buckets.length>0&&(<FormInput label="Bucket (optional)">
        <select value={newBucketId} onChange={e=>setNewBucketId(e.target.value)} style={{...inp(),cursor:'pointer'}}>
          <option value="">No bucket</option>
          {buckets.map(b=>(<option key={b.id} value={b.id}>{b.emoji} {b.name}</option>))}
        </select>
      </FormInput>)}
      {sprints.length>0&&(<FormInput label="Link to Sprint (optional)">
        <select value={newSprintId} onChange={e=>setNewSprintId(e.target.value)} style={{...inp(),cursor:'pointer'}}>
          <option value="">No sprint</option>
          {sprints.map(s=>(<option key={s.id} value={s.id}>{s.emoji||'⚡'} {s.name}</option>))}
        </select>
      </FormInput>)}
      <FormInput label="Color">
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {HABIT_COLORS.map(col=>(<button key={col} onClick={()=>setNewColor(col)} style={{width:28,height:28,borderRadius:'50%',background:col,border:'none',cursor:'pointer',outline:newColor===col?'2px solid #fff':'none',outlineOffset:2}}/>))}
        </div>
      </FormInput>
      <BtnRow>
        <BtnGhost onClick={()=>setShowAdd(false)}>Cancel</BtnGhost>
        <BtnPrimary onClick={addHabit} disabled={saving||!newName.trim()} color={GREEN}>{saving?'Adding…':'Add Habit'}</BtnPrimary>
      </BtnRow>
    </Sheet>)}

    {editHabit&&(<EditHabitSheet habit={editHabit} onClose={()=>setEditHabit(null)} onSave={updateHabit} onDelete={deleteHabit}/>)}
    {detailHabit&&(<HabitDetailScreen habit={detailHabit} user={user} sprints={sprints} buckets={buckets} onClose={()=>{setDetailHabit(null);load();}} onSave={async(id,patch)=>{await updateHabit(id,patch);setDetailHabit(null);}} onDelete={async id=>{await deleteHabit(id);setDetailHabit(null);}}/>)}
    {showBucketMgr&&(<BucketManager user={user} buckets={buckets} onClose={()=>setShowBucketMgr(false)} onReload={load}/>)}
  </div>);
}
