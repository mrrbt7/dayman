// COUNTDOWN SECTION
// ═══════════════════════════════════════════════════════════════════
const CD_RECURRINGS=[{key:null,label:'One-time'},{key:'weekly',label:'📅 Weekly'},{key:'monthly',label:'🗓 Monthly'},{key:'yearly',label:'🔁 Yearly'},{key:'every 1',label:'Every 1st'},{key:'every 15',label:'Every 15th'},{key:'every 25',label:'Every 25th'},{key:'custom_day',label:'Every Nth…'},{key:'custom_yearly',label:'📅 Yearly on Date…'}];

function CDEventSheet({item,onClose,onSave,onDelete,defaultDirection}){
  const [name,setName]=useState(item?.name||'');
  const [cdEmoji,setCdEmoji]=useState(item?.emoji||'');
  const [date,setDate]=useState(item?.target_date||'');
  const [firstDate,setFirstDate]=useState(item?.first_date||'');
  const [cat,setCat]=useState(item?.category||'countdown');
  const [recurring,setRecurring]=useState(()=>{const r=item?.recurring||null;if(r&&(r.match(/^\d{1,2}-\d{1,2}$/)||r.match(/^[a-z]+\s+\d{1,2}$/i)))return'custom_yearly';if(r&&r.match(/^every \d+$/))return'custom_day';return r;});
  const [direction,setDirection]=useState(item?.direction||defaultDirection||'countdown');
  const [cdLink,setCdLink]=useState(item?.link||'');
  const [cdNotes,setCdNotes]=useState(item?.notes||'');
  const [customDay,setCustomDay]=useState(()=>{const m=(item?.recurring||'').match(/^every (\d+)$/);return m?m[1]:'';});
  const [customYearlyMonth,setCustomYearlyMonth]=useState(()=>{const r=item?.recurring||'';const md=r.match(/^(\d{1,2})-(\d{1,2})$/);if(md)return md[1];const mn=r.match(/^([a-z]+)\s+(\d{1,2})$/i);if(mn){const months=['january','february','march','april','may','june','july','august','september','october','november','december'];const mo=months.findIndex(m=>m.startsWith(mn[1].toLowerCase()));return String(mo+1).padStart(2,'0');}return '';});
  const [customYearlyDay,setCustomYearlyDay]=useState(()=>{const r=item?.recurring||'';const md=r.match(/^(\d{1,2})-(\d{1,2})$/);if(md)return md[2];const mn=r.match(/^([a-z]+)\s+(\d{1,2})$/i);if(mn)return mn[2];return '';});
  const [saving,setSaving]=useState(false);
  const isCountUp=direction==='countup';
  const effectiveRecur=recurring==='custom_day'?`every ${customDay||'1'}`:recurring==='custom_yearly'?(customYearlyMonth&&customYearlyDay?`${String(customYearlyMonth).padStart(2,'0')}-${String(customYearlyDay).padStart(2,'0')}`:null):recurring;
  const habit_col=CD_COLORS[cat]||BLUE;
  const MONTH_NAMES=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const save=async()=>{if(!name.trim()||!date)return;setSaving(true);await onSave({name:name.trim(),emoji:cdEmoji||null,target_date:date,first_date:firstDate||null,category:cat,recurring:effectiveRecur,direction,link:cdLink||null,notes:cdNotes||null});setSaving(false);};
  return(<Sheet onClose={onClose} title={item?(isCountUp?'Edit Count-Up':'Edit Countdown'):(isCountUp?'New Count-Up':'New Countdown')}>
    <FormInput label="Type">
      <div style={{display:'flex',gap:8}}>
        {[['countdown','⏳ Countdown'],['countup','⏱ Count-Up']].map(([d,l])=>(<button key={d} onClick={()=>setDirection(d)} style={{flex:1,padding:'9px',borderRadius:10,cursor:'pointer',background:direction===d?'#1a2535':'#1a1a1a',border:`1px solid ${direction===d?BLUE:'#2a2a2a'}`,color:direction===d?TEXT:MUTED,fontSize:12,fontFamily:'inherit',fontWeight:direction===d?600:400}}>{l}</button>))}
      </div>
    </FormInput>
    <div style={{display:'flex',gap:8,marginBottom:14}}>
      <input value={cdEmoji} onChange={e=>setCdEmoji(e.target.value)} style={{...inp(),width:52,textAlign:'center',fontSize:22,padding:'8px 4px',flexShrink:0}} placeholder='🎯'/>
      <input value={name} onChange={e=>setName(e.target.value)} placeholder={isCountUp?'What happened / started?':'What are you counting down to?'} style={{...inp(),flex:1}} autoFocus/>
    </div>
    <FormInput label={isCountUp?'Date it started / happened':'Date'}>
      <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={inp()}/>
    </FormInput>
    <FormInput label="Original year (for age/years display)" style={{opacity:0.85}}>
      <input type="date" value={firstDate} onChange={e=>setFirstDate(e.target.value)} style={{...inp(),color:firstDate?TEXT:MUTED}} placeholder="e.g. 1988-03-17"/>
      <div style={{fontSize:11,color:MUTED,marginTop:5}}>For birthdays/anniversaries — shows how many years. Leave blank to skip.</div>
      {firstDate&&yearsFrom(firstDate)!==null&&<div style={{fontSize:13,color:habit_col||BLUE,marginTop:5,fontWeight:700}}>→ {yearsFrom(firstDate)} years old / {yearsFrom(firstDate)} yrs</div>}
    </FormInput>
    {!isCountUp&&(<>
      <FormInput label="Category">
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {CD_CATS.map(c=>(<button key={c.key} onClick={()=>setCat(c.key)} style={{background:cat===c.key?'#1a2535':'#1a1a1a',border:`1px solid ${cat===c.key?BLUE:'#2a2a2a'}`,borderRadius:10,padding:'8px 14px',fontSize:13,color:cat===c.key?TEXT:MUTED,cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',gap:6}}>{c.emoji} {c.label}</button>))}
        </div>
      </FormInput>
      <FormInput label="Recurring">
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {CD_RECURRINGS.map(r=>(<button key={String(r.key)} onClick={()=>setRecurring(r.key)} style={{background:recurring===r.key?'#1a2535':'#1a1a1a',border:`1px solid ${recurring===r.key?BLUE:'#2a2a2a'}`,borderRadius:10,padding:'7px 12px',fontSize:12,color:recurring===r.key?TEXT:MUTED,cursor:'pointer',fontFamily:'inherit'}}>{r.label}</button>))}
          {recurring==='custom_day'&&<input type="number" min="1" max="31" value={customDay} onChange={e=>setCustomDay(e.target.value)} placeholder="Day # (1-31)" style={{...inp(),marginTop:8,width:140}} />}
          {recurring==='custom_yearly'&&(<div style={{display:'flex',gap:8,marginTop:8,alignItems:'center'}}>
            <select value={customYearlyMonth} onChange={e=>setCustomYearlyMonth(e.target.value)} style={{...inp(),flex:1,cursor:'pointer'}}>
              <option value="">Month</option>
              {MONTH_NAMES.map((m,i)=><option key={i+1} value={String(i+1).padStart(2,'0')}>{m}</option>)}
            </select>
            <input type="number" min="1" max="31" value={customYearlyDay} onChange={e=>setCustomYearlyDay(e.target.value)} placeholder="Day" style={{...inp(),width:80}}/>
            {customYearlyMonth&&customYearlyDay&&<span style={{fontSize:11,color:BLUE,whiteSpace:'nowrap'}}>→ Every {MONTH_NAMES[parseInt(customYearlyMonth)-1]} {customYearlyDay}</span>}
          </div>)}
        </div>
      </FormInput>
    </>)}
    <FormInput label="Link (URL)"><input value={cdLink} onChange={e=>setCdLink(e.target.value)} placeholder="https://…" style={inp()}/></FormInput>
    <FormInput label="Notes"><textarea value={cdNotes} onChange={e=>setCdNotes(e.target.value)} rows={2} style={{...inp(),resize:'vertical'}}/></FormInput>
    <BtnRow>
      {item&&<button onClick={()=>onDelete(item.id)} style={{background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.2)',borderRadius:12,color:'#ef4444',fontSize:14,padding:'12px 16px',cursor:'pointer',fontFamily:'inherit'}}>Delete</button>}
      <BtnGhost onClick={onClose}>Cancel</BtnGhost>
      <BtnPrimary onClick={save} disabled={saving||!name.trim()||!date} color={BLUE}>{saving?'…':item?'Save':'Add'}</BtnPrimary>
    </BtnRow>
  </Sheet>);
}

function CountdownSection({user,resetHour=RESET_HOUR,menuBtn}){
  const [items,setItems]=useState([]);const [loading,setLoading]=useState(true);
  const [mainTab,setMainTab]=useState('upcoming');const [catFilter,setCatFilter]=useState('all');
  const [sheet,setSheet]=useState(null);const [detailItem,setDetailItem]=useState(null);

  const load=useCallback(async()=>{
    const{data,error}=await db.from('countdowns').select('*').eq('user_id',user.id).order('target_date');
    if(!error)setItems(data||[]);setLoading(false);
  },[user.id]);
  useEffect(()=>{load();},[load]);

  const handleSave=async({name,emoji,target_date,first_date,category,recurring,direction,link,notes})=>{
    if(sheet?.id){await db.from('countdowns').update({name,emoji:emoji||null,target_date,first_date:first_date||null,category,recurring,direction,link:link||null,notes:notes||null}).eq('id',sheet.id);}
    else{await db.from('countdowns').insert({user_id:user.id,name,emoji:emoji||null,target_date,first_date:first_date||null,category,recurring,direction:direction||'countdown',link:link||null,notes:notes||null});}
    setSheet(null);load();
  };
  const handleDelete=async id=>{await db.from('countdowns').delete().eq('id',id);setSheet(null);load();};

  // Mark a recurring countdown complete → advance to next occurrence
  const handleMarkComplete=async(item,e)=>{
    if(e&&e.stopPropagation)e.stopPropagation();
    if(!item.recurring){
      // Non-recurring: mark last_completed — it will disappear from overdue section
      await db.from('countdowns').update({last_completed:localDateStr()}).eq('id',item.id);
    }else{
      // Recurring: next occurrence is always AFTER today regardless of how overdue we are
      // e.g. completing on the 17th for "every 15" → next 15th of NEXT month
      const newTarget=nextOccurrence(localDateStr(),item.recurring);
      await db.from('countdowns').update({target_date:newTarget,last_completed:localDateStr()}).eq('id',item.id);
    }
    load();
  };

  const enriched=items.map(item=>{
    // For recurring: use stored target_date (not auto-advance) so it stays in Upcoming until marked done
    const effectiveDate=item.target_date;
    const days=daysUntil(effectiveDate);
    return{...item,_days:days,_effectiveDate:effectiveDate};
  });

  // Split by direction
  const cdItems=enriched.filter(i=>i.direction!=='countup');
  const cuItems=enriched.filter(i=>i.direction==='countup');
  // All cdItems go into upcoming (overdue shown as sections). Far = 100+ days out.
  const allUpcoming=cdItems.filter(i=>i._days<=100).sort((a,b)=>a._days-b._days);// includes negatives (overdue)
  const far=cdItems.filter(i=>i._days>100).sort((a,b)=>a._days-b._days);
  const countup=[...cuItems].map(i=>({...i,_since:Math.abs(i._days)})).sort((a,b)=>b._since-a._since);

  const displayList=mainTab==='countup'?countup
    :mainTab==='far'?far.filter(i=>catFilter==='all'||i.category===catFilter)
    :allUpcoming.filter(i=>catFilter==='all'||i.category===catFilter);

  const tabCounts={upcoming:allUpcoming.length,far:far.length,countup:countup.length};

  return(<div style={{height:'100%',display:'flex',flexDirection:'column',background:'#000',overflow:'hidden'}}>
    {/* Header */}
    <div style={{display:'flex',alignItems:'center',justifyContent:'flex-end',padding:'0 12px',borderBottom:`1px solid ${BORDER}`,flexShrink:0,height:38}}>
      <button onClick={()=>setSheet('new')} style={{background:BLUE,border:'none',borderRadius:8,padding:'4px 12px',cursor:'pointer',color:'#000',fontSize:20,fontWeight:800,fontFamily:'inherit',lineHeight:1.2}}>+</button>
    </div>

    {/* Chrome tabs */}
    <div className="chrome-tabs">
      {[['upcoming','Upcoming',BLUE],['far','100+ Days','#aaa'],['countup','Count Up','#22d3ee']].map(([k,l,col])=>(
        <button key={k} className={`chrome-tab ${mainTab===k?'active':'inactive'}`} onClick={()=>setMainTab(k)} style={{color:mainTab===k?col:'#666'}}>
          {l}{tabCounts[k]>0?` (${tabCounts[k]})`:''}{mainTab===k&&<span style={{position:'absolute',bottom:0,left:0,right:0,height:2,borderRadius:'2px 2px 0 0',background:col}}/>}
        </button>
      ))}
    </div>

    {/* Category filter — not for countup */}
    {mainTab!=='countup'&&(<div className="pill-tabs">
      {[{key:'all',label:'All',emoji:''},...CD_CATS].map(c=>(<button key={c.key} className={`pill-tab ${catFilter===c.key?'active':'inactive'}`} onClick={()=>setCatFilter(c.key)} style={{borderColor:catFilter===c.key?BLUE:BORDER,background:catFilter===c.key?BLUE:'#141414',color:catFilter===c.key?'#000':MUTED}}>{c.emoji?c.emoji+' ':''}{c.label}</button>))}
    </div>)}

    <div style={{flex:1,overflowY:'auto',padding:'4px 16px',paddingBottom:NAV_H+12}}>
      {loading&&<div style={{display:'flex',justifyContent:'center',paddingTop:40}}><Spinner size={22} color={BLUE}/></div>}
      {!loading&&displayList.length===0&&(<div style={{textAlign:'center',padding:'60px 0',color:MUTED}}><div style={{fontSize:40,marginBottom:12}}>{mainTab==='countup'?'⏱':'⏳'}</div><div style={{fontSize:14}}>No {mainTab==='countup'?'count-up events':mainTab+' events'}</div></div>)}
      {!loading&&(()=>{
        const isCountUp=mainTab==='countup';
        // Build sectioned list for non-countup tabs
        const renderItem=(item,i)=>{
          const ci=CD_CATS.find(c=>c.key===item.category)||CD_CATS[0];
          const isToday_=item._days===0;const isPast=item._days<0&&!isCountUp;
          const color=isCountUp?'#22d3ee':(CD_COLORS[item.category]||BLUE);
          const daysVal=isCountUp?item._since:Math.abs(item._days);
          const isOverdue_=!isCountUp&&item._days<0;
          const yrsLabel=item.first_date?(isCountUp?yearsFrom(item.first_date):yearsUntilNext(item.first_date)):null;
          return(<div key={item.id} style={{background:isOverdue_?'#180808':'#141414',border:`1px solid ${isToday_?'rgba(247,201,79,0.3)':isOverdue_?RED+'33':BORDER}`,borderRadius:16,padding:'14px 15px',marginBottom:8,display:'flex',alignItems:'center',gap:14,cursor:'pointer'}} onClick={()=>setDetailItem(item)}>
            <div style={{width:40,height:40,borderRadius:11,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,background:color+'1a',flexShrink:0}}>{item.emoji||(isCountUp?'⏱':ci.emoji)}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:TASK_FS,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:isOverdue_?RED:'#e8e8e8'}}>{item.name}</div>
              <div style={{display:'flex',alignItems:'center',gap:6,marginTop:2,flexWrap:'wrap'}}>
                {yrsLabel!==null&&<span style={{fontSize:12,fontWeight:700,color:color}}>{isCountUp?`${yrsLabel} yrs`:`→ turns ${yrsLabel}`}</span>}
                <span style={{fontSize:11,color:MUTED}}>
                  {new Date(item.target_date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
                  {item.recurring&&<span style={{marginLeft:5,color:BLUE}}>↻ {item.recurring}</span>}
                  {isOverdue_&&<span style={{marginLeft:5,color:RED,fontWeight:700}}>{Math.abs(item._days)}d overdue</span>}
                </span>
              </div>
            </div>
            <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:2,flexShrink:0}}>
              {isToday_&&!isCountUp?<div style={{color:'#f7c94f',fontWeight:700,fontSize:16}}>Today</div>:<>
                <div style={{fontSize:30,fontWeight:700,lineHeight:1,fontFamily:'monospace',color:isOverdue_?RED:isPast?MUTED:color}}>{daysVal}</div>
                <div style={{fontSize:10,color:MUTED,textTransform:'uppercase',letterSpacing:'0.04em',fontWeight:500}}>{isCountUp?'Days Since':isOverdue_?'Overdue':'Days Until'}</div>
              </>}
            </div>
          </div>);
        };
        if(mainTab==='upcoming'){
          // Sections: Overdue, Today, Upcoming
          const overdue=displayList.filter(i=>i._days<0);
          const todayItems=displayList.filter(i=>i._days===0);
          const upcoming_=displayList.filter(i=>i._days>0);
          const SectionLabel=({label,color:col})=>(<div style={{display:'flex',alignItems:'center',gap:6,padding:'8px 0 4px'}}>
            <div style={{width:5,height:5,borderRadius:'50%',background:col,flexShrink:0}}/>
            <span style={{fontSize:9,fontWeight:700,letterSpacing:1.5,textTransform:'uppercase',color:col}}>{label}</span>
          </div>);
          return(<>
            {overdue.length>0&&<><SectionLabel label="Overdue" color={RED}/>{overdue.map((item,i)=>renderItem(item,i))}</>}
            {todayItems.length>0&&<><SectionLabel label="Today" color="#f7c94f"/>{todayItems.map((item,i)=>renderItem(item,i))}</>}
            {upcoming_.length>0&&<><SectionLabel label="Upcoming" color={BLUE}/>{upcoming_.map((item,i)=>renderItem(item,i))}</>}
          </>);
        }
        return displayList.map((item,i)=>renderItem(item,i));
      })()}
    </div>

    {sheet==='new'&&(<CDEventSheet item={null} onClose={()=>setSheet(null)} onSave={handleSave} onDelete={handleDelete} defaultDirection={mainTab==='countup'?'countup':'countdown'}/>)}
    {detailItem&&(<CDDetailScreen item={detailItem} onClose={()=>setDetailItem(null)} onMarkComplete={async item=>{await handleMarkComplete(item,{stopPropagation:()=>{}});setDetailItem(null);}} onDelete={async id=>{await handleDelete(id);setDetailItem(null);}} onSaved={load}/>)}
  </div>);
}

// TimeBox for countdown detail — defined outside to avoid Babel inline-component issues
function TimeBox({value,label,col}){
  return(<div style={{background:'#141414',borderRadius:16,padding:'20px 0',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:6,border:'1px solid #2a2a2a'}}>
    <div style={{fontSize:56,fontWeight:900,lineHeight:1,fontVariantNumeric:'tabular-nums',color:col||BLUE}}>{value}</div>

  </div>);
}

function CDDetailScreen({item:itemProp,onClose,onMarkComplete,onDelete,onSaved}){
  const [item,setItem]=useState(itemProp);
  const isCountUp=item.direction==='countup';
  const ci=CD_CATS.find(c=>c.key===item.category)||CD_CATS[0];
  const color=isCountUp?'#22d3ee':(CD_COLORS[item.category]||BLUE);
  const yrsLabel=item.first_date?(isCountUp?yearsFrom(item.first_date):yearsUntilNext(item.first_date)):null;
  const [now,setNow]=useState(()=>new Date());
  // Edit fields
  const [eName,setEName]=useState(item.name||'');
  const [eEmoji,setEEmoji]=useState(item.emoji||'');
  const [eDate,setEDate]=useState(item.target_date||'');
  const [eFirstDate,setEFirstDate]=useState(item.first_date||'');
  const [eCat,setECat]=useState(item.category||'countdown');
  const [eRecurType,setERecurType]=useState(()=>{const r=item.recurring||null;if(r&&(r.match(/^\d{1,2}-\d{1,2}$/)||r.match(/^[a-z]+\s+\d{1,2}$/i)))return'custom_yearly';if(r&&r.match(/^every \d+$/))return'custom_day';return r;});
  const [eRecurCustomDay,setERecurCustomDay]=useState(()=>{const m=(item.recurring||'').match(/^every (\d+)$/);return m?m[1]:'';});
  const [eRecurYearlyMonth,setERecurYearlyMonth]=useState(()=>{const r=item.recurring||'';const md=r.match(/^(\d{1,2})-(\d{1,2})$/);if(md)return md[1];return '';});
  const [eRecurYearlyDay,setERecurYearlyDay]=useState(()=>{const r=item.recurring||'';const md=r.match(/^(\d{1,2})-(\d{1,2})$/);if(md)return md[2];return '';});
  const eRecur=eRecurType==='custom_day'?`every ${eRecurCustomDay||'1'}`:eRecurType==='custom_yearly'?(eRecurYearlyMonth&&eRecurYearlyDay?`${String(eRecurYearlyMonth).padStart(2,'0')}-${String(eRecurYearlyDay).padStart(2,'0')}`:null):eRecurType;
  const [eDirection,setEDirection]=useState(item.direction||'countdown');
  const [eLink,setELink]=useState(item.link||'');
  const [eNotes,setENotes]=useState(item.notes||'');
  const [saving,setSaving]=useState(false);
  const [notesExpanded,setNotesExpanded]=useState(false);

  useEffect(()=>{const id=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(id);},[]);

  const target=new Date(item.target_date+'T00:00:00');
  const diffMs=isCountUp?(now-target):(target-now);
  const isToday=daysUntil(item.target_date)===0;
  const isOverdue=!isCountUp&&!isToday&&diffMs<0;
  const absDiff=Math.abs(diffMs);
  const totalSecs_=Math.floor(absDiff/1000);
  const ss=totalSecs_%60;const totalMins=Math.floor(totalSecs_/60);const mm=totalMins%60;
  const totalHrs=Math.floor(totalMins/60);const hh=totalHrs%24;
  const totalDays=Math.floor(totalHrs/24);
  const d1=isCountUp?target:now;const d2=isCountUp?now:target;
  let yrs=d2.getFullYear()-d1.getFullYear();let mos=d2.getMonth()-d1.getMonth();
  if(mos<0){yrs--;mos+=12;}
  const afterYM=new Date(d1);afterYM.setFullYear(afterYM.getFullYear()+yrs);afterYM.setMonth(afterYM.getMonth()+mos);
  const remDays=Math.max(0,Math.round(Math.abs(d2-afterYM)/86400000));
  const bigColor=isOverdue?RED:color;
  const pad=n=>String(n).padStart(2,'0');

  const saveEdits=async()=>{
    setSaving(true);
    await db.from('countdowns').update({name:eName,emoji:eEmoji||null,target_date:eDate,first_date:eFirstDate||null,category:eCat,recurring:eRecur,direction:eDirection,link:eLink||null,notes:eNotes||null}).eq('id',item.id);
    setSaving(false);
    if(onSaved)onSaved();
    onClose();// close after save
  };

  return(<div style={{position:'fixed',inset:0,background:'#000',zIndex:400,display:'flex',flexDirection:'column'}}>
    {/* Header */}
    <div className="section-header">
      <button onClick={onClose} style={{background:'none',border:'none',color:MUTED,fontSize:26,cursor:'pointer',lineHeight:1,marginLeft:-4}}>‹</button>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontWeight:900,fontSize:16,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:isOverdue?RED:color}}>{item.emoji?item.emoji+' ':''}{item.name}</div>
        {yrsLabel!==null&&<div style={{fontSize:12,color:color,fontWeight:700,marginTop:1}}>{isCountUp?`${yrsLabel} yrs`:`→ turns ${yrsLabel}`}</div>}
      </div>
    </div>

    <div style={{flex:1,overflowY:'auto',paddingBottom:40}}>
      {/* Live timer section */}
      <div style={{padding:'24px 20px 20px',textAlign:'center'}}>
        <div style={{fontSize:32,lineHeight:1,marginBottom:12}}>{item.emoji||(isCountUp?'⏱':ci.emoji)}</div>
        {isToday&&!isCountUp?(
          <div style={{fontSize:42,fontWeight:900,color:'#f7c94f',letterSpacing:-2,marginBottom:8}}>TODAY! 🎉</div>
        ):(
          <>
            {/* Stacked boxes like the screenshot */}
            <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:16}}>
              {yrs>0&&<TimeBox col={bigColor} value={String(yrs).padStart(2,'0')} label={`year${yrs!==1?'s':''}`}/>}
              {(yrs>0||mos>0)&&<TimeBox col={bigColor} value={String(mos).padStart(2,'0')} label={`month${mos!==1?'s':''}`}/>}
              {(yrs>0||mos>0||remDays>0)&&<TimeBox col={bigColor} value={String(remDays).padStart(2,'0')} label={`day${remDays!==1?'s':''}`}/>}
              {yrs===0&&<TimeBox col={bigColor} value={String(totalDays).padStart(2,'0')} label={isOverdue?'days overdue':isCountUp?'days since':'days'}/>}
              <TimeBox col={bigColor} value={pad(hh)} label="hours"/>
              <TimeBox col={bigColor} value={pad(mm)} label="minutes"/>
              <TimeBox col={bigColor} value={pad(ss)} label="seconds"/>
            </div>
            <div style={{fontSize:12,color:MUTED,letterSpacing:1,textTransform:'uppercase',marginBottom:12}}>{isCountUp?'elapsed':'remaining'}</div>
          </>
        )}
        <div style={{fontSize:14,color:MUTED}}>
          {new Date(item.target_date+'T00:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}
        </div>
        {item.recurring&&<div style={{fontSize:12,color:BLUE,marginTop:4}}>↻ Repeats {item.recurring}</div>}
        {item.link&&<a href={item.link} target="_blank" rel="noopener noreferrer" style={{display:'block',fontSize:12,color:BLUE,marginTop:8,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.link}</a>}
        {item.notes&&(<button onClick={()=>setNotesExpanded(true)} style={{marginTop:8,width:'100%',padding:'8px 12px',borderRadius:8,background:'#111',border:`1px solid ${BORDER}`,color:MUTED,cursor:'pointer',fontFamily:'inherit',fontSize:12,textAlign:'left',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>📝 {item.notes.split('\n')[0]}</button>)}
        {/* Done button - moved here away from accidental top-right taps */}
        {!isCountUp&&<button onClick={()=>onMarkComplete(item)} style={{marginTop:14,width:'100%',padding:'13px',borderRadius:12,border:`1px solid ${GREEN}55`,background:'#0a140a',color:GREEN,fontWeight:800,fontSize:15,cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>✓ Mark Done{item.recurring?` (resets to next occurrence)`:''}</button>}
      </div>

      {/* Edit section */}
      <div style={{borderTop:`1px solid ${BORDER}`,padding:'20px 16px 0'}}>
        <div style={{fontSize:10,color:MUTED,fontWeight:700,letterSpacing:2,textTransform:'uppercase',marginBottom:14}}>EDIT</div>
        <div style={{display:'flex',gap:8,marginBottom:14}}>
          <input value={eEmoji} onChange={e=>setEEmoji(e.target.value)} style={{...inp(),width:52,textAlign:'center',fontSize:22,padding:'8px 4px',flexShrink:0}} placeholder='🎯'/>
          <input value={eName} onChange={e=>setEName(e.target.value)} style={{...inp(),flex:1}}/>
        </div>
        <FormInput label="Type">
          <div style={{display:'flex',gap:8}}>
            {[['countdown','⏳ Countdown'],['countup','⏱ Count-Up']].map(([d,l])=>(<button key={d} onClick={()=>setEDirection(d)} style={{flex:1,padding:'9px',borderRadius:10,cursor:'pointer',background:eDirection===d?'#1a2535':'#1a1a1a',border:`1px solid ${eDirection===d?BLUE:'#2a2a2a'}`,color:eDirection===d?TEXT:MUTED,fontSize:12,fontFamily:'inherit'}}>{l}</button>))}
          </div>
        </FormInput>
        <FormInput label="Date"><input type="date" value={eDate} onChange={e=>setEDate(e.target.value)} style={inp()}/></FormInput>
        <FormInput label="Original year (for age display)">
          <input type="date" value={eFirstDate} onChange={e=>setEFirstDate(e.target.value)} style={{...inp(),color:eFirstDate?TEXT:MUTED}}/>
          {eFirstDate&&yearsFrom(eFirstDate)!==null&&<div style={{fontSize:12,color:color,marginTop:5,fontWeight:700}}>→ turns {yearsUntilNext(eFirstDate)}</div>}
        </FormInput>
        {eDirection!=='countup'&&(<>
          <FormInput label="Category">
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {CD_CATS.map(cat=>(<button key={cat.key} onClick={()=>setECat(cat.key)} style={{background:eCat===cat.key?'#1a2535':'#1a1a1a',border:`1px solid ${eCat===cat.key?BLUE:'#2a2a2a'}`,borderRadius:10,padding:'7px 12px',fontSize:12,color:eCat===cat.key?TEXT:MUTED,cursor:'pointer',fontFamily:'inherit'}}>{cat.emoji} {cat.label}</button>))}
            </div>
          </FormInput>
          <FormInput label="Recurring">
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>

  const PRIS=[{k:'crush',l:'🔥 Crush',c:'#FF9F0A'},{k:'high',l:'High',c:RED},{k:'normal',l:'Normal',c:MUTED},{k:'low',l:'Low',c:BLUE}];

  const ACTIONS=['buy','call','email','research','review','schedule','watch','read','fix','build','plan','pay'];
  const NOTIFY_OPTS=[{v:'',l:'Off'},{v:'0',l:'On time'},{v:'5',l:'5m'},{v:'15',l:'15m'},{v:'30',l:'30m'},{v:'60',l:'1h'},{v:'1440',l:'1 day'}];
  const save=async()=>{

    await onSave(r.id,{title,frequency:freq||null,notes,priority,status,due_date:dueDate||null,event_date:eventDate||null,time:time||null,duration:duration||null,link:link||null,keep_link:keepLink||null,action:action||null,brand:brand||null,gameday:gameday||null,device:device||null,person:person||null,sprint_id:sprintId||null,notify_mins:notifyMins!==''?parseInt(notifyMins):null,is_ref:isRef,mundane,labels:labelsArr,completion_log:updCl});
    setSaving(false);

      <div style={{flex:1,fontWeight:900,fontSize:16,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:ORANGE}}>{r.title}</div>
      <DotMenu items={[{label:'Delete task',danger:true,action:()=>onDelete(r.id)}]}/>
    </div>
    <div style={{flex:1,overflowY:'auto',padding:'0 16px 40px'}}>
      {/* Stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,background:'#0a0a0a',borderRadius:10,border:`1px solid ${BORDER}`,overflow:'hidden',margin:'14px 0'}}>
        {[['Freq',fd!==null?fd+'d':'—','#444'],['Since',sd!==null?sd+'d':'—',sc],['Δ Tally',delta!==null?(delta>0?'+'+delta:delta):'—',dc]].map(([l,v,col])=>(
          <div key={l} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,padding:'10px 4px',borderRight:'1px solid #141414'}}>
            <div style={{fontSize:8,fontWeight:700,letterSpacing:1,color:'#444',textTransform:'uppercase'}}>{l}</div>
            <div style={{fontSize:22,fontWeight:900,color:col}}>{v}</div>

        <FormInput label="Last Completed">

          {lastCompleted&&<div style={{fontSize:10,color:GREEN,marginTop:3}}>✓ {fmtDateShort(lastCompleted)}</div>}

        <FormInput label="Duration"><input value={duration} onChange={e=>setDuration(e.target.value)} placeholder="30m, 1h" style={fi}/></FormInput>

        <FormInput label="Gameday"><input value={gameday} onChange={e=>setGameday(e.target.value)} placeholder="Game" style={fi}/></FormInput>

      <FormInput label="Action">

          {ACTIONS.map(a=>(<button key={a} onClick={()=>setAction(action===a?'':a)} style={{padding:'5px 10px',borderRadius:8,border:`1px solid ${action===a?ORANGE:BORDER}`,background:action===a?ORANGE+'22':'#1a1a1a',color:action===a?ORANGE:MUTED,fontSize:11,cursor:'pointer',fontFamily:'inherit'}}>{a}</button>))}

function FreqSection({user,resetHour=RESET_HOUR,menuBtn}){
  const [tasks,setTasks]=useState([]);const [raw,setRaw]=useState({});
  const [boards,setBoards]=useState([]);const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState('do');const [q,setQ]=useState('');
  const [editItem,setEditItem]=useState(null);const [addOpen,setAddOpen]=useState(false);
  const [saving,setSaving]=useState(false);

  const load=useCallback(async()=>{
    const{data:mem}=await db.from('board_members').select('board_id,boards(id,name,emoji)').eq('user_id',user.id);
    const bds=(mem||[]).map(m=>m.boards).filter(Boolean);setBoards(bds);
    const ids=bds.map(b=>b.id);if(!ids.length){setTasks([]);setLoading(false);return;}
    const{data:rows}=await db.from('tasks').select('*').in('board_id',ids).eq('done',false).not('frequency','is',null).neq('frequency','');
    const rawMap={};
    const mapped=(rows||[]).filter(r=>r.frequency&&freqDays(r.frequency)!==null).map(r=>{
      rawMap[r.id]=r;
      const fd=freqDays(r.frequency);const cl=r.completion_log||[];
      const sd=daysSinceDone(cl);
      // Use due_date field directly when available; fall back to completion_log math
      let daysUntilDue;
      if(r.due_date){
        const td=new Date(todayStr()+'T00:00:00');const dd=new Date(r.due_date+'T00:00:00');
        daysUntilDue=Math.round((dd-td)/86400000);
      }else{
        daysUntilDue=fd!==null&&sd!==null?(fd-sd):null;
      }
      const over=daysUntilDue!==null&&daysUntilDue<0?Math.abs(daysUntilDue):null;
      const due=daysUntilDue===0;
      return{id:r.id,title:r.title||'Untitled',freq:fd,since:sd,over,due,daysUntilDue,isDo:sd===null||over!==null||due};
    });
    setRaw(rawMap);setTasks(mapped);setLoading(false);
  },[user.id]);
  useEffect(()=>{load();},[load]);

  const markDone=async id=>{const r=raw[id];if(!r)return;const cl=r.completion_log||[];const newCl=[...cl,{id:genId(),doneAt:new Date().toISOString(),note:''}];await db.from('tasks').update({completion_log:newCl,due_date:nextDue(r.frequency),status:'list'}).eq('id',id);setEditItem(null);load();};
  const saveTask=async(id,upd)=>{await db.from('tasks').update(upd).eq('id',id);setEditItem(null);load();};
  const addTask=async(data)=>{await db.from('tasks').insert(data);setAddOpen(false);load();};
  const deleteTask=async id=>{if(!window.confirm('Delete this task?'))return;await db.from('tasks').update({done:true}).eq('id',id);setEditItem(null);load();};

  let rows=tasks.filter(t=>tab==='do'?t.isDo:tab==='dont'?!t.isDo:true);
  if(q.trim())rows=rows.filter(t=>t.title.toLowerCase().includes(q.toLowerCase()));
  // Sort by days until due (most overdue first, never-done last)
  rows.sort((a,b)=>{
    const av=a.daysUntilDue??9999;const bv=b.daysUntilDue??9999;return av-bv;
  });

  const sections_=[];
  if(tab==='do'||tab==='all'){const ov=rows.filter(r=>r.over!==null);const du=rows.filter(r=>r.due&&r.over===null);const nd=rows.filter(r=>r.since===null&&!r.due&&r.over===null);const ok=rows.filter(r=>!r.isDo&&r.since!==null);if(ov.length)sections_.push({label:'Overdue',color:RED,items:ov});if(du.length)sections_.push({label:'Due',color:ORANGE,items:du});if(tab==='all'&&ok.length)sections_.push({label:'Not Due Yet',color:GREEN,items:ok});if(nd.length)sections_.push({label:'Never Done',color:'#333',items:nd});}
  else{sections_.push({label:'',color:'',items:rows});}

  return(<div style={{height:'100%',display:'flex',flexDirection:'column',background:'#000',overflow:'hidden'}}>
    <div style={{display:'flex',alignItems:'center',gap:8,padding:'0 12px',borderBottom:`1px solid ${BORDER}`,flexShrink:0,height:38}}>
      <span style={{fontSize:11,color:MUTED,flex:1}}>{rows.length} task{rows.length!==1?'s':''}</span>
      <button onClick={()=>setAddOpen(true)} style={{background:ORANGE,border:'none',borderRadius:8,padding:'4px 12px',cursor:'pointer',color:'#000',fontSize:20,fontWeight:800,fontFamily:'inherit',lineHeight:1.2}}>+</button>
    </div>

    {/* Chrome tabs */}
    <div className="chrome-tabs">
      {[['do','DO',RED],['dont',"DON'T",GREEN],['all','ALL',LIME]].map(([k,l,col])=>(
        <button key={k} className={`chrome-tab ${tab===k?'active':'inactive'}`} onClick={()=>setTab(k)} style={{color:tab===k?col:'#666'}}>
          {l}{tab===k&&<span style={{position:'absolute',bottom:0,left:0,right:0,height:2,borderRadius:'2px 2px 0 0',background:col}}/>}
        </button>
      ))}
    </div>

    {/* Filter */}
    <div style={{padding:'8px 16px',flexShrink:0}}><input value={q} onChange={e=>setQ(e.target.value)} placeholder="Filter tasks…" style={{...inp(),fontSize:'14px !important'}}/></div>

    {/* List */}
    <div style={{flex:1,overflowY:'auto',paddingBottom:NAV_H+12}}>
      {loading&&<div style={{display:'flex',justifyContent:'center',paddingTop:40}}><Spinner size={22} color={ORANGE}/></div>}
      {!loading&&rows.length===0&&(<div style={{textAlign:'center',padding:'60px 0',color:MUTED}}><div style={{fontSize:26,marginBottom:10}}>{tab==='do'?'✓':'◡'}</div><div style={{fontSize:13}}>{tab==='do'?'Nothing overdue or due':tab==='dont'?'All good':'No tasks'}</div></div>)}
      {sections_.map((sec,si)=>(<div key={si}>
        {sec.label&&(<div style={{padding:'10px 16px 3px',display:'flex',alignItems:'center',gap:7}}><div style={{width:5,height:5,borderRadius:'50%',background:sec.color,flexShrink:0}}/><span style={{fontSize:9,fontWeight:700,letterSpacing:1.5,textTransform:'uppercase',color:sec.color}}>{sec.label}</span></div>)}
        {sec.items.map(t=>{
          const dtd=t.daysUntilDue;
          const dtdColor=dtd===null?MUTED:dtd<0?RED:dtd===0?ORANGE:dtd<=3?'#f7c94f':GREEN;
          const dtdLabel=dtd===null?'—':dtd<0?`${Math.abs(dtd)}d over`:dtd===0?'today':`${dtd}d`;
          return(<div key={t.id} onClick={()=>setEditItem(t)} style={{display:'grid',gridTemplateColumns:'60px 1fr 64px',alignItems:'center',padding:'10px 16px',borderBottom:`1px solid #080808`,cursor:'pointer',transition:'background .1s'}} onMouseEnter={e=>e.currentTarget.style.background='#0c0c0c'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            <div style={{display:'flex',flexDirection:'column',gap:1}}>
              <span style={{fontSize:12,fontWeight:700,color:MUTED,fontVariantNumeric:'tabular-nums'}}>{t.freq}d</span>
              <span style={{fontSize:10,color:'#555',fontVariantNumeric:'tabular-nums'}}>{t.since!==null?t.since+'d ago':'never'}</span>
            </div>
            <span style={{fontSize:TASK_FS,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',paddingRight:8}}>{t.title}</span>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:14,fontWeight:800,color:dtdColor,fontVariantNumeric:'tabular-nums',lineHeight:1}}>{dtdLabel}</div>
              {dtd!==null&&dtd!==0&&<div style={{fontSize:8,color:MUTED,textTransform:'uppercase',letterSpacing:0.5}}>{dtd<0?'overdue':'left'}</div>}
            </div>
          </div>);
        })}
      </div>))}
    </div>

    setStatuses(prev=>{
      const cur=prev[platform]?.status||'na';
      const idx=STATUS_OPTS.findIndex(o=>o.key===cur);
      const next=STATUS_OPTS[(idx+1)%STATUS_OPTS.length].key;
      return{...prev,[platform]:{...(prev[platform]||{}),status:next}};
    });
  };
  const setNote=(platform,note)=>setStatuses(prev=>({...prev,[platform]:{...(prev[platform]||{}),note}}));

            <div style={{fontSize:9,color:MUTED,fontWeight:700,letterSpacing:2,marginBottom:6}}>STATUS NOTE</div>
            <textarea value={st.note||''} onChange={e=>setNote(p.key,e.target.value)} rows={2} placeholder="What needs to happen?" style={{...inp(),resize:'vertical'}}/>

      <button onClick={save} disabled={saving} style={{width:'100%',marginTop:16,padding:'14px',borderRadius:12,border:'none',background:saving?'#2a2a2a':LIME,color:'#000',fontWeight:900,fontSize:15,cursor:saving?'default':'pointer',fontFamily:'inherit'}}>{saving?'Saving…':'Save'}</button>

// ═══════════════════════════════════════════════════════════════════
// NOW SECTION — everything due today, sorted by time
// ═══════════════════════════════════════════════════════════════════
function NowSection({user,resetHour=RESET_HOUR,onNavigate,menuBtn}){
  const [items,setItems]=useState([]);
  const [loading,setLoading]=useState(true);
  const [doneIds,setDoneIds]=useState(new Set());
  const today=useMemo(()=>localDateStr(),[]);
  const todayDow=new Date().getDay();
  const todayAbbr_=['SUN','MON','TUE','WED','THU','FRI','SAT'][todayDow];

  const load=useCallback(async()=>{
    setLoading(true);
    const[{data:sprints},{data:habits},{data:habitLogs},{data:countdowns},{data:boardMem}]=await Promise.all([
      db.from('sprints_v2').select('*').eq('user_id',user.id),
      db.from('habits').select('*').eq('user_id',user.id),
      db.from('habit_logs').select('*').eq('user_id',user.id).eq('log_date',today),
      db.from('countdowns').select('*').eq('user_id',user.id),
      db.from('board_members').select('board_id,boards(id)').eq('user_id',user.id),
    ]);

    const all=[];

    // SPRINTS — today's uncompleted
    (sprints||[]).forEach(sp=>{
      const ds=resolveDS(sp.daily_state,resetHour);
      if(ds.done)return;
      const isToday=!sp.frequency_days||sp.frequency_days.split(',').includes(todayAbbr_);
      if(!isToday)return;
      all.push({id:'sp_'+sp.id,type:'sprint',label:sp.name,emoji:sp.emoji||'⚡',time:sp.scheduled_time||null,color:LIME,raw:sp});
    });

    // HABITS — today's due daily + today's weekly
    const logSet=new Set((habitLogs||[]).map(l=>l.habit_id));
    (habits||[]).forEach(h=>{
      const isDone=logSet.has(h.id);if(isDone)return;
      const isDaily=!h.habit_frequency||h.habit_frequency==='daily';
      const isWeeklyToday=h.habit_frequency==='weekly'&&h.weekly_day===todayAbbr_;
      if(!isDaily&&!isWeeklyToday)return;
      all.push({id:'hb_'+h.id,type:'habit',label:h.name,emoji:h.emoji||null,time:h.scheduled_time||null,color:h.color||GREEN,subtitle:isWeeklyToday?'Weekly':'Daily',raw:h});
    });

    // COUNTDOWNS — due today or overdue
    (countdowns||[]).forEach(cd=>{
      if(cd.direction==='countup')return;
      const days=daysUntil(cd.target_date);
      if(days>0)return;// future
      const label=days===0?'Today':days<0?`${Math.abs(days)}d overdue`:'';
      const CD_CI=CD_CATS.find(c=>c.key===cd.category)||CD_CATS[0];
      all.push({id:'cd_'+cd.id,type:'countdown',label:cd.name,emoji:cd.emoji||CD_CI.emoji,time:null,color:days===0?'#f7c94f':RED,subtitle:label,raw:cd});
    });

    // FREQ — due or overdue tasks
    const boardIds=(boardMem||[]).map(m=>m.boards?.id).filter(Boolean);
    if(boardIds.length){
      const{data:tasks}=await db.from('tasks').select('*').in('board_id',boardIds).eq('done',false).not('frequency','is',null).neq('frequency','');
      (tasks||[]).forEach(t=>{
        const fd=freqDays(t.frequency);if(fd===null)return;
        const cl=t.completion_log||[];
        const sd=daysSinceDone(cl);
        if(sd===null||sd<fd)return;// not yet due
        const over=sd-fd;
        all.push({id:'fq_'+t.id,type:'freq',label:t.title,emoji:'🔁',time:t.time?t.time.slice(0,5):null,color:over>0?RED:ORANGE,subtitle:over>0?`${over}d overdue`:'Due today',raw:t});
      });
    }

    // Sort: items with time first (by time asc), then no-time items
    all.sort((a,b)=>{
      if(a.time&&b.time)return a.time.localeCompare(b.time);
      if(a.time)return -1;if(b.time)return 1;
      return 0;
    });

    setItems(all);setLoading(false);
  },[user.id,today,resetHour,todayAbbr_]);

  useEffect(()=>{load();},[load]);

  // Group by time section
  const sections=useMemo(()=>{
    const map={};
    items.forEach(item=>{
      const sec=item.time?getTimeSection(item.time):'NO TIME';
      if(!map[sec])map[sec]=[];
      map[sec].push(item);
    });
    return SECTION_ORDER.filter(s=>map[s]?.length).map(s=>({label:s,emoji:SECTION_EMOJI[s],items:map[s]}));
  },[items]);

  const markItemDone=useCallback(async(item,e)=>{
    e.stopPropagation();
    const id=item.id;
    if(doneIds.has(id))return;
    setDoneIds(prev=>{const n=new Set(prev);n.add(id);return n;});
    try{
      if(item.type==='habit'){
        const habitId=id.replace('hb_','');
        await db.from('habit_logs').upsert({user_id:user.id,habit_id:habitId,log_date:today,value:1},{onConflict:'habit_id,log_date'});
      }else if(item.type==='sprint'){
        const sprintId=id.replace('sp_','');const resetH=resetHour??4;const todayK=todayKey(resetH);
        await db.from('sprints_v2').update({daily_state:{done:true,date:todayK}}).eq('id',sprintId).eq('user_id',user.id);
      }else if(item.type==='freq'){
        const taskId=id.replace('fq_','');
        const{data:t}=await db.from('tasks').select('completion_log,frequency').eq('id',taskId).single();
        if(t){const cl=[...(t.completion_log||[]),{id:genId(),doneAt:new Date().toISOString(),note:''}];const nd=nextDue(t.frequency);await db.from('tasks').update({completion_log:cl,due_date:nd,status:'list'}).eq('id',taskId);}
      }else if(item.type==='countdown'){
        const cdId=id.replace('cd_','');
        await db.from('countdowns').update({last_completed:today}).eq('id',cdId);
      }
    }catch(err){console.error(err);}

const freqToNum=f=>{if(!f)return null;const s=f.trim().toLowerCase();if(s==="daily")return 1;if(s==="weekly")return 7;if(s==="monthly")return 30;if(s==="yearly")return 365;if(s==="weekday"||s==="weekdays")return 5;if(s==="weekend"||s==="weekends")return 2;const annM=s.match(/^(\d{1,2})-(\d{1,2})$/);if(annM)return 365;const n=parseInt(s);return(!isNaN(n)&&n>0)?n:null;};

function CompLog({log,onChange}){
  const sorted=[...(log||[])].sort((a,b)=>b.doneAt.localeCompare(a.doneAt));
  const ago=d=>{const v=Math.abs(daysDiff(d.split("T")[0]));return v===0?"today":v===1?"yesterday":`${v}d ago`;};
  const [showMore,setShowMore]=useState(false);
  const LIMIT=3;
  const visible=showMore?sorted:sorted.slice(0,LIMIT);
  const hidden=sorted.length-LIMIT;
  return(
    <div>
      <label style={{...bLbl,color:"#30D158"}}>Completion Log{sorted.length>0&&<span style={{color:MUTED,fontWeight:400,textTransform:"none",letterSpacing:0}}> · {sorted.length}</span>}</label>
      {sorted.length===0&&<div style={{fontSize:11,color:MUTED,marginBottom:12,fontStyle:"italic"}}>No completions yet.</div>}
      {sorted.length>0&&(
        <div style={{borderRadius:8,border:"1px solid #30D15833",overflow:"hidden",marginBottom:14,background:"#0a140a"}}>
          {visible.map((e,i)=>{
            const isCollapsed=!showMore&&i>=LIMIT;

              <div key={e.id} style={{padding:"8px 10px",borderBottom:i<visible.length-1?"1px solid #0d1e0d":"none",display:"flex",gap:8}}>
                <span style={{fontSize:12,color:"#30D158",fontWeight:700,flexShrink:0,paddingTop:1}}>✓</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",gap:8,marginBottom:showMore?3:0}}>
                    <span style={{fontSize:11,color:"#30D158",fontWeight:600}}>{fmtDateFull(e.doneAt.split("T")[0])}</span>
                    <span style={{fontSize:10,color:MUTED}}>{ago(e.doneAt)}</span>
                  </div>
                  {showMore&&<input value={e.note||""} onChange={ev=>{const u=[...(log||[])];const idx=u.findIndex(x=>x.id===e.id);if(idx>=0)u[idx]={...u[idx],note:ev.target.value};onChange(u);}} placeholder="Add a note…" style={{width:"100%",padding:"3px 0",background:"transparent",border:"none",borderBottom:"1px solid #1a2a1a",color:MUTED,fontSize:11,fontFamily:"inherit",outline:"none"}}/>}
                </div>
                <button onClick={()=>onChange((log||[]).filter(x=>x.id!==e.id))} style={{background:"none",border:"none",color:"#333",cursor:"pointer",fontSize:12}} onMouseEnter={x=>x.currentTarget.style.color="#FF453A"} onMouseLeave={x=>x.currentTarget.style.color="#333"}>✕</button>
              </div>
            );
          })}
          {hidden>0&&(
            <button onClick={()=>setShowMore(o=>!o)} style={{width:"100%",padding:"7px",background:"transparent",border:"none",borderTop:"1px solid #0d1e0d",cursor:"pointer",fontSize:11,color:"#30D15888",fontFamily:"inherit"}}>
              {showMore?`▲ Show less`:`▾ ${hidden} more…`}
            </button>
          )}
        </div>
      )}
    </div>
  );
}

function ImportModal({boardId,buckets,onImport,onClose}){
  const [rows,setRows]=useState([]);
  const [error,setError]=useState("");
  const [status,setStatus]=useState("idle");
  const [sourceInfo,setSourceInfo]=useState(null);
  const TEMPLATE_HEADERS=["title","notes","status","priority","frequency","dueDate","time","bucket","duration","action"];
  const STATUSES=["list","do","nextup","inprogress"];
  const downloadTemplate=()=>{
    const csv=[TEMPLATE_HEADERS.join(","),
      '"Weekly team meeting","Meet with team","do","normal","monday","","09:00","Work","","60",""',
      '"Buy groceries","Milk eggs bread","list","normal","","2025-03-15","","Errands","","",""',
    ].join("\n");
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download="daycrush-import-template.csv";a.click();
  };
  const parseJSON=text=>{
    try{
      const obj=JSON.parse(text);
      if(!obj.tasks||!Array.isArray(obj.tasks)){setError("Invalid board export — missing tasks array.");return;}
      const parsed=obj.tasks.map(t=>{
        const fresh=mkTask(t.status||"list",boardId);
        Object.assign(fresh,t);
        fresh.id=genId();fresh.boardId=boardId;fresh.done=false;fresh.completionLog=[];
        if(t._bucketLabel){
          const match=buckets.find(b=>b.label.toLowerCase()===t._bucketLabel.toLowerCase()||b.emoji===t._bucketEmoji);
          fresh.bucketId=match?match.id:null;
        } else fresh.bucketId=null;
        return fresh;
      });
      setSourceInfo({boardName:obj.boardName||"Unknown",taskCount:parsed.length,bucketCount:(obj.buckets||[]).length});
      setRows(parsed);setError("");setStatus("preview");
    }catch(e){setError("Could not parse JSON: "+e.message);}
  };
  const parse=text=>{
    const lines=text.split(/\r?\n/).filter(l=>l.trim());
    if(!lines.length){setError("File is empty");return;}
    // Detect delimiter
    const delim=lines[0].includes("\t")?"\t":",";
    const parseRow=raw=>{
      const out=[];let cur="",inQ=false;
      for(let i=0;i<raw.length;i++){
        const ch=raw[i];
        if(ch==='"'&&!inQ){inQ=true;}
        else if(ch==='"'&&inQ&&raw[i+1]==='"'){cur+='"';i++;}
        else if(ch==='"'&&inQ){inQ=false;}
        else if(ch===delim&&!inQ){out.push(cur.trim());cur="";}
        else cur+=ch;
      }
      out.push(cur.trim());return out;
    };
    const hdrs=parseRow(lines[0]).map(h=>h.toLowerCase().replace(/[^a-z]/g,""));
    const titleIdx=hdrs.findIndex(h=>h==="title");
    if(titleIdx===-1){setError("No 'title' column found in header row");return;}
    const idx=h=>hdrs.indexOf(h);
    const parsed=[];
    for(let i=1;i<lines.length;i++){
      const cols=parseRow(lines[i]);
      const get=h=>{const ix=idx(h);return ix>=0?(cols[ix]||"").trim():"";};
      const title=get("title");if(!title)continue;
      const bktLabel=get("bucket").toLowerCase();
      const bkt=buckets.find(b=>b.label.toLowerCase()===bktLabel||b.emoji===bktLabel)||null;
      const status=STATUSES.includes(get("status"))?get("status"):"list";
      const priority=PRIORITIES.includes(get("priority"))?get("priority"):"normal";
      const t=mkTask(status,boardId);
      t.title=title;t.notes=get("notes");t.status=status;t.priority=priority;
      t.frequency=get("frequency");t.dueDate=get("duedate")||get("due")||null;
      t.time=get("time");t.bucketId=bkt?bkt.id:null;
      t.duration=get("duration");t.action=get("action");
      // annual freq → 6am default
      const fp=parseFreq(t.frequency);
      if(fp.type==="annual"&&!t.time)t.time="06:00";
      parsed.push(t);
    }
    if(!parsed.length){setError("No valid rows found (need at least a 'title' column)");return;}
    setRows(parsed);setError("");setStatus("preview");
  };
  const handleFile=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const text=ev.target.result;
        if(file.name.endsWith(".json")||file.name.endsWith(".dcboard")){parseJSON(text);}
        else{parse(text);}
      }catch(ex){setError("Parse error: "+ex.message);}
    };
    reader.readAsText(file);
  };
  const handleImport=async()=>{
    setStatus("importing");
    await onImport(rows);
    setStatus("done");
  };
  return(
    <Modal onClose={onClose} maxWidth={520}>
      <div style={{padding:"18px 18px 4px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <div style={{fontWeight:700,fontSize:15}}>📤 Import Tasks</div>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:MUTED}}>✕</button>
        </div>
      </div>
      <div style={{padding:"0 18px",maxHeight:"72vh",overflowY:"auto"}}>
        {status==="done"?(
          <div style={{textAlign:"center",padding:"40px 0"}}>
            <div style={{fontSize:40,marginBottom:12}}>✅</div>
            <div style={{fontWeight:700,fontSize:16,marginBottom:6}}>{rows.length} tasks imported!</div>
            <button onClick={onClose} style={{marginTop:16,padding:"10px 28px",borderRadius:9,border:"none",background:LIME,color:"#000",cursor:"pointer",fontWeight:700,fontFamily:"inherit",fontSize:13}}>Done</button>
          </div>
        ):status==="importing"?(
          <div style={{textAlign:"center",padding:"40px 0",color:MUTED,fontSize:14}}>Importing {rows.length} tasks…</div>
        ):status==="preview"?(
          <div>
            {sourceInfo&&<div style={{padding:"8px 10px",borderRadius:7,background:"#0a140a",border:"1px solid #30D15833",marginBottom:10,fontSize:11,color:"#30D158"}}>📦 From: <b>{sourceInfo.boardName}</b> · {sourceInfo.taskCount} tasks</div>}
            <div style={{fontSize:12,color:LIME,fontWeight:600,marginBottom:12}}>✓ {rows.length} tasks ready to import</div>
            <div style={{maxHeight:300,overflowY:"auto",marginBottom:12}}>
              {rows.map((t,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",borderBottom:`1px solid ${BORDER}`,fontSize:12}}>
                  <span style={{color:TEXT,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</span>
                  {t.dueDate&&<span style={{color:MUTED,flexShrink:0}}>{t.dueDate}</span>}
                  {t.frequency&&<span style={{color:"#5E5CE6",flexShrink:0}}>{t.frequency}</span>}
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <button onClick={()=>{setStatus("idle");setRows([]);}} style={{flex:1,padding:"10px",borderRadius:8,border:`1px solid ${BORDER}`,background:"transparent",color:MUTED,cursor:"pointer",fontFamily:"inherit",fontSize:12}}>← Back</button>
              <button onClick={handleImport} style={{flex:2,padding:"10px",borderRadius:8,border:"none",background:LIME,color:"#000",cursor:"pointer",fontWeight:700,fontFamily:"inherit",fontSize:13}}>Import {rows.length} Tasks</button>
            </div>
          </div>
        ):(
          <div style={{paddingBottom:16}}>
            <div style={{background:"#0a0a0a",borderRadius:10,border:`1px solid ${BORDER}`,padding:"14px 16px",marginBottom:14}}>
              <div style={{fontWeight:600,fontSize:12,marginBottom:6}}>📋 CSV / TSV Template</div>
              <div style={{fontSize:11,color:MUTED,marginBottom:10,lineHeight:1.5}}>Download the template, fill it in with your tasks (one per row), then upload it here. Works with Excel, Google Sheets, Numbers, or any CSV editor.</div>
              <div style={{fontSize:10,color:"#444",fontFamily:"monospace",marginBottom:10,background:"#0d0d0d",padding:"8px",borderRadius:6,overflowX:"auto",whiteSpace:"nowrap"}}>{TEMPLATE_HEADERS.join(" | ")}</div>
              <button onClick={downloadTemplate} style={{padding:"8px 16px",borderRadius:7,border:`1px solid ${BORDER}`,background:"#1a1a1a",color:TEXT,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>⬇ Download Template</button>
            </div>
            <div style={{marginBottom:8}}>
              <label style={{display:"block",fontWeight:600,fontSize:12,marginBottom:4,color:MUTED}}>Upload file — CSV/TSV  <span style={{color:"#5E5CE6",fontWeight:700}}>or Board Export (.json)</span></label>
              <input type="file" accept=".csv,.tsv,.txt,.json,.dcboard" onChange={handleFile}
                style={{width:"100%",padding:"10px",borderRadius:8,border:`1px solid ${BORDER}`,background:"#111",color:TEXT,fontSize:12,fontFamily:"inherit",cursor:"pointer",boxSizing:"border-box"}}/>
            </div>
            {error&&<div style={{color:"#FF453A",fontSize:12,marginTop:8}}>⚠ {error}</div>}
            <div style={{marginTop:12,fontSize:11,color:"#333"}}>
              Columns: title (required), notes, status (list/do/nextup/inprogress), priority (normal/low/high/crush), frequency, dueDate (YYYY-MM-DD), time (HH:MM), bucket (name), duration (minutes), action
            </div>
          </div>
        )}
      </div>
    </Modal>
  );

function StatsMdl({tasks,oCt,tCt,onClose}){
  const now=etNow();
  const todayStr2=now.toISOString().split("T")[0];
  // Week start = Monday
  const dow=now.getDay();// 0=Sun
  const daysSinceMon=dow===0?6:dow-1;
  const weekStart=new Date(now);weekStart.setDate(now.getDate()-daysSinceMon);weekStart.setHours(0,0,0,0);
  const monthStart=new Date(now.getFullYear(),now.getMonth(),1);
  const isDoneToday=t=>{
    if(!t.completionLog||!t.completionLog.length)return false;
    return t.completionLog.some(e=>{if(!e.doneAt)return false;const d=new Date(e.doneAt);return d.toISOString().split("T")[0]===todayStr2;});
  };
  const isDoneThisWeek=t=>{
    if(!t.completionLog||!t.completionLog.length)return false;
    return t.completionLog.some(e=>{if(!e.doneAt)return false;const d=new Date(e.doneAt);return d>=weekStart;});
  };
  const isDoneThisMonth=t=>{
    if(!t.completionLog||!t.completionLog.length)return false;
    return t.completionLog.some(e=>{if(!e.doneAt)return false;const d=new Date(e.doneAt);return d>=monthStart;});
  };
  // Also count one-offs that are done (done flag)
  const doneTodayList=tasks.filter(t=>isDoneToday(t)||(t.done&&t.doneAt&&t.doneAt.split("T")[0]===todayStr2));
  const doneWeekList=tasks.filter(t=>isDoneThisWeek(t)||(t.done&&t.doneAt&&new Date(t.doneAt)>=weekStart));
  const doneMonthList=tasks.filter(t=>isDoneThisMonth(t)||(t.done&&t.doneAt&&new Date(t.doneAt)>=monthStart));
  const cDt=doneTodayList.length,cWk=doneWeekList.length,cMo=doneMonthList.length;
  const stat=(label,val,color)=>(
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 0",borderBottom:`1px solid ${BORDER}`}}>
      <span style={{fontSize:13,color:"#aaa"}}>{label}</span>
      <span style={{fontSize:22,fontWeight:800,color:color||LIME}}>{val}</span>
    </div>
  );
  return(
    <Modal onClose={onClose} maxWidth={300}>
      <div style={{padding:"18px 18px 0"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <span style={{fontWeight:700,fontSize:15}}>Stats</span>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:MUTED}}>✕</button>
        </div>
        {stat("Overdue",oCt,"#FF453A")}
        {stat("Due today",tCt,LIME)}
        <div style={{fontSize:9,fontWeight:700,letterSpacing:1.5,color:MUTED,textTransform:"uppercase",padding:"12px 0 4px"}}>COMPLETED</div>
        {stat("Today",cDt)}
        {stat("This week",cWk)}
        {stat("This month",cMo)}
      </div>
      <div style={{padding:"14px 18px 18px",display:"flex",justifyContent:"flex-end",borderTop:`1px solid ${BORDER}`,marginTop:12}}>
        <button onClick={onClose} style={{padding:"7px 18px",borderRadius:8,border:"none",background:LIME,color:"#000",cursor:"pointer",fontWeight:700,fontFamily:"inherit",fontSize:12}}>Done</button>
      </div>
    </Modal>
  );
}

function AttachmentsMgr({attachments,readOnly,onChange}){
  const {lm:eLm,border:eb,inp:ei,text:et,muted:em}=useTheme();
  const [newUrl,setNewUrl]=useState(""),[newName,setNewName]=useState("");
  const add=()=>{
    const url=newUrl.trim();if(!url)return;
    const name=newName.trim()||url.split("/").pop().split("?")[0]||"Attachment";
    onChange([...attachments,{id:genId(),name,url}]);
    setNewUrl("");setNewName("");
  };
  const del=id=>onChange(attachments.filter(a=>a.id!==id));
  const isImg=url=>/\.(jpg|jpeg|png|gif|webp|svg)(\?.*)?$/i.test(url);
  return(
    <div style={{marginBottom:14}}>
      <label style={bLbl}>Attachments</label>
      {attachments.map(a=>(
        <div key={a.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:eLm?"#deeaf5":"#0a0a0a",borderRadius:8,marginBottom:5,border:`1px solid ${eLm?"#b0c8e0":BORDER}`}}>
          {isImg(a.url)&&<img src={a.url} style={{width:32,height:32,objectFit:"cover",borderRadius:4,flexShrink:0}} onError={e=>e.target.style.display="none"}/>}
          {!isImg(a.url)&&<span style={{fontSize:16,flexShrink:0}}>📎</span>}
          <a href={a.url.startsWith("http")?a.url:"https://"+a.url} target="_blank" rel="noopener" style={{flex:1,fontSize:12,color:"#4ECDC4",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",textDecoration:"none"}}>{a.name}</a>
          {!readOnly&&<button onClick={()=>del(a.id)} style={{background:"none",border:"none",color:"#333",cursor:"pointer",fontSize:14,flexShrink:0,padding:"0 2px"}} onMouseEnter={e=>e.currentTarget.style.color="#FF453A"} onMouseLeave={e=>e.currentTarget.style.color="#333"}>✕</button>}
        </div>
      ))}
      {!readOnly&&(
        <div style={{display:"flex",gap:6,alignItems:"flex-start"}}>
          <div style={{flex:2}}>
            <input value={newUrl} onChange={e=>setNewUrl(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="URL…" style={{...bInp,marginBottom:5}} onFocus={FL} onBlur={FB}/>
            <input value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="Label (optional)" style={{...bInp,marginBottom:0,fontSize:11}} onFocus={FL} onBlur={FB}/>
          </div>
          <button onClick={add} style={{padding:"9px 12px",borderRadius:8,border:"none",background:newUrl.trim()?LIME:(eLm?"#c0d8f0":"#2a2a2a"),color:newUrl.trim()?"#000":(eLm?"#446688":MUTED),cursor:newUrl.trim()?"pointer":"default",fontWeight:700,fontSize:12,fontFamily:"inherit",flexShrink:0,marginTop:0}}>+ Add</button>
        </div>
      )}
    </div>
  );
}

            <input type="date" value={f.eventDate||""} onChange={e=>set("eventDate",e.target.value)} disabled={readOnly} style={{...bInp,colorScheme:"dark",marginBottom:0}}/>
            {f.eventDate&&(()=>{const d=Math.ceil((new Date(f.eventDate+"T00:00:00")-new Date())/(1000*60*60*24));return d<0?<div style={{fontSize:11,color:"#0A84FF",marginTop:4}}>⏱ {Math.abs(d)} days since</div>:d===0?<div style={{fontSize:11,color:LIME,marginTop:4}}>🎉 Today!</div>:<div style={{fontSize:11,color:LIME,marginTop:4}}>⏳ {d} days away</div>;})()}
          </div>
          <div style={{marginTop:12,paddingTop:12,borderTop:`1px solid ${BORDER}`}}>
            <label style={bLbl}>🔔 Notifications</label>
            <div style={{fontSize:10,color:MUTED,marginBottom:8}}>Browser push notification before this task is due. Task must have a time set.</div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <select value={f.notifyMins!=null?String(f.notifyMins):""} onChange={e=>set("notifyMins",e.target.value===""?null:parseInt(e.target.value))} disabled={readOnly} style={{...bSel,marginBottom:0,flex:1}}>
                <option value="">No notification</option>
                <option value="0">At task time</option>
                <option value="5">5 min before</option>
                <option value="15">15 min before</option>
                <option value="30">30 min before</option>
                <option value="60">1 hour before</option>
                <option value="120">2 hours before</option>
                <option value="1440">1 day before</option>
              </select>
              {f.notifyMins!=null&&<button onClick={()=>{if(!("Notification" in window)){alert("Not supported");return;}Notification.requestPermission().then(p=>{if(p==="granted")new Notification("🔔 DayCrush",{body:"Test: "+(f.title||"Task")});else alert("Allow notifications in browser settings.");});}} style={{padding:"6px 12px",borderRadius:7,border:`1px solid ${BORDER}`,background:"#1a1a1a",color:LIME,cursor:"pointer",fontSize:11,fontFamily:"inherit",whiteSpace:"nowrap"}}>Test</button>}
            </div>
            {f.notifyMins!=null&&!f.time&&<div style={{fontSize:10,color:"#FF9F0A",marginTop:5}}>⚠ Add a time to this task for notifications to work.</div>}
            {f.notifyMins!=null&&f.time&&<div style={{fontSize:10,color:"#30D158",marginTop:5}}>✓ Will notify {f.notifyMins===0?"at":""+f.notifyMins+"min before"} {fmtTime(f.time)}.</div>}
          </div>
          <CompLog log={f.completionLog} onChange={v=>set("completionLog",v)}/>
        </MoreSection>

        {/* Last completion — always visible, compact */}
        {f.completionLog&&f.completionLog.length>0&&(()=>{
          const last=[...f.completionLog].sort((a,b)=>b.doneAt.localeCompare(a.doneAt))[0];
          const ago2=d=>{const v=Math.abs(daysDiff(d.split("T")[0]));return v===0?"today":v===1?"yesterday":`${v}d ago`;};
          return<div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",background:eLm?"#d8f5e0":"#061406",borderRadius:7,border:"1px solid #30D15833",marginBottom:10}}>
            <span style={{color:"#30D158",fontSize:11,fontWeight:700}}>✓ Last done:</span>
            <span style={{fontSize:11,color:"#30D158"}}>{fmtDateFull(last.doneAt.split("T")[0])}</span>
            <span style={{fontSize:10,color:MUTED}}>({ago2(last.doneAt)})</span>
            {f.completionLog.length>1&&<span style={{fontSize:10,color:"#2a4a2a",marginLeft:"auto"}}>{f.completionLog.length} total</span>}
          </div>;
        })()}
      </div>
      <div style={{padding:"12px 16px 16px",display:"flex",gap:8,justifyContent:"flex-end",borderTop:`1px solid ${BORDER}`,flexWrap:"wrap"}}>
        <button onClick={onClose} style={{padding:"8px 16px",borderRadius:8,border:`1px solid ${eb}`,background:ec,cursor:"pointer",color:em,fontFamily:"inherit",fontSize:12}}>Cancel</button>
        {!readOnly&&<button onClick={()=>{
  const fp=parseFreq(f.frequency);
  const finalF={...f};
  if(fp.type==="annual"&&!finalF.time)finalF.time="06:00";
  onSave(finalF);
}} style={{padding:"8px 22px",borderRadius:8,border:"none",background:LIME,color:"#000",cursor:"pointer",fontWeight:700,fontSize:12,fontFamily:"inherit"}}>Save</button>}
      </div>
    </Modal>
  );
}

function InlineAdd({colId,boardId,onAdd,onCancel}){
  const [title,setTitle]=useState(""),[freq,setFreq]=useState("");
  const ref=useRef();useEffect(()=>ref.current?.focus(),[]);
  const save=()=>{if(!title.trim())return onCancel();const t=mkTask(colId,boardId);t.title=title.trim();t.frequency=freq;onAdd(t);};
  return(
    <div style={{marginBottom:5}}>
      <textarea ref={ref} value={title} onChange={e=>setTitle(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();save();}if(e.key==="Escape")onCancel();}} placeholder="Task name…" rows={2} style={{width:"100%",padding:"9px 10px",borderRadius:8,border:"1px solid #444",background:CARD_BG,color:TEXT,fontSize:13,fontFamily:"inherit",outline:"none",resize:"none",marginBottom:6}}/>
      <input value={freq} onChange={e=>setFreq(e.target.value)} placeholder="# (frequency)" style={{width:"100%",padding:"6px 9px",borderRadius:7,border:`1px solid ${BORDER}`,background:"#1a1a1a",color:TEXT,fontSize:11,fontFamily:"inherit",outline:"none",marginBottom:7}}/>
      <div style={{display:"flex",gap:7}}><button onClick={save} style={{padding:"6px 14px",borderRadius:7,border:"none",background:LIME,color:"#000",cursor:"pointer",fontWeight:700,fontSize:12,fontFamily:"inherit"}}>Add</button><button onClick={onCancel} style={{background:"none",border:"none",cursor:"pointer",color:MUTED,fontSize:18,lineHeight:1}}>✕</button></div>
    </div>
  );
}

function TaskCard({task,buckets,onEdit,onDelete,onCheck,onDuplicate,showBucket,onDragStart,onDragOver,onDrop,isDragging,listMode,readOnly,hideToday,hideTime,celebrating}){
  const [hov,setHov]=useState(false);
  const [hovMenu,setHovMenu]=useState(false);
  const dl=task.dueDate?dueLabel(task.dueDate):null;
  const hideTodayFlag=hideToday||(hideTime&&task.time&&daysDiff(task.dueDate||"9999-01-01")===0);
  const dlShow=dl&&!(hideTodayFlag&&dl.color===LIME&&task.dueDate&&daysDiff(task.dueDate)===0)?dl:null;
  const {cardBg:tcBg,border:tcBorder,text:tcText,muted:tcMuted,showActionTag:sAT,showBucketColor:sBktCol,showCardBg:sCardBg,showDuration:sDur,showFrequency:sFreq,lm:tcLm}=useTheme();
  const bkt=buckets.find(b=>b.id===task.bucketId);
  const fl=freqLabel(task.frequency);
  const _deltaTally=task.frequency&&!isNaN(parseInt((task.frequency||"").trim()))?taskDeltaTally(task):null;
  const pi=PMAP[task.priority||"normal"];
  const accent=task.priority==="crush"||task.priority==="high";
  const isWord=freqIsWord(task.frequency);
  const hasFreq=task.frequency&&task.frequency.trim();
  const isOneOff=!hasFreq;
  const isDone=task.done&&isOneOff;
  const cbColor=pi.dot||"#444";
  const cbRadius=hasFreq?3:50;
  const bktMainColor=bkt?.mainColor||null;
  const bktBgColor=bkt?.bgColor||null;
  const celebrating_=celebrating;

  const isLight=bktBgColor?hexLum(bktBgColor)<0.3:false;
  const hasCover=!!(task.attachments&&task.attachments.length>0&&task.attachments.some(a=>/\.(jpg|jpeg|png|gif|webp|svg)(\?.*)?$/i.test(a.url)));
  const cardBg=celebrating_?"#0d2a0d":isDone?"#0a120a":hasCover?"transparent":bgActual?bgActual:tcBg;
  const cardBorder=celebrating_?"#30D158":isDone?"#30D15833":dlShow?.color==="#FF453A"?"#FF453A44":bktMainColor?bktMainColor+"33":tcBorder;
  const cardText=null;
  return(
    <div onDragOver={e=>{e.preventDefault();onDragOver&&onDragOver(task.id);}} onDrop={e=>{e.preventDefault();onDrop&&onDrop(task.id);}} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{borderRadius:10,padding:"9px 11px",marginBottom:5,border:`1px solid ${cardBorder}`,opacity:isDragging?.35:isDone?.6:1,cursor:"pointer",position:"relative",overflow:"hidden",transition:"border-color .3s,background .3s",

        boxShadow:celebrating_?"0 0 18px #30D15844":"none"}}>
      {celebrating_&&<div style={{position:"absolute",inset:0,background:"linear-gradient(135deg,#0a1a0a,#0d2a0d)",borderRadius:10,zIndex:0}}/>}
      {!celebrating_&&isDone&&<div style={{position:"absolute",inset:0,background:"#0a120a",borderRadius:10,zIndex:0}}/>}
      {!celebrating_&&!isDone&&hasCover&&<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.72)",borderRadius:10}}/>}
      {!celebrating_&&!isDone&&!hasCover&&<div style={{position:"absolute",inset:0,background:cardBg,borderRadius:10,zIndex:0}}/>}
      {!celebrating_&&!isDone&&sBktCol&&bktMainColor&&<div style={{position:"absolute",left:0,top:0,bottom:0,width:4,background:bktMainColor,borderRadius:"0 2px 2px 0",opacity:.9,zIndex:1}}/>}
      {!celebrating_&&!isDone&&sBktCol&&bktMainColor&&<div style={{position:"absolute",right:0,top:0,bottom:0,width:4,background:bktMainColor,borderRadius:"2px 0 0 2px",opacity:.9,zIndex:1}}/>}
      {!celebrating_&&!isDone&&!bktMainColor&&accent&&<div style={{position:"absolute",left:0,top:4,bottom:4,width:3,background:pi.dot,borderRadius:"0 3px 3px 0",opacity:.85,zIndex:1}}/>}
      {!celebrating_&&!isDone&&!bktMainColor&&!accent&&dlShow&&<div style={{position:"absolute",left:0,top:4,bottom:4,width:3,background:dlShow.color,borderRadius:"0 3px 3px 0",opacity:.45,zIndex:1}}/>}
      {(celebrating_||isDone)&&<div style={{position:"absolute",left:0,top:0,bottom:0,width:4,background:"#30D158",borderRadius:"0 3px 3px 0",zIndex:1,opacity:isDone?.5:1}}/>}
      <div style={{paddingLeft:8,position:"relative",zIndex:1}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:7}}>
          {!readOnly&&<div style={{flexShrink:0,marginTop:2,width:15,height:15,borderRadius:3,border:`1.5px solid ${(celebrating_||isDone)?"#30D158":"#444"}`,background:(celebrating_||isDone)?"#30D158":"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}
            onClick={e=>{e.stopPropagation();onCheck(task.id);}}
            onMouseEnter={e=>{if(!celebrating_&&!isDone){e.currentTarget.style.borderColor="#30D158";e.currentTarget.style.background="#0a140a";}}}
            onMouseLeave={e=>{if(!celebrating_&&!isDone){e.currentTarget.style.borderColor="#444";e.currentTarget.style.background="transparent";}}}>
            {(celebrating_||isDone)&&<span style={{color:"#000",fontSize:9,fontWeight:900,lineHeight:1}}>✓</span>}
          </div>}
          <div style={{flex:1,minWidth:0}} onClick={()=>!celebrating_&&onEdit(task)}>
            {(()=>{const titleCol=(celebrating_||isDone)?"#30D158":(task.priority==="high"&&!celebrating_&&!isDone)?"#FF453A":cardText||tcText;return(<div style={{fontSize:13,color:titleCol,lineHeight:1.4,wordBreak:"break-word",textDecoration:(celebrating_||isDone)?"line-through":"none"}}>{task.title||<span style={{fontStyle:"italic",color:tcText+"55"}}>Untitled</span>}</div>);})()}
          </div>
          <div style={{flexShrink:0,display:"flex",flexDirection:"row",alignItems:"flex-start",gap:4,position:"relative"}}>
            {celebrating_&&<span style={{fontSize:12,color:"#30D158",fontWeight:700}}>DONE! ✅</span>}
            {isDone&&!celebrating_&&<span style={{fontSize:10,color:"#30D15877",fontWeight:600}}>✓ done</span>}
            {!celebrating_&&!isDone&&task.priority==="high"&&<span style={{fontSize:11}}>🚨</span>}
            {!celebrating_&&!isDone&&showBucket&&bkt&&(task.link?<a href={task.link.startsWith("http")?task.link:"https://"+task.link} target="_blank" rel="noopener" onClick={e=>e.stopPropagation()} style={{fontSize:13,opacity:.7,textDecoration:"none",cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.opacity=1} onMouseLeave={e=>e.currentTarget.style.opacity=.7}>{bkt.emoji}</a>:<span style={{fontSize:13,opacity:.7}}>{bkt.emoji}</span>)}
            {!celebrating_&&!isDone&&!readOnly&&(onDelete||onDuplicate)&&hov&&(
              <div style={{position:"relative"}}>
                <button onClick={e=>{e.stopPropagation();setHovMenu(m=>!m);}} style={{background:"none",border:"none",cursor:"pointer",color:MUTED,fontSize:14,padding:"0 2px",lineHeight:1,letterSpacing:1}} onMouseEnter={e=>e.currentTarget.style.color=TEXT} onMouseLeave={e=>e.currentTarget.style.color=MUTED}>⋯</button>
                {hovMenu&&(
                  <div onClick={e=>e.stopPropagation()} style={{position:"absolute",right:0,top:"calc(100% + 2px)",background:tcBg=="#1c1c1e"||!tcBg?"#1a1a1a":tcBg,border:`1px solid ${tcBorder}`,borderRadius:9,zIndex:999,minWidth:150,boxShadow:"0 8px 24px rgba(0,0,0,.9)"}}>
                    {!listMode&&onDragStart&&<div draggable onDragStart={e=>{e.stopPropagation();e.dataTransfer.effectAllowed="move";onDragStart(task.id);setHovMenu(false);}} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"9px 13px",background:"none",border:"none",borderBottom:"1px solid #2a2a2a",cursor:"grab",color:TEXT,fontFamily:"inherit",fontSize:12,textAlign:"left",borderRadius:"9px 9px 0 0",userSelect:"none"}} onMouseEnter={e=>e.currentTarget.style.background="#222"} onMouseLeave={e=>e.currentTarget.style.background="none"}>⠿ Drag to Reorder</div>}
                    {onDuplicate&&<button onClick={e=>{e.stopPropagation();onDuplicate(task);setHovMenu(false);}} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"9px 13px",background:"none",border:"none",cursor:"pointer",color:TEXT,fontFamily:"inherit",fontSize:12,textAlign:"left"}} onMouseEnter={e=>e.currentTarget.style.background="#222"} onMouseLeave={e=>e.currentTarget.style.background="none"}>📋 Duplicate</button>}
                    {onDelete&&<button onClick={e=>{e.stopPropagation();onDelete(task.id);setHovMenu(false);}} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"9px 13px",background:"none",border:"none",cursor:"pointer",color:"#FF453A",fontFamily:"inherit",fontSize:12,textAlign:"left",borderRadius:"0 0 9px 9px"}} onMouseEnter={e=>e.currentTarget.style.background="#1a0808"} onMouseLeave={e=>e.currentTarget.style.background="none"}>🗑 Delete</button>}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
        {!celebrating_&&!isDone&&(()=>{
          const hasEvent=!!task.eventDate;
          const daysUntil=hasEvent?Math.ceil((new Date(task.eventDate+"T00:00:00")-new Date())/(1000*60*60*24)):null;
          const isCountup=daysUntil!==null&&daysUntil<0;
          const showMeta=dlShow||fl||(task.time&&!hideTime)||task.duration||hasEvent||isOneOff;
          return showMeta?(
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:4}}>
              <div style={{display:"flex",alignItems:"center",gap:6,flex:1,flexWrap:"wrap"}}>
                {sAT&&task.action&&<span style={{fontSize:9,color:"#fff",fontWeight:700,letterSpacing:.3,borderRadius:3,padding:"1px 5px",border:"1px solid #fff",background:"#000"}}>{task.action.toUpperCase()}</span>}
                {!showBucket&&bkt&&<span style={{fontSize:9,color:bktMainColor||"#555",fontWeight:600,letterSpacing:.3,borderRadius:3,padding:"1px 5px",border:`1px solid ${bktMainColor?bktMainColor+"33":"#2a2a2a"}`}}>{bkt.emoji} {bkt.label}</span>}
                {isOneOff&&<span style={{fontSize:9,color:"#383838",fontWeight:600,letterSpacing:.4,textTransform:"uppercase",borderRadius:3,padding:"1px 4px",border:"1px solid #2a2a2a"}}>one-off</span>}
                {task.time&&!hideTime&&<span style={{fontSize:10,color:"#888",fontWeight:500}}>{fmtTime(task.time)}</span>}
                {dlShow&&<span style={{fontSize:11,color:dlShow.color,fontWeight:dlShow.weight}}>{dlShow.text}</span>}
                {(()=>{const d=task.dueDate?daysDiff(task.dueDate):null;if(d===null||d>=0)return null;const days=Math.abs(d);return<span style={{fontSize:10,fontWeight:800,color:"#FF453A",background:"#FF453A18",borderRadius:4,padding:"1px 5px",letterSpacing:.2}}>⚠ {days}d overdue</span>;})()}
