function DashboardView({tasks,buckets,onEdit,onCheck,celebratingIds,readOnly,dayFilter,onSnooze}){
  const {lm,text:dvText,cardBg:dvCardBg,border:dvBorder,muted:dvMuted,navBg:dvNavBg}=useTheme();
  const now=etNow();
  const nm=now.getHours()*60+now.getMinutes();
  const dateLbl=now.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
  // Helper: exclude if done and NOT currently celebrating (celebrating = show green then vanish)
  const excl=t=>t.isRef||(t.done&&!celebratingIds.has(t.id));
  // Overdue: past date tasks
  const overdue=tasks.filter(t=>!excl(t)&&t.dueDate&&daysDiff(t.dueDate)<0).sort((a,b)=>(a.dueDate||"").localeCompare(b.dueDate||""));
  // Missed Today: timed tasks from today whose scheduled time already passed
  const missedToday=tasks.filter(t=>{
    if(excl(t))return false;
    return t.dueDate&&daysDiff(t.dueDate)===0&&t.time&&t2m(t.time)<nm;
  }).sort((a,b)=>t2m(a.time)-t2m(b.time));
  // Do Now: in-progress one-offs + timed tasks in next 2h (NO untimed tasks)
  const doNow=tasks.filter(t=>{
    if(excl(t))return false;
    if(missedToday.find(x=>x.id===t.id))return false;
    // in-progress one-offs always show here
    if(t.status==="inprogress"&&!(t.frequency&&t.frequency.trim()))return true;
    if(!t.dueDate||daysDiff(t.dueDate)!==0)return false;
    if(!t.time)return false; // untimed tasks go to "Later Today" only
    return t2m(t.time)>=nm&&t2m(t.time)<=nm+120;
  }).sort((a,b)=>{const at=a.time?t2m(a.time):9999,bt=b.time?t2m(b.time):9999;return at-bt;});
  // Do In A Few Hours: 2-6h from now (timed only)
  const doSoon=tasks.filter(t=>{
    if(excl(t))return false;
    if(doNow.find(x=>x.id===t.id)||missedToday.find(x=>x.id===t.id))return false;
    return t.dueDate&&daysDiff(t.dueDate)===0&&t.time&&t2m(t.time)>nm+120&&t2m(t.time)<=nm+360;
  }).sort((a,b)=>t2m(a.time)-t2m(b.time));
  // Later Today: ALL remaining today tasks not in any other bucket (timed + untimed)
  const laterToday=tasks.filter(t=>{
    if(excl(t))return false;
    if(!t.dueDate||daysDiff(t.dueDate)!==0)return false;
    if(overdue.find(x=>x.id===t.id)||missedToday.find(x=>x.id===t.id))return false;
    if(doNow.find(x=>x.id===t.id)||doSoon.find(x=>x.id===t.id))return false;
    return true; // everything else due today
  }).sort((a,b)=>{const at=a.time?t2m(a.time):9999,bt=b.time?t2m(b.time):9999;return at-bt;});

  const DashCard=({t,color})=>{
    const bkt=buckets.find(b=>b.id===t.bucketId);
    const isCelebrating=celebratingIds.has(t.id);
    const isDone=t.done||isCelebrating;
    const isIP=t.status==="inprogress"&&!(t.frequency&&t.frequency.trim());
    if(t.done&&!isCelebrating)return null;
    return(
      <div onClick={()=>onEdit(t)}
        style={{background:isDone?(lm?"#e8f5e8":"#0a120a"):(lm?"#ffffff":"#0e0e0e"),borderRadius:10,border:`1px solid ${isDone?"#30D15833":color+"33"}`,padding:"10px 14px",marginBottom:6,cursor:"pointer",display:"flex",alignItems:"center",gap:10,transition:"all .4s",opacity:isDone?.6:1}}
        onMouseEnter={e=>e.currentTarget.style.borderColor=color+"77"}
        onMouseLeave={e=>e.currentTarget.style.borderColor=isDone?"#30D15833":color+"33"}>
        {t.time&&<div style={{textAlign:"center",flexShrink:0,minWidth:44}}>
          <div style={{fontSize:15,fontWeight:800,color:isDone?"#30D158":color,letterSpacing:-.3,lineHeight:1}}>{fmtTime(t.time)}</div>
        </div>}
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,color:isDone?"#30D158":(lm?"#1a1a1a":TEXT),fontWeight:500,lineHeight:1.4,textDecoration:isDone?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title||"Untitled"}</div>
          <div style={{display:"flex",alignItems:"center",gap:6,marginTop:2}}>
            {isIP&&!t.time&&<span style={{fontSize:10,color:"#5E5CE6",fontWeight:600}}>◉ in progress</span>}
            {bkt&&<span style={{fontSize:10,color:bkt.mainColor||MUTED}}>{bkt.emoji} {bkt.label}</span>}
          </div>
        </div>
        {!readOnly&&<div onClick={e=>{e.stopPropagation();onCheck(t.id);}} style={{width:22,height:22,borderRadius:6,border:`2px solid ${isDone?"#30D158":color}`,background:isDone?"#30D158":"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"background .2s"}}>
          {isDone&&<span style={{color:"#000",fontSize:10,fontWeight:900,lineHeight:1}}>✓</span>}
        </div>}
      </div>
    );
  };

  const Section=({title,subtitle,color,icon,items,emptyMsg,showEmpty})=>(
    <div style={{marginBottom:24}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
        <span style={{fontSize:14}}>{icon}</span>
        <div>
          <span style={{fontWeight:800,fontSize:13,color,letterSpacing:.5,textTransform:"uppercase"}}>{title}</span>
          {subtitle&&<span style={{fontSize:10,color:color+"88",marginLeft:8,fontWeight:400,letterSpacing:.3}}>{subtitle}</span>}
        </div>
        <div style={{flex:1,height:1,background:color+"33",marginLeft:4}}/>
        <span style={{fontSize:11,color,fontWeight:700,background:lm?color+"44":color+"22",padding:"2px 8px",borderRadius:99}}>{items.length}</span>
      </div>
      {items.length===0&&showEmpty&&(
        <div style={{textAlign:"center",padding:"14px 0",color:MUTED,fontSize:12,fontStyle:"italic",background:lm?"#e8f2fa":"#0a0a0a",borderRadius:10,border:`1px solid ${lm?"#b0c8e0":BORDER}`}}>{emptyMsg}</div>
      )}
      {items.map(t=><DashCard key={t.id} t={t} color={color}/>)}
    </div>
  );

  // ── Date Preview Mode (any specific date from dropdown) ────────────────
  const _isSpecificDate=dayFilter!=="today"&&dayFilter!=="todaynomundane"&&dayFilter!=="all"&&dayFilter!=="overdue"&&dayFilter!=="todaytomorrow"&&dayFilter!=="nodate"&&dayFilter!=="alltasks";
  if(_isSpecificDate){
    // Compute the preview date string and label
    let _pvDateStr,_pvLabel;
    if(dayFilter==="tomorrow"){
      const _d=new Date(todayStr()+"T00:00:00");_d.setDate(_d.getDate()+1);_pvDateStr=_d.toISOString().split("T")[0];
      _pvLabel=_d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});

      let _dd=new Date(_n);while(_dd.getDay()!==_wd)_dd.setDate(_dd.getDate()+1);
      _pvDateStr=_dd.toISOString().split("T")[0];
      _pvLabel=_dd.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
    } else { _pvDateStr=null; _pvLabel=""; }
    const _pvAll=_pvDateStr?tasks.filter(t=>!excl(t)&&t.dueDate&&t.dueDate===_pvDateStr):[];
    // timed first sorted by time, untimed last
    const _pvTimed=[..._pvAll.filter(t=>t.time)].sort((a,b)=>t2m(a.time)-t2m(b.time));
    const _pvNoTime=_pvAll.filter(t=>!t.time);
    const _pvEarly=_pvTimed.filter(t=>t2m(t.time)<720);
    const _pvDay=_pvTimed.filter(t=>t2m(t.time)>=720&&t2m(t.time)<1080);
    const _pvNight=_pvTimed.filter(t=>t2m(t.time)>=1080);
    const PvCard=({t})=>{

function HealthView({tasks,buckets,onEdit,activeTab,childBucketIds}){
  const {text:hvTx,border:hvBo,cardBg:hvCard,lm:hvLm}=useTheme();
  // Bucket filter (respects activeTab, ignores date filter)
  const bktFiltered=tasks.filter(t=>{
    if(!activeTab||activeTab==="all")return true;
    return t.bucketId===activeTab||(childBucketIds||[]).includes(t.bucketId);
  });
  // Compute health for every task with a frequency
  const rows=bktFiltered
    .filter(t=>t.frequency&&t.frequency.trim()&&!isNaN(parseInt(t.frequency.trim()))&&parseInt(t.frequency.trim())>0)
    .map(t=>{
      const dt=taskDeltaTally(t);
      const dueDiff=t.dueDate?daysDiff(t.dueDate):0;
      let status,color,bg,sortKey;
      if(dt!==null){
        // Use deltaTally: negative=overdue, 0=due, positive=good
        if(dt<0){status=`OVERDUE ${Math.abs(dt)}d`;color="#FF453A";bg=hvLm?"#ffe0e0":"#1a0505";sortKey=dt;}
        else if(dt===0){status="DUE";color="#FF9F0A";bg=hvLm?"#fff0d0":"#1a0d00";sortKey=0;}
        else{status=`GOOD +${dt}d`;color="#30D158";bg=hvLm?"#d0f5e0":"#071500";sortKey=dt;}
      } else {
        // No frequency: use date
        if(dueDiff<0){status=`OVERDUE ${Math.abs(dueDiff)}d`;color="#FF453A";bg="#1a0505";sortKey=dueDiff;}
        else if(dueDiff===0){status="DUE";color="#FF9F0A";bg="#1a0d00";sortKey=0;}
        else{status=`GOOD +${dueDiff}d`;color="#30D158";bg="#071500";sortKey=dueDiff;}
      }
      return{t,status,color,bg,sortKey};
    })
    .sort((a,b)=>a.sortKey-b.sortKey);

  // Include tasks without frequency too, always GOOD unless overdue by date
  const allRows=[
    ...rows,
    ...bktFiltered
      .filter(t=>!t.frequency||!t.frequency.trim()||isNaN(parseInt(t.frequency.trim()))||parseInt(t.frequency.trim())<=0)
      .map(t=>{
        const dueDiff=t.dueDate?daysDiff(t.dueDate):0;
        let status,color,bg,sortKey;
        if(dueDiff<0){status=`OVERDUE ${Math.abs(dueDiff)}d`;color="#FF453A";bg=hvLm?"#ffe0e0":"#1a0505";sortKey=dueDiff;}
        else if(dueDiff===0){status="DUE";color="#FF9F0A";bg=hvLm?"#fff0d0":"#1a0d00";sortKey=0;}
        else{status=`GOOD +${dueDiff}d`;color="#30D158";bg=hvLm?"#d0f5e0":"#071500";sortKey=dueDiff;}
        return{t,status,color,bg,sortKey};
      })
      .sort((a,b)=>a.sortKey-b.sortKey)
  ].sort((a,b)=>a.sortKey-b.sortKey);

  const [healthQ,setHealthQ]=useState("");
  const displayRows=healthQ.trim()?allRows.filter(({t})=>(t.title||"").toLowerCase().includes(healthQ.toLowerCase())):allRows;
  return(
    <div style={{display:"flex",flexDirection:"column",flex:1,minHeight:0}}>
      <div style={{padding:"10px 16px 6px",flexShrink:0,display:"flex",alignItems:"center",gap:10}}>
        <input value={healthQ} onChange={e=>setHealthQ(e.target.value)} placeholder="Filter tasks…" style={{flex:1,padding:"6px 10px",borderRadius:8,border:`1px solid ${hvBo}`,background:hvCard,color:hvTx,fontSize:12,fontFamily:"inherit",outline:"none"}}/>
        <span style={{fontSize:10,fontWeight:700,color:MUTED,letterSpacing:.5,flexShrink:0}}>⬡ {displayRows.length}</span>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"4px 16px 24px"}}>
        <div style={{maxWidth:640,margin:"0 auto"}}>
          {displayRows.map(({t,status,color,bg})=>{
            const bkt=buckets.find(b=>b.id===t.bucketId);
            return(
              <div key={t.id} onClick={()=>onEdit(t)}
                style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:8,background:hvCard,marginBottom:4,border:`1px solid ${hvBo}`,cursor:"pointer"}}
                onMouseEnter={e=>e.currentTarget.style.borderColor=hvBo}
                onMouseLeave={e=>e.currentTarget.style.borderColor=hvBo}>
                <span style={{flex:1,fontSize:13,color:hvTx,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title||<span style={{color:MUTED,fontStyle:"italic"}}>Untitled</span>}</span>
                <div style={{background:bg,border:`1px solid ${color}44`,borderRadius:6,padding:"3px 10px",flexShrink:0,minWidth:90,textAlign:"center"}}>
                  <span style={{fontSize:11,fontWeight:700,color,letterSpacing:.3}}>{status}</span>
                </div>
              </div>
            );
          })}
          {displayRows.length===0&&<div style={{textAlign:"center",padding:"64px 0",color:MUTED,fontSize:14,fontStyle:"italic"}}><div style={{fontSize:32,marginBottom:12}}>⬡</div>No tasks to show</div>}
        </div>
      </div>
    </div>
  );
}

function ActivityLog({logKey,onClose}){

  const icons={add:"➕",edit:"✏️",delete:"🗑",complete:"✓"};
  const colors={add:TEXT,edit:MUTED,delete:"#FF453A",complete:"#30D158"};
  const fmtAt=s=>{const d=new Date(s);return d.toLocaleDateString("en-US",{month:"short",day:"numeric"})+" "+d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});};
  return(
    <Modal onClose={onClose} maxWidth={420}>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>

        </div>
        {log.length===0&&<div style={{textAlign:"center",padding:"32px 0",color:MUTED,fontSize:13}}>No activity yet</div>}

          <div key={i} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"8px 10px",borderBottom:`1px solid ${BORDER}`,background:i%2===0?"transparent":"#0a0a0a"}}>

            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,color:TEXT,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.title||"?"}</div>
              {e.col&&<div style={{fontSize:10,color:MUTED}}>→ {e.col}</div>}
            </div>
            <span style={{fontSize:10,color:"#333",flexShrink:0,whiteSpace:"nowrap"}}>{fmtAt(e.at)}</span>
          </div>
        ))}

function DayFilterDropdown({value,onChange}){
  const {border:dBo,text:dTx,muted:dMu,inp:dIn,lm:dLm}=useTheme();
  const [open,setOpen]=useState(false);
  const ref=useRef();
  useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[]);
  const now=etNow();
  const todayDow=now.getDay();
  const wdNames=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const wdOpts=[];
  for(let i=0;i<7;i++){
    const dow=(todayDow+i)%7;
    const d=new Date(now);d.setDate(now.getDate()+i);
    const dateStr=(d.getMonth()+1)+"/"+(d.getDate());
    const prefix=i===0?"TODAY":i===1?"TOMORROW":wdNames[dow].toUpperCase();
    wdOpts.push({id:i===0?"today":i===1?"tomorrow":"wd:"+dow,label:`${prefix} · ${dateStr}`});
  }
  const OPTS=[
    ...wdOpts,
    {id:"__sep__"},
    {id:"todaytomorrow",label:"Today + Tomorrow"},
    {id:"todaynomundane",label:"Today (No Mundane)"},
    {id:"all",label:"All Dates"},
    {id:"nodate",label:"Has No Date"},
    {id:"alltasks",label:"All Tasks"},
    {id:"overdue",label:"Overdue Only"},
  ];
  const active=OPTS.find(o=>o.id===value)||OPTS[0];
  return(
    <div ref={ref} style={{position:"relative"}}>
      <button onClick={()=>setOpen(o=>!o)}
        style={{display:"flex",alignItems:"center",gap:7,padding:"5px 10px",borderRadius:8,border:`1px solid ${open?dBo:dBo}`,background:dIn,cursor:"pointer",color:dTx,fontFamily:"inherit",fontSize:12,minWidth:90,justifyContent:"space-between"}}>
        <span style={{fontWeight:600,maxWidth:110,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{active.label||"Today"}</span>
        <span style={{fontSize:9,color:dMu,marginLeft:4}}>{open?"▲":"▼"}</span>
      </button>
      {open&&(
        <div style={{position:"absolute",top:"calc(100% + 6px)",right:0,background:dIn,border:`1px solid ${dBo}`,borderRadius:10,overflow:"hidden",zIndex:200,minWidth:180,boxShadow:"0 8px 32px rgba(0,0,0,.8)"}}>
          {OPTS.map((opt,i)=>{
            if(opt.id==="__sep__")return <div key="sep" style={{height:1,background:dBo,margin:"4px 0"}}/>;
            const sel=opt.id===value;
            return(
              <button key={opt.id} onClick={()=>{onChange(opt.id);setOpen(false);}}
                style={{display:"flex",alignItems:"center",width:"100%",padding:"9px 14px",background:sel?dBo:"transparent",border:"none",cursor:"pointer",color:sel?LIME:dTx,fontFamily:"inherit",fontSize:12,textAlign:"left",borderLeft:sel?`2px solid ${LIME}`:"2px solid transparent"}}
                onMouseEnter={e=>{if(!sel)e.currentTarget.style.background="#1a1a1a";}}
                onMouseLeave={e=>{if(!sel)e.currentTarget.style.background="transparent";}}>
                <span style={{flex:1,fontWeight:sel?700:400}}>{opt.label}</span>
                {sel&&<span style={{color:LIME,fontSize:11}}>✓</span>}
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

function SimpleView({tasks,onEdit}){
  const {text:svTx,border:svBo,cardBg:svCard,lm:svLm}=useTheme();
  const [q,setQ]=useState("");

  const freqDaysSimple=f=>{
    if(!f)return null;
    const s=f.trim().toLowerCase();
    if(WDN.includes(s)||s==="weekday"||s==="weekdays"||s==="weekend"||s==="weekends"||s==="weekly")return 7;
    return freqToNum(f);
  };

  const rows=tasks
    .filter(t=>!t.done&&t.frequency&&t.frequency.trim())
    .map(t=>{
      const freqDays=freqDaysSimple(t.frequency);
      const sinceDays=taskDaysSinceDone(t);
      const delta=(freqDays!==null&&sinceDays!==null)?freqDays-sinceDays:null;
      return{t,freqDays,sinceDays,delta};
    });

  const filtered=q.trim()?rows.filter(({t})=>(t.title||"").toLowerCase().includes(q.toLowerCase())):rows;

  const overdue=filtered.filter(r=>r.delta!==null&&r.delta<0).sort((a,b)=>a.delta-b.delta);
  const due=filtered.filter(r=>r.delta!==null&&r.delta===0);
  const notYet=filtered.filter(r=>r.delta!==null&&r.delta>0).sort((a,b)=>a.delta-b.delta);
  const never=filtered.filter(r=>r.sinceDays===null);

        <span style={{fontSize:10,fontWeight:700,color:MUTED,letterSpacing:.5,flexShrink:0}}>≡ {filtered.length}</span>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"4px 16px 24px"}}>
        {filtered.length===0
          ? <div style={{textAlign:"center",padding:"64px 0",color:MUTED,fontSize:14,fontStyle:"italic"}}><div style={{fontSize:32,marginBottom:12}}>≡</div>{q.trim()?"No matches":"No tasks with frequency set"}</div>
          : <>
              <Section label="Overdue" accent="#FF453A" items={overdue} sinceColor="#FF453A"/>
              <Section label="Due" accent="#FF9F0A" items={due} sinceColor="#FF9F0A"/>
              <Section label="Not Due Yet" accent="#30D158" items={notYet} sinceColor="#30D158"/>
              {never.length>0&&<Section label="Never Done" accent={MUTED} items={never} sinceColor={MUTED}/>}
            </>
        }
      </div>
    </div>
  );
}

          :<button onClick={()=>setAdding(true)} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:`1px dashed ${BORDER}`,borderRadius:9,cursor:"pointer",color:MUTED,fontSize:13,fontFamily:"inherit",padding:"9px 14px",width:"100%",justifyContent:"center"}} onMouseEnter={e=>{e.currentTarget.style.borderColor="#444";e.currentTarget.style.color=TEXT;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=BORDER;e.currentTarget.style.color=MUTED;}}>+ Add Gameday Task</button>}
        </div>}

function SummaryView({tasks,buckets,onEdit,celebratingIds,dayFilter}){
  const {lm:smLm,text:smTx,border:smBo,muted:smMu,navBg:smNav,cardBg:smCard,limeText:smLime}=useTheme();
  const now=etNow();
  const dateStr=now.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
  const nm=now.getHours()*60+now.getMinutes();
  const isNoMundane=dayFilter==="todaynomundane";
  const allToday=tasks.filter(t=>!t.isRef&&!t.done&&t.dueDate&&daysDiff(t.dueDate)===0&&(!isNoMundane||!t.mundane));
  const allOverdue=tasks.filter(t=>!t.isRef&&!t.done&&t.dueDate&&daysDiff(t.dueDate)<0);
  const hiPri=allToday.filter(t=>t.priority==="crush"||t.priority==="high");
  const mundaneCt=allToday.filter(t=>t.mundane===true).length;
  const recurring=allToday.filter(t=>t.frequency&&t.frequency.trim());
  const oneoffs=allToday.filter(t=>!t.frequency||!t.frequency.trim());
  const timedUpcoming=allToday.filter(t=>t.time&&t2m(t.time)>nm).sort((a,b)=>t2m(a.time)-t2m(b.time)).slice(0,4);
  const total=allToday.length+allOverdue.length;
  const busyLabel=total===0?"All Clear":total<=3?"Light":total<=7?"Moderate":total<=12?"Busy":"Heavy";
  const busyColor=total===0?"#30D158":total<=3?"#30D158":total<=7?smLime:total<=12?"#FF9F0A":"#FF453A";
  const busyPct=Math.min(100,total*7);
  const Card=({children,style})=>(<div style={{background:smLm?"#fff":smCard,borderRadius:11,border:`1px solid ${smBo}`,padding:"12px 14px",...style}}>{children}</div>);
  const StatBox=({label,val,color,sub})=>(
    <div style={{flex:1,textAlign:"center",padding:"12px 6px",background:smLm?"#fff":smCard,borderRadius:11,border:`1px solid ${smBo}`}}>
      <div style={{fontSize:28,fontWeight:900,color:color||smMu,lineHeight:1}}>{val}</div>
      <div style={{fontSize:9,fontWeight:700,color:smMu,letterSpacing:.8,textTransform:"uppercase",marginTop:4,lineHeight:1.3}}>{label}</div>
      {sub&&<div style={{fontSize:9,color:smMu,marginTop:3}}>{sub}</div>}
    </div>
  );
  return(
    <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",background:smLm?"#deeaf5":"#000"}}>
      <div style={{padding:"14px 16px 10px",borderBottom:`1px solid ${smBo}`,background:smNav,flexShrink:0}}>
        <div style={{fontSize:10,fontWeight:700,color:smMu,letterSpacing:.6,textTransform:"uppercase"}}>Daily Summary</div>
        <div style={{fontSize:16,fontWeight:800,color:smTx,marginTop:2}}>{dateStr}</div>
      </div>
      <div style={{padding:"14px 16px",maxWidth:700,margin:"0 auto",width:"100%",boxSizing:"border-box",display:"flex",flexDirection:"column",gap:12}}>
        {/* Load meter */}
        <Card>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:11,fontWeight:700,color:smMu,textTransform:"uppercase",letterSpacing:.5}}>Today's Load</span>
            <span style={{fontSize:15,fontWeight:800,color:busyColor}}>{busyLabel}</span>
          </div>
          <div style={{height:9,background:smLm?"#dde8f4":"#111",borderRadius:5,overflow:"hidden",marginBottom:6}}>
            <div style={{height:"100%",width:`${busyPct}%`,background:`linear-gradient(90deg,${busyColor}bb,${busyColor})`,borderRadius:5,transition:"width .5s"}}/>
          </div>
          <div style={{fontSize:11,color:smMu}}>{allToday.length} due today{allOverdue.length>0&&<span style={{color:"#FF453A",fontWeight:700,marginLeft:6}}>+ {allOverdue.length} overdue</span>}</div>
        </Card>
        {/* Stat row */}
        <div style={{display:"flex",gap:8}}>
          <StatBox label="Due Today" val={allToday.length} color={smLime}/>
          <StatBox label="Overdue" val={allOverdue.length} color={allOverdue.length>0?"#FF453A":smMu}/>
          <StatBox label="High Pri" val={hiPri.length} color={hiPri.length>0?"#FF9F0A":smMu}/>
          <StatBox label="Mundane" val={mundaneCt} color={smMu}/>
        </div>
        {/* High priority */}
        {hiPri.length>0&&(
          <Card style={{border:"1px solid #FF9F0A44",background:smLm?"#fffbf0":"#140e00"}}>
            <div style={{fontSize:10,fontWeight:700,color:"#FF9F0A",letterSpacing:.6,marginBottom:10}}>🔥 HIGH PRIORITY</div>
            {hiPri.map(t=>{const bkt=buckets.find(b=>b.id===t.bucketId);return(
              <div key={t.id} onClick={()=>onEdit(t)} style={{display:"flex",alignItems:"center",gap:9,padding:"7px 8px",borderRadius:8,cursor:"pointer",marginBottom:4,transition:"background .15s"}} onMouseEnter={e=>e.currentTarget.style.background=smLm?"#ffe8c055":"#2a140055"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <span style={{fontSize:14,flexShrink:0}}>{t.priority==="crush"?"💥":"🚨"}</span>
                <span style={{flex:1,fontSize:13,fontWeight:600,color:smLm?"#7a3000":"#FF9F0A",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title||"Untitled"}</span>
                {bkt&&<span style={{fontSize:12,flexShrink:0}}>{bkt.emoji}</span>}
                {t.time&&<span style={{fontSize:11,color:"#FF9F0A",fontWeight:700,flexShrink:0}}>{fmtTime(t.time)}</span>}
              </div>
            );})}
          </Card>
        )}
        {/* Next up today */}
        {timedUpcoming.length>0&&(
          <Card>
            <div style={{fontSize:10,fontWeight:700,color:smMu,letterSpacing:.6,marginBottom:10}}>⏰ NEXT UP TODAY</div>
            {timedUpcoming.map(t=>{const bkt=buckets.find(b=>b.id===t.bucketId);const minsAway=t2m(t.time)-nm;const inLbl=minsAway<=0?"now":minsAway<60?`in ${minsAway}m`:`in ${Math.floor(minsAway/60)}h ${minsAway%60?minsAway%60+"m":""}`;return(
              <div key={t.id} onClick={()=>onEdit(t)} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 8px",borderRadius:8,cursor:"pointer",marginBottom:4,transition:"background .15s"}} onMouseEnter={e=>e.currentTarget.style.background=smLm?"#e8f2fa":"#111"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <div style={{textAlign:"center",flexShrink:0,minWidth:52}}>
                  <div style={{fontSize:13,fontWeight:800,color:"#5E5CE6",lineHeight:1}}>{fmtTime(t.time)}</div>
                  <div style={{fontSize:9,color:smMu}}>{inLbl}</div>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:smTx,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title||"Untitled"}</div>
                  {bkt&&<span style={{fontSize:10,color:bkt.mainColor||smMu}}>{bkt.emoji} {bkt.label}</span>}
                </div>
                {t.frequency&&t.frequency.trim()&&<span style={{fontSize:9,color:smMu,flexShrink:0,background:smLm?"#e0edf8":"#1a1a1a",borderRadius:4,padding:"2px 5px"}}>{freqLabel(t.frequency)}</span>}
              </div>
            );})}
          </Card>
        )}
        {/* Split: recurring vs one-off */}
        <div style={{display:"flex",gap:8}}>
          <Card style={{flex:1}}>
            <div style={{fontSize:10,fontWeight:700,color:smMu,letterSpacing:.6,marginBottom:8}}>RECURRING ({recurring.length})</div>
            {recurring.length===0?<div style={{fontSize:12,color:smMu,fontStyle:"italic"}}>None today</div>
            :recurring.slice(0,6).map(t=>(
              <div key={t.id} onClick={()=>onEdit(t)} style={{fontSize:12,color:smTx,padding:"4px 0",borderBottom:`1px solid ${smBo}`,cursor:"pointer",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",transition:"color .15s"}} onMouseEnter={e=>e.currentTarget.style.color=smLime} onMouseLeave={e=>e.currentTarget.style.color=smTx}>{t.title||"Untitled"}</div>
            ))}
            {recurring.length>6&&<div style={{fontSize:10,color:smMu,marginTop:4}}>+{recurring.length-6} more</div>}
          </Card>
          <Card style={{flex:1}}>
            <div style={{fontSize:10,fontWeight:700,color:smMu,letterSpacing:.6,marginBottom:8}}>ONE-OFFS ({oneoffs.length})</div>
            {oneoffs.length===0?<div style={{fontSize:12,color:smMu,fontStyle:"italic"}}>None today</div>
            :oneoffs.slice(0,6).map(t=>(
              <div key={t.id} onClick={()=>onEdit(t)} style={{fontSize:12,color:smTx,padding:"4px 0",borderBottom:`1px solid ${smBo}`,cursor:"pointer",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",transition:"color .15s"}} onMouseEnter={e=>e.currentTarget.style.color=smLime} onMouseLeave={e=>e.currentTarget.style.color=smTx}>{t.title||"Untitled"}</div>
            ))}
            {oneoffs.length>6&&<div style={{fontSize:10,color:smMu,marginTop:4}}>+{oneoffs.length-6} more</div>}
          </Card>
        </div>
        {allToday.length===0&&allOverdue.length===0&&(
          <div style={{textAlign:"center",padding:"48px 0",color:smMu}}>
            <div style={{fontSize:44,marginBottom:12}}>✨</div>
            <div style={{fontSize:18,fontWeight:700,color:smTx,marginBottom:6}}>All Clear!</div>
            <div style={{fontSize:13}}>Nothing due today</div>
          </div>
        )}
      </div>
    </div>
  );
}

function PlanView({tasks,buckets,onEdit,onCheck,onSnooze,readOnly,celebratingIds}){
  const {lm:pvLm,text:pvTx,border:pvBo,muted:pvMu,navBg:pvNav,cardBg:pvCard,limeText:pvLime}=useTheme();
  const [snoozedIds,setSnoozedIds]=useState(new Set());
  const handleSnooze=t=>{
    setSnoozedIds(prev=>{const n=new Set(prev);n.add(t.id);return n;});
    onSnooze(t);
    setTimeout(()=>setSnoozedIds(prev=>{const n=new Set(prev);n.delete(t.id);return n;}),2400);
  };
  const planTasks=[...tasks.filter(t=>!t.isRef&&t.dueDate&&daysDiff(t.dueDate)<=0&&!(t.done&&!celebratingIds.has(t.id)))].sort((a,b)=>{
    const at=a.time?t2m(a.time):9999,bt=b.time?t2m(b.time):9999;
    if(at!==bt)return at-bt;
    return(a.dueDate||"").localeCompare(b.dueDate||"");
  });
  const oneOffTasks=tasks.filter(t=>!t.isRef&&!t.dueDate&&!(t.frequency&&t.frequency.trim())&&!t.done&&!t.isRef);
  const overdueTasks=planTasks.filter(t=>t.dueDate&&daysDiff(t.dueDate)<0);
  const todayTasks=planTasks.filter(t=>t.dueDate&&daysDiff(t.dueDate)===0);
  const SecHead=({color,label,count})=>(
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
      <div style={{width:6,height:6,borderRadius:"50%",background:color,flexShrink:0}}/>
      <span style={{fontSize:11,fontWeight:700,color,letterSpacing:.5}}>{label}</span>
      <div style={{flex:1,height:1,background:color+"33"}}/>
      <span style={{fontSize:10,color}}>{count}</span>
    </div>
  );
  const PlanRow=({t,isOverdue,isOneOff})=>{
    const bkt=buckets.find(b=>b.id===t.bucketId);
    const bktMain=bkt?.mainColor||null;
    const bktBg=bkt?.bgColor||null;
    const isCelebrating=celebratingIds.has(t.id);
    const isDone=t.done||isCelebrating;
    const isSnoozed=snoozedIds.has(t.id);
    const d=t.dueDate?daysDiff(t.dueDate):null;
    const overDays=(d!==null&&d<0)?Math.abs(d):0;
    // Card background: bucket bgColor takes priority, then celebrate/overdue/default
    const cardBg=isCelebrating?(pvLm?"#d8f5e0":"#0a140a"):isDone?(pvLm?"#e8f5e8":"#0a120a"):bktBg?(bktBg+"22"):(pvLm?"#ffffff":pvCard);
    const cardBorder=isCelebrating?"#30D158":(bktMain?bktMain+"55":isOverdue?"#FF453A55":pvBo);
    const leftAccent=bktMain||null;
    if(isSnoozed){
      return(
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",borderRadius:12,border:"1px solid #FF9F0A66",background:pvLm?"#fffbf0":"#1a0e00",marginBottom:6,transition:"all .3s"}}>
          <div style={{fontSize:20,flexShrink:0}}>💤</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontStyle:"italic",color:"#FF9F0A",fontWeight:600}}>Snoozed To Tomorrow</div>
            <div style={{fontSize:11,color:"#FF9F0A88",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title||"Untitled"}</div>
          </div>
        </div>
      );
    }
    return(
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",borderRadius:12,border:`1px solid ${cardBorder}`,background:cardBg,marginBottom:6,opacity:isDone?.6:1,transition:"all .3s",borderLeft:leftAccent?`3px solid ${leftAccent}`:`1px solid ${cardBorder}`}}>
        {!isOneOff&&(t.time
          ?<div style={{fontSize:18,fontWeight:800,color:isDone?"#30D158":isOverdue?"#FF453A":"#5E5CE6",flexShrink:0,minWidth:58,textAlign:"center",letterSpacing:-.5}}>{fmtTime(t.time)}</div>
          :<div style={{fontSize:12,color:pvMu,flexShrink:0,minWidth:58,textAlign:"center"}}>{overDays>0?<span style={{color:"#FF453A",fontWeight:700,fontSize:14}}>-{overDays}d</span>:"today"}</div>
        )}
        {isOneOff&&<div style={{fontSize:10,color:pvMu,flexShrink:0,minWidth:58,textAlign:"center",fontStyle:"italic"}}>no date</div>}
        <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={()=>onEdit(t)}>
          <div style={{fontSize:14,fontWeight:600,color:isDone?"#30D158":(pvLm?"#1a1a1a":pvTx),textDecoration:isDone?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",lineHeight:1.3}}>{t.title||"Untitled"}</div>
          <div style={{display:"flex",alignItems:"center",gap:6,marginTop:3,flexWrap:"wrap"}}>
            {bkt&&<span style={{fontSize:10,color:bktMain||pvMu,fontWeight:bktMain?600:400}}>{bkt.emoji} {bkt.label}</span>}
            {t.frequency&&t.frequency.trim()&&<span style={{fontSize:10,color:"#5E5CE6",background:"#5E5CE611",borderRadius:4,padding:"1px 5px",fontWeight:600}}>{t.frequency}</span>}
            {overDays>0&&<span style={{fontSize:10,fontWeight:700,color:"#FF453A",background:"#FF453A18",borderRadius:4,padding:"1px 5px"}}>⚠ {overDays}d overdue</span>}
            {isCelebrating&&<span style={{fontSize:11,color:"#30D158",fontWeight:700}}>✓ Done!</span>}
          </div>
        </div>
        {!readOnly&&!isDone&&!isOneOff&&(
          <div style={{display:"flex",gap:6,flexShrink:0}}>
            <button onClick={e=>{e.stopPropagation();handleSnooze(t);}} style={{padding:"9px 0",width:76,borderRadius:9,border:"1px solid #FF9F0A55",background:pvLm?"#fff5d0":"#1a0e00",color:"#FF9F0A",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",textAlign:"center"}}>Snooze</button>
            <button onClick={e=>{e.stopPropagation();onCheck(t.id);}} style={{padding:"9px 0",width:76,borderRadius:9,border:"none",background:pvLime,color:pvLm?"#fff":"#000",fontSize:12,fontWeight:800,cursor:"pointer",fontFamily:"inherit",textAlign:"center"}}>Done</button>
          </div>
        )}
        {!readOnly&&!isDone&&isOneOff&&(
          <button onClick={()=>onEdit(t)} style={{padding:"7px 12px",borderRadius:8,border:`1px solid ${pvBo}`,background:"transparent",color:pvMu,fontSize:11,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap",flexShrink:0}}>Schedule</button>
        )}
        {(isDone&&!isCelebrating)&&<span style={{fontSize:11,color:"#30D15877",flexShrink:0}}>✓</span>}
      </div>
    );
  };
  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0}}>
      <div style={{padding:"10px 16px 8px",borderBottom:`1px solid ${pvBo}`,background:pvNav,flexShrink:0,display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:13,fontWeight:700,color:pvLime,letterSpacing:.6}}>▣ Plan — Today</span>
        <span style={{fontSize:11,color:pvMu}}>{planTasks.length} tasks{oneOffTasks.length>0?` · ${oneOffTasks.length} unscheduled`:""}</span>
        {overdueTasks.length>0&&<span style={{fontSize:11,color:"#FF453A",fontWeight:700}}>⚠ {overdueTasks.length} overdue</span>}
        <div style={{flex:1}}/>
        <span style={{fontSize:10,color:pvMu}}>tap title to edit</span>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"14px 16px",width:"100%",boxSizing:"border-box"}}>
        {planTasks.length===0&&oneOffTasks.length===0&&<div style={{textAlign:"center",padding:"56px 0",color:pvMu,fontSize:14}}>
          <div style={{fontSize:32,marginBottom:10}}>▣</div>
          Nothing due today — you're clear!
        </div>}
        {overdueTasks.length>0&&(
          <div style={{marginBottom:18}}>
            <SecHead color="#FF453A" label="OVERDUE" count={overdueTasks.length}/>
            {overdueTasks.map(t=><PlanRow key={t.id} t={t} isOverdue={true}/>)}
          </div>
        )}
        {todayTasks.length>0&&(
          <div style={{marginBottom:18}}>
            <SecHead color={pvLime} label="TODAY" count={todayTasks.length}/>
            {todayTasks.map(t=><PlanRow key={t.id} t={t} isOverdue={false}/>)}
          </div>
        )}
        {oneOffTasks.length>0&&(
          <div>
            <SecHead color={pvMu} label="UNSCHEDULED ONE-OFFS" count={oneOffTasks.length}/>
            <div style={{fontSize:10,color:pvMu,marginBottom:8,fontStyle:"italic"}}>These have no date — tap Schedule to assign one</div>
            {oneOffTasks.map(t=><PlanRow key={t.id} t={t} isOverdue={false} isOneOff={true}/>)}
          </div>
        )}
      </div>
    </div>
  );
}
function SprintsMgr({sprints,onSave,onClose}){
  const {navBg:mgrBg,border:mgrBo,text:mgrTx,muted:mgrMu,cardBg:mgrCard}=useTheme();
  const [list,setList]=useState((sprints||[]).map(s=>({id:s.id,emoji:s.emoji||"⚡",name:s.name||"",items:s.items||[]})));
  const [nw,setNw]=useState({emoji:"⚡",name:""});
  const upd=(id,k,v)=>setList(ls=>ls.map(sp=>sp.id===id?{...sp,[k]:v}:sp));
  const add=()=>{if(!nw.name.trim())return;setList(ls=>[...ls,{...nw,id:genId(),items:[]}]);setNw({emoji:"⚡",name:""});};
  const del=id=>setList(ls=>ls.filter(sp=>sp.id!==id));
  return(
    <div style={{position:"fixed",inset:0,background:mgrBg,zIndex:400,display:"flex",flexDirection:"column"}}>
      <div style={{padding:"16px 18px",borderBottom:`1px solid ${mgrBo}`,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <button onClick={onClose} style={{background:"none",border:"none",color:mgrMu,fontSize:22,cursor:"pointer",lineHeight:1,padding:"0 4px"}}>‹</button>
        <span style={{fontWeight:700,fontSize:16,color:mgrTx}}>⚡ Sprint Manager</span>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"16px 18px"}}>
        <div style={{fontSize:11,color:mgrMu,marginBottom:12,lineHeight:1.5}}>Sprints are self-contained checklists — great for breaking news rundowns, event protocols, or repeatable workflows. Items are separate from your main task list.</div>
        {list.map(sp=>(
          <div key={sp.id} style={{marginBottom:6}}>
            <div style={{background:mgrCard,borderRadius:8,border:`1px solid ${mgrBo}`,display:"flex",gap:6,alignItems:"center",padding:"9px 11px"}}>
              <input value={sp.emoji||""} onChange={e=>upd(sp.id,"emoji",e.target.value)} style={{width:36,padding:"4px",borderRadius:6,border:`1px solid ${mgrBo}`,background:mgrBg,color:mgrTx,fontSize:16,textAlign:"center",outline:"none",fontFamily:"inherit"}}/>
              <input value={sp.name} onChange={e=>upd(sp.id,"name",e.target.value)} placeholder="Sprint name…" style={{flex:1,padding:"7px 10px",borderRadius:6,border:`1px solid ${mgrBo}`,background:mgrBg,color:mgrTx,fontSize:13,outline:"none",fontFamily:"inherit"}}/>
              <span style={{fontSize:10,color:mgrMu,flexShrink:0}}>{(sp.items||[]).length} items</span>
              <MgrDotMenu onDelete={()=>del(sp.id)}/>
            </div>
          </div>
        ))}
        {list.length===0&&<div style={{textAlign:"center",padding:"48px 0",color:mgrMu,fontSize:13,fontStyle:"italic"}}>No sprints yet</div>}
      </div>
      <div style={{padding:"0 18px 12px",flexShrink:0,borderTop:`1px solid ${mgrBo}`}}>
        <div style={{display:"flex",gap:7,alignItems:"center",padding:"10px 0 12px"}}>
          <input value={nw.emoji} onChange={e=>setNw(n=>({...n,emoji:e.target.value}))} style={{width:36,padding:"4px",borderRadius:6,border:`1px solid ${mgrBo}`,background:mgrBg,color:mgrTx,fontSize:16,textAlign:"center",outline:"none",fontFamily:"inherit"}}/>
          <input value={nw.name} onChange={e=>setNw(n=>({...n,name:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="New sprint name…" style={{flex:1,padding:"7px 10px",borderRadius:6,border:`1px solid ${mgrBo}`,background:mgrBg,color:mgrTx,fontSize:13,outline:"none",fontFamily:"inherit"}}/>
          <button onClick={add} style={{background:LIME,border:"none",borderRadius:7,padding:"7px 14px",cursor:"pointer",fontWeight:800,fontSize:13,color:"#000",fontFamily:"inherit"}}>+</button>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onClose} style={{flex:1,padding:"11px",borderRadius:9,border:`1px solid ${mgrBo}`,background:"transparent",color:mgrMu,cursor:"pointer",fontFamily:"inherit",fontSize:13}}>Cancel</button>
          <button onClick={()=>onSave(list)} style={{flex:2,padding:"11px",borderRadius:9,border:"none",background:LIME,color:"#000",cursor:"pointer",fontWeight:700,fontFamily:"inherit",fontSize:14}}>Save</button>
        </div>
      </div>
    </div>
  );
}
function SprintView({sprints,onSaveSprints}){
  const {lm:svLm,text:svTx,border:svBo,muted:svMu,navBg:svNav,cardBg:svCard,inp:svInp,limeText:svLime}=useTheme();
  const [activeSprint,setActiveSprint]=useState(sprints&&sprints.length>0?sprints[0].id:null);
  const [newTitle,setNewTitle]=useState("");
  const [expandedId,setExpandedId]=useState(null);
  const sprint=useMemo(()=>(sprints||[]).find(s=>s.id===activeSprint),[sprints,activeSprint]);
  const items=useMemo(()=>sprint?.items||[],[sprint]);
  const saveItems=newItems=>{
    const updated=(sprints||[]).map(sp=>sp.id===activeSprint?{...sp,items:newItems}:sp);
    onSaveSprints(updated);
  };
  const toggleDone=id=>saveItems(items.map(x=>x.id===id?{...x,done:!x.done}:x));
  const updItem=(id,k,v)=>saveItems(items.map(x=>x.id===id?{...x,[k]:v}:x));
  const delItem=id=>saveItems(items.filter(x=>x.id!==id));
  const addItem=()=>{if(!newTitle.trim())return;saveItems([...items,{id:genId(),title:newTitle.trim(),done:false,notes:"",link:""}]);setNewTitle("");};
  const moveUp=i=>{if(i===0)return;const a=[...items];[a[i-1],a[i]]=[a[i],a[i-1]];saveItems(a);};
  const moveDn=i=>{if(i===items.length-1)return;const a=[...items];[a[i],a[i+1]]=[a[i+1],a[i]];saveItems(a);};
  const resetAll=()=>saveItems(items.map(x=>({...x,done:false})));
  const doneCount=items.filter(x=>x.done).length;
  if(!sprints||sprints.length===0){
    return(<div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32,gap:12,color:svMu}}>
      <div style={{fontSize:36}}>⚡</div>
      <div style={{fontSize:15,fontWeight:700,color:svTx}}>No sprints yet</div>
      <div style={{fontSize:13,textAlign:"center",lineHeight:1.6}}>Create sprints via Sidebar → Sprint Manager.</div>
    </div>);
  }
  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0}}>
      <div style={{padding:"10px 16px 8px",borderBottom:`1px solid ${svBo}`,background:svNav,flexShrink:0}}>
        <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:2,scrollbarWidth:"none"}}>
          {(sprints||[]).map(sp=>(
            <button key={sp.id} onClick={()=>setActiveSprint(sp.id)} style={{padding:"6px 14px",borderRadius:8,border:`1px solid ${activeSprint===sp.id?svLime:svBo}`,background:activeSprint===sp.id?(svLm?"#d8f5d0":"#0a140a"):"transparent",color:activeSprint===sp.id?svLime:svMu,fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap",flexShrink:0}}>
              {sp.emoji||"⚡"} {sp.name}
            </button>
          ))}
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"14px 16px",maxWidth:680,margin:"0 auto",width:"100%",boxSizing:"border-box"}}>
        {sprint&&(
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
            <span style={{fontSize:20}}>{sprint.emoji||"⚡"}</span>
            <span style={{fontSize:15,fontWeight:800,color:svTx}}>{sprint.name}</span>
            <span style={{fontSize:11,color:svMu,marginLeft:4}}>{doneCount}/{items.length}</span>
            {doneCount>0&&<button onClick={resetAll} style={{marginLeft:"auto",padding:"4px 10px",borderRadius:6,border:`1px solid ${svBo}`,background:"transparent",color:svMu,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>↺ Reset</button>}
          </div>
        )}
        {items.map((item,i)=>(
          <div key={item.id} style={{marginBottom:4}}>
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",borderRadius:item.done||expandedId!==item.id?10:"10px 10px 0 0",border:`1px solid ${item.done?"#30D15844":svBo}`,background:item.done?(svLm?"#eafaf0":"#091409"):(svLm?"#ffffff":svCard),transition:"all .2s"}}>
              <div onClick={()=>toggleDone(item.id)} style={{width:20,height:20,borderRadius:5,border:`2px solid ${item.done?"#30D158":svBo}`,background:item.done?"#30D158":"transparent",flexShrink:0,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s"}}>
                {item.done&&<span style={{color:"#000",fontSize:11,fontWeight:900,lineHeight:1}}>✓</span>}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:2,flexShrink:0}}>
                <button onClick={()=>moveUp(i)} disabled={i===0} style={{background:"none",border:"none",color:i===0?svBo:svMu,cursor:i===0?"default":"pointer",fontSize:10,lineHeight:1,padding:"1px 3px"}}>▲</button>
                <button onClick={()=>moveDn(i)} disabled={i===items.length-1} style={{background:"none",border:"none",color:i===items.length-1?svBo:svMu,cursor:i===items.length-1?"default":"pointer",fontSize:10,lineHeight:1,padding:"1px 3px"}}>▼</button>
              </div>
              <span style={{flex:1,fontSize:13,fontWeight:500,color:item.done?"#30D158":svTx,textDecoration:item.done?"line-through":"none",fontStyle:item.done?"italic":"normal",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.title||"Untitled"}</span>
              {item.link&&<a href={item.link.startsWith("http")?item.link:"https://"+item.link} target="_blank" rel="noopener" onClick={e=>e.stopPropagation()} style={{fontSize:13,color:"#0A84FF",flexShrink:0,textDecoration:"none"}} title={item.link}>↗</a>}
              <button onClick={()=>setExpandedId(expandedId===item.id?null:item.id)} style={{background:"none",border:"none",color:expandedId===item.id?svTx:svMu,cursor:"pointer",fontSize:14,padding:"0 3px",lineHeight:1,flexShrink:0}}>⋯</button>
              <button onClick={()=>delItem(item.id)} style={{background:"none",border:"none",color:"#FF453A33",cursor:"pointer",fontSize:13,padding:"0 3px",lineHeight:1,flexShrink:0,transition:"color .15s"}} onMouseEnter={e=>e.currentTarget.style.color="#FF453A"} onMouseLeave={e=>e.currentTarget.style.color="#FF453A33"}>✕</button>
            </div>
            {expandedId===item.id&&(
              <div style={{padding:"9px 12px",borderRadius:"0 0 10px 10px",border:`1px solid ${svBo}`,borderTop:"none",background:svLm?"#f4f8fc":"#0a0a10",display:"flex",flexDirection:"column",gap:7}}>
                <input value={item.link||""} onChange={e=>updItem(item.id,"link",e.target.value)} placeholder="Link URL…" style={{width:"100%",boxSizing:"border-box",padding:"6px 10px",borderRadius:7,border:`1px solid ${svBo}`,background:svLm?"#fff":"#161616",color:svTx,fontSize:12,fontFamily:"inherit",outline:"none"}}/>
                <textarea value={item.notes||""} onChange={e=>updItem(item.id,"notes",e.target.value)} placeholder="Notes…" rows={2} style={{width:"100%",boxSizing:"border-box",padding:"6px 10px",borderRadius:7,border:`1px solid ${svBo}`,background:svLm?"#fff":"#161616",color:svTx,fontSize:12,fontFamily:"inherit",outline:"none",resize:"none"}}/>
              </div>
            )}
          </div>
        ))}
        {items.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:svMu,fontSize:13}}>
          <div style={{fontSize:28,marginBottom:8}}>⚡</div>
          No items yet — add below
        </div>}
        <div style={{display:"flex",gap:7,marginTop:14}}>
          <input value={newTitle} onChange={e=>setNewTitle(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addItem()} placeholder="Add item…" style={{flex:1,padding:"9px 12px",borderRadius:9,border:`1px solid ${svBo}`,background:svLm?"#fff":svInp,color:svTx,fontSize:13,fontFamily:"inherit",outline:"none"}}/>
          <button onClick={addItem} style={{padding:"9px 20px",borderRadius:9,border:"none",background:LIME,color:"#000",fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>+</button>
        </div>
      </div>
    </div>
  );
}
